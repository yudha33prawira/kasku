                            ${familyMembers.length > 0 ? familyMembers.map(m => {
                                const memberName = m.users?.display_name || m.users?.username || `User ${m.user_id}`;
                                const memberCode = m.users?.user_code || '???';
                                const isOwner = m.role === 'owner';
                                const isMe = m.user_id === currentCustomUser?.id;
                                return `
                                <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 4px; border-bottom:1px solid var(--border-color);">
                                    <span>${isMe ? '👤' : '👥'} ${escapeHtml(memberName)} ${isMe ? '⭐ (Saya)' : ''}</span>
                                    <span style="font-size:11px; color:var(--text-secondary);">
                                        ${memberCode} ${isOwner ? '👑 Owner' : ''}
                                    </span>
                                </div>
                            `}).join('') : '<div style="padding:8px; color:var(--text-secondary);">Belum ada anggota</div>'}
                        </div>
                    </div>
                </div>
                
                <!-- ====== FORM UNDANG ====== -->
                <div style="display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; border-top:1px solid var(--border-color); padding-top:16px;">
                    <input type="email" id="inviteEmail" placeholder="📧 Email anggota baru" class="modal-input" style="flex:1; min-width:150px; margin-bottom:0;">
                    <button id="inviteMemberBtn" style="background:linear-gradient(135deg, #10b981, #059669); border:none; border-radius:40px; padding:8px 20px; color:white; font-weight:600; cursor:pointer; white-space:nowrap;">
                        ➕ Undang
                    </button>
                </div>
            ` : `
                <!-- ====== BELUM PUNYA KELUARGA ====== -->
                <div style="margin-bottom:12px;">
                    <p style="color:var(--text-secondary); margin-bottom:16px;">Bergabung dengan keluarga untuk berbagi data keuangan</p>
                    
                    <!-- Buat Keluarga -->
                    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
                        <input type="text" id="familyNameInput" placeholder="Nama Keluarga" class="modal-input" style="flex:1; min-width:150px; margin-bottom:0;">
                        <button id="createFamilyBtn" style="background:linear-gradient(135deg, #3b82f6, #2563eb); border:none; border-radius:40px; padding:8px 20px; color:white; font-weight:600; cursor:pointer; white-space:nowrap;">
                            🏠 Buat
                        </button>
                    </div>
                    
                    <!-- Gabung Keluarga -->
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <input type="text" id="joinFamilyInput" placeholder="ID Keluarga (UUID)" class="modal-input" style="flex:1; min-width:150px; margin-bottom:0;">
                        <button id="joinFamilyBtn" style="background:linear-gradient(135deg, #8b5cf6, #6d28d9); border:none; border-radius:40px; padding:8px 20px; color:white; font-weight:600; cursor:pointer; white-space:nowrap;">
                            🔗 Gabung
                        </button>
                    </div>
                    
                    <div style="margin-top:12px; padding:12px; background:rgba(251,191,36,0.1); border-radius:8px; border-left:3px solid #fbbf24;">
                        <span style="font-size:12px; color:var(--text-secondary);">
                            💡 <strong>Belum punya keluarga?</strong> Buat keluarga baru atau minta ID Keluarga dari teman/keluarga Anda.
                        </span>
                    </div>
                </div>
            `}
        </div>
        
        <!-- ====== TEMA ====== -->
        <div class="card">
            <div class="card-title">🎨 Tampilan</div>
            <div class="theme-toggle" id="themeToggle">
                <span class="theme-toggle-label">🌙 Mode Gelap</span>
                <label class="theme-switch">
                    <input type="checkbox" id="darkModeSwitch" ${document.body.classList.contains("dark") ? 'checked' : ''}>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <!-- ====== PASSWORD ====== -->
        <div class="card">
            <div class="card-title">🔐 Ubah Password</div>
            <div class="password-wrapper"><input type="password" id="oldPass" placeholder="Password Lama" class="modal-input"><button class="toggle-password" data-target="oldPass">👁️</button></div>
            <div class="password-wrapper"><input type="password" id="newPass" placeholder="Password Baru (min 6)" class="modal-input"><button class="toggle-password" data-target="newPass">👁️</button></div>
            <div class="password-wrapper"><input type="password" id="confirmPass" placeholder="Konfirmasi Password" class="modal-input"><button class="toggle-password" data-target="confirmPass">👁️</button></div>
            <button id="changePassBtn" class="modal-btn modal-btn-primary">Update Password</button>
        </div>
    `;
    
    document.getElementById("appContainer").innerHTML = html;
    
    // ============================================
    // EVENT LISTENERS
    // ============================================
    
    // 1. Copy Family ID dari Profil
    document.getElementById("copyFamilyIdFromProfileBtn")?.addEventListener("click", copyFamilyId);
    
    // 2. Edit Profile
    document.getElementById("editProfileBtn")?.addEventListener("click", () => {
        openEditProfileModal();
    });
    
    // 3. Logout
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
    
    // 4. Back
    document.getElementById("backFromSettingsBtn")?.addEventListener("click", () => { 
        if (previousNav && previousNav !== "settings") { 
            currentNav = previousNav; 
            updateNav(); 
            renderCurrentView(); 
        } else { 
            currentNav = "home"; 
            updateNav(); 
            renderHome(); 
        } 
    });
    
    // 5. Change Password
    document.getElementById("changePassBtn")?.addEventListener("click", async () => {
        const old = document.getElementById("oldPass").value;
        const newp = document.getElementById("newPass").value;
        const conf = document.getElementById("confirmPass").value;
        
        if (!old || !newp) {
            showToast("❌ Isi semua field");
            return;
        }
        if (newp.length < 6) {
            showToast("❌ Password baru minimal 6 karakter");
            return;
        }
        if (newp !== conf) {
            showToast("❌ Konfirmasi password tidak cocok");
            return;
        }
        
        try {
            const { error } = await sb.auth.updateUser({ password: newp });
            if (error) throw error;
            showToast("✅ Password berhasil diubah");
            document.getElementById("oldPass").value = "";
            document.getElementById("newPass").value = "";
            document.getElementById("confirmPass").value = "";
        } catch(e) {
            showToast("❌ Gagal update password: " + e.message);
        }
    });
    
    // 6. Dark Mode
    const darkModeSwitch = document.getElementById("darkModeSwitch");
    if (darkModeSwitch) {
        darkModeSwitch.addEventListener("change", async (e) => { 
            await toggleTheme(); 
        });
    }
    
    // 7. Create Family
    document.getElementById("createFamilyBtn")?.addEventListener("click", async () => {
        const name = document.getElementById("familyNameInput").value.trim();
        if (!name) {
            showToast("❌ Masukkan nama keluarga");
            return;
        }
        await createFamily(name);
    });
    
    // 8. Join Family
    document.getElementById("joinFamilyBtn")?.addEventListener("click", async () => {
        const familyId = document.getElementById("joinFamilyInput").value.trim();
        if (!familyId) {
            showToast("❌ Masukkan ID Keluarga");
            return;
        }
        await joinFamily(familyId);
    });
    
    // 9. Invite Member
    document.getElementById("inviteMemberBtn")?.addEventListener("click", async () => {
        const email = document.getElementById("inviteEmail").value.trim();
        if (!email) {
            showToast("❌ Masukkan email");
            return;
        }
        try {
            const { data: userData, error: userError } = await sb
                .from("users")
                .select("id")
                .eq("email", email)
                .maybeSingle();
            
            if (userError || !userData) {
                throw new Error("User tidak ditemukan atau belum memiliki akun");
            }
            
            const { data: existing, error: existError } = await sb
                .from("family_members")
                .select("*")
                .eq("family_id", currentFamilyId)
                .eq("user_id", userData.id)
                .maybeSingle();
            
            if (existing) {
                throw new Error("User sudah menjadi anggota");
            }
            
            await sb.from("family_members").insert({
                family_id: currentFamilyId,
                user_id: userData.id,
                role: 'member'
            });
            
            showToast("✅ Anggota berhasil ditambahkan!");
            await loadFamilyData();
            renderSettings();
        } catch(e) {
            showToast("❌ Gagal mengundang: " + e.message);
        }
    });
    
    // 10. Leave Family
    document.getElementById("leaveFamilyBtn")?.addEventListener("click", async () => {
        if (!confirm("Yakin ingin keluar dari keluarga?")) return;
        const userId = await userManager.getUserId();
        if (!userId) return;
        
        try {
            await sb.from("family_members")
                .delete()
                .eq("family_id", currentFamilyId)
                .eq("user_id", userId);
            
            currentFamilyId = null;
            familyInfo = null;
            familyMembers = [];
            showToast("✅ Keluar dari keluarga");
            await loadAllData();
            renderSettings();
        } catch(e) {
            showToast("❌ Gagal keluar: " + e.message);
        }
    });
    
    // 11. Toggle Password
    document.querySelectorAll(".toggle-password").forEach(btn => {
        btn.onclick = () => {
            const inp = document.getElementById(btn.getAttribute("data-target"));
            if (inp) {
                if (inp.type === 'password') {
                    inp.type = 'text';
                    btn.textContent = '🙈';
                } else {
                    inp.type = 'password';
                    btn.textContent = '👁️';
                }
            }
        };
    });
}

// ============================================
// FUNGSI COPY FAMILY ID (Global)
// ============================================
function copyFamilyId() {
    if (currentFamilyId) {
        navigator.clipboard.writeText(currentFamilyId).then(() => {
            showToast("✅ ID Keluarga disalin!", 3000);
        }).catch(() => {
            // Fallback
            const textArea = document.createElement('textarea');
            textArea.value = currentFamilyId;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast("✅ ID Keluarga disalin!", 3000);
        });
    } else {
        showToast("❌ Tidak ada keluarga", 2000);
    }
}

// ============================================
// RENDER CURRENT VIEW & NAVIGATION
// ============================================
function renderCurrentView() {
    if(!appReady) return;
    if(currentNav==='home') renderHome();
    else if(currentNav==='transaksi') renderTransaksi();
    else if(currentNav==='laporan') renderLaporan();
    else if(currentNav==='hutang') renderHutang();
    else if(currentNav==='savings') renderSavings();
    else if(currentNav==='reminders') renderReminders();
    else if(currentNav==='tasks') renderTasks();
    else if(currentNav==='settings') renderSettings();
}

function updateNav() { 
    document.querySelectorAll('.nav-item').forEach(btn=>{ 
        if(btn.getAttribute('data-nav')===currentNav) btn.classList.add('active'); 
        else btn.classList.remove('active'); 
    }); 
}

function addBottomNav() {
    const navHtml = `
        <div class="bottom-nav">
            <button class="nav-item ${currentNav==='home'?'active':''}" data-nav="home"><span class="nav-icon">🏠</span><span>Beranda</span></button>
            <button class="nav-item ${currentNav==='transaksi'?'active':''}" data-nav="transaksi"><span class="nav-icon">📋</span><span>Transaksi</span></button>
            <div class="nav-center"><button id="centerAddBtn" class="nav-center-btn">+</button></div>
            <button class="nav-item ${currentNav==='hutang'?'active':''}" data-nav="hutang"><span class="nav-icon">💰</span><span>Hutang</span></button>
            <button class="nav-item ${currentNav==='tasks'?'active':''}" data-nav="tasks"><span class="nav-icon">✅</span><span>Tugas</span></button>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', navHtml);
    document.getElementById("centerAddBtn")?.addEventListener("click", () => openTransaksiModal());
    document.querySelectorAll('.nav-item').forEach(btn => { 
        btn.onclick = () => { 
            pushHistory(currentNav); 
            currentNav = btn.getAttribute("data-nav"); 
            updateNav(); 
            renderCurrentView(); 
        }; 
    });
}

window.addEventListener('popstate', function(event) { 
    if (goBack()) {
        event.preventDefault();
    }
});

// ============================================
// AUTH FUNCTIONS
// ============================================
async function handleLogin() {
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    const errorDiv = document.getElementById("loginError");
    
    if (!email || !password) { 
        errorDiv.innerText = "Email dan password harus diisi"; 
        return; 
    }
    errorDiv.innerText = "";
    
    const loadingInterval = showLoading();
    
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { 
            errorDiv.innerText = error.message; 
            clearInterval(loadingInterval);
            hideLoading();
            return; 
        }
        if (data.user) {
            showToast("Login berhasil!");
            await onAuthSuccess(data.user);
        }
    } else {
        if (password.length < 6) {
            errorDiv.innerText = "Password minimal 6 karakter";
            clearInterval(loadingInterval);
            hideLoading();
            return;
        }
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { 
            errorDiv.innerText = error.message; 
            clearInterval(loadingInterval);
            hideLoading();
            return; 
        }
        if (data.user) {
            showToast("Pendaftaran berhasil! Silakan login.");
            toggleMode();
            document.getElementById("emailInput").value = "";
            document.getElementById("passwordInput").value = "";
            clearInterval(loadingInterval);
            hideLoading();
        }
    }
}

async function handleGuest() {
    const errorDiv = document.getElementById("loginError");
    errorDiv.innerText = "";
    
    const loadingInterval = showLoading();
    
    try {
        const { data, error } = await sb.auth.signInAnonymously();
        if (error) { 
            errorDiv.innerText = error.message; 
            clearInterval(loadingInterval);
            hideLoading();
            return; 
        }
        if (data.user) {
            showToast("Masuk sebagai tamu");
            await onAuthSuccess(data.user);
        }
    } catch(e) {
        errorDiv.innerText = "Gagal masuk sebagai tamu: " + e.message;
        clearInterval(loadingInterval);
        hideLoading();
    }
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    const modalTitle = document.getElementById("modalTitle");
    const submitBtn = document.getElementById("submitLoginBtn");
    const switchText = document.getElementById("switchText");
    
    if (isLoginMode) {
        modalTitle.innerHTML = "💰 Masuk ke Akun";
        submitBtn.innerHTML = "Masuk";
        switchText.innerHTML = "Belum punya akun? Daftar";
    } else {
        modalTitle.innerHTML = "💰 Daftar Akun Baru";
        submitBtn.innerHTML = "Daftar";
        switchText.innerHTML = "Sudah punya akun? Masuk";
    }
}

async function onAuthSuccess(user) {
    currentUser = user;
    document.getElementById("loginModal").style.display = "none";
    
    // Setup custom user dengan fallback
    let customUser = await userManager.setupCustomUser(user);
    
    if (!customUser) {
        // Fallback: buat user object sederhana
        console.warn('⚠️ Using fallback user data');
        customUser = {
            id: 0,
            user_code: 'USR-???',
            auth_id: user.id,
            email: user.email,
            username: user.email.split('@')[0],
            display_name: user.user_metadata?.full_name || user.email.split('@')[0]
        };
        userManager.customUser = customUser;
        userManager.authUser = user;
        showToast("⚠️ Menggunakan data user sementara");
    }
    
    currentCustomUser = customUser;
    
    // Tampilkan user_code di console
    console.log(`👤 User Code: ${customUser.user_code || 'USR-???'}`);
    console.log(`👤 User ID: ${customUser.id || 0}`);
    
    await loadAllData();
    await initTheme();
    
    appReady = true;
    addBottomNav();
    renderCurrentView();
    hideLoading();
}

async function logout() {
    try { await sb.auth.signOut(); } catch(e) { console.log("Logout error:", e); }
    currentUser = null;
    currentCustomUser = null;
    appReady = false;
    document.querySelector(".bottom-nav")?.remove();
    document.getElementById("appContainer").innerHTML = "";
    document.getElementById("loginModal").style.display = "flex";
    document.getElementById("emailInput").value = "";
    document.getElementById("passwordInput").value = "";
    
    isLoginMode = true;
    const modalTitle = document.getElementById("modalTitle");
    const submitBtn = document.getElementById("submitLoginBtn");
    const switchText = document.getElementById("switchText");
    if (modalTitle) {
        modalTitle.innerHTML = "💰 Masuk ke Akun";
        submitBtn.innerHTML = "Masuk";
        switchText.innerHTML = "Belum punya akun? Daftar";
    }
    applyTheme(false);
}

async function startApp() {
    showLoading();
    
    await waitForSupabase();
    
    if (!initSupabase()) {
        console.error("Failed to initialize Supabase");
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('loginModal').style.display = 'flex';
        document.getElementById('loginError').innerText = "Gagal memuat Supabase. Refresh halaman.";
        return;
    }
    
    try {
        const { data, error } = await sb.auth.getSession();
        if (error && error.message?.includes("Invalid Refresh Token")) { 
            localStorage.clear(); 
            document.getElementById('loginModal').style.display = 'flex';
            hideLoading();
            return; 
        }
        if (data.session?.user) {
            await onAuthSuccess(data.session.user);
        } else { 
            document.getElementById('loginModal').style.display = 'flex';
            hideLoading();
        }
    } catch(e) { 
        console.log("Session check error:", e);
        document.getElementById('loginModal').style.display = 'flex';
        hideLoading();
    }
}

// ============================================
// EVENT LISTENERS
// ============================================
document.getElementById("submitLoginBtn")?.addEventListener("click", handleLogin);
document.getElementById("guestBtn")?.addEventListener("click", handleGuest);
document.getElementById("switchText")?.addEventListener("click", toggleMode);
document.getElementById("toggleLoginPassword")?.addEventListener("click", () => {
    const inp = document.getElementById("passwordInput");
    if(inp.type === 'password'){ inp.type = 'text'; inp.nextElementSibling.textContent = '👁️‍🗨️'; }
    else{ inp.type = 'password'; inp.nextElementSibling.textContent = '👁️'; }
});

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startApp);
} else {
    startApp();
}
</script>
