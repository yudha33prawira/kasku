<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Keuangan Keluarga - Premium</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(255,255,255,0.06);
            --bg-card-hover: rgba(255,255,255,0.10);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255,255,255,0.06);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --gradient-success: linear-gradient(135deg, #10b981, #059669);
            --gradient-danger: linear-gradient(135deg, #ef4444, #dc2626);
            --gradient-warning: linear-gradient(135deg, #f59e0b, #d97706);
            --nav-height: 70px;
            --danger-color: #f87171;
            --warning-color: #fbbf24;
            --success-color: #4ade80;
        }
        
        body { background: var(--bg-primary); font-family: 'Inter', -apple-system, sans-serif; color: var(--text-primary); min-height: 100vh; padding-bottom: calc(var(--nav-height) + 20px); transition: background 0.3s ease; }
        
        body.light {
            --bg-primary: #f1f5f9;
            --bg-secondary: #ffffff;
            --bg-card: rgba(0,0,0,0.04);
            --bg-card-hover: rgba(0,0,0,0.08);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: rgba(0,0,0,0.06);
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        
        body.light .balance-card,
        body.light .balance-card * { color: #ffffff !important; }
        body.light .balance-card .balance-label,
        body.light .balance-card .stat-label { color: rgba(255,255,255,0.7) !important; }
        body.light .balance-card .balance-amount { color: #ffffff !important; }
        body.light .balance-card .stat-value.income { color: #4ade80 !important; }
        body.light .balance-card .stat-value.expense { color: #f87171 !important; }
        body.light .balance-card .balance-eye { color: #ffffff !important; background: rgba(255,255,255,0.1) !important; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }
        
        .loading-overlay { position: fixed; inset: 0; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease; }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-logo { font-size: 64px; margin-bottom: 20px; animation: pulse 1.5s ease-in-out infinite; }
        .loading-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loading-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; }
        .loading-bar { width: 200px; height: 4px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
        .loading-bar-fill { height: 100%; background: var(--gradient-primary); border-radius: 4px; animation: shimmer 1.5s ease-in-out infinite; background-size: 200% 100%; }
        .loading-percent { color: var(--text-muted); font-size: 12px; margin-top: 12px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        
        .app-container { max-width: 420px; margin: 0 auto; padding: 16px 16px 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--bg-card); backdrop-filter: blur(20px); border-radius: var(--radius); border: 1px solid var(--border-color); margin-bottom: 16px; }
        .header-user { display: flex; align-items: center; gap: 10px; }
        .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: white; flex-shrink: 0; }
        .header-info { line-height: 1.3; }
        .header-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .header-code { font-size: 11px; color: var(--text-secondary); }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .header-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--bg-card); color: var(--text-secondary); font-size: 16px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; position: relative; }
        .header-btn:active { transform: scale(0.92); }
        .header-btn .badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 9px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .card { background: var(--bg-card); backdrop-filter: blur(10px); border-radius: var(--radius); padding: 18px 16px; margin-bottom: 12px; border: 1px solid var(--border-color); transition: var(--transition); cursor: pointer; color: var(--text-primary); }
        .card:active { transform: scale(0.98); }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; color: var(--text-primary); }
        .card-title .badge-count { font-size: 11px; font-weight: 500; color: var(--text-secondary); background: var(--bg-card); padding: 2px 10px; border-radius: 20px; }
        
        .balance-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; color: #ffffff; }
        .balance-card::before { content: ''; position: absolute; top: -50%; right: -30%; width: 60%; height: 200%; background: radial-gradient(circle, rgba(59,130,246,0.10), transparent 70%); pointer-events: none; }
        .balance-label { font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 0.5px; }
        .balance-amount { font-size: 32px; font-weight: 800; margin: 6px 0; letter-spacing: -0.5px; color: #ffffff; }
        .balance-stats { display: flex; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); position: relative; z-index: 1; }
        .stat-item { flex: 1; }
        .stat-label { font-size: 11px; color: rgba(255,255,255,0.6); }
        .stat-value { font-size: 16px; font-weight: 700; margin-top: 2px; color: #ffffff; }
        .stat-value.income { color: #4ade80; }
        .stat-value.expense { color: #f87171; }
        .balance-eye { position: absolute; right: 16px; top: 16px; background: rgba(255,255,255,0.08); border: none; border-radius: 30px; padding: 4px 12px; color: #ffffff; font-size: 12px; cursor: pointer; z-index: 2; }
        
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-card { background: var(--bg-card); border-radius: var(--radius-sm); padding: 14px; text-align: center; border: 1px solid var(--border-color); transition: var(--transition); cursor: pointer; color: var(--text-primary); }
        .stat-card:active { transform: scale(0.96); }
        .stat-card .label { font-size: 11px; color: var(--text-secondary); }
        .stat-card .value { font-size: 18px; font-weight: 700; margin-top: 2px; color: var(--text-primary); }
        .stat-card .value.income { color: #10b981; }
        .stat-card .value.expense { color: #ef4444; }
        
        .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: var(--transition); color: var(--text-primary); }
        .tx-item:last-child { border-bottom: none; }
        .tx-item:active { opacity: 0.7; }
        .tx-item .left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .tx-item .left .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .tx-item .left .desc { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .tx-item .left .meta { font-size: 11px; color: var(--text-secondary); }
        .tx-item .amount { font-weight: 600; font-size: 14px; flex-shrink: 0; }
        .tx-item .amount.income { color: #10b981; }
        .tx-item .amount.expense { color: #ef4444; }
        
        .bottom-nav { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); max-width: 420px; width: calc(100% - 32px); background: var(--bg-secondary); backdrop-filter: blur(20px); border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); display: flex; justify-content: space-around; align-items: center; padding: 6px 8px; z-index: 100; height: var(--nav-height); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px 10px; border-radius: var(--radius-sm); transition: var(--transition); flex: 1; position: relative; min-width: 0; }
        .nav-item .nav-icon { font-size: 20px; transition: var(--transition); }
        .nav-item .nav-label { font-size: 9px; font-weight: 500; color: inherit; transition: var(--transition); }
        .nav-item:active { transform: scale(0.92); }
        .nav-item.active { color: #3b82f6; }
        .nav-item.active .nav-icon { transform: translateY(-2px); }
        .nav-item .nav-badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 8px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
        
        .nav-center { flex: 0 0 auto; margin-top: -20px; }
        .nav-center-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--gradient-primary); border: none; color: white; font-size: 28px; font-weight: 300; cursor: pointer; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3); transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        .nav-center-btn:active { transform: scale(0.92); }
        
        #moreMenuPopup { position: fixed; bottom: calc(var(--nav-height) + 20px); left: 50%; transform: translateX(-50%) scale(0.9); max-width: 420px; width: calc(100% - 32px); background: var(--bg-secondary); backdrop-filter: blur(20px); border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); padding: 12px; z-index: 99; opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        #moreMenuPopup.open { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
        .menu-popup-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 8px; border: none; border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; transition: var(--transition); font-size: 12px; font-weight: 500; }
        .menu-popup-item:active { transform: scale(0.95); }
        .menu-popup-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .menu-popup-item .icon { font-size: 24px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; animation: modalFadeIn 0.3s ease-out; }
        @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content { background: var(--bg-secondary); border-radius: var(--radius); padding: 28px 24px; width: 100%; max-width: 380px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border-color); box-shadow: 0 20px 60px rgba(0,0,0,0.5); color: var(--text-primary); animation: modalSlideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes modalSlideUp { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 20px; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.3px; }
        .modal-subtitle { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: -12px; margin-bottom: 16px; }
        .modal-input, .modal-select, .modal-textarea { width: 100%; padding: 12px 16px; margin-bottom: 12px; border: 1.5px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-primary); font-size: 14px; transition: var(--transition); font-family: inherit; }
        .modal-input:focus, .modal-select:focus, .modal-textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
        .modal-button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
        .modal-btn { padding: 12px 16px; border: none; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; cursor: pointer; transition: var(--transition); text-align: center; font-family: inherit; }
        .modal-btn:active { transform: scale(0.96); }
        .modal-btn-full { grid-column: span 2; }
        .modal-btn-primary { background: var(--gradient-primary); color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
        .modal-btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .modal-btn-danger { background: var(--gradient-danger); color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }
        .modal-btn-success { background: var(--gradient-success); color: white; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        .modal-btn-warning { background: var(--gradient-warning); color: white; box-shadow: 0 4px 12px rgba(245,158,11,0.3); }
        .modal-btn-sm { padding: 8px 12px; font-size: 12px; }
        
        .modal-divider { border: none; border-top: 1px solid var(--border-color); margin: 16px 0; }
        .modal-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .modal-badge.success { background: rgba(16,185,129,0.15); color: #4ade80; }
        .modal-badge.danger { background: rgba(239,68,68,0.15); color: #f87171; }
        .modal-badge.warning { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .modal-badge.info { background: rgba(59,130,246,0.15); color: #60a5fa; }
        
        .toast { position: fixed; bottom: calc(var(--nav-height) + 30px); left: 50%; transform: translateX(-50%); background: var(--bg-secondary); color: var(--text-primary); padding: 14px 28px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; z-index: 300; box-shadow: var(--shadow); border: 1px solid var(--border-color); animation: toastIn 0.4s ease-out; max-width: 90%; text-align: center; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.95); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
        .toast.success { border-color: #4ade80; }
        .toast.error { border-color: #f87171; }
        .toast.warning { border-color: #fbbf24; }
        
        .empty-state { text-align: center; padding: 30px 20px; color: var(--text-secondary); }
        .empty-state .icon { font-size: 48px; margin-bottom: 8px; }
        .empty-state .title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .empty-state .desc { font-size: 13px; margin-top: 4px; color: var(--text-secondary); }
        
        .filter { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
        .filter-btn { padding: 8px 16px; border: none; border-radius: 20px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; transition: var(--transition); }
        .filter-btn.active { background: var(--gradient-primary); color: white; }
        .filter-btn:active { transform: scale(0.95); }
        
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 50px; }
        .toggle-password { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.6; color: var(--text-secondary); }
        
        .sedekah-card { background: var(--bg-card); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; border: 1px solid var(--border-color); transition: var(--transition); }
        .sedekah-card.active { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.05); }
        .sedekah-card .header { display: flex; justify-content: space-between; align-items: center; padding: 0; background: none; border: none; margin-bottom: 8px; }
        .sedekah-card .header .name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
        .sedekah-card .header .badge { font-size: 10px; padding: 2px 10px; border-radius: 20px; font-weight: 500; }
        .sedekah-card .header .badge.daily { background: rgba(16,185,129,0.15); color: #4ade80; }
        .sedekah-card .header .badge.weekly { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .sedekah-card .header .badge.monthly { background: rgba(139,92,246,0.15); color: #a78bfa; }
        .sedekah-card .desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
        .sedekah-card .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .sedekah-card .actions .action-btn { padding: 4px 12px; border-radius: 16px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-secondary); font-size: 11px; cursor: pointer; transition: var(--transition); }
        .sedekah-card .actions .action-btn.active { background: rgba(16,185,129,0.15); border-color: #4ade80; color: #4ade80; }
        .sedekah-card .actions .action-btn:active { transform: scale(0.95); }
        .sedekah-card .status-text { font-size: 11px; margin-top: 8px; color: var(--text-secondary); }
        .sedekah-card .status-text .highlight { color: #4ade80; font-weight: 600; }
        .sedekah-card .reminder-btn { margin-top: 8px; padding: 4px 12px; border-radius: 16px; border: none; background: #60a5fa; color: white; font-size: 11px; cursor: pointer; }
        .sedekah-card .reminder-btn:active { transform: scale(0.95); }
        
        .reminder-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .reminder-item:last-child { border-bottom: none; }
        .reminder-item .info { flex: 1; }
        .reminder-item .info .title { font-weight: 500; font-size: 13px; color: var(--text-primary); }
        .reminder-item .info .sub { font-size: 11px; color: var(--text-secondary); }
        .reminder-item .status { font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 500; }
        .reminder-item .status.done { background: rgba(16,185,129,0.15); color: #4ade80; }
        .reminder-item .status.pending { background: rgba(251,191,36,0.15); color: #fbbf24; }
        
        .task-preview { display: flex; flex-direction: column; gap: 6px; }
        .task-preview-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-card); border-radius: var(--radius-sm); border: 1px solid var(--border-color); transition: var(--transition); cursor: pointer; border-left: 3px solid var(--text-muted); color: var(--text-primary); }
        .task-preview-item:active { transform: scale(0.98); }
        .task-preview-item .icon { font-size: 18px; }
        .task-preview-item .info { flex: 1; }
        .task-preview-item .info .title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
        .task-preview-item .info .date { font-size: 11px; color: var(--text-secondary); }
        .task-preview-item .status { font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 500; }
        .task-preview-item .status.danger { background: rgba(239,68,68,0.15); color: #f87171; }
        .task-preview-item .status.warning { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .task-preview-item .status.done { background: rgba(16,185,129,0.15); color: #4ade80; }
        .task-preview-item .status.pending { background: rgba(148,163,184,0.15); color: #94a3b8; }
        
        @media (max-width: 420px) {
            .app-container { padding: 12px 12px 20px; }
            .balance-amount { font-size: 26px; }
            .header-name { font-size: 13px; }
            .nav-item .nav-label { font-size: 8px; }
            .nav-center-btn { width: 44px; height: 44px; font-size: 24px; }
            .bottom-nav { padding: 4px 6px; height: 64px; }
            .modal-content { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-logo">💰</div>
    <div class="loading-title">Keuangan Keluarga</div>
    <div class="loading-subtitle">Memuat data Anda...</div>
    <div class="loading-bar"><div class="loading-bar-fill" id="loadingBarFill"></div></div>
    <div class="loading-percent" id="loadingPercent">0%</div>
</div>

<!-- APP CONTAINER -->
<div class="app-container" id="appContainer"></div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">💰 Keuangan Keluarga</div>
        <div class="modal-subtitle">Kelola keuangan keluarga dengan mudah</div>
        <input type="email" id="emailInput" class="modal-input" placeholder="Email">

function getRamadhanDates(year) {
    const ramadhanData = {
        2024: { start: '2024-03-11', end: '2024-04-09' },
        2025: { start: '2025-03-01', end: '2025-03-30' },
        2026: { start: '2026-02-18', end: '2026-03-19' },
        2027: { start: '2027-02-08', end: '2027-03-09' },
        2028: { start: '2028-01-28', end: '2028-02-26' },
    };
    return ramadhanData[year] || null;
}

function isRamadhanToday() {
    const now = new Date();
    const year = now.getFullYear();
    const ramadhan = getRamadhanDates(year);
    if (!ramadhan) return false;
    const today = now.toISOString().split('T')[0];
    return today >= ramadhan.start && today <= ramadhan.end;
}

function getRamadhanDays() {
    const now = new Date();
    const year = now.getFullYear();
    const ramadhan = getRamadhanDates(year);
    if (!ramadhan) return [];
    const start = new Date(ramadhan.start);
    const end = new Date(ramadhan.end);
    const days = [];
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        days.push(d.toISOString().split('T')[0]);
    }
    return days;
}

function isRamadhanDay(dateStr) {
    const d = new Date(dateStr);
    const year = d.getFullYear();
    const ramadhan = getRamadhanDates(year);
    if (!ramadhan) return false;
    return dateStr >= ramadhan.start && dateStr <= ramadhan.end;
}

    });
    reminders.forEach(r => {
        if (r.is_done || !r.due_date) return;
        const due = new Date(r.due_date);
        due.setHours(0,0,0,0);
        const diff = Math.ceil((due - today) / (1000*60*60*24));

    });
    msgs.sort((a,b) => {
        if (a.type === 'danger' && b.type === 'warning') return -1;
        if (a.type === 'warning' && b.type === 'danger') return 1;
        return 0;

        const { data: settings } = await sb.from('sedekah_settings').select('*').eq('user_id', uid).maybeSingle();

        const { data: reminders } = await sb.from('sedekah_reminders').select('*').eq('user_id', uid).order('created_at', { ascending: false });

            id: st.id,

async function saveSedekahData() {
    const uid = await userManager.getUserId();
    if (!uid) return;
    try {
        const today = new Date().toISOString().split('T')[0];
        const { data: existing } = await sb.from('sedekah_data').select('id').eq('user_id', uid).eq('date', today).maybeSingle();
        
        if (existing) {
            await sb.from('sedekah_data').update({ actions: sedekahData, updated_at: new Date().toISOString() }).eq('id', existing.id);
        } else {
            await sb.from('sedekah_data').insert({ user_id: uid, date: today, actions: sedekahData });
        }
        
        const completed = sedekahData.filter(d => d.completed && d.enabled);
        if (completed.length > 0) {
            const todayHistory = sedekahHistory.find(h => h.date === today);
            if (!todayHistory) {
                const totalPoints = completed.reduce((sum, d) => {
                    const type = SEDEKAH_TYPES.find(t => t.id === d.id);
                    const pointsPerAction = type?.pointsPerAction || 2;
                    return sum + d.actions.length * pointsPerAction;
                }, 0);
                await sb.from('sedekah_history').insert({
                    user_id: uid,
                    date: today,
                    completed_types: completed.map(d => d.id),
                    total_points: totalPoints
                });
                await loadSedekahData();
            }
        }
    } catch(e) { console.error('Save sedekah error:', e); }
}

async function generateReminders() {
    const uid = await userManager.getUserId();
    if (!uid) return;
    
    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];
    const dayOfWeek = today.getDay();
    
    const enabledTypes = sedekahData.filter(d => d.enabled);
    
    for (const sedekah of enabledTypes) {
        const type = SEDEKAH_TYPES.find(t => t.id === sedekah.id);
        if (!type) continue;
        
        let shouldRemind = false;
        let isRamadhanSpecial = false;
        
        if (type.frequency === 'daily') {
            shouldRemind = true;
        } else if (type.frequency === 'weekly') {
            if (dayOfWeek === 5) {
                shouldRemind = true;
            }
        } else if (type.frequency === 'monthly') {
            if (isRamadhanDay(todayStr)) {
                shouldRemind = true;
                isRamadhanSpecial = true;
            }
        }
        
        if (shouldRemind) {
            const existing = sedekahReminders.find(r => 
                r.sedekah_id === sedekah.id && 
                r.date === todayStr
            );
            
            if (!existing) {
                const { data, error } = await sb.from('sedekah_reminders').insert({
                    user_id: uid,
                    sedekah_id: sedekah.id,
                    date: todayStr,
                    is_done: false,
                    is_ramadhan: isRamadhanSpecial,
                    points_multiplier: isRamadhanSpecial ? 2 : 1
                }).select().maybeSingle();
                
                if (data) {
                    sedekahReminders.push(data);
                    if (sedekahSettings.notifications_enabled !== false) {
                        showToast(`🔔 ${type.icon} ${type.label} - ${isRamadhanSpecial ? 'Ramadhan (4x poin)!' : 'Hari ini!'}`, 4000, 'success');
                        
                        if ('Notification' in window && Notification.permission === 'granted') {
                            new Notification('💰 Sedekah Reminder', {
                                body: `${type.icon} ${type.label} - ${isRamadhanSpecial ? 'Ramadhan (4x poin)!' : 'Waktunya sedekah!'}`,
                                icon: '💰'
                            });
                        }
                    }
                }
            }
        }
    }
}

            `;
        }).join('')}

        <div style="text-align:center;color:#94a3b8;font-size:12px;">Dicetak: ${new Date().toLocaleString('id-ID')}</div>
    `;
    html2pdf().set({ margin: 10, filename: `laporan_sedekah_${today}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } }).from(el).save().then(() => showToast('✅ Laporan PDF berhasil diunduh!', 2000, 'success')).catch(() => showToast('❌ Gagal membuat PDF', 2000, 'error'));

async function loadFamilyData() {
    const uid = await userManager.getUserId();
    if (!uid) { currentFamilyId = null; familyMembers = []; familyInfo = null; return; }
    try {
        const { data: fm } = await sb.from('family_members').select('family_id').eq('user_id', uid);
        const member = fm?.[0];
        if (member) {
            currentFamilyId = member.family_id;
            const { data: family } = await sb.from('families').select('*').eq('id', currentFamilyId).single();
            familyInfo = family;
            const { data: members } = await sb.from('family_members').select('*, users!user_id(*)').eq('family_id', currentFamilyId);
            familyMembers = members || [];
        } else {
            currentFamilyId = null; familyMembers = []; familyInfo = null;
        }
    } catch(e) { currentFamilyId = null; familyMembers = []; familyInfo = null; }
}

async function loadCategories() {
    const uid = await userManager.getUserId();
    if (!uid) { categories = []; return; }
    try {
        let q = sb.from('categories').select('*');
        if (currentFamilyId) {
            const ids = getFamilyMemberIds();
            if (ids.length) q = q.in('user_id', ids);
            else q = q.eq('user_id', uid);
        } else { q = q.eq('user_id', uid); }
        const { data } = await q;
        categories = data || [];
    } catch(e) { categories = []; }
}

    await loadReminders();
    await loadBudgets();
}

function getSpentByCategory(catId) {
    let total = 0;
    transactions.forEach(t => {
        const d = new Date(t.created_at);
        if (d.getMonth() === currentBudgetMonth && d.getFullYear() === currentBudgetYear && t.category_id === catId && t.type === 'pengeluaran') {
            total += Number(t.amount) || 0;
        }
    });
    return total;
}

function getTaskStatus(t) {
    if (t.is_completed) return { label: '✅ Selesai', cls: 'done', color: '#4ade80' };
    if (!t.due_date) return { label: '⏳ Pending', cls: 'pending', color: '#94a3b8' };
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(t.due_date); due.setHours(0,0,0,0);
    const diff = Math.ceil((due - today) / (1000*60*60*24));
    if (diff < 0 || diff === 0) return { label: diff < 0 ? '🔴 Terlewat!' : '🔴 Hari ini!', cls: 'danger', color: '#f87171' };
    if (diff <= 7) return { label: `🟡 ${diff} hari lagi`, cls: 'warning', color: '#fbbf24' };
    return { label: `⏳ ${diff} hari lagi`, cls: 'pending', color: '#94a3b8' };
}

function getUserEmail(userId) {
    const m = familyMembers.find(f => f.user_id === userId);
    return m?.users?.email || m?.users?.username || `User ${userId}`;
}

    `;
    document.getElementById('appContainer').innerHTML = html;

async function renderLaporan() {
    await loadTransactions();
    const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const all = [...transactions];
    all.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    let totalPemasukan = 0, totalPengeluaran = 0;
    all.forEach(t => {
        if (t.type === 'pemasukan') totalPemasukan += Number(t.amount)||0;
        else totalPengeluaran += Number(t.amount)||0;
    });
    const monthFiltered = transactions.filter(t => {
        const d = new Date(t.created_at);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
    });
    monthFiltered.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
    let bulanPemasukan = 0, bulanPengeluaran = 0;
    monthFiltered.forEach(t => {
        if (t.type === 'pemasukan') bulanPemasukan += Number(t.amount)||0;
        else bulanPengeluaran += Number(t.amount)||0;
    });
    let html = `
        <div class="header"><div class="header-user"><div class="header-avatar">📊</div><div class="header-info"><div class="header-name">Laporan</div><div class="header-code">${all.length} transaksi</div></div></div><div class="header-actions"><button class="header-btn" onclick="pushHistory(currentNav);currentNav='transaksi';updateNav();renderTransaksi();">←</button></div></div>
        <div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg-card);border-radius:12px;padding:8px 12px;margin-bottom:12px;">
            <button id="prevMonth" style="background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;">◀</button>
            <span style="font-weight:600;">📅 ${months[currentMonth]} ${currentYear}</span>
            <button id="nextMonth" style="background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;">▶</button>
        </div>
        <div class="balance-card" style="padding:16px;">
            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
                <div><span style="font-size:12px;opacity:0.7;color:rgba(255,255,255,0.7);">Pemasukan</span><div style="font-size:20px;font-weight:700;color:#ffffff;">+Rp ${formatRupiah(bulanPemasukan)}</div></div>
                <div><span style="font-size:12px;opacity:0.7;color:rgba(255,255,255,0.7);">Pengeluaran</span><div style="font-size:20px;font-weight:700;color:#ffffff;">-Rp ${formatRupiah(bulanPengeluaran)}</div></div>
                <div><span style="font-size:12px;opacity:0.7;color:rgba(255,255,255,0.7);">Saldo</span><div style="font-size:20px;font-weight:700;color:${bulanPemasukan - bulanPengeluaran >= 0 ? '#4ade80' : '#f87171'};">${bulanPemasukan - bulanPengeluaran >= 0 ? '+' : '-'}Rp ${formatRupiah(Math.abs(bulanPemasukan - bulanPengeluaran))}</div></div>
            </div>
        </div>
        <div style="background:rgba(59,130,246,0.08);border-radius:12px;padding:12px 16px;margin-bottom:12px;border:1px solid rgba(59,130,246,0.12);color:var(--text-primary);">
            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;font-size:13px;">
                <span>💰 Total Pemasukan: <strong style="color:#10b981;">Rp ${formatRupiah(totalPemasukan)}</strong></span>
                <span>💸 Total Pengeluaran: <strong style="color:#ef4444;">Rp ${formatRupiah(totalPengeluaran)}</strong></span>
                <span>📊 Total Saldo: <strong style="color:${totalPemasukan - totalPengeluaran >= 0 ? '#10b981' : '#ef4444'};">Rp ${formatRupiah(totalPemasukan - totalPengeluaran)}</strong></span>
            </div>
        </div>
        <div class="card">
            <div class="card-title"><span>📋 Detail Transaksi (${months[currentMonth]} ${currentYear})</span><span style="font-size:11px;color:var(--text-secondary);">${monthFiltered.length} transaksi</span></div>
            <div id="detailTransaksi"></div>
        </div>
    `;
    document.getElementById('appContainer').innerHTML = html;
    
    const grouped = {};
    monthFiltered.forEach(t => {
        const d = formatDate(t.created_at);
        if (!grouped[d]) grouped[d] = [];
        grouped[d].push(t);
    });
    const sortedDates = Object.keys(grouped).sort((a,b) => {
        const da = a.split('/');
        const db = b.split('/');
        return new Date(db[2], db[1]-1, db[0]) - new Date(da[2], da[1]-1, da[0]);
    });
    let detail = '';
    if (!sortedDates.length) {
        detail = '<div class="empty-state" style="padding:20px 0;"><div class="desc">Tidak ada transaksi bulan ini</div></div>';
    } else {
        sortedDates.forEach(date => {
            const items = grouped[date];
            const total = items.reduce((s, i) => s + (i.type === 'pemasukan' ? Number(i.amount) : -Number(i.amount)), 0);
            detail += `<div style="margin-top:12px;padding:8px 0;border-bottom:1px solid var(--border-color);color:var(--text-primary);">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <strong style="font-size:15px;">📌 ${date}</strong>
                    <span style="font-size:15px;font-weight:700;color:${total >= 0 ? '#4ade80' : '#f87171'};">${total >= 0 ? '+' : '-'}Rp ${formatRupiah(Math.abs(total))}</span>
                </div>
            </div>`;
            items.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
            items.forEach(i => {
                const cat = getCategoryById(i.category_id);
                const isPemasukan = i.type === 'pemasukan';
                detail += `
                    <div class="tx-item" style="padding:8px 0 8px 16px;cursor:pointer;border-left:3px solid ${isPemasukan ? '#4ade80' : (cat?.color || '#64748b')};margin-left:8px;color:var(--text-primary);" data-id="${i.id}">
                        <div class="left">
                            <div>
                                <div class="desc" style="font-size:13px;font-weight:500;color:var(--text-primary);">
                                    ${isPemasukan ? '💚' : '❤️'} ${escapeHtml(i.description)}
                                </div>
                                <div style="font-size:11px;color:var(--text-secondary);">${cat ? cat.icon + ' ' + cat.name : 'Tanpa Kategori'}</div>
                            </div>
                        </div>
                        <div class="amount ${isPemasukan ? 'income' : 'expense'}" style="font-size:14px;">
                            ${isPemasukan ? '+' : '-'}Rp ${formatRupiah(i.amount)}
                        </div>
                    </div>
                `;
            });
        });
    }
    document.getElementById('detailTransaksi').innerHTML = detail;
    document.querySelectorAll('#detailTransaksi .tx-item').forEach(el => {
        el.onclick = () => { const id = el.dataset.id; const tx = transactions.find(t => t.id === id); if (tx) showTransactionDetail(tx); };
    });
    document.getElementById('prevMonth').onclick = () => { if (currentMonth === 0) { currentMonth = 11; currentYear--; } else currentMonth--; renderLaporan(); };
    document.getElementById('nextMonth').onclick = () => { if (currentMonth === 11) { currentMonth = 0; currentYear++; } else currentMonth++; renderLaporan(); };
}

        const cat = getCategoryById(t.category_id);
        return `<div class="tx-item" data-id="${t.id}">
            <div class="left"><span class="dot" style="background:${cat?.color || '#64748b'}"></span><div><div class="desc">${escapeHtml(t.description)}</div><div class="meta">${formatDate(t.created_at)}</div></div></div>
            <div class="amount ${t.type === 'pemasukan' ? 'income' : 'expense'}">${t.type === 'pemasukan' ? '+' : '-'}Rp ${formatRupiah(t.amount)}</div>
        </div>`;
    }).join('');
    document.querySelectorAll('.tx-item').forEach(el => { el.onclick = () => { const id = el.dataset.id; const tx = transactions.find(t => t.id === id); if (tx) showTransactionDetail(tx); }; });
    document.querySelectorAll('.filter-btn').forEach(btn => { btn.onclick = () => { transaksiFilter = btn.dataset.filter; renderTransaksi(); }; });
}

function openTransaksiModal(predefinedType = null, editId = null) {
    const isEdit = !!editId;
    const tx = isEdit ? transactions.find(t => t.id === editId) : null;
    const today = new Date().toISOString().slice(0, 10);
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-title">${isEdit ? '✏️ Edit' : '✨ Tambah'} Transaksi</div>
            <input type="text" id="modalDesk" class="modal-input" placeholder="Deskripsi" value="${isEdit ? escapeHtml(tx.description) : ''}">
            <input type="text" id="modalJum" class="modal-input" placeholder="Jumlah" value="${isEdit ? formatRupiah(tx.amount) : ''}">
            <select id="modalTipe" class="modal-select">
                <option value="pemasukan" ${(isEdit && tx.type === 'pemasukan') || predefinedType === 'pemasukan' ? 'selected' : ''}>💵 Pemasukan</option>
                <option value="pengeluaran" ${(isEdit && tx.type === 'pengeluaran') || predefinedType === 'pengeluaran' ? 'selected' : ''}>💸 Pengeluaran</option>
            </select>
            <input type="date" id="modalTanggal" class="modal-input" value="${isEdit ? formatDateInput(tx.created_at) : today}">
            <select id="modalKat" class="modal-select">
                <option value="">Pilih Kategori</option>
                ${categories.map(c => `<option value="${c.id}" ${isEdit && tx.category_id === c.id ? 'selected' : ''}>${c.icon} ${c.name}</option>`).join('')}
            </select>
            <div class="modal-button-grid">
                <button id="saveTransaksi" class="modal-btn modal-btn-primary">${isEdit ? 'Update' : 'Simpan'}</button>
                <button id="closeModal" class="modal-btn modal-btn-secondary">Batal</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('saveTransaksi').onclick = async () => {
        const desc = document.getElementById('modalDesk').value.trim();
        const amount = parseRupiah(document.getElementById('modalJum').value);
        const type = document.getElementById('modalTipe').value;
        const tanggal = document.getElementById('modalTanggal').value;
        const catId = document.getElementById('modalKat').value;
        if (!desc || !amount) { showToast('❌ Isi dengan benar', 2000, 'error'); return; }
        const uid = await userManager.getUserId();
        const data = { description: desc, amount, type, created_at: new Date(tanggal).toISOString() };
        if (catId) data.category_id = catId;
        if (isEdit) { await sb.from('transactions').update(data).eq('id', editId); showToast('✅ Transaksi diupdate', 2000, 'success'); }
        else { data.user_id = uid; await sb.from('transactions').insert(data); showToast('✅ Transaksi ditambahkan', 2000, 'success'); }
        modal.remove(); await loadTransactions(); renderCurrentView();
    };
    document.getElementById('closeModal').onclick = () => modal.remove();
}

async function createFamily(name) {
    const uid = await userManager.getUserId();
    if (!uid) { showToast('❌ User ID tidak ditemukan', 2000, 'error'); return; }
    try {
        const { data: family } = await sb.from('families').insert({ name, created_by: uid }).select().single();
        await sb.from('family_members').insert({ family_id: family.id, user_id: uid, role: 'owner' });
        await sb.from('user_settings').upsert({ user_id: uid, family_id: family.id });
        currentFamilyId = family.id; familyInfo = family;
        showToast('✅ Keluarga dibuat!', 2000, 'success');
        await loadAllData(); renderSettings();
    } catch(e) { showToast('❌ Gagal: ' + e.message, 3000, 'error'); }
}

async function joinFamily(familyId) {
    const uid = await userManager.getUserId();
    if (!uid) { showToast('❌ User ID tidak ditemukan', 2000, 'error'); return; }
    try {
        const { data: family } = await sb.from('families').select('*').eq('id', familyId).single();
        if (!family) { showToast('❌ Keluarga tidak ditemukan', 2000, 'error'); return; }
        await sb.from('family_members').insert({ family_id: familyId, user_id: uid, role: 'member' });
        await sb.from('user_settings').upsert({ user_id: uid, family_id: familyId });
        currentFamilyId = familyId; familyInfo = family;
        showToast('✅ Bergabung ke ' + family.name, 2000, 'success');
        await loadAllData(); renderSettings();
    } catch(e) { showToast('❌ Gagal: ' + e.message, 3000, 'error'); }
}

function copyFamilyId() {
    if (!currentFamilyId) { showToast('❌ Tidak ada keluarga', 2000, 'error'); return; }
    navigator.clipboard.writeText(currentFamilyId).then(() => showToast('✅ ID disalin!', 2000, 'success')).catch(() => { const ta = document.createElement('textarea'); ta.value = currentFamilyId; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('✅ ID disalin!', 2000, 'success'); });
}

// THEME FUNCTIONS
// ============================================
function applyTheme(isDark) {
    document.body.classList.toggle('dark', isDark);
    document.body.classList.toggle('light', !isDark);
    localStorage.setItem('theme_mode', isDark ? 'dark' : 'light');
}
async function initTheme() {
    if (currentUser) {
        const uid = await userManager.getUserId();
        if (uid) {
            const { data } = await sb.from('user_settings').select('dark_mode').eq('user_id', uid);
            if (data?.[0]?.dark_mode !== undefined) { applyTheme(data[0].dark_mode); return; }
        }
    }
    const local = localStorage.getItem('theme_mode');
    applyTheme(local === 'dark');
}
async function toggleTheme() {
    const isDark = !document.body.classList.contains('dark');
    applyTheme(isDark);
    const uid = await userManager.getUserId();
    if (uid) {
        const { data: existing } = await sb.from('user_settings').select('id').eq('user_id', uid).maybeSingle();
        if (existing) await sb.from('user_settings').update({ dark_mode: isDark, updated_at: new Date().toISOString() }).eq('user_id', uid);
        else await sb.from('user_settings').insert({ user_id: uid, dark_mode: isDark });
    }
    showToast(isDark ? '🌙 Mode Gelap' : '☀️ Mode Terang');
}

        </div>

            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
                <button class="menu-popup-item" data-nav="tasks"><span class="icon">✅</span>Tugas</button>
                <button class="menu-popup-item" data-nav="hutang"><span class="icon">💰</span>Hutang</button>
                <button class="menu-popup-item" data-nav="savings"><span class="icon">🏦</span>Tabungan</button>
                <button class="menu-popup-item" data-nav="reminders"><span class="icon">⏰</span>Pengingat</button>
                <button class="menu-popup-item" data-nav="kategori"><span class="icon">🏷️</span>Kategori</button>
                <button class="menu-popup-item" data-nav="laporan"><span class="icon">📊</span>Laporan</button>
                <button class="menu-popup-item" data-nav="kunci-sukses"><span class="icon">🔑</span>Kunci Sukses</button>
                <button class="menu-popup-item" data-nav="settings"><span class="icon">⚙️</span>Settings</button>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', navHtml);
    document.getElementById('centerAddBtn')?.addEventListener('click', () => openTransaksiModal());
    const moreBtn = document.getElementById('moreMenuBtn');
    const popup = document.getElementById('moreMenuPopup');
    let open = false;
    moreBtn?.addEventListener('click', (e) => {
        e.stopPropagation();
        open = !open;
        popup.classList.toggle('open', open);
        moreBtn.classList.toggle('active', open);
        moreBtn.style.color = open ? '#3b82f6' : '';
    });
    document.addEventListener('click', (e) => {
        if (open && !popup.contains(e.target) && e.target !== moreBtn && !moreBtn.contains(e.target)) {
            open = false;
            popup.classList.remove('open');
            moreBtn.classList.remove('active');
            moreBtn.style.color = '';
        }
    });
    document.querySelectorAll('.menu-popup-item').forEach(btn => {
        btn.addEventListener('click', () => {
            open = false;
            popup.classList.remove('open');
            moreBtn.classList.remove('active');
            moreBtn.style.color = '';
            pushHistory(currentNav);
            currentNav = btn.dataset.nav;
            updateNav();
            renderCurrentView();
        });
    });
    document.querySelectorAll('.nav-item[data-nav]').forEach(btn => {
        btn.addEventListener('click', () => {
            if (open) {
                open = false;
                popup.classList.remove('open');
                moreBtn.classList.remove('active');
                moreBtn.style.color = '';
            }
            pushHistory(currentNav);
            currentNav = btn.dataset.nav;
            updateNav();
            renderCurrentView();
        });
    });
}

function updateNav() {
    document.querySelectorAll('.nav-item[data-nav]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.nav === currentNav);
        btn.style.color = btn.dataset.nav === currentNav ? '#3b82f6' : '';
    });
}

async function onAuthSuccess(user) {
    currentUser = user;
    document.getElementById('loginModal').style.display = 'none';
    let customUser = await userManager.setupCustomUser(user);
    if (!customUser) { customUser = { id: 0, user_code: 'USR-???', email: user.email, username: user.email.split('@')[0] }; userManager.customUser = customUser; userManager.authUser = user; }
    currentCustomUser = customUser;
    await loadAllData();
    await initTheme();
    appReady = true;
    addBottomNav();
    renderCurrentView();
    hideLoading();
}

async function logout() {
    await sb.auth.signOut();
    currentUser = null; currentCustomUser = null; appReady = false;
    document.querySelector('.bottom-nav')?.remove();
    document.getElementById('appContainer').innerHTML = '';
    document.getElementById('loginModal').style.display = 'flex';
    document.getElementById('emailInput').value = ''; document.getElementById('passwordInput').value = '';

    document.getElementById('modalTitle').innerHTML = '💰 Keuangan Keluarga';
    document.getElementById('submitLoginBtn').innerHTML = 'Masuk';
    document.getElementById('switchText').innerHTML = 'Belum punya akun? Daftar';
    applyTheme(false);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('modalTitle').innerHTML = isLoginMode ? '💰 Masuk ke Akun' : '💰 Daftar Akun Baru';
    document.getElementById('submitLoginBtn').innerHTML = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('switchText').innerHTML = isLoginMode ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Masuk';
}

async function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorDiv = document.getElementById('loginError');
    if (!email || !password) { errorDiv.textContent = 'Email dan password harus diisi'; return; }
    errorDiv.textContent = '';
    const loading = showLoading();
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { errorDiv.textContent = error.message; clearInterval(loading); hideLoading(); return; }
        if (data.user) { await onAuthSuccess(data.user); }
    } else {
        if (password.length < 6) { errorDiv.textContent = 'Password minimal 6 karakter'; clearInterval(loading); hideLoading(); return; }
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { errorDiv.textContent = error.message; clearInterval(loading); hideLoading(); return; }
        if (data.user) { showToast('✅ Pendaftaran berhasil! Silakan login.', 2500, 'success'); toggleMode(); document.getElementById('emailInput').value = ''; document.getElementById('passwordInput').value = ''; clearInterval(loading); hideLoading(); }
    }
}

async function handleGuest() {
    const errorDiv = document.getElementById('loginError');
    errorDiv.textContent = '';
    const loading = showLoading();
    try {
        const { data, error } = await sb.auth.signInAnonymously();
        if (error) { errorDiv.textContent = error.message; clearInterval(loading); hideLoading(); return; }
        if (data.user) { await onAuthSuccess(data.user); }
    } catch(e) { errorDiv.textContent = 'Gagal masuk sebagai tamu: ' + e.message; clearInterval(loading); hideLoading(); }
}

async function startApp() {
    showLoading();
    await new Promise(r => {
        if (typeof supabase !== 'undefined') { r(); return; }
        let attempts = 0;
        const iv = setInterval(() => { attempts++; if (typeof supabase !== 'undefined') { clearInterval(iv); r(); } else if (attempts > 50) { clearInterval(iv); console.error('Supabase failed to load'); document.getElementById('loadingOverlay').classList.add('hidden'); document.getElementById('loginModal').style.display = 'flex'; document.getElementById('loginError').textContent = 'Gagal memuat Supabase. Refresh halaman.'; r(); } }, 200);
    });
    if (!initSupabase()) { document.getElementById('loadingOverlay').classList.add('hidden'); document.getElementById('loginModal').style.display = 'flex'; document.getElementById('loginError').textContent = 'Gagal memuat Supabase. Refresh halaman.'; return; }
    try {
        const { data } = await sb.auth.getSession();
        if (data.session?.user) await onAuthSuccess(data.session.user);
        else { document.getElementById('loginModal').style.display = 'flex'; hideLoading(); }
    } catch(e) { document.getElementById('loginModal').style.display = 'flex'; hideLoading(); }
}

// ============================================
// EVENT LISTENERS
// ============================================
document.getElementById('submitLoginBtn')?.addEventListener('click', handleLogin);
document.getElementById('guestBtn')?.addEventListener('click', handleGuest);
document.getElementById('switchText')?.addEventListener('click', toggleMode);
document.getElementById('toggleLoginPassword')?.addEventListener('click', () => {
    const inp = document.getElementById('passwordInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    inp.nextElementSibling.textContent = inp.type === 'password' ? '👁️' : '👁️‍🗨️';
});

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startApp);
else startApp();
</script>
</body>
