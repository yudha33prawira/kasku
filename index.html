            padding: 0;
            box-sizing: border-box;

        }
        
        body {

            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;

        .btn-secondary {

            padding: 14px;
            background: #e2e8f0;

            font-weight: 600;

        }
        
        .message {

        }
        
        .income-text {

            font-weight: 600;
        }
        
        .expense-text {
            color: #f87171;
            font-weight: 600;
        }
        
        /* Quick Add */
        .quick-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .btn-income {
            flex: 1;
            background: #10b981;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn-expense {
            flex: 1;
            background: #ef4444;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;

            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;

            font-size: 16px;

            color: #1e293b;

            align-items: center;

            color: #94a3b8;

            font-size: 18px;

        }

            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;

        .modal-box {

            border-radius: 28px;

            max-width: 340px;
        }
        
        .modal-title {

            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;

        .modal-input, .modal-select {

            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 15px;
            background: #f8fafc;
        }
        
        .modal-btn {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .modal-btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .modal-btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 16px 24px;
            border-top: 1px solid #e2e8f0;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 11px;
            color: #94a3b8;
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: #3b82f6;
            background: #eff6ff;
        }
        
        .nav-icon {
            font-size: 22px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 1000;
        }
        
        button {
            cursor: pointer;
        }
    </style>
</head>

<script>

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
console.log("Supabase initialized");

// Global variables
let currentUser = null;
let transactions = [];

let isLoginMode = true;
let isBalanceHidden = false;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

// ============================================
// HELPER FUNCTIONS
// ============================================
function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function formatRp(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function updateBalanceUI() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === 'pemasukan') pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    const displaySaldo = isBalanceHidden ? '••••••' : `Rp ${formatRp(pemasukan - pengeluaran)}`;
    const displayPemasukan = isBalanceHidden ? '••••' : `Rp ${formatRp(pemasukan)}`;
    const displayPengeluaran = isBalanceHidden ? '••••' : `Rp ${formatRp(pengeluaran)}`;
    
    document.getElementById('totalSaldo').innerText = displaySaldo;
    document.getElementById('totalPemasukan').innerText = displayPemasukan;
    document.getElementById('totalPengeluaran').innerText = displayPengeluaran;
}

// ============================================
// DATA LOADING
// ============================================
async function loadCategories() {
    if (!currentUser) return;
    const { data } = await sb.from('categories').select('*').eq('user_id', currentUser.id);
    categories = data || [];
}

async function loadTransactions() {
    if (!currentUser) return;
    const { data } = await sb.from('transactions').select('*').eq('user_id', currentUser.id);
    transactions = data || [];
    updateBalanceUI();
}

async function loadDebts() {
    if (!currentUser) return;
    const { data } = await sb.from('debts').select('*').eq('user_id', currentUser.id);
    debts = data || [];
}

// ============================================
// RENDER FUNCTIONS
// ============================================
function renderHome() {
    let totalPiutang = 0, totalHutang = 0;
    for (const d of debts) {
        if (d.status === 'lunas') continue;
        if (d.type === 'piutang') totalPiutang += d.amount;
        else totalHutang += d.amount;
    }
    
    const recent = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,5);
    
    let html = `
        <div class="debt-row">
            <div class="debt-box piutang">
                <div style="font-size:12px">💰 Piutang</div>
                <div class="debt-amount piutang">Rp ${formatRp(totalPiutang)}</div>
            </div>
            <div class="debt-box hutang">
                <div style="font-size:12px">💸 Hutang</div>
                <div class="debt-amount hutang">Rp ${formatRp(totalHutang)}</div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">📋 Transaksi Terbaru</div>
            <div id="recentList"></div>
        </div>
    `;
    
    document.getElementById('dynamicContent').innerHTML = html;
    
    const container = document.getElementById('recentList');
    if (recent.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
    } else {
        let rHtml = '';
        for (const t of recent) {
            const kelas = t.type === 'pemasukan' ? 'txn-income' : 'txn-expense';
            const prefix = t.type === 'pemasukan' ? '+' : '-';
            rHtml += `
                <div class="txn-item">
                    <div>
                        <div class="txn-desc">${escapeHtml(t.description)}</div>
                        <div class="txn-date">${new Date(t.created_at).toLocaleDateString('id-ID')}</div>
                    </div>
                    <div class="${kelas}">${prefix} Rp ${formatRp(t.amount)}</div>
                </div>
            `;
        }
        container.innerHTML = rHtml;
    }
}
