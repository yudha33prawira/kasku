// Render Transaksi dengan tombol kelola kategori
async function renderTransaksi() {
    let html = `
        <div class="header"><div class="user-info">${currentUser?.email?.slice(0,20)||'Tamu'}</div><button id="logoutBtn" class="logout-btn">Logout</button></div>
        <button id="addTransaksiBtn" class="btn-income" style="margin-bottom:16px">+ Tambah Transaksi</button>
        <button id="manageCategoriesBtn" class="btn-expense" style="margin-bottom:16px; background:#8b5cf6">🏷️ Kelola Kategori</button>
        <div class="filter">
            <button class="filter-btn ${transaksiFilter==='all'?'active':''}" data-filter="all">Semua</button>
            <button class="filter-btn ${transaksiFilter==='income'?'active':''}" data-filter="income">Pemasukan</button>
            <button class="filter-btn ${transaksiFilter==='expense'?'active':''}" data-filter="expense">Pengeluaran</button>
        </div>
        <div class="card"><div class="transaction-list" id="transaksiListContainer"></div></div>
    `;
    document.getElementById("appContainer").innerHTML = html;
    document.getElementById("addTransaksiBtn")?.addEventListener("click",()=>openTransaksiModal());
    document.getElementById("manageCategoriesBtn")?.addEventListener("click",()=>{ currentNav="settings"; updateBottomNavActive(); renderSettings(); });
    document.getElementById("logoutBtn")?.addEventListener("click",logout);
    let data = [...transactions];
    if(transaksiFilter==="income") data=data.filter(t=>t.type==="pemasukan");
    if(transaksiFilter==="expense") data=data.filter(t=>t.type==="pengeluaran");
    data.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const container = document.getElementById("transaksiListContainer");
    if(data.length===0) container.innerHTML='<div class="empty-state">Tidak ada transaksi</div>';
    else {
        let listHtml="";
        for(const t of data){
            const cat=getCategoryById(t.category_id);
            listHtml+=`
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-desc">${escapeHtml(t.description)}</div>
                        <div class="transaction-meta">
                            <span>${new Date(t.created_at).toLocaleDateString("id-ID")}</span>
                            ${cat?`<span class="transaction-cat">${cat.icon} ${escapeHtml(cat.name)}</span>`:''}
                            ${t.is_fixed_expense?`<span class="transaction-cat">🔄 Tetap</span>`:''}
                        </div>
                    </div>
                    <div style="display:flex; gap:8px">
                        <div class="transaction-amount ${t.type==='pemasukan'?'income':'expense'}">${t.type==='pemasukan'?'+':'-'} Rp ${formatRupiah(t.amount)}</div>
                        <button class="delete-transaksi" data-id="${t.id}" style="background:none; border:none; font-size:18px;">🗑️</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML=listHtml;
    }
    for(const btn of document.querySelectorAll(".delete-transaksi")) btn.onclick=async()=>{ if(confirm("Hapus transaksi?")){ await sb.from("transactions").delete().eq("id",btn.dataset.id); showToast("Transaksi dihapus"); await loadTransactions(); renderTransaksi(); } };
    for(const btn of document.querySelectorAll(".filter-btn")) btn.onclick=()=>{ transaksiFilter=btn.dataset.filter; renderTransaksi(); };
}

// Render Laporan dengan tombol export PDF
async function renderLaporan() {
    const monthNames=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const filtered=transactions.filter(t=>{ const d=new Date(t.created_at); return d.getMonth()===currentMonth && d.getFullYear()===currentYear; });
    let pemasukan=0,pengeluaran=0,catTotals={};
    for(const t of filtered){ if(t.type==="pemasukan") pemasukan+=t.amount; else pengeluaran+=t.amount; const catId=t.category_id||"uncategorized"; catTotals[catId]=(catTotals[catId]||0)+t.amount; }
    const labels=[],chartData=[],colors=[];
    for(const [id,val] of Object.entries(catTotals)){
        if(id==="uncategorized"){ labels.push("📁 Tanpa Kategori"); colors.push("#94a3b8"); }
        else{ const cat=categories.find(c=>c.id===id); if(cat){ labels.push(`${cat.icon} ${cat.name}`); colors.push(cat.color); } }
        chartData.push(val);
    }
    let html=`
        <div class="header"><div class="user-info">${currentUser?.email?.slice(0,20)||'Tamu'}</div><button id="logoutBtn" class="logout-btn">Logout</button></div>
        <div class="month-selector"><button id="prevMonth">◀</button><span>${monthNames[currentMonth]} ${currentYear}</span><button id="nextMonth">▶</button></div>
        <button id="exportPdfLaporan" class="btn-income" style="background:#6366f1; margin-bottom:16px">📑 Export Laporan Bulanan ke PDF</button>
        <div class="balance-card" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
            <div style="display:flex; justify-content:space-between;">
                <div><div style="font-size:12px; opacity:0.7">Pemasukan</div><div style="color:#4ade80">+Rp ${formatRupiah(pemasukan)}</div></div>
                <div><div style="font-size:12px; opacity:0.7">Pengeluaran</div><div style="color:#f87171">-Rp ${formatRupiah(pengeluaran)}</div></div>
                <div><div style="font-size:12px; opacity:0.7">Saldo</div><div>Rp ${formatRupiah(pemasukan-pengeluaran)}</div></div>
            </div>
        </div>
        <div class="card"><div class="card-title">📊 Statistik Kategori</div><canvas id="laporanChart" style="max-height:200px"></canvas></div>
        <div class="card"><div class="card-title">📋 Detail Transaksi</div><div class="transaction-list" id="detailTransaksiList"></div></div>
    `;
    document.getElementById("appContainer").innerHTML=html;
    const ctx=document.getElementById('laporanChart')?.getContext('2d');
    if(ctx && chartData.length){ if(window.laporanChart) window.laporanChart.destroy(); window.laporanChart=new Chart(ctx,{type:'pie',data:{labels,datasets:[{data:chartData,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}}}); }
    const grouped={};
    for(const t of filtered){ const date=new Date(t.created_at).toLocaleDateString("id-ID"); if(!grouped[date]) grouped[date]=[]; grouped[date].push(t); }
    let detailHtml="";
    for(const [date,items] of Object.entries(grouped)){
        let totalHari=0; for(const item of items) totalHari+=item.type==="pemasukan"?item.amount:-item.amount;
        detailHtml+=`<div style="margin-top:12px; border-bottom:1px solid #eef2f6;"><strong>📌 ${date}</strong> <span style="color:${totalHari>=0?'#10b981':'#ef4444'}">${totalHari>=0?'+':'-'} Rp ${formatRupiah(Math.abs(totalHari))}</span></div>`;
        for(const item of items){
            const cat=getCategoryById(item.category_id);
            detailHtml+=`<div style="display:flex; justify-content:space-between; padding:8px 0 8px 16px;"><div><span>${item.type==="pemasukan"?"💚":"❤️"}</span> ${escapeHtml(item.description)} ${cat?`<span style="font-size:10px;">• ${cat.icon} ${cat.name}</span>`:''}</div><div style="color:${item.type==="pemasukan"?'#10b981':'#ef4444'}">${item.type==="pemasukan"?'+':'-'} Rp ${formatRupiah(item.amount)}</div></div>`;
        }
    }
    document.getElementById("detailTransaksiList").innerHTML=detailHtml||'<div class="empty-state">Tidak ada transaksi</div>';
    document.getElementById("prevMonth")?.addEventListener("click",()=>{ if(currentMonth===0){ currentMonth=11; currentYear--; }else currentMonth--; renderLaporan(); });
    document.getElementById("nextMonth")?.addEventListener("click",()=>{ if(currentMonth===11){ currentMonth=0; currentYear++; }else currentMonth++; renderLaporan(); });
    document.getElementById("exportPdfLaporan")?.addEventListener("click",exportToPDF);
    document.getElementById("logoutBtn")?.addEventListener("click",logout);
}

// Render Tugas (Tasks)
async function renderTasks() {
    let html=`
        <div class="header"><div class="user-info">${currentUser?.email?.slice(0,20)||'Tamu'}</div><button id="logoutBtn" class="logout-btn">Logout</button></div>

    const container=document.getElementById("tasksList");

        let tHtml="";
        for(const task of tasks.sort((a,b)=>new Date(a.due_date)-new Date(b.due_date))){
            const isOverdue=task.due_date && new Date(task.due_date)<new Date() && !task.is_completed;
            tHtml+=`
                <div class="reminder-item ${isOverdue?'reminder-urgent':''}" style="border-bottom:1px solid #f0f2f5; padding:12px; border-radius:12px; margin-bottom:8px;">
                    <div style="display:flex; align-items:center; gap:12px">
                        <input type="checkbox" class="task-complete" data-id="${task.id}" ${task.is_completed?'checked':''}>
                        <div style="flex:1">
                            <div style="font-weight:600; ${task.is_completed?'text-decoration:line-through; color:#94a3b8':''}">${escapeHtml(task.title)}</div>
                            ${task.description?`<div style="font-size:12px; color:#64748b">${escapeHtml(task.description)}</div>`:''}
                            ${task.due_date?`<div style="font-size:11px; color:${isOverdue?'#ef4444':'#64748b'}">📅 Deadline: ${new Date(task.due_date).toLocaleDateString("id-ID")}</div>`:''}
                        </div>
                        <button class="edit-task" data-id="${task.id}" style="background:none; border:none; font-size:18px;">✏️</button>
                        <button class="delete-task" data-id="${task.id}" style="background:none; border:none; font-size:18px;">🗑️</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML=tHtml;
    }
    for(const cb of document.querySelectorAll(".task-complete")) cb.addEventListener("change",async(e)=>{ const id=cb.dataset.id; const isChecked=cb.checked; await sb.from("tasks").update({is_completed:isChecked}).eq("id",id); showToast(isChecked?"Tugas selesai":"Tugas dibuka kembali"); await loadTasks(); renderTasks(); });
    for(const btn of document.querySelectorAll(".edit-task")) btn.onclick=()=>openTaskModal(btn.dataset.id);
    for(const btn of document.querySelectorAll(".delete-task")) btn.onclick=async()=>{ if(confirm("Hapus tugas?")){ await sb.from("tasks").delete().eq("id",btn.dataset.id); showToast("Tugas dihapus"); await loadTasks(); renderTasks(); } };
}

function openTaskModal(editId=null){
    const isEdit=!!editId;
    const task=isEdit?tasks.find(t=>t.id===editId):null;
    const modalHtml=`
        <div id="taskModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-title">${isEdit?'Edit Tugas':'Tambah Tugas'}</div>
                <input type="text" id="taskTitle" class="modal-input" placeholder="Judul tugas" value="${isEdit?escapeHtml(task.title):''}">
                <textarea id="taskDesc" class="modal-textarea" placeholder="Deskripsi (opsional)">${isEdit?escapeHtml(task.description||''):''}</textarea>
                <input type="date" id="taskDueDate" class="modal-input" value="${isEdit?(task.due_date?task.due_date.slice(0,10):''):''}">
                <input type="hidden" id="taskId" value="${editId||''}">
                <button id="saveTaskBtn" class="modal-btn modal-btn-primary">Simpan</button>
                <button id="closeTaskModal" class="modal-btn modal-btn-secondary">Batal</button>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend',modalHtml);
    document.getElementById("saveTaskBtn").onclick=async()=>{
        const title=document.getElementById("taskTitle").value.trim();
        const desc=document.getElementById("taskDesc").value;
        const dueDate=document.getElementById("taskDueDate").value;
        const id=document.getElementById("taskId").value;
        if(!title) return alert("Judul harus diisi");
        if(id) await sb.from("tasks").update({title,description:desc,due_date:dueDate||null}).eq("id",id);
        else await sb.from("tasks").insert({user_id:currentUser.id,title,description:desc,due_date:dueDate||null});
        document.getElementById("taskModal")?.remove();
        await loadTasks();
        renderTasks();
        showToast(id?"Tugas diupdate":"Tugas ditambahkan");
    };
    document.getElementById("closeTaskModal").onclick=()=>document.getElementById("taskModal")?.remove();
}

// Navigasi
function renderCurrentView(){
    if(currentNav==="home") renderHome();
    else if(currentNav==="transaksi") renderTransaksi();
    else if(currentNav==="laporan") renderLaporan();
    else if(currentNav==="hutang") renderHutang();
    else if(currentNav==="savings") renderSavings();
    else if(currentNav==="reminders") renderReminders();
    else if(currentNav==="tasks") renderTasks();
    else if(currentNav==="settings") renderSettings();
}

function updateBottomNavActive(){
    const items=document.querySelectorAll('.nav-item');
    if(items.length) items.forEach(item=>{ if(item.dataset.nav===currentNav) item.classList.add('active'); else item.classList.remove('active'); });
}

function addBottomNav(){
    const navHtml=`
        <div class="bottom-nav">
            <button class="nav-item ${currentNav==='home'?'active':''}" data-nav="home"><span class="nav-icon">🏠</span><span>Beranda</span></button>
            <button class="nav-item ${currentNav==='transaksi'?'active':''}" data-nav="transaksi"><span class="nav-icon">📋</span><span>Transaksi</span></button>
            <button class="nav-item ${currentNav==='laporan'?'active':''}" data-nav="laporan"><span class="nav-icon">📅</span><span>Laporan</span></button>
            <button class="nav-item ${currentNav==='hutang'?'active':''}" data-nav="hutang"><span class="nav-icon">💰</span><span>Hutang</span></button>
            <button class="nav-item ${currentNav==='tasks'?'active':''}" data-nav="tasks"><span class="nav-icon">📝</span><span>Tugas</span></button>
            <button class="nav-item ${currentNav==='settings'?'active':''}" data-nav="settings"><span class="nav-icon">⚙️</span><span>Atur</span></button>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend',navHtml);
    for(const btn of document.querySelectorAll('.nav-item')) btn.onclick=()=>{ currentNav=btn.dataset.nav; updateBottomNavActive(); renderCurrentView(); };
}
