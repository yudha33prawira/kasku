function showToast(msg) { 
    let t = document.querySelector('.toast'); 
    if (t) t.remove();

function formatRupiah(angka) {
    if (angka === undefined || angka === null) return '0';
    return new Intl.NumberFormat("id-ID").format(angka);
}

function parseRupiah(str) {
    if (!str) return 0;
    return parseInt(str.replace(/\./g, '').replace(/[^0-9]/g, '')) || 0;
}

function escapeHtml(str) { 
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); 
}

function getCategoryById(id) {

function hitungTotalSaldo() { 
    let totalPemasukan = 0; 
    let totalPengeluaran = 0; 
    
    for (const t of transactions) {
        if (t.type === 'pemasukan') {
            totalPemasukan += Number(t.amount) || 0;
        } else if (t.type === 'pengeluaran') {
            totalPengeluaran += Number(t.amount) || 0;
        }
    }
    
    const saldo = totalPemasukan - totalPengeluaran;
    
    return { 
        pemasukan: totalPemasukan, 
        pengeluaran: totalPengeluaran, 
        saldo: saldo 
    }; 
}

function hitungTotalTabungan() { 
    let total = 0;

// Fungsi untuk membuat transaksi otomatis dari recurring (langsung insert ke database)
async function generateAndSaveTransactionsFromRecurring(recurring) {
    if (!currentUser) return 0;
    if (!recurring.is_active) return 0;
    
    const today = new Date();
    let createdCount = 0;
    const maxMonths = 12; // Generate untuk 12 bulan ke depan
    
    for (let i = 0; i <= maxMonths; i++) {
        const targetDate = new Date(today);
        targetDate.setMonth(today.getMonth() + i);
        
        let targetDay = recurring.day_of_month;
        // Handle tanggal yang tidak valid (misal 31 di bulan Februari)
        let validDate = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDay);
        if (validDate.getMonth() !== targetDate.getMonth()) {
            continue;
        }
        
        // Cek apakah transaksi sudah ada (berdasarkan recurring_id dan tanggal)
        let alreadyExists = false;
        for (const t of transactions) {
            if (!t.created_at) continue;
            if (t.recurring_id !== recurring.id) continue;
            const tDate = new Date(t.created_at);
            if (tDate.getFullYear() === validDate.getFullYear() && 
                tDate.getMonth() === validDate.getMonth() && 
                tDate.getDate() === targetDay) {
                alreadyExists = true;
                break;
            }
        }
        
        if (!alreadyExists) {
            // Buat transaksi baru
            const insertData = {
                user_id: currentUser.id,
                description: recurring.description,
                amount: recurring.amount,
                type: recurring.type,
                is_fixed_expense: recurring.type === 'pengeluaran',
                created_at: validDate.toISOString(),
                is_auto_generated: true,
                recurring_id: recurring.id
            };
            if (recurring.category_id) insertData.category_id = recurring.category_id;
            
            const { error } = await sb.from("transactions").insert(insertData);
            if (error) {
                console.error("Error generating transaction:", error);
            } else {
                createdCount++;
                console.log(`Created transaction: ${recurring.description} for ${validDate.toLocaleDateString()}`);
            }
        }
    }
    
    return createdCount;
}

// Proses semua transaksi berulang
async function processAllRecurringTransactions() {
    if (!currentUser) return 0;
    
    await loadRecurring();
    let totalCreated = 0;
    
    for (const recurring of recurringList) {
        if (recurring.is_active) {
            const created = await generateAndSaveTransactionsFromRecurring(recurring);
            totalCreated += created;
        }
    }
    
    if (totalCreated > 0) {
        console.log(`Created ${totalCreated} recurring transactions`);
        await loadTransactions(); // Refresh transaksi
    }
    
    return totalCreated;
}

// Running text
function getRunningText() {
    const today = new Date();
    const messages = [];
    
    for (const d of debts) {
        if (d.status === 'lunas') continue;
        if (d.due_date) {
            const due = new Date(d.due_date);
            const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
            if (diff >= 0 && diff <= 7) {
                messages.push(`⚠️ ${d.type === 'piutang' ? 'Piutang' : 'Hutang'} ${escapeHtml(d.contact_name)} jatuh tempo ${diff === 0 ? 'HARI INI!' : `${diff} hari lagi`}`);
            }
        }
    }
    
    for (const t of tasks) {
        if (t.is_completed) continue;
        if (t.due_date) {
            const due = new Date(t.due_date);
            const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
            if (diff >= 0 && diff <= 7) {
                messages.push(`📋 Tugas "${escapeHtml(t.title)}" ${diff === 0 ? 'HARI INI!' : `${diff} hari lagi`}`);
            }
        }
    }
    
    for (const r of reminders) {
        if (r.is_done) continue;
        if (r.due_date) {
            const due = new Date(r.due_date);
            const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
            if (diff >= 0 && diff <= 7) {
                messages.push(`⏰ ${escapeHtml(r.title)} ${diff === 0 ? 'HARI INI!' : `${diff} hari lagi`}`);
            }
        }
    }
    
    return messages;
}

function renderRunningText() {
    const messages = getRunningText();
    if (messages.length === 0) return '';
    return `<div class="running-text-container"><div class="running-text">${messages.map(m => `<span>🔔 ${m}</span>`).join('')}</div></div>`;
}

    document.querySelectorAll(".delete-transaksi").forEach(btn=>btn.onclick=async()=>{if(confirm("Hapus transaksi?")){await sb.from("transactions").delete().eq("id",btn.getAttribute("data-id")); showToast("Dihapus"); await loadTransactions(); renderTransaksi();}});
    document.querySelectorAll(".filter-btn").forEach(btn=>btn.onclick=()=>{transaksiFilter=btn.getAttribute("data-filter"); renderTransaksi();});
}

// Transaksi Berulang
async function openRecurringModal(editId=null){
    const isEdit = !!editId;
    let r = null;
    if(isEdit) {
        await loadRecurring();
        r = recurringList.find(x => x.id === editId);
    }
    
    const modal = document.createElement('div'); 
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-title">${isEdit ? 'Edit Transaksi Berulang' : '➕ Transaksi Berulang'}</div>
            <input type="text" id="recurringDesc" class="modal-input" placeholder="Deskripsi" value="${isEdit ? escapeHtml(r?.description || '') : ''}">
            <input type="text" id="recurringAmount" class="modal-input" placeholder="Jumlah" value="${isEdit ? formatRupiah(r?.amount || 0) : ''}">
            <select id="recurringType" class="modal-select">
                <option value="pemasukan" ${isEdit && r?.type === 'pemasukan' ? 'selected' : ''}>💵 Pemasukan</option>
                <option value="pengeluaran" ${isEdit && r?.type === 'pengeluaran' ? 'selected' : ''}>💸 Pengeluaran</option>
            </select>
            <select id="recurringDay" class="modal-select">
                <option value="">Pilih Tanggal (1-31)</option>
                ${Array.from({length:31}, (_,i)=>i+1).map(d => `<option value="${d}" ${isEdit && r?.day_of_month === d ? 'selected' : ''}>Tanggal ${d}</option>`).join('')}
            </select>
            <select id="recurringCat" class="modal-select">
                <option value="">Pilih Kategori</option>
                ${categories.map(c => `<option value="${c.id}" ${isEdit && r?.category_id === c.id ? 'selected' : ''}>${c.icon} ${c.name}</option>`).join('')}
            </select>
            <label style="display:flex; align-items:center; gap:8px; margin:8px 0">
                <input type="checkbox" id="recurringActive" ${isEdit ? (r?.is_active ? 'checked' : '') : 'checked'}> Aktif
            </label>
            <input type="hidden" id="recurringId" value="${editId || ''}">
            <button id="saveRecurring" class="modal-btn modal-btn-primary">Simpan</button>
            <button id="closeRecurring" class="modal-btn modal-btn-secondary">Batal</button>
        </div>
    `;
    document.body.appendChild(modal);
    setupRupiahInput('recurringAmount');
    
    document.getElementById("saveRecurring").onclick = async () => {
        const desc = document.getElementById("recurringDesc").value.trim();
        const amount = parseRupiah(document.getElementById("recurringAmount").value);
        const type = document.getElementById("recurringType").value;
        const day = parseInt(document.getElementById("recurringDay").value);
        const catId = document.getElementById("recurringCat").value;
        const isActive = document.getElementById("recurringActive").checked;
        const id = document.getElementById("recurringId").value;
        
        if (!desc) {
            alert("Deskripsi harus diisi");
            return;
        }
        if (!amount || amount <= 0) {
            alert("Jumlah harus lebih dari 0");
            return;
        }
        if (!day || day < 1 || day > 31) {
            alert("Pilih tanggal yang valid (1-31)");
            return;
        }
        
        const data = { 
            description: desc, 
            amount: amount, 
            type: type, 
            day_of_month: day, 
            is_active: isActive,
            user_id: currentUser.id
        };
        if (catId) data.category_id = catId;
        
        try {
            let recurringId = id;
            if (id) {
                // Update existing
                const { error } = await sb.from("recurring_transactions").update(data).eq("id", id);
                if (error) throw error;
                showToast("Transaksi berulang diupdate");
                recurringId = id;
            } else {
                // Insert new
                const { data: newRecurring, error } = await sb.from("recurring_transactions").insert(data).select();
                if (error) throw error;
                showToast("Transaksi berulang ditambahkan");
                if (newRecurring && newRecurring.length > 0) {
                    recurringId = newRecurring[0].id;
                }
            }
            
            modal.remove();
            await loadRecurring();
            
            // Generate transactions untuk recurring yang baru ditambahkan/diupdate
            if (recurringId && isActive) {
                const newRecurring = recurringList.find(r => r.id === recurringId);
                if (newRecurring) {
                    showToast("Membuat transaksi otomatis...");
                    const created = await generateAndSaveTransactionsFromRecurring(newRecurring);
                    await loadTransactions();
                    showToast(`Selesai! ${created} transaksi otomatis ditambahkan`);
                }
            }
            
            renderTransaksi();
            if (currentNav === 'home') renderHome();
        } catch(err) {
            console.error("Error saving recurring:", err);
            alert("Gagal menyimpan: " + err.message);
        }
    };
    
    document.getElementById("closeRecurring").onclick = () => modal.remove();
}

// HUTANG
async function renderHutang() {
    await loadDebts();
    let piutang=0, hutang=0;
    for (const d of debts) {
        if (d.status !== 'lunas') {
            if (d.type === 'piutang') piutang += Number(d.amount) || 0;
            else hutang += Number(d.amount) || 0;
        }
    }
    let html=`
        <div class="header">
            <div class="user-info">${currentUser?.email?.slice(0,20)||'Tamu'}</div>
            <div class="header-actions">
                <button id="openSettingsBtn" class="settings-btn">⚙️</button>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>
        ${renderRunningText()}
        <div style="display:flex; gap:12px; margin-bottom:16px"><div style="flex:1; background:#d1fae5; border-radius:20px; padding:12px; text-align:center"><div>💰 Total Piutang</div><div style="font-weight:700; color:#10b981">Rp ${formatRupiah(piutang)}</div></div><div style="flex:1; background:#fee2e2; border-radius:20px; padding:12px; text-align:center"><div>💸 Total Hutang</div><div style="font-weight:700; color:#ef4444">Rp ${formatRupiah(hutang)}</div></div></div>
        <button id="addDebtBtn" class="btn-income" style="margin-bottom:16px">+ Tambah Hutang/Piutang</button>
        <div class="card"><div id="debtList"></div></div>
    `;
    document.getElementById("appContainer").innerHTML=html;
    document.getElementById("addDebtBtn")?.addEventListener("click",()=>openDebtModal());
    document.getElementById("logoutBtn")?.addEventListener("click",logout);
    document.getElementById("openSettingsBtn")?.addEventListener("click",()=>{ 
        previousNav = currentNav;
        currentNav = "settings"; 
        updateNav(); 
        renderSettings(); 
    });
    
    const container=document.getElementById("debtList");
    if(!debts.length) container.innerHTML='<div class="empty-state">Belum ada data hutang/piutang</div>';
    else container.innerHTML=debts.map(d=>`<div class="transaction-item ${d.status!=='lunas' && d.due_date && new Date(d.due_date) < new Date() ? 'debt-urgent' : ''}" data-debt-id="${d.id}"><div><div>${d.type==='piutang'?'💰':'💸'} ${escapeHtml(d.contact_name)}</div><div class="task-date">${d.status==='lunas'?'✅ Lunas':`Rp ${formatRupiah(d.amount)} • ${d.due_date?`Jatuh tempo: ${new Date(d.due_date).toLocaleDateString()}`:''}`}</div></div><div><button class="debt-detail" data-id="${d.id}" style="background:#3b82f6; border:none; border-radius:30px; padding:6px 12px; color:white; margin-right:8px;">Detail</button>${d.status!=='lunas'?`<button class="lunas-debt" data-id="${d.id}" style="background:#10b981; border:none; border-radius:30px; padding:6px 12px; color:white; margin-right:8px;">✓ Lunas</button>`:''}<button class="delete-debt" data-id="${d.id}" style="background:none; border:none; font-size:18px;">🗑️</button></div></div>`).join('');
    
    document.querySelectorAll(".lunas-debt").forEach(btn => {
        btn.onclick = async function(e) {
            e.preventDefault();
            e.stopPropagation();
            const id = this.getAttribute("data-id");
            if(confirm("Tandai sebagai lunas?")){
                try {
                    const today = new Date();
                    const paidDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
                    const { error } = await sb.from("debts").update({ status: 'lunas', paid_date: paidDate }).eq("id", id);
                    if (error) throw error;
                    showToast("Ditandai lunas");
                    await loadDebts();
                    renderHutang();
                } catch(err) {
                    alert("Gagal update: " + err.message);
                }
            }
        };
    });
    
    document.querySelectorAll(".debt-detail").forEach(btn=>btn.onclick=()=>showDebtDetail(btn.getAttribute("data-id")));
    document.querySelectorAll(".delete-debt").forEach(btn=>btn.onclick=async()=>{if(confirm("Hapus?")){await sb.from("debts").delete().eq("id",btn.getAttribute("data-id")); await loadDebts(); renderHutang();}});
}

// LAPORAN
async function renderLaporan() {
    await loadTransactions();
    const monthNames=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const filtered=transactions.filter(t=>{const d=new Date(t.created_at); return d.getMonth()===currentMonth && d.getFullYear()===currentYear;});
    let pemasukan=0,pengeluaran=0,catTotals={};
    for (const t of filtered) {
        if(t.type==='pemasukan') pemasukan+=Number(t.amount); 
        else pengeluaran+=Number(t.amount); 
        const cid=t.category_id||'uncategorized'; 
        catTotals[cid]=(catTotals[cid]||0)+Number(t.amount);
    }
    const labels=[],data=[],colors=[];
    for (const [id,val] of Object.entries(catTotals)) {
        if(id==='uncategorized'){
            labels.push('📁 Tanpa Kategori');
            colors.push('#94a3b8');
        } else {
            const cat=categories.find(c=>c.id===id);
            if(cat){
                labels.push(`${cat.icon} ${cat.name}`);
                colors.push(cat.color);
            }
        }
        data.push(val);
    }
    let html=`
        <div class="header"><div class="user-info">${currentUser?.email?.slice(0,20)||'Tamu'}</div><div class="header-actions"><button id="openSettingsBtn" class="settings-btn">⚙️</button><button id="logoutBtn" class="logout-btn">Logout</button></div></div>
        ${renderRunningText()}
        <div class="month-selector"><button id="prevMonth">◀</button><span>${monthNames[currentMonth]} ${currentYear}</span><button id="nextMonth">▶</button></div>
        <div class="balance-card"><div style="display:flex; justify-content:space-between"><div>💚 +Rp ${formatRupiah(pemasukan)}</div><div>❤️ -Rp ${formatRupiah(pengeluaran)}</div><div>💰 ${pemasukan-pengeluaran >= 0 ? '+' : '-'}Rp ${formatRupiah(Math.abs(pemasukan-pengeluaran))}</div></div></div>
        <div class="card"><div class="card-title">📊 Statistik Kategori <button id="exportPdfBtn" style="background:#6366f1; border:none; border-radius:30px; padding:8px 16px; color:white; font-size:12px;">📑 Export PDF</button></div><canvas id="laporanChart" style="max-height:180px; width:100%"></canvas></div>
        <div class="card"><div class="card-title">📋 Detail Transaksi</div><div id="detailTransaksi"></div></div>
    `;
    document.getElementById("appContainer").innerHTML=html;
    
    const ctx = document.getElementById('laporanChart')?.getContext('2d');
    if(ctx && data.length > 0) {
        if(window.laporanChart && typeof window.laporanChart.destroy === 'function') {
            window.laporanChart.destroy();
        }
        window.laporanChart = new Chart(ctx, {
            type: 'pie',
            data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
        });
    }
    
    const grouped = {};
    for (const t of filtered) {
        const d=new Date(t.created_at).toLocaleDateString(); 
        if(!grouped[d]) grouped[d]=[]; 
        grouped[d].push(t);
    }
    let detail='';
    for (const [date,items] of Object.entries(grouped)) {
        let total=items.reduce((s,i)=>s+(i.type==='pemasukan'?Number(i.amount):-Number(i.amount)),0); 
        detail+=`<div style="margin-top:12px"><strong>📌 ${date}</strong> <span style="color:${total>=0?'#10b981':'#ef4444'}">${total>=0?'+':'-'}Rp ${formatRupiah(Math.abs(total))}</span></div>`; 
        for (const i of items) {
            const cat=getCategoryById(i.category_id); 
            detail+=`<div style="padding-left:16px; margin:4px 0">${i.type==='pemasukan'?'💚':'❤️'} ${escapeHtml(i.description)} ${i.is_auto_generated ? '<span class="badge-auto">Auto</span>' : ''} ${cat?`• ${cat.icon} ${cat.name}`:''} <span style="float:right">${i.type==='pemasukan'?'+':'-'}Rp ${formatRupiah(i.amount)}</span></div>`;
        }
    }
    document.getElementById("detailTransaksi").innerHTML=detail||'<div class="empty-state">Tidak ada transaksi</div>';
    document.getElementById("logoutBtn")?.addEventListener("click",logout);
    document.getElementById("openSettingsBtn")?.addEventListener("click",()=>{ 
        previousNav = currentNav;
        currentNav = "settings"; 
        updateNav(); 
        renderSettings(); 
    });
    document.getElementById("prevMonth")?.addEventListener("click",()=>{if(currentMonth===0){currentMonth=11;currentYear--;}else currentMonth--; renderLaporan();});
    document.getElementById("nextMonth")?.addEventListener("click",()=>{if(currentMonth===11){currentMonth=0;currentYear++;}else currentMonth++; renderLaporan();});
    document.getElementById("exportPdfBtn")?.addEventListener("click",async()=>{const element = document.createElement('div'); element.innerHTML = document.querySelector('.balance-card')?.outerHTML + document.querySelector('.card')?.outerHTML; const opt={margin:[10,10,10,10],filename:`laporan_${currentYear}_${currentMonth+1}.pdf`,html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}; html2pdf().set(opt).from(element).save(); showToast("Membuat PDF...");});
}

            renderCurrentView();

            updateNav();
            renderHome();

        if(error) alert(error.message);
        else {
            showToast(`Undangan akses dikirim ke ${email}. Pengguna harus login dengan email tersebut.`);
            document.getElementById("sharedEmail").value = "";
            await loadSharedAccess();
            renderSettings();
        }
    });
    
    await loadSharedAccess();
    const sharedDiv = document.getElementById("sharedList");
    const ownerAccess = sharedAccess.filter(s => s.owner_id === currentUser.id);
    const receiverAccess = sharedAccess.filter(s => s.shared_email === currentUser.email && s.owner_id !== currentUser.id);
    
    if(ownerAccess.length === 0 && receiverAccess.length === 0) {
        sharedDiv.innerHTML = '<div class="empty-state">Belum ada akses bersama</div>';
    } else {
        let html = '';
        if(ownerAccess.length > 0) {
            html += `<div style="margin-bottom:12px"><strong>📤 Undangan yang Anda kirim:</strong></div>`;
            ownerAccess.forEach(s => {
                const statusText = s.status === 'pending' ? '⏳ Menunggu' : (s.status === 'accepted' ? '✅ Diterima' : '❌ Ditolak');
                html += `<div class="shared-item"><div>📧 ${escapeHtml(s.shared_email)}<br><small>${s.access_level === 'edit' ? '✏️ Edit' : '👁️ Lihat'} • ${statusText}</small></div><button class="remove-shared" data-id="${s.id}" style="background:none; border:none; font-size:18px;">🗑️</button></div>`;
            });
        }
        if(receiverAccess.length > 0) {
            html += `<div style="margin-top:12px; margin-bottom:12px"><strong>📥 Akses yang diterima:</strong></div>`;
            receiverAccess.forEach(s => {
                html += `<div class="shared-item"><div>👤 ${escapeHtml(s.owner_id?.slice(0,8)||'User')}<br><small>${s.access_level === 'edit' ? '✏️ Edit' : '👁️ Lihat'}</small></div></div>`;
            });
        }
        sharedDiv.innerHTML = html;
    }
    
    document.querySelectorAll(".remove-shared").forEach(btn=>btn.onclick=async()=>{
        if(confirm("Hapus akses ini?")){
            await sb.from("shared_access").delete().eq("id",btn.getAttribute("data-id"));
            showToast("Akses dihapus");
            renderSettings();
        }
    });
    
    document.querySelectorAll(".toggle-password").forEach(btn=>btn.onclick=()=>{
        const inp=document.getElementById(btn.getAttribute("data-target"));
        if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
        else{inp.type='password';btn.textContent='👁️';}
    });
}

// Navigation
function renderCurrentView() {
    if(currentNav==='home') renderHome();
    else if(currentNav==='transaksi') renderTransaksi();
    else if(currentNav==='laporan') renderLaporan();
    else if(currentNav==='hutang') renderHutang();
    else if(currentNav==='savings') renderSavings();
    else if(currentNav==='reminders') renderReminders();
    else if(currentNav==='tasks') renderTasks();
    else if(currentNav==='settings') renderSettings();
}

function updateNav() { 
    document.querySelectorAll('.nav-item').forEach(btn=>{ 
        if(btn.getAttribute('data-nav')===currentNav) btn.classList.add('active'); 
        else btn.classList.remove('active'); 
    }); 
}

function addBottomNav() {
    const navHtml=`<div class="bottom-nav">
        <button class="nav-item ${currentNav==='home'?'active':''}" data-nav="home"><span class="nav-icon">🏠</span><span>Beranda</span></button>
        <button class="nav-item ${currentNav==='transaksi'?'active':''}" data-nav="transaksi"><span class="nav-icon">📋</span><span>Transaksi</span></button>
        <button class="nav-item ${currentNav==='laporan'?'active':''}" data-nav="laporan"><span class="nav-icon">📅</span><span>Laporan</span></button>
        <button class="nav-item ${currentNav==='hutang'?'active':''}" data-nav="hutang"><span class="nav-icon">💰</span><span>Hutang</span></button>
        <button class="nav-item ${currentNav==='tasks'?'active':''}" data-nav="tasks"><span class="nav-icon">✅</span><span>Tugas</span></button>
    </div>`;
    document.body.insertAdjacentHTML('beforeend',navHtml);
    document.querySelectorAll('.nav-item').forEach(btn=>btn.onclick=()=>{
        previousNav = currentNav;
        currentNav = btn.getAttribute("data-nav");
        updateNav();
        renderCurrentView();
    });
}

// Auth
async function handleLogin() {
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    const errorDiv = document.getElementById("loginError");
    if (!email || !password) { errorDiv.innerText = "Email dan password harus diisi"; return; }
    errorDiv.innerText = "";
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { errorDiv.innerText = error.message; return; }
        await onAuthSuccess(data.user);
    } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { errorDiv.innerText = error.message; return; }
        if (data.user) { alert("Pendaftaran berhasil! Silakan login."); toggleMode(); }
    }
}

async function handleGuest() {
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) { document.getElementById("loginError").innerText = error.message; return; }
    await onAuthSuccess(data.user);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById("modalTitle").innerText = isLoginMode ? "Masuk / Daftar" : "Daftar Akun Baru";
    document.getElementById("submitLoginBtn").innerText = isLoginMode ? "Masuk" : "Daftar";
    document.getElementById("switchText").innerText = isLoginMode ? "Belum punya akun? Daftar" : "Sudah punya akun? Masuk";
}

async function onAuthSuccess(user) {
    currentUser = user;
    document.getElementById("loginModal").style.display = "none";
    await loadCategories(); 
    await loadTransactions(); 
    await loadDebts(); 
    await loadSavings(); 
    await loadReminders(); 
    await loadTasks(); 
    await loadRecurring();
    await loadSharedAccess();
    
    // Generate semua transaksi berulang
    const created = await processAllRecurringTransactions();
    if (created > 0) {
        console.log(`Generated ${created} recurring transactions`);
    }
    await loadTransactions(); // Refresh lagi
    
    addBottomNav();
    renderCurrentView();
}

async function logout() {
    try {
        await sb.auth.signOut();
    } catch(e) {
        console.log("Logout error:", e);
    }
    currentUser = null;
    document.querySelector(".bottom-nav")?.remove();
    document.getElementById("appContainer").innerHTML = "";
    document.getElementById("loginModal").style.display = "flex";
    document.getElementById("emailInput").value = "";
    document.getElementById("passwordInput").value = "";
}

async function checkSession() {
    try {
        const { data, error } = await sb.auth.getSession();
        if (error) {
            console.error("Session error:", error);
            localStorage.removeItem('sb-dttupsimbwsffyylfpax-auth-token');
            document.getElementById("loginModal").style.display = "flex";
            return;
        }
        if (data.session?.user) { 
            await onAuthSuccess(data.session.user); 
        } else { 
            document.getElementById("loginModal").style.display = "flex"; 
        }
    } catch(e) {
        console.log("Session check error:", e);
        document.getElementById("loginModal").style.display = "flex";
    }
}

document.getElementById("submitLoginBtn").onclick = handleLogin;
document.getElementById("switchText").onclick = toggleMode;
document.getElementById("guestBtn").onclick = handleGuest;
document.getElementById("toggleLoginPassword")?.addEventListener("click",()=>{
    const inp=document.getElementById("passwordInput"); 
    if(inp.type==='password'){
        inp.type='text'; 
        document.getElementById("toggleLoginPassword").textContent='🙈';
    }else{
        inp.type='password'; 
        document.getElementById("toggleLoginPassword").textContent='👁️';
    }
});
checkSession();
</script>
