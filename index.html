<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Keuangan Keluarga - Sederhana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            font-family: Arial, Helvetica, sans-serif;
            padding: 16px;
            padding-bottom: 80px;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #1e293b;
        }
        .balance-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }
        .balance-amount {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }
        .balance-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .stat { text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.8; }
        .stat-value { font-size: 18px; font-weight: bold; margin-top: 5px; }
        .income { color: #4ade80; }
        .expense { color: #f87171; }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-income { background: #10b981; color: white; }
        .btn-expense { background: #ef4444; color: white; }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .transaction-desc { font-weight: 500; }
        .transaction-date { font-size: 11px; color: #888; margin-top: 4px; }
        .transaction-amount { font-weight: bold; }
        .amount-income { color: #10b981; }
        .amount-expense { color: #ef4444; }
        
        .delete-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            color: #999;
        }
        
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px;
            border-top: 1px solid #ddd;
            max-width: 450px;
            margin: 0 auto;
        }
        .nav-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 30px;
        }
        .nav-btn.active {
            background: #3b82f6;
            color: white;
        }
        
        .savings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .savings-name { font-weight: bold; }
        .savings-target { font-size: 11px; color: #888; }
        
        .empty {
            text-align: center;
            padding: 30px;
            color: #888;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 300px;
        }
        .modal-btn {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-btn-primary { background: #3b82f6; color: white; }
        .modal-btn-secondary { background: #e2e8f0; color: #333; }
        .hidden { display: none; }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 1100;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // ==================== DATA ====================
    let transactions = [];
    let savings = [];
    let currentMenu = 'home';
    
    // Load data dari localStorage
    function loadData() {
        const savedTrans = localStorage.getItem('transactions');
        const savedSavings = localStorage.getItem('savings');
        if (savedTrans) transactions = JSON.parse(savedTrans);
        if (savedSavings) savings = JSON.parse(savedSavings);
    }
    
    // Save data ke localStorage
    function saveData() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
        localStorage.setItem('savings', JSON.stringify(savings));
    }
    
    // Hitung saldo
    function getSaldo() {
        let income = 0, expense = 0;
        transactions.forEach(t => {
            if (t.type === 'income') income += t.amount;
            else expense += t.amount;
        });
        return { income, expense, balance: income - expense };
    }
    
    // Format Rupiah
    function rp(angka) {
        return 'Rp ' + new Intl.NumberFormat('id-ID').format(angka || 0);
    }
    
    // Toast notifikasi
    function toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    // Tambah transaksi
    function addTransaction(desc, amount, type) {
        if (!desc || amount <= 0) {
            toast('Data tidak valid');
            return false;
        }
        transactions.unshift({
            id: Date.now(),
            desc: desc,
            amount: Number(amount),
            type: type,
            date: new Date().toLocaleDateString('id-ID')
        });
        saveData();
        render();
        toast(type === 'income' ? 'Pemasukan ditambahkan' : 'Pengeluaran ditambahkan');
        return true;
    }
    
    // Hapus transaksi
    function deleteTransaction(id) {
        transactions = transactions.filter(t => t.id != id);
        saveData();
        render();
        toast('Transaksi dihapus');
    }
    
    // Tambah tabungan
    function addSavings(name, target) {
        if (!name || target <= 0) return;
        savings.push({
            id: Date.now(),
            name: name,
            target: Number(target),
            current: 0
        });
        saveData();
        render();
        toast('Tabungan dibuat');
    }
    
    // Transfer ke tabungan
    function transferToSavings(id, amount) {
        const saving = savings.find(s => s.id == id);
        if (!saving) return;
        const saldo = getSaldo().balance;
        if (saldo < amount) {
            toast('Saldo tidak cukup');
            return;
        }
        addTransaction(`Transfer ke ${saving.name}`, amount, 'expense');
        saving.current += amount;
        saveData();
        render();
        toast(`Rp ${amount.toLocaleString()} ditransfer`);
    }
    
    // Ambil dari tabungan
    function transferFromSavings(id, amount) {
        const saving = savings.find(s => s.id == id);
        if (!saving || saving.current < amount) {
            toast('Dana tabungan tidak cukup');
            return;
        }
        addTransaction(`Ambil dari ${saving.name}`, amount, 'income');
        saving.current -= amount;
        saveData();
        render();
        toast(`Rp ${amount.toLocaleString()} diambil`);
    }
    
    // Hapus tabungan
    function deleteSavings(id) {
        savings = savings.filter(s => s.id != id);
        saveData();
        render();
        toast('Tabungan dihapus');
    }
    
    // ==================== RENDER HOME ====================
    function renderHome() {
        const { income, expense, balance } = getSaldo();
        const totalSavings = savings.reduce((sum, s) => sum + s.current, 0);
        const recent = transactions.slice(0, 5);
        
        let html = `
            <div class="balance-card">
                <div style="font-size: 14px; opacity:0.8;">Total Saldo</div>
                <div class="balance-amount">${rp(balance)}</div>
                <div class="balance-stats">
                    <div class="stat"><div class="stat-label">Pemasukan</div><div class="stat-value income">${rp(income)}</div></div>
                    <div class="stat"><div class="stat-label">Pengeluaran</div><div class="stat-value expense">${rp(expense)}</div></div>
                    <div class="stat"><div class="stat-label">Tabungan</div><div class="stat-value">${rp(totalSavings)}</div></div>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn btn-income" id="incomeBtn">+ Pemasukan</button>
                <button class="btn btn-expense" id="expenseBtn">- Pengeluaran</button>
            </div>
            
            <div class="card">
                <div class="card-title">Transaksi Terbaru</div>
                ${recent.length === 0 ? '<div class="empty">Belum ada transaksi</div>' : 
                    recent.map(t => `
                        <div class="transaction-item">
                            <div>
                                <div class="transaction-desc">${t.desc}</div>
                                <div class="transaction-date">${t.date}</div>
                            </div>
                            <div>
                                <span class="transaction-amount ${t.type === 'income' ? 'amount-income' : 'amount-expense'}">
                                    ${t.type === 'income' ? '+' : '-'} ${rp(t.amount)}
                                </span>
                                <button class="delete-btn" data-id="${t.id}">🗑️</button>
                            </div>
                        </div>
                    `).join('')
                }
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        document.getElementById('incomeBtn').onclick = () => {
            const desc = prompt('Deskripsi pemasukan:', 'Gaji');
            if (desc) {
                const amount = prompt('Jumlah (Rp):');
                if (amount && !isNaN(amount)) addTransaction(desc, Number(amount), 'income');
            }
        };
        
        document.getElementById('expenseBtn').onclick = () => {
            const desc = prompt('Deskripsi pengeluaran:', 'Belanja');
            if (desc) {
                const amount = prompt('Jumlah (Rp):');
                if (amount && !isNaN(amount)) addTransaction(desc, Number(amount), 'expense');
            }
        };
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => deleteTransaction(Number(btn.getAttribute('data-id')));
        });
    }
    
    // ==================== RENDER TRANSACTIONS ====================
    function renderTransactions() {
        let html = `
            <div class="card">
                <div class="card-title">
                    Semua Transaksi
                    <button id="addTransBtn" style="background:#3b82f6; color:white; border:none; padding:6px 12px; border-radius:20px;">+ Tambah</button>
                </div>
                ${transactions.length === 0 ? '<div class="empty">Belum ada transaksi</div>' : 
                    transactions.map(t => `
                        <div class="transaction-item">
                            <div>
                                <div class="transaction-desc">${t.desc}</div>
                                <div class="transaction-date">${t.date}</div>
                            </div>
                            <div>
                                <span class="transaction-amount ${t.type === 'income' ? 'amount-income' : 'amount-expense'}">
                                    ${t.type === 'income' ? '+' : '-'} ${rp(t.amount)}
                                </span>
                                <button class="delete-btn" data-id="${t.id}">🗑️</button>
                            </div>
                        </div>
                    `).join('')
                }
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        document.getElementById('addTransBtn').onclick = () => {
            const type = confirm('Pemasukan? (OK=Pemasukan, Batal=Pengeluaran)');
            const desc = prompt('Deskripsi:');
            if (desc) {
                const amount = prompt('Jumlah (Rp):');
                if (amount && !isNaN(amount)) {
                    addTransaction(desc, Number(amount), type ? 'income' : 'expense');
                }
            }
        };
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => deleteTransaction(Number(btn.getAttribute('data-id')));
        });
    }
    
    // ==================== RENDER SAVINGS ====================
    function renderSavings() {
        let html = `
            <div class="card">
                <div class="card-title">
                    Tabungan
                    <button id="addSavingsBtn" style="background:#3b82f6; color:white; border:none; padding:6px 12px; border-radius:20px;">+ Buat</button>
                </div>
                ${savings.length === 0 ? '<div class="empty">Belum ada tabungan</div>' : 
                    savings.map(s => `
                        <div class="savings-item">
                            <div>
                                <div class="savings-name">${s.name}</div>
                                <div class="savings-target">Target: ${rp(s.target)} | Terkumpul: ${rp(s.current)}</div>
                            </div>
                            <div>
                                <button class="transfer-in-btn" data-id="${s.id}" style="background:#10b981; border:none; padding:6px 12px; border-radius:20px; margin:2px;">➕ Masuk</button>
                                <button class="transfer-out-btn" data-id="${s.id}" style="background:#f59e0b; border:none; padding:6px 12px; border-radius:20px; margin:2px;">➖ Ambil</button>
                                <button class="delete-savings-btn" data-id="${s.id}" style="background:#ef4444; border:none; padding:6px 12px; border-radius:20px; margin:2px;">🗑️</button>
                            </div>
                        </div>
                    `).join('')
                }
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        document.getElementById('addSavingsBtn').onclick = () => {
            const name = prompt('Nama tabungan:', 'Liburan');
            if (name) {
                const target = prompt('Target jumlah (Rp):');
                if (target && !isNaN(target)) addSavings(name, Number(target));
            }
        };
        
        document.querySelectorAll('.transfer-in-btn').forEach(btn => {
            btn.onclick = () => {
                const id = Number(btn.getAttribute('data-id'));
                const amount = prompt('Jumlah yang ditransfer ke tabungan (Rp):');
                if (amount && !isNaN(amount)) transferToSavings(id, Number(amount));
            };
        });
        
        document.querySelectorAll('.transfer-out-btn').forEach(btn => {
            btn.onclick = () => {
                const id = Number(btn.getAttribute('data-id'));
                const amount = prompt('Jumlah yang diambil dari tabungan (Rp):');
                if (amount && !isNaN(amount)) transferFromSavings(id, Number(amount));
            };
        });
        
        document.querySelectorAll('.delete-savings-btn').forEach(btn => {
            btn.onclick = () => deleteSavings(Number(btn.getAttribute('data-id')));
        });
    }
    
    // ==================== RENDER STATS ====================
    function renderStats() {
        const { income, expense, balance } = getSaldo();
        const totalSavings = savings.reduce((sum, s) => sum + s.current, 0);
        const totalTarget = savings.reduce((sum, s) => sum + s.target, 0);
        
        let html = `
            <div class="card">
                <div class="card-title">Statistik Keuangan</div>
                <div style="padding: 8px 0;"><strong>💰 Total Saldo:</strong> ${rp(balance)}</div>
                <div style="padding: 8px 0;"><strong>📈 Total Pemasukan:</strong> ${rp(income)}</div>
                <div style="padding: 8px 0;"><strong>📉 Total Pengeluaran:</strong> ${rp(expense)}</div>
                <div style="padding: 8px 0;"><strong>🏦 Total Tabungan:</strong> ${rp(totalSavings)}</div>
                <div style="padding: 8px 0;"><strong>🎯 Target Tabungan:</strong> ${rp(totalTarget)}</div>
                <hr style="margin: 12px 0;">
                <div style="padding: 8px 0;"><strong>📝 Jumlah Transaksi:</strong> ${transactions.length}</div>
                <div style="padding: 8px 0;"><strong>📌 Jumlah Tabungan:</strong> ${savings.length}</div>
                <button id="resetBtn" style="margin-top:16px; width:100%; padding:12px; background:#ef4444; color:white; border:none; border-radius:30px; font-weight:bold;">Reset Semua Data</button>
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        document.getElementById('resetBtn').onclick = () => {
            if (confirm('Yakin ingin menghapus SEMUA data? Aksi tidak dapat dibatalkan!')) {
                transactions = [];
                savings = [];
                saveData();
                render();
                toast('Semua data telah direset');
            }
        };
    }
    
    // ==================== NAVIGATION ====================
    function render() {
        if (currentMenu === 'home') renderHome();
        else if (currentMenu === 'transactions') renderTransactions();
        else if (currentMenu === 'savings') renderSavings();
        else if (currentMenu === 'stats') renderStats();
    }
    
    function initNav() {
        const nav = document.createElement('div');
        nav.className = 'nav-bar';
        nav.innerHTML = `
            <button class="nav-btn ${currentMenu === 'home' ? 'active' : ''}" data-men
