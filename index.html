<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Keuangan Keluarga</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #f8f9fc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 70px;
        }
        .app-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 16px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 4px 0;
        }
        .user-info {
            background: #e8edf5;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #1e293b;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }
        .balance-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            position: relative;
        }
        .balance-eye {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .balance-label {
            font-size: 14px;
            opacity: 0.7;
        }
        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            margin: 8px 0 4px;
        }
        .balance-stats {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .stat-item { flex: 1; }
        .stat-label { font-size: 12px; opacity: 0.7; }
        .stat-value { font-size: 18px; font-weight: 600; margin-top: 4px; }
        .stat-value.income { color: #4ade80; }
        .stat-value.expense { color: #f87171; }
        .quick-add {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn-income {
            flex: 1;
            background: #10b981;
            border: none;
            border-radius: 60px;
            padding: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-expense {
            flex: 1;
            background: #ef4444;
            border: none;
            border-radius: 60px;
            padding: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 20px;
            border-top: 1px solid #eef2f6;
            max-width: 450px;
            margin: 0 auto;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 11px;
            color: #94a3b8;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 40px;
        }
        .nav-item .nav-icon { font-size: 22px; }
        .nav-item.active { color: #3b82f6; background: #eff6ff; }
        .password-wrapper { position: relative; }
        .password-wrapper input { width: 100%; padding: 14px 50px 14px 16px; }
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
        }
        .transaction-list, .savings-list, .reminders-list, .debts-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .transaction-item, .savings-item, .reminder-item, .debt-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .transaction-info, .savings-info { flex: 1; }
        .transaction-desc { font-weight: 500; }
        .transaction-meta { display: flex; gap: 8px; margin-top: 4px; font-size: 11px; color: #94a3b8; }
        .transaction-amount { font-weight: 600; }
        .transaction-amount.income { color: #10b981; }
        .transaction-amount.expense { color: #ef4444; }
        .delete-btn, .edit-btn, .action-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            color: #94a3b8;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-title { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 20px; }
        .modal-input, .modal-select {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
            background: #f8fafc;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .modal-btn-primary { background: #3b82f6; color: white; }
        .modal-btn-secondary { background: #e2e8f0; color: #475569; }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 300;
            white-space: nowrap;
        }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; background: white; border-radius: 60px; padding: 4px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .filter { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; }
        .filter-btn { padding: 8px 16px; border: none; border-radius: 40px; background: #e2e8f0; cursor: pointer; }
        .filter-btn.active { background: #0f172a; color: white; }
        .empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
        .hidden { display: none; }
        .period-selector { display: flex; justify-content: space-between; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer"></div>
<div id="loginModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">Masuk / Daftar</div>
        <input type="email" id="emailInput" class="modal-input" placeholder="Email">
        <div class="password-wrapper">
            <input type="password" id="passwordInput" class="modal-input" placeholder="Password (min. 6)">
            <button type="button" class="toggle-password" data-target="passwordInput">👁️</button>
        </div>
        <button id="submitLoginBtn" class="modal-btn modal-btn-primary">Masuk</button>
        <div id="switchText" style="text-align:center; margin:12px 0; color:#3b82f6; cursor:pointer;">Belum punya akun? Daftar</div>
        <button id="guestBtn" class="modal-btn modal-btn-secondary">Lanjut sebagai Tamu</button>
        <div id="loginError" style="color:#ef4444; font-size:12px; text-align:center; margin-top:12px;"></div>
    </div>
</div>

<script>

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // State
    let currentUser = null;

    // Helper functions
    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function formatRupiah(angka) {
        return new Intl.NumberFormat("id-ID").format(angka || 0);
    }
    
    // Setup toggle password via event listener (no inline onclick)
    function setupTogglePassword() {
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.removeEventListener('click', handleTogglePassword);
            btn.addEventListener('click', handleTogglePassword);
        });
    }
    function handleTogglePassword(e) {
        const btn = e.currentTarget;
        const targetId = btn.getAttribute('data-target');
        const input = document.getElementById(targetId);
        if (input) {
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    }
    
    async function loadCategories() {
        const { data, error } = await sb.from('categories').select('*');
        if (!error && data) categories = data;
        else categories = [];
    }
    
    async function loadTransactions() {
        if (!currentUser) return;
        let query = sb.from('transactions').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
        const { data, error } = await query;
        if (!error && data) transactions = data;
        else transactions = [];
    }
    
    async function loadDebts() {
        if (!currentUser) return;
        const { data, error } = await sb.from('debts').select('*').eq('user_id', currentUser.id);
        if (!error && data) debts = data;
        else debts = [];
    }
    
    async function loadSavings() {
        if (!currentUser) return;
        const { data, error } = await sb.from('savings').select('*').eq('user_id', currentUser.id);
        if (!error && data) savings = data;
        else savings = [];
    }
    
    async function loadReminders() {
        if (!currentUser) return;
        const { data, error } = await sb.from('reminders').select('*').eq('user_id', currentUser.id);
        if (!error && data) reminders = data;
        else reminders = [];
    }
    
    async function loadAllData() {
        await loadCategories();
        await loadTransactions();
        await loadDebts();
        await loadSavings();
        await loadReminders();
        renderCurrentView();
        setupTogglePassword(); // re-attach after dynamic content
    }
    
    function getTotals() {
        let pemasukan = 0, pengeluaran = 0;
        transactions.forEach(t => {
            if (t.type === 'pemasukan') pemasukan += t.amount;
            else pengeluaran += t.amount;
        });
        return { pemasukan, pengeluaran, saldo: pemasukan - pengeluaran };
    }
    
    function renderCurrentView() {
        if (currentNav === 'home') renderHome();
        else if (currentNav === 'transactions') renderTransactions();
        else if (currentNav === 'savings') renderSavings();
        else if (currentNav === 'reports') renderReports();
        else if (currentNav === 'more') renderMore();
        setupTogglePassword(); // ensure toggle works after re-render
    }
    
    // Home
    function renderHome() {

        }).reduce((sum, t) => sum + t.amount, 0);

        let html = `
            <div class="header">
                <div class="user-info">${currentUser?.email?.slice(0,20) || 'Tamu'}</div>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>

                <div class="balance-label">Total Saldo</div>
                <div class="balance-amount">${isBalanceHidden ? '••••••' : `Rp ${formatRupiah(totals.saldo)}`}</div>
                <div class="balance-stats">

            </div>
            <div class="card">
                <div class="card-title">Transaksi Terbaru</div>
                ${recent.length ? recent.map(t => `<div class="transaction-item"><div><div class="transaction-desc">${t.description}</div><div class="transaction-meta">${new Date(t.created_at).toLocaleDateString()}</div></div><div class="transaction-amount ${t.type === 'pemasukan' ? 'income' : 'expense'}">${t.type === 'pemasukan' ? '+' : '-'} Rp ${formatRupiah(t.amount)}</div></div>`).join('') : '<div class="empty-state">Belum ada transaksi</div>'}
            </div>
        `;
        document.getElementById('appContainer').innerHTML = html;
        document.getElementById('quickIncomeBtn').onclick = () => showAddTransactionModal('pemasukan');
        document.getElementById('quickExpenseBtn').onclick = () => showAddTransactionModal('pengeluaran');
        document.getElementById('toggleBalanceBtn').onclick = () => { isBalanceHidden = !isBalanceHidden; renderHome(); };
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; document.getElementById('loginModal').style.display = 'flex'; };
        document.getElementById('setWeekly').onclick = () => { currentPeriod = 'weekly'; renderHome(); };
        document.getElementById('setMonthly').onclick = () => { currentPeriod = 'monthly'; renderHome(); };
    }
    
    // Transactions view
    function renderTransactions() {
        let html = `<div class="card"><div class="card-title">Semua Transaksi <button id="addTransBtn" class="action-btn">+ Tambah</button></div><div class="transaction-list">`;
        if (transactions.length === 0) html += '<div class="empty-state">Belum ada transaksi</div>';
        transactions.forEach(t => {
            html += `<div class="transaction-item">
