<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Keuangan Keluarga</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f8f9fc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 70px;
        }

        /* Container */
        .app-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 4px 0;
        }
        .user-info {
            background: #e8edf5;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #1e293b;
        }
        .logout-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        /* Kartu Saldo */
        .balance-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 20px;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .balance-label {
            font-size: 14px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }
        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            margin: 8px 0 4px;
            letter-spacing: -0.5px;
        }
        .balance-stats {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .stat-item {
            flex: 1;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 600;
            margin-top: 4px;
        }
        .stat-value.income { color: #4ade80; }
        .stat-value.expense { color: #f87171; }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 20px;
            border-top: 1px solid #eef2f6;
            max-width: 450px;
            margin: 0 auto;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: #94a3b8;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 40px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .nav-item .nav-icon {
            font-size: 22px;
        }
        .nav-item.active {
            color: #3b82f6;
            background: #eff6ff;
        }

        /* Quick Add Buttons */
        .quick-add {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .btn-income {
            flex: 1;
            background: #10b981;
            border: none;
            border-radius: 60px;
            padding: 14px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-expense {
            flex: 1;
            background: #ef4444;
            border: none;
            border-radius: 60px;
            padding: 14px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Card Umum */
        .card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Ringkasan Hutang */
        .debt-summary {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .debt-box {
            flex: 1;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 14px;
            text-align: center;
        }
        .debt-box.piutang { background: #d1fae5; }
        .debt-box.hutang { background: #fee2e2; }
        .debt-box .label { font-size: 12px; margin-bottom: 6px; }
        .debt-box .amount { font-size: 18px; font-weight: 700; }
        .debt-box.piutang .amount { color: #10b981; }
        .debt-box.hutang .amount { color: #ef4444; }

        /* List Transaksi */
        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .transaction-info {
            flex: 1;
        }
        .transaction-desc {
            font-weight: 500;
            font-size: 15px;
            color: #1e293b;
        }
        .transaction-meta {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .transaction-date {
            font-size: 11px;
            color: #94a3b8;
        }
        .transaction-cat {
            font-size: 10px;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 30px;
            color: #475569;
        }
        .transaction-amount {
            font-weight: 600;
            font-size: 16px;
        }
        .transaction-amount.income { color: #10b981; }
        .transaction-amount.expense { color: #ef4444; }
        .delete-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            color: #cbd5e1;
        }

        /* Month Selector */
        .month-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 16px;
        }
        .month-selector button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            color: #3b82f6;
        }
        .month-selector span {
            font-weight: 600;
            font-size: 16px;
            color: #1e293b;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }
        .modal-input, .modal-select, .modal-textarea {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
            background: #f8fafc;
        }
        .modal-textarea {
            border-radius: 20px;
            resize: none;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        .modal-btn-primary {
            background: #3b82f6;
            color: white;
        }
        .modal-btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }
        .modal-btn-danger {
            background: #ef4444;
            color: white;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 300;
            white-space: nowrap;
        }

        /* Hidden */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer"></div>

<!-- Modal Login -->

<script>
// Supabase Config
const SUPABASE_URL = "https://dttupsimbwsffyylfpax.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dHVwc2ltYndzZmZ5eWxmcGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTIyMDksImV4cCI6MjA5NjE2ODIwOX0.Fa_552HBaZmNgXdZUiMZc3jVWQqzEnAJNcKE_GgJy3g";

let sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
let categories = [];
let transactions = [];
let debts = [];
let chart = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let currentNav = "home";
let isLoginMode = true;

function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function getCategoryById(id) {
    if (!id) return null;
    return categories.find(c => c.id === id);
}

// Hitung total saldo
function hitungTotalSaldo() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === "pemasukan") pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    return { pemasukan, pengeluaran, saldo: pemasukan - pengeluaran };
}

// Render Beranda
async function renderHome() {
    const totals = hitungTotalSaldo();
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
    
    // Transaksi bulan ini
    const bulanIni = transactions.filter(t => {
        const d = new Date(t.created_at);
        return d.getMonth() === new Date().getMonth() && d.getFullYear() === new Date().getFullYear();
    });
    let pemasukanBulan = 0, pengeluaranBulan = 0;
    for (const t of bulanIni) {
        if (t.type === "pemasukan") pemasukanBulan += t.amount;
        else pengeluaranBulan += t.amount;
    }
    
    // Hutang piutang
    let totalPiutang = 0, totalHutang = 0;
    for (const d of debts) {
        if (d.status === 'lunas') continue;
        if (d.type === 'piutang') totalPiutang += d.amount;
        else totalHutang += d.amount;
    }
    
    // 5 transaksi terakhir
    const recent = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,5);
    
    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email ? currentUser.email.slice(0,20) : 'Tamu'}</div>
            <button id="logoutBtn" class="logout-btn">🚪</button>
        </div>
        
        <div class="balance-card">
            <div class="balance-label">Total Saldo</div>
            <div class="balance-amount">Rp ${formatRupiah(totals.saldo)}</div>
            <div class="balance-stats">
                <div class="stat-item">
                    <div class="stat-label">Pemasukan</div>
                    <div class="stat-value income">+Rp ${formatRupiah(totals.pemasukan)}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Pengeluaran</div>
                    <div class="stat-value expense">-Rp ${formatRupiah(totals.pengeluaran)}</div>
                </div>
            </div>
        </div>
        
        <div class="quick-add">
            <button id="quickIncome" class="btn-income">+ Pemasukan</button>
            <button id="quickExpense" class="btn-expense">- Pengeluaran</button>
        </div>
        
        <div class="debt-summary">
            <div class="debt-box piutang">
                <div class="label">💰 Piutang</div>
                <div class="amount">Rp ${formatRupiah(totalPiutang)}</div>
            </div>
            <div class="debt-box hutang">
                <div class="label">💸 Hutang</div>
                <div class="amount">Rp ${formatRupiah(totalHutang)}</div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">📋 Transaksi Terbaru</div>
            <div class="transaction-list">
    `;
    
    if (recent.length === 0) {
        html += `<div class="empty-state">Belum ada transaksi</div>`;
    } else {
        for (const t of recent) {
            const cat = getCategoryById(t.category_id);
            html += `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-desc">${escapeHtml(t.description)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-date">${new Date(t.created_at).toLocaleDateString("id-ID")}</span>
                            ${cat ? `<span class="transaction-cat">${cat.icon} ${escapeHtml(cat.name)}</span>` : ''}
                        </div>
                    </div>
                    <div class="transaction-amount ${t.type === 'pemasukan' ? 'income' : 'expense'}">
                        ${t.type === 'pemasukan' ? '+' : '-'} Rp ${formatRupiah(t.amount)}
                    </div>
                </div>
            `;
        }
    }
    
    html += `</div></div>
    <div class="card">
        <div class="card-title">📅 Bulan Ini</div>
        <div style="display:flex; justify-content:space-between; text-align:center;">
            <div style="flex:1"><div style="font-size:12px; color:#64748b">Pemasukan</div><div style="font-size:18px; font-weight:600; color:#10b981">+Rp ${formatRupiah(pemasukanBulan)}</div></div>
            <div style="flex:1"><div style="font-size:12px; color:#64748b">Pengeluaran</div><div style="font-size:18px; font-weight:600; color:#ef4444">-Rp ${formatRupiah(pengeluaranBulan)}</div></div>
            <div style="flex:1"><div style="font-size:12px; color:#64748b">Saldo</div><div style="font-size:18px; font-weight:600">Rp ${formatRupiah(pemasukanBulan - pengeluaranBulan)}</div></div>
        </div>
    </div>`;
    
    document.getElementById("appContainer").innerHTML = html;
    
    document.getElementById("quickIncome")?.addEventListener("click", () => openTransaksiModal("pemasukan"));
    document.getElementById("quickExpense")?.addEventListener("click", () => openTransaksiModal("pengeluaran"));
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
}

// Render Transaksi
async function renderTransaksi() {
    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email ? currentUser.email.slice(0,20) : 'Tamu'}</div>
            <button id="logoutBtn" class="logout-btn">🚪</button>
        </div>
        <button id="addTransaksiBtn" class="btn-income" style="margin-bottom:16px">+ Tambah Transaksi</button>
        <div class="filter" style="display:flex; gap:8px; margin-bottom:16px;">
            <button class="filter-btn ${currentNavFilter === 'semua' ? 'active' : ''}" data-filter="semua" style="flex:1; padding:10px; border:none; border-radius:40px; background:${currentNavFilter === 'semua' ? '#3b82f6' : '#e2e8f0'}; color:${currentNavFilter === 'semua' ? 'white' : '#475569'}">Semua</button>
            <button class="filter-btn ${currentNavFilter === 'pemasukan' ? 'active' : ''}" data-filter="pemasukan" style="flex:1; padding:10px; border:none; border-radius:40px; background:${currentNavFilter === 'pemasukan' ? '#10b981' : '#e2e8f0'}; color:${currentNavFilter === 'pemasukan' ? 'white' : '#475569'}">Pemasukan</button>
            <button class="filter-btn ${currentNavFilter === 'pengeluaran' ? 'active' : ''}" data-filter="pengeluaran" style="flex:1; padding:10px; border:none; border-radius:40px; background:${currentNavFilter === 'pengeluaran' ? '#ef4444' : '#e2e8f0'}; color:${currentNavFilter === 'pengeluaran' ? 'white' : '#475569'}">Pengeluaran</button>
        </div>
        <div class="card">
            <div class="transaction-list" id="transaksiListContainer"></div>
        </div>
    `;
    document.getElementById("appContainer").innerHTML = html;
    
    document.getElementById("addTransaksiBtn")?.addEventListener("click", () => openTransaksiModal());
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
    
    let data = [...transactions];
    if (currentNavFilter === "pemasukan") data = data.filter(t => t.type === "pemasukan");
    if (currentNavFilter === "pengeluaran") data = data.filter(t => t.type === "pengeluaran");
    data.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    
    const container = document.getElementById("transaksiListContainer");
    if (data.length === 0) {
        container.innerHTML = `<div class="empty-state">Tidak ada transaksi</div>`;
    } else {
        let listHtml = "";
        for (const t of data) {
            const cat = getCategoryById(t.category_id);
            listHtml += `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-desc">${escapeHtml(t.description)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-date">${new Date(t.created_at).toLocaleDateString("id-ID")}</span>
                            ${cat ? `<span class="transaction-cat">${cat.icon} ${escapeHtml(cat.name)}</span>` : ''}
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px">
                        <div class="transaction-amount ${t.type === 'pemasukan' ? 'income' : 'expense'}">
                            ${t.type === 'pemasukan' ? '+' : '-'} Rp ${formatRupiah(t.amount)}
                        </div>
                        <button class="delete-transaksi" data-id="${t.id}" style="background:none; border:none; font-size:18px; cursor:pointer;">🗑️</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = listHtml;
    }
    
    for (const btn of document.querySelectorAll(".delete-transaksi")) {
        btn.onclick = async () => {
            if (confirm("Hapus transaksi?")) {
                await sb.from("transactions").delete().eq("id", btn.dataset.id);
                showToast("Transaksi dihapus");
                await loadTransactions();
                renderCurrentView();
            }
        };
    }
    for (const btn of document.querySelectorAll(".filter-btn")) {
        btn.onclick = () => {
            currentNavFilter = btn.dataset.filter;
            renderTransaksi();
        };
    }
}

// Render Laporan
async function renderLaporan() {
    const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    
    const filtered = transactions.filter(t => {
        const d = new Date(t.created_at);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
    });
    
    let pemasukan = 0, pengeluaran = 0;
    const catTotals = {};
    for (const t of filtered) {
        if (t.type === "pemasukan") pemasukan += t.amount;
        else pengeluaran += t.amount;
        const catId = t.category_id || "uncategorized";
        catTotals[catId] = (catTotals[catId] || 0) + t.amount;
    }
    
    // Chart data
    const labels = [], chartData = [], colors = [];
    for (const [id, val] of Object.entries(catTotals)) {
        if (id === "uncategorized") {
            labels.push("📁 Tanpa Kategori");
            colors.push("#94a3b8");
        } else {
            const cat = categories.find(c => c.id === id);
            if (cat) {
                labels.push(`${cat.icon} ${cat.name}`);
                colors.push(cat.color);
            }
        }
        chartData.push(val);
    }
    
    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email ? currentUser.email.slice(0,20) : 'Tamu'}</div>
            <button id="logoutBtn" class="logout-btn">🚪</button>
        </div>
        <div class="month-selector">
            <button id="prevMonth">◀</button>
            <span>${monthNames[currentMonth]} ${currentYear}</span>
            <button id="nextMonth">▶</button>
        </div>
        <div class="balance-card" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
            <div style="display:flex; justify-content:space-between; text-align:center;">
                <div style="flex:1"><div style="font-size:12px; opacity:0.7">Pemasukan</div><div style="font-size:20px; font-weight:600; color:#4ade80">+Rp ${formatRupiah(pemasukan)}</div></div>
                <div style="flex:1"><div style="font-size:12px; opacity:0.7">Pengeluaran</div><div style="font-size:20px; font-weight:600; color:#f87171">-Rp ${formatRupiah(pengeluaran)}</div></div>
                <div style="flex:1"><div style="font-size:12px; opacity:0.7">Saldo</div><div style="font-size:20px; font-weight:600">Rp ${formatRupiah(pemasukan - pengeluaran)}</div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">📊 Statistik Kategori</div>
            <canvas id="laporanChart" style="max-height:200px; width:100%"></canvas>
        </div>
        <div class="card">
            <div class="card-title">📋 Detail Transaksi</div>
            <div class="transaction-list" id="detailTransaksiList"></div>
        </div>
    `;
    document.getElementById("appContainer").innerHTML = html;
    
    // Chart
    const ctx = document.getElementById('laporanChart')?.getContext('2d');
    if (ctx && chartData.length > 0) {
        if (window.laporanChart) window.laporanChart.destroy();
        window.laporanChart = new Chart(ctx, {
            type: 'pie',
            data: { labels, datasets: [{ data: chartData, backgroundColor: colors, borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
        });
    }
    
    // Detail transaksi per tanggal
    const grouped = {};
    for (const t of filtered) {
        const date = new Date(t.created_at).toLocaleDateString("id-ID");
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(t);
    }
    
    let detailHtml = "";
    for (const [date, items] of Object.entries(grouped)) {
        let totalHari = 0;
        for (const item of items) totalHari += item.type === "pemasukan" ? item.amount : -item.amount;
        detailHtml += `<div style="margin-top:12px; padding:8px 0; border-bottom:1px solid #eef2f6;"><strong>📌 ${date}</strong> <span style="color:${totalHari >= 0 ? '#10b981' : '#ef4444'}">${totalHari >= 0 ? '+' : '-'} Rp ${formatRupiah(Math.abs(totalHari))}</span></div>`;
        for (const item of items) {
            const cat = getCategoryById(item.category_id);
            detailHtml += `
                <div style="display:flex; justify-content:space-between; padding:8px 0 8px 16px;">
                    <div><span style="font-size:14px">${item.type === "pemasukan" ? "💚" : "❤️"}</span> ${escapeHtml(item.description)} ${cat ? `<span style="font-size:10px; color:#94a3b8">• ${cat.icon} ${cat.name}</span>` : ''}</div>
                    <div style="color:${item.type === "pemasukan" ? '#10b981' : '#ef4444'}">${item.type === "pemasukan" ? '+' : '-'} Rp ${formatRupiah(item.amount)}</div>
                </div>
            `;
        }
    }
    document.getElementById("detailTransaksiList").innerHTML = detailHtml || `<div class="empty-state">Tidak ada transaksi bulan ini</div>`;
    
    document.getElementById("prevMonth")?.addEventListener("click", () => {
        if (currentMonth === 0) { currentMonth = 11; currentYear--; }
        else currentMonth--;
        renderLaporan();
    });
    document.getElementById("nextMonth")?.addEventListener("click", () => {
        if (currentMonth === 11) { currentMonth = 0; currentYear++; }
        else currentMonth++;
        renderLaporan();
    });
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
}

// Render Hutang Piutang
async function renderHutang() {
    let totalPiutang = 0, totalHutang = 0;
    for (const d of debts) {
        if (d.status === 'lunas') continue;
        if (d.type === 'piutang') totalPiutang += d.amount;
        else totalHutang += d.amount;
    }
    
    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email ? currentUser.email.slice(0,20) : 'Tamu'}</div>
            <button id="logoutBtn" class="logout-btn">🚪</button>
        </div>
        <div class="debt-summary">
            <div class="debt-box piutang">
                <div class="label">💰 Piutang</div>
                <div class="amount">Rp ${formatRupiah(totalPiutang)}</div>
            </div>
            <div class="debt-box hutang">
                <div class="label">💸 Hutang</div>
                <div class="amount">Rp ${formatRupiah(totalHutang)}</div>
            </div>
        </div>
        <button id="addDebtBtn" class="btn-income" style="margin-bottom:16px">+ Tambah Hutang/Piutang</button>
        <div class="card">
            <div class="transaction-list" id="debtListContainer"></div>
        </div>
    `;
    document.getElementById("appContainer").innerHTML = html;
    
    document.getElementById("addDebtBtn")?.addEventListener("click", () => openDebtModal());
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
    
    const container = document.getElementById("debtListContainer");
    if (debts.length === 0) {
        container.innerHTML = `<div class="empty-state">Belum ada data hutang/piutang</div>`;
    } else {
        let listHtml = "";
        for (const d of debts) {
            const isPiutang = d.type === "piutang";
            const statusText = d.status === "lunas" ? "✅ Lunas" : "⏳ Belum Lunas";
            const dueText = d.due_date ? ` • Jatuh tempo: ${new Date(d.due_date).toLocaleDateString("id-ID")}` : '';
            listHtml += `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-desc">${isPiutang ? '💰' : '💸'} ${escapeHtml(d.contact_name)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-date">${statusText}${dueText}</span>
                            ${d.description ? `<span class="transaction-cat">${escapeHtml(d.description)}</span>` : ''}
                        </div>
                    </div>
                    <div style="display:flex; gap:8px; align-items:center">
                        <div class="transaction-amount ${isPiutang ? 'income' : 'expense'}">
                            ${isPiutang ? '+' : '-'} Rp ${formatRupiah(d.amount)}
                        </div>
                        ${d.status !== 'lunas' ? `<button class="lunas-debt" data-id="${d.id}" style="background:none; border:none; font-size:16px; cursor:pointer;">✅</button>` : ''}
                        <button class="delete-debt" data-id="${d.id}" style="background:none; border:none; font-size:18px; cursor:pointer;">🗑️</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = listHtml;
    }
    
    for (const btn of document.querySelectorAll(".lunas-debt")) {
        btn.onclick = async () => {
            if (confirm("Tandai sebagai lunas?")) {
                await sb.from("debts").update({ status: 'lunas' }).eq("id", btn.dataset.id);
                showToast("Ditandai lunas");
                await loadDebts();
                renderHutang();
            }
        };
    }
    for (const btn of document.querySelectorAll(".delete-debt")) {
        btn.onclick = async () => {
            if (confirm("Hapus data ini?")) {
                await sb.from("debts").delete().eq("id", btn.dataset.id);
                showToast("Data dihapus");
                await loadDebts();
                renderHutang();
            }
        };
    }
}

// Render Pengaturan (Kategori)

    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email ? currentUser.email.slice(0,20) : 'Tamu'}</div>
            <button id="logoutBtn" class="logout-btn">🚪</button>
        </div>
        <button id="addCategoryBtn" class="btn-income" style="margin-bottom:16px">+ Tambah Kategori</button>
        <div class="card">
            <div class="card-title">🏷️ Daftar Kategori</div>
            <div class="transaction-list" id="categoryListContainer"></div>
        </div>
    `;
    document.getElementById("appContainer").innerHTML = html;
    
    document.getElementById("addCategoryBtn")?.addEventListener("click", () => openCategoryModal());
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
    
    const container = document.getElementById("categoryListContainer");
    if (categories.length === 0) {
        container.innerHTML = `<div class="empty-state">Belum ada kategori</div>`;
    } else {
        let listHtml = "";
        for (const c of categories) {
            listHtml += `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-desc"><span style="font-size:20px">${c.icon}</span> ${escapeHtml(c.name)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-cat">${c.type === "pemasukan" ? "💵 Pemasukan" : "💸 Pengeluaran"}</span>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px">
                        <span class="color-preview" style="display:inline-block; width:24px; height:24px; border-radius:12px; background:${c.color}"></span>
                        <button class="edit-category" data-id="${c.id}" style="background:none; border:none; font-size:18px; cursor:pointer;">✏️</button>
                        <button class="delete-category" data-id="${c.id}" style="background:none; border:none; font-size:18px; cursor:pointer;">🗑️</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = listHtml;
    }
    
    for (const btn of document.querySelectorAll(".edit-category")) {
        btn.onclick = () => editCategory(btn.dataset.id);
    }
    for (const btn of document.querySelectorAll(".delete-category")) {
        btn.onclick = async () => {
            if (confirm("Hapus kategori?")) {
                await sb.from("categories").delete().eq("id", btn.dataset.id);

                renderPengaturan();

}

// Navigation
let currentNavFilter = "semua";
function renderCurrentView() {
    if (currentNav === "home") renderHome();
    else if (currentNav === "transaksi") renderTransaksi();
    else if (currentNav === "laporan") renderLaporan();
    else if (currentNav === "hutang") renderHutang();
    else if (currentNav === "pengaturan") renderPengaturan();
}

// Bottom Navigation
function addBottomNav() {
    const navHtml = `
        <div class="bottom-nav">
            <button class="nav-item ${currentNav === 'home' ? 'active' : ''}" data-nav="home"><span class="nav-icon">🏠</span><span>Beranda</span></button>
            <button class="nav-item ${currentNav === 'transaksi' ? 'active' : ''}" data-nav="transaksi"><span class="nav-icon">📋</span><span>Transaksi</span></button>
            <button class="nav-item ${currentNav === 'laporan' ? 'active' : ''}" data-nav="laporan"><span class="nav-icon">📅</span><span>Laporan</span></button>
            <button class="nav-item ${currentNav === 'hutang' ? 'active' : ''}" data-nav="hutang"><span class="nav-icon">💰</span><span>Hutang</span></button>
            <button class="nav-item ${currentNav === 'pengaturan' ? 'active' : ''}" data-nav="pengaturan"><span class="nav-icon">⚙️</span><span>Atur</span></button>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', navHtml);
    
    for (const btn of document.querySelectorAll('.nav-item')) {
        btn.onclick = () => {
            currentNav = btn.dataset.nav;
            for (const b of document.querySelectorAll('.nav-item')) b.classList.remove('active');
            btn.classList.add('active');
            renderCurrentView();
        };
    }
}

// Modal Functions
function openTransaksiModal(predefinedType = null) {
    const modalHtml = `
        <div id="transaksiModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-title">Tambah Transaksi</div>
                <input type="text" id="modalDeskripsi" class="modal-input" placeholder="Deskripsi">
                <input type="number" id="modalJumlah" class="modal-input" placeholder="Jumlah (Rp)">
                <select id="modalTipe" class="modal-select">
                    <option value="pemasukan" ${predefinedType === 'pemasukan' ? 'selected' : ''}>💵 Pemasukan</option>
                    <option value="pengeluaran" ${predefinedType === 'pengeluaran' ? 'selected' : ''}>💸 Pengeluaran</option>
                </select>
                <select id="modalKategori" class="modal-select"><option value="">Pilih Kategori</option></select>
                <button id="saveTransaksiBtn" class="modal-btn modal-btn-primary">Simpan</button>
                <button id="closeTransaksiModal" class="modal-btn modal-btn-secondary">Batal</button>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    
    // Isi dropdown kategori
    const catSelect = document.getElementById("modalKategori");
    let options = '<option value="">Tanpa Kategori</option>';
    for (const c of categories) {
        options += `<option value="${c.id}">${c.icon} ${escapeHtml(c.name)}</option>`;
    }
    catSelect.innerHTML = options;
    
    document.getElementById("saveTransaksiBtn").onclick = async () => {
        const desc = document.getElementById("modalDeskripsi").value.trim();
        const amount = parseInt(document.getElementById("modalJumlah").value);
        const type = document.getElementById("modalTipe").value;
        const catId = document.getElementById("modalKategori").value;
        if (!desc) return alert("Deskripsi harus diisi");
        if (isNaN(amount) || amount <= 0) return alert("Jumlah harus > 0");
        
        const data = { user_id: currentUser.id, description: desc, amount, type };
        if (catId) data.category_id = catId;
        
        const { error } = await sb.from("transactions").insert(data);
        if (error) alert("Error: " + error.message);
        else {
            showToast("Transaksi ditambahkan");
            document.getElementById("transaksiModal")?.remove();
            await loadTransactions();
            renderCurrentView();
        }
    };
    document.getElementById("closeTransaksiModal").onclick = () => document.getElementById("transaksiModal")?.remove();
}

function openDebtModal() {
    const modalHtml = `
        <div id="debtModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-title">Tambah Hutang/Piutang</div>
                <input type="text" id="debtName" class="modal-input" placeholder="Nama orang">
                <input type="number" id="debtAmount" class="modal-input" placeholder="Jumlah (Rp)">
                <select id="debtType" class="modal-select">
                    <option value="piutang">💰 Piutang (orang berhutang ke saya)</option>
                    <option value="hutang">💸 Hutang (saya berhutang ke orang)</option>
                </select>
                <input type="date" id="debtDueDate" class="modal-input">
                <textarea id="debtDesc" class="modal-textarea" placeholder="Catatan (opsional)" rows="2"></textarea>
                <button id="saveDebtBtn" class="modal-btn modal-btn-primary">Simpan</button>
                <button id="closeDebtModal" class="modal-btn modal-btn-secondary">Batal</button>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    
    document.getElementById("saveDebtBtn").onclick = async () => {
        const name = document.getElementById("debtName").value.trim();
        const amount = parseInt(document.getElementById("debtAmount").value);
        const type = document.getElementById("debtType").value;
        const dueDate = document.getElementById("debtDueDate").value;
        const desc = document.getElementById("debtDesc").value;
        
        if (!name) return alert("Nama harus diisi");
        if (isNaN(amount) || amount <= 0) return alert("Jumlah harus > 0");
        
        const data = { user_id: currentUser.id, contact_name: name, amount, type, description: desc, status: 'belum_lunas' };
        if (dueDate) data.due_date = dueDate;
        
        const { error } = await sb.from("debts").insert(data);
        if (error) alert("Error: " + error.message);
        else {
            showToast("Data ditambahkan");
            document.getElementById("debtModal")?.remove();
            await loadDebts();
            if (currentNav === "hutang") renderHutang();
            else renderCurrentView();
        }
    };
    document.getElementById("closeDebtModal").onclick = () => document.getElementById("debtModal")?.remove();
}

function openCategoryModal(editId = null) {
    const modalHtml = `
        <div id="categoryModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-title">${editId ? 'Edit Kategori' : 'Tambah Kategori'}</div>
                <input type="text" id="categoryName" class="modal-input" placeholder="Nama Kategori">
                <input type="text" id="categoryIcon" class="modal-input" placeholder="Icon (🍔, 🚗)" value="📁">
                <select id="categoryType" class="modal-select">
                    <option value="pengeluaran">💸 Pengeluaran</option>
                    <option value="pemasukan">💵 Pemasukan</option>
                </select>
                <input type="color" id="categoryColor" class="modal-input" value="#3b82f6">
                <input type="hidden" id="categoryId" value="${editId || ''}">
                <button id="saveCategoryBtn" class="modal-btn modal-btn-primary">Simpan</button>
                <button id="closeCategoryModal" class="modal-btn modal-btn-secondary">Batal</button>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    
    if (editId) {
        const cat = categories.find(c => c.id === editId);
        if (cat) {
            document.getElementById("categoryName").value = cat.name;
            document.getElementById("categoryIcon").value = cat.icon;
            document.getElementById("categoryType").value = cat.type;
            document.getElementById("categoryColor").value = cat.color;
        }
    }
    
    document.getElementById("saveCategoryBtn").onclick = async () => {
        const name = document.getElementById("categoryName").value.trim();
        const icon = document.getElementById("categoryIcon").value.trim() || "📁";
        const type = document.getElementById("categoryType").value;
        const color = document.getElementById("categoryColor").value;
        const id = document.getElementById("categoryId").value;
        
        if (!name) return alert("Nama kategori harus diisi");
        
        if (id) {
            await sb.from("categories").update({ name, icon, type, color }).eq("id", id);
            showToast("Kategori diupdate");
        } else {
            await sb.from("categories").insert({ user_id: currentUser.id, name, icon, type, color });
            showToast("Kategori ditambahkan");
        }
        document.getElementById("categoryModal")?.remove();
        await loadCategories();
        renderPengaturan();
    };
    document.getElementById("closeCategoryModal").onclick = () => document.getElementById("categoryModal")?.remove();
}

function editCategory(id) {
    openCategoryModal(id);
}

// Load Data Functions
async function loadCategories() {
    if (!currentUser) return;
    const { data } = await sb.from("categories").select("*").eq("user_id", currentUser.id);
    categories = data || [];
}

async function loadTransactions() {
    if (!currentUser) return;
    const { data } = await sb.from("transactions").select("*").eq("user_id", currentUser.id);
    transactions = data || [];
}

async function loadDebts() {
    if (!currentUser) return;
    const { data } = await sb.from("debts").select("*").eq("user_id", currentUser.id);
    debts = data || [];
}

async function processRecurring() {
    if (!currentUser) return;
    const today = new Date();
    const currentDay = today.getDate();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();
    
    const { data: recurringList } = await sb.from("recurring_transactions").select("*").eq("user_id", currentUser.id).eq("is_active", true);
    if (!recurringList) return;
    
    for (const r of recurringList) {
        if (r.day_of_month !== currentDay) continue;
        if (r.last_processed_date) {
            const last = new Date(r.last_processed_date);
            if (last.getMonth() === currentMonth && last.getFullYear() === currentYear) continue;
        }
        const insertData = { user_id: currentUser.id, description: `${r.description} (otomatis)`, amount: r.amount, type: r.type };
        if (r.category_id) insertData.category_id = r.category_id;
        await sb.from("transactions").insert(insertData);
        await sb.from("recurring_transactions").update({ last_processed_date: `${currentYear}-${currentMonth+1}-${currentDay}` }).eq("id", r.id);
    }
}

// Authentication
async function handleLogin() {
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    const errorDiv = document.getElementById("loginError");
    if (!email || !password) { errorDiv.innerText = "Email dan password harus diisi"; return; }
    errorDiv.innerText = "";
    
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { errorDiv.innerText = error.message; return; }
        await onAuthSuccess(data.user);
    } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { errorDiv.innerText = error.message; return; }
        if (data.user) {
            alert("Pendaftaran berhasil! Silakan login.");
            toggleMode();
        }
    }
}

async function handleGuest() {
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) { document.getElementById("loginError").innerText = error.message; return; }
    await onAuthSuccess(data.user);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById("modalTitle").innerText = isLoginMode ? "Masuk / Daftar" : "Daftar Akun Baru";
    document.getElementById("submitLoginBtn").innerText = isLoginMode ? "Masuk" : "Daftar";
    document.getElementById("switchText").innerText = isLoginMode ? "Belum punya akun? Daftar" : "Sudah punya akun? Masuk";
}

async function onAuthSuccess(user) {
    currentUser = user;
    document.getElementById("loginModal").style.display = "none";
    
    await loadCategories();
    await loadTransactions();
    await loadDebts();
    await processRecurring();
    await loadTransactions();
    
    addBottomNav();
    renderCurrentView();
}

async function logout() {
    await sb.auth.signOut();
    currentUser = null;
    document.querySelector(".bottom-nav")?.remove();
    document.getElementById("appContainer").innerHTML = "";
    document.getElementById("loginModal").style.display = "flex";
}

async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session?.user) {
        await onAuthSuccess(data.session.user);
    } else {
        document.getElementById("loginModal").style.display = "flex";
    }
}

// Event Listeners Login
document.getElementById("submitLoginBtn").onclick = handleLogin;
document.getElementById("switchText").onclick = toggleMode;
document.getElementById("guestBtn").onclick = handleGuest;

checkSession();
</script>
