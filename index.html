<script>

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dHVwc2ltYndzZmZ5eWxmcGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTIyMDksImV4cCI6MjA5NjE2ODIwOX0.Fa_552HBaZmNgXdZUiMZc3jVWQqzEnAJNcKE_GgJy3g";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
console.log("Supabase initialized");

let currentUser = null;
let transactions = [];
let debts = [];
let categories = [];
let currentNav = "home";
let isLoginMode = true;
let isBalanceHidden = false;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

// Helper functions
function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function formatRp(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function updateBalanceUI() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === 'pemasukan') pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    const displaySaldo = isBalanceHidden ? '••••••' : `Rp ${formatRp(pemasukan - pengeluaran)}`;
    const displayPemasukan = isBalanceHidden ? '••••' : `Rp ${formatRp(pemasukan)}`;
    const displayPengeluaran = isBalanceHidden ? '••••' : `Rp ${formatRp(pengeluaran)}`;
    
    document.getElementById('totalSaldo').innerText = displaySaldo;
    document.getElementById('totalPemasukan').innerText = displayPemasukan;
    document.getElementById('totalPengeluaran').innerText = displayPengeluaran;
}

// Load data
async function loadCategories() {
    if (!currentUser) return;
    const { data } = await sb.from('categories').select('*').eq('user_id', currentUser.id);
    categories = data || [];
}

async function loadTransactions() {
    if (!currentUser) return;
    const { data } = await sb.from('transactions').select('*').eq('user_id', currentUser.id);
    transactions = data || [];
    updateBalanceUI();
}

async function loadDebts() {
    if (!currentUser) return;
    const { data } = await sb.from('debts').select('*').eq('user_id', currentUser.id);
    debts = data || [];
}

// Add transaction
async function addTransaction(desc, amount, type, catId = null) {
    if (!desc) return alert('Deskripsi harus diisi');
    if (isNaN(amount) || amount <= 0) return alert('Jumlah harus > 0');
    
    const data = { user_id: currentUser.id, description: desc, amount, type };
    if (catId) data.category_id = catId;
    
    const { error } = await sb.from('transactions').insert(data);
    if (error) {
        alert('Gagal: ' + error.message);
        return false;
    }
    showToast('Transaksi berhasil ditambahkan');
    await loadTransactions();
    return true;
}

// Render functions
function renderHome() {
    let totalPiutang = 0, totalHutang = 0;
    for (const d of debts) {
        if (d.status === 'lunas') continue;
        if (d.type === 'piutang') totalPiutang += d.amount;
        else totalHutang += d.amount;
    }
    
    const recent = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,5);
    
    let html = `
        <div class="debt-row">
            <div class="debt-box piutang">
                <div style="font-size:12px">💰 Piutang</div>
                <div class="debt-amount piutang">Rp ${formatRp(totalPiutang)}</div>
            </div>
            <div class="debt-box hutang">
                <div style="font-size:12px">💸 Hutang</div>
                <div class="debt-amount hutang">Rp ${formatRp(totalHutang)}</div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">📋 Transaksi Terbaru</div>
            <div id="recentList"></div>
        </div>
    `;
    
    document.getElementById('dynamicContent').innerHTML = html;
    
    const container = document.getElementById('recentList');
    if (recent.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
    } else {
        let rHtml = '';
        for (const t of recent) {
            const kelas = t.type === 'pemasukan' ? 'txn-income' : 'txn-expense';
            const prefix = t.type === 'pemasukan' ? '+' : '-';
            rHtml += `
                <div class="txn-item">
                    <div>
                        <div class="txn-desc">${escapeHtml(t.description)}</div>
                        <div class="txn-date">${new Date(t.created_at).toLocaleDateString('id-ID')}</div>
                    </div>
                    <div class="${kelas}">${prefix} Rp ${formatRp(t.amount)}</div>
                </div>
            `;
        }
        container.innerHTML = rHtml;
    }
}

function renderTransaksi() {
    let html = `
        <div class="card">
            <div class="card-title">📋 Semua Transaksi</div>
            <div class="filter-row">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="income">Pemasukan</button>
                <button class="filter-btn" data-filter="expense">Pengeluaran</button>
            </div>
            <div id="allTransactionsList"></div>
        </div>
    `;
    document.getElementById('dynamicContent').innerHTML = html;
    
    const container = document.getElementById('allTransactionsList');
    const all = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    
    if (all.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
    } else {
        let listHtml = '';
        for (const t of all) {
            const kelas = t.type === 'pemasukan' ? 'txn-income' : 'txn-expense';
            const prefix = t.type === 'pemasukan' ? '+' : '-';
            listHtml += `
                <div class="txn-item">
                    <div>
                        <div class="txn-desc">${escapeHtml(t.description)}</div>
                        <div class="txn-date">${new Date(t.created_at).toLocaleDateString('id-ID')}</div>
                    </div>
                    <div style="display:flex; align-items:center">
                        <div class="${kelas}">${prefix} Rp ${formatRp(t.amount)}</div>
                        <button class="delete-icon" data-id="${t.id}">🗑️</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = listHtml;
    }
    
    document.querySelectorAll('.delete-icon').forEach(btn => {
        btn.onclick = async () => {
            if (confirm('Hapus transaksi?')) {
                await sb.from('transactions').delete().eq('id', btn.dataset.id);
                showToast('Transaksi dihapus');
                await loadTransactions();
                renderCurrentView();
            }
        };
    });
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.dataset.filter;
            let filtered = [...transactions];
            if (filter === 'income') filtered = filtered.filter(t => t.type === 'pemasukan');
            if (filter === 'expense') filtered = filtered.filter(t => t.type === 'pengeluaran');
            filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">Tidak ada transaksi</div>';
            } else {
                let fHtml = '';
                for (const t of filtered) {
                    const kelas = t.type === 'pemasukan' ? 'txn-income' : 'txn-expense';
                    const prefix = t.type === 'pemasukan' ? '+' : '-';
                    fHtml += `
                        <div class="txn-item">
                            <div>
                                <div class="txn-desc">${escapeHtml(t.description)}</div>
                                <div class="txn-date">${new Date(t.created_at).toLocaleDateString('id-ID')}</div>
                            </div>
                            <div style="display:flex; align-items:center">
                                <div class="${kelas}">${prefix} Rp ${formatRp(t.amount)}</div>
                                <button class="delete-icon" data-id="${t.id}">🗑️</button>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = fHtml;
                
                document.querySelectorAll('.delete-icon').forEach(btn => {
                    btn.onclick = async () => {
                        if (confirm('Hapus transaksi?')) {
                            await sb.from('transactions').delete().eq('id', btn.dataset.id);
                            await loadTransactions();
                            renderCurrentView();
                        }
                    };
                });
            }
        };
    });
}

    const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    
    const filtered = transactions.filter(t => {
        const d = new Date(t.created_at);
        return d.getMon
