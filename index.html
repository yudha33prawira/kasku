<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Keuangan Keluarga</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
           ALL STYLES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #141b2d;
            --bg-card: rgba(255,255,255,0.04);
            --bg-card-hover: rgba(255,255,255,0.08);
            --bg-card-glass: rgba(255,255,255,0.03);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255,255,255,0.06);
            --border-glow: rgba(59,130,246,0.15);
            --shadow: 0 8px 40px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 40px rgba(59,130,246,0.08);
            --radius: 24px;
            --radius-sm: 14px;
            --radius-xs: 10px;
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --gradient-success: linear-gradient(135deg, #10b981, #059669);
            --gradient-danger: linear-gradient(135deg, #ef4444, #dc2626);
            --gradient-warning: linear-gradient(135deg, #f59e0b, #d97706);
            --gradient-premium: linear-gradient(135deg, #8b5cf6, #3b82f6, #06b6d4);
            --nav-height: 72px;
            --danger-color: #f87171;
            --warning-color: #fbbf24;
            --success-color: #4ade80;
        }
        body {
            background: var(--bg-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + 24px);
            transition: background 0.4s ease;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.03) 0%, transparent 50%);
        }
        body.light {
            --bg-primary: #f0f4ff;
            --bg-secondary: #ffffff;
            --bg-card: rgba(0,0,0,0.03);
            --bg-card-hover: rgba(0,0,0,0.06);
            --bg-card-glass: rgba(255,255,255,0.6);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: rgba(0,0,0,0.06);
            --border-glow: rgba(59,130,246,0.1);
            --shadow: 0 8px 40px rgba(0,0,0,0.06);
            --shadow-glow: 0 0 40px rgba(59,130,246,0.04);
            background-image: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.05) 0%, transparent 60%);
        }
        body.light .balance-card,
        body.light .balance-card * {
            color: #ffffff !important;
        }
        body.light .balance-card .balance-label,
        body.light .balance-card .stat-label {
            color: rgba(255,255,255,0.7) !important;
        }
        body.light .balance-card .balance-amount {
            color: #ffffff !important;
        }
        body.light .balance-card .stat-value.income {
            color: #4ade80 !important;
        }
        body.light .balance-card .stat-value.expense {
            color: #f87171 !important;
        }
        body.light .balance-card .balance-eye {
            color: #ffffff !important;
            background: rgba(255,255,255,0.15) !important;
        }
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-logo {
            font-size: 72px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .loading-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
            background: var(--gradient-premium);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .loading-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .loading-bar {
            width: 200px;
            height: 4px;
            background: var(--bg-card);
            border-radius: 4px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            background: var(--gradient-premium);
            border-radius: 4px;
            animation: shimmer 1.5s ease-in-out infinite;
            background-size: 200% 100%;
        }
        .loading-percent {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 12px;
            font-weight: 500;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .app-container {
            max-width: 440px;
            margin: 0 auto;
            padding: 16px 16px 20px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-card-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-glow);
            margin-bottom: 16px;
        }
        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex: 1;
            min-width: 0;
        }
        .header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gradient-premium);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(59,130,246,0.25);
            overflow: hidden;
            position: relative;
        }
        .header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .header-avatar .initials {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 18px;
            font-weight: 700;
            color: white;
            background: var(--gradient-premium);
        }
        .header-info {
            line-height: 1.3;
            flex: 1;
            min-width: 0;
        }
        .header-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-code {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }
        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            backdrop-filter: blur(8px);
            flex-shrink: 0;
        }
        .header-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            transform: scale(1.05);
        }
        .header-btn:active {
            transform: scale(0.92);
        }
        .header-btn .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #ef4444;
            color: white;
            font-size: 9px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(239,68,68,0.4);
        }

        .running-text-container {
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
            overflow: hidden;
            white-space: nowrap;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            background: var(--bg-card-glass);
            backdrop-filter: blur(12px);
        }
        .running-text-container.danger {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.2);
        }
        .running-text-container.warning {
            background: rgba(251,191,36,0.08);
            border-color: rgba(251,191,36,0.12);
        }
        .running-text {
            display: inline-block;
            animation: scrollText 28s linear infinite;
            font-size: 12px;
            font-weight: 500;
        }
        .running-text .text-danger { color: #f87171; font-weight: 600; }
        .running-text .text-warning { color: #fbbf24; font-weight: 500; }
        .running-text span { margin-right: 40px; }
        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .balance-card {
            background: linear-gradient(145deg, #1a2332, #0f172a);
            border-radius: var(--radius);
            padding: 24px 24px 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            color: #ffffff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 70%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.12), transparent 70%);
            pointer-events: none;
        }
        .balance-card::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 60%;
            height: 150%;
            background: radial-gradient(circle, rgba(139,92,246,0.08), transparent 70%);
            pointer-events: none;
        }
        .balance-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        .balance-amount {
            font-size: 34px;
            font-weight: 800;
            margin: 4px 0 8px;
            letter-spacing: -0.8px;
            color: #ffffff;
            position: relative;
            z-index: 1;
        }
        .balance-stats {
            display: flex;
            gap: 24px;
            margin-top: 12px;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
            position: relative;
            z-index: 1;
        }
        .stat-item { flex: 1; }
        .stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .stat-value {
            font-size: 17px;
            font-weight: 700;
            margin-top: 2px;
            color: #ffffff;
        }
        .stat-value.income { color: #4ade80; }
        .stat-value.expense { color: #f87171; }
        .balance-eye {
            position: absolute;
            right: 16px;
            top: 16px;
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 30px;
            padding: 4px 14px;
            color: #ffffff;
            font-size: 12px;
            cursor: pointer;
            z-index: 2;
            backdrop-filter: blur(8px);
            transition: var(--transition);
        }
        .balance-eye:hover { background: rgba(255,255,255,0.12); }

        .card {
            background: var(--bg-card-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 18px 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            cursor: pointer;
            color: var(--text-primary);
            box-shadow: var(--shadow-glow);
        }
        .card:hover {
            border-color: var(--border-glow);
            transform: translateY(-1px);
        }
        .card:active { transform: scale(0.98); }
        .card-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }
        .card-title .badge-count {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-card);
            padding: 2px 12px;
            border-radius: 20px;
            flex-shrink: 0;
        }

        .home-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .home-grid-card {
            background: var(--bg-card-glass);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-sm);
            padding: 12px 12px 10px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            cursor: pointer;
            overflow: hidden;
            min-width: 0;
        }
        .home-grid-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-2px);
        }
        .home-grid-card .hgc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .home-grid-card .hgc-header .hgc-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .home-grid-card .hgc-header .hgc-badge {
            font-size: 9px;
            color: var(--text-secondary);
            background: var(--bg-card);
            padding: 1px 8px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .home-grid-card .hgc-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 6px;
            border-radius: 6px;
            background: var(--bg-card);
            margin-bottom: 4px;
            border-left: 2px solid var(--text-muted);
            font-size: 11px;
            overflow: hidden;
        }
        .home-grid-card .hgc-item .hgc-icon { font-size: 14px; flex-shrink: 0; }
        .home-grid-card .hgc-item .hgc-text {
            flex: 1;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .home-grid-card .hgc-item .hgc-status {
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 12px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .home-grid-card .hgc-item .hgc-status.danger {
            background: rgba(239,68,68,0.15);
            color: #f87171;
        }
        .home-grid-card .hgc-item .hgc-status.warning {
            background: rgba(251,191,36,0.15);
            color: #fbbf24;
        }
        .home-grid-card .hgc-item .hgc-status.done {
            background: rgba(16,185,129,0.15);
            color: #4ade80;
        }
        .home-grid-card .hgc-empty {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            padding: 8px 0;
        }
        .home-grid-card .hgc-more {
            font-size: 10px;
            color: var(--text-secondary);
            text-align: center;
            padding: 2px 0;
            border-top: 1px solid var(--border-color);
            margin-top: 4px;
        }

        .task-premium-card {
            background: var(--bg-card-glass);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .task-premium-card:hover {
            border-color: var(--border-glow);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }
        .task-premium-card .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .task-premium-card .task-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .task-premium-card .task-title .task-icon { font-size: 20px; flex-shrink: 0; }
        .task-premium-card .task-title .task-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .task-premium-card .task-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .task-premium-card .task-meta .status-badge {
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        .task-premium-card .task-meta .status-badge.danger {
            background: rgba(239,68,68,0.15);
            color: #f87171;
        }
        .task-premium-card .task-meta .status-badge.warning {
            background: rgba(251,191,36,0.15);
            color: #fbbf24;
        }
        .task-premium-card .task-meta .status-badge.done {
            background: rgba(16,185,129,0.15);
            color: #4ade80;
        }
        .task-premium-card .task-meta .status-badge.pending {
            background: rgba(148,163,184,0.15);
            color: #94a3b8;
        }
        .task-premium-card .task-checkbox {
            width: 20px;
            height: 20px;
            accent-color: #3b82f6;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .task-premium-card .task-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            padding: 8px 12px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            word-wrap: break-word;
        }
        .task-premium-card .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: flex-end;
        }
        .task-premium-card .task-actions .btn-small {
            padding: 4px 14px;
            border-radius: 20px;
            border: none;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .task-premium-card .task-actions .btn-small.edit {
            background: var(--gradient-primary);
            color: white;
        }
        .task-premium-card .task-actions .btn-small.delete {
            background: var(--gradient-danger);
            color: white;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--bg-card-glass);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-sm);
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            cursor: pointer;
            color: var(--text-primary);
        }
        .stat-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-2px);
        }
        .stat-card:active { transform: scale(0.96); }
        .stat-card .label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .stat-card .value {
            font-size: 19px;
            font-weight: 700;
            margin-top: 2px;
            color: var(--text-primary);
        }
        .stat-card .value.income { color: #10b981; }
        .stat-card .value.expense { color: #ef4444; }

        .tx-premium-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-primary);
            border-radius: var(--radius-xs);
            gap: 10px;
        }
        .tx-premium-item:last-child { border-bottom: none; }
        .tx-premium-item:hover {
            background: var(--bg-card);
            margin: 0 -4px;
            padding-left: 12px;
            padding-right: 12px;
        }
        .tx-premium-item:active { opacity: 0.7; }
        .tx-premium-item .tx-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .tx-premium-item .tx-icon-wrapper {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            background: var(--bg-card);

                handleBackPress();
            });

            let touchStartX = 0;
            document.addEventListener('touchstart', function(e) {
                touchStartX = e.touches[0].clientX;
            });
            document.addEventListener('touchend', function(e) {
                const touchEndX = e.changedTouches[0].clientX;
                const diffX = touchEndX - touchStartX;
                if (diffX > 80) {
                    const loginModal = document.getElementById('loginModal');
                    if (loginModal && loginModal.style.display !== 'none') return;

                }
            });

        function handleBackPress() {
            const modalOverlay = document.querySelector('.modal-overlay');
            if (modalOverlay) {

            if (moreMenu && moreMenu.classList.contains('open')) {

                if (moreBtn) {

        class CustomUserManager {
            constructor(sb) {
                this.sb = sb;
                this.authUser = null;
                this.customUser = null;
                this.isGuest = false;
            }

            async setupCustomUser(authUser) {
                if (authUser && authUser.id && authUser.id.startsWith('guest_')) {
                    this.authUser = authUser;
                    this.customUser = {
                        id: 0,
                        auth_id: authUser.id,
                        email: authUser.email || 'guest@tamu.com',
                        username: 'Tamu',
                        user_code: 'TAMU-' + String(Math.floor(Math.random() * 10000)).padStart(4, '0'),
                        display_name: 'Pengunjung',
                        avatar_url: null
                    };
                    this.isGuest = true;
                    return this.customUser;
                }
                if (!authUser) return null;
                try {
                    const { data: existing } = await this.sb.from('users').select('*').eq('auth_id', authUser.id)
                        .maybeSingle();
                    if (existing) {
                        this.customUser = existing;
                        this.authUser = authUser;
                        return this.customUser;
                    }
                    const username = authUser.email.split('@')[0] + '_' + Math.floor(Math.random() * 10000);
                    const userCode = 'USR-' + String(Math.floor(Math.random() * 10000)).padStart(4, '0');
                    const { data: inserted } = await this.sb.from('users').insert({
                        auth_id: authUser.id,
                        email: authUser.email,
                        username: username,
                        user_code: userCode
                    }).select().maybeSingle();
                    if (inserted) {
                        this.customUser = inserted;
                        this.authUser = authUser;
                        return this.customUser;
                    }
                    throw new Error('Failed to create user');
                } catch (e) {
                    console.error(e);
                    return null;
                }
            }

            async getUserId() { return this.customUser?.id || 0; }
            async getUserCode() { return this.customUser?.user_code || 'USR-???'; }
            async getUsername() { return this.customUser?.username || 'User'; }
            async getUserData() { return this.customUser; }
            async getAvatarUrl() { return this.customUser?.avatar_url || null; }

            async updateProfile(data) {
                if (this.isGuest) {
                    if (data.username) this.customUser.username = data.username;
                    if (data.display_name) this.customUser.display_name = data.display_name;
                    if (data.avatar_url) this.customUser.avatar_url = data.avatar_url;
                    saveGuestData();
                    return this.customUser;
                }
                if (!this.customUser) throw new Error('No user');
                await this.sb.from('users').update({ ...data, updated_at: new Date().toISOString() }).eq('id', this
                    .customUser.id);
                const { data: updated } = await this.sb.from('users').select('*').eq('id', this.customUser.id)
                    .single();
                this.customUser = updated;
                return updated;
            }

            async getUserById(id) {
                if (this.isGuest) {
                    if (id === 0 || id === this.customUser?.id) return this.customUser;
                    return null;
                }
                const { data } = await this.sb.from('users').select('*').eq('id', id).maybeSingle();
                return data;
            }
        }

        function isNotificationSupported() {

        function initAudioContext() {
            try {
                audioContext = new(window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') audioContext.resume();
            } catch (e) {}
        }

        function playNotificationSound() {
            try {
                if (!audioContext) initAudioContext();
                if (!audioContext) return;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.type = 'sine';
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + 0.3);
                setTimeout(() => {
                    try {
                        const osc2 = audioContext.createOscillator();
                        const gain2 = audioContext.createGain();
                        osc2.connect(gain2);
                        gain2.connect(audioContext.destination);
                        osc2.type = 'sine';
                        osc2.frequency.value = 1100;
                        gain2.gain.setValueAtTime(0.2, audioContext.currentTime);
                        gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.25);
                        osc2.start(audioContext.currentTime);
                        osc2.stop(audioContext.currentTime + 0.25);
                    } catch (e2) {}
                }, 200);
            } catch (e) {}
        }

        function vibrateAndroid() {
            try { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); } catch (e) {}
        }

        function showSystemNotification(title, body, tag = null) {
            if (!isNotificationSupported()) return;
            if (Notification.permission !== 'granted') return;
            try {
                const options = {
                    body: body,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💰</text></svg>',
                    vibrate: [200, 100, 200],
                    requireInteraction: true
                };
                if (tag) options.tag = tag;
                const notif = new Notification(title, options);
                setTimeout(() => notif.close(), 8000);
                playNotificationSound();
                vibrateAndroid();
            } catch (e) {}
        }

        function requestNotificationPermission() {
            if (!isNotificationSupported()) {
                showToast('❌ Notifikasi tidak didukung browser ini', 3000, 'error');
                return;
            }
            if (Notification.permission === 'granted') {
                notificationPermission = true;
                showToast('✅ Notifikasi sudah diizinkan', 2000, 'success');
                renderCurrentView();
                return;
            }
            if (Notification.permission === 'denied') {
                showToast('❌ Izin notifikasi ditolak.', 3000, 'error');
                return;
            }
            Notification.requestPermission().then(permission => {
                notificationPermission = permission === 'granted';
                if (notificationPermission) {
                    showToast('🔔 Notifikasi diaktifkan!', 2000, 'success');
                    initAudioContext();
                } else {
                    showToast('❌ Izin notifikasi ditolak', 2000, 'error');
                }
                renderCurrentView();
            });
        }

            if (notifCheckerInterval) clearInterval(notifCheckerInterval);
            notifCheckerInterval = setInterval(async () => {
                if (!appReady || !currentUser) return;
                if (!isNotificationSupported()) return;
                if (!notificationPermission && Notification.permission === 'granted') {
                    notificationPermission = true;
                }
                if (!notificationPermission) return;
                await checkAndNotify();
            }, 30000);
        }

        async function checkAndNotify() {
            try {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                for (const t of tasks) {
                    if (t.is_completed || !t.due_date) continue;
                    const due = new Date(t.due_date);
                    due.setHours(0, 0, 0, 0);
                    const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                    if (diff <= 1 && diff >= -1) {
                        const key = 'notif_task_' + t.id + '_' + today.toISOString().split('T')[0];
                        if (!sessionStorage.getItem(key)) {
                            const msg = diff < 0 ? '🔴 TERLEWAT!' : (diff === 0 ? '🔴 HARI INI!' : '🟡 Besok!');
                            showSystemNotification(`📋 Tugas: ${t.title}`, `${msg} Deadline ${formatDate(t.due_date)}`,
                                key);
                            sessionStorage.setItem(key, 'sent');
                        }
                    }
                }
                for (const d of debts) {
                    if (d.status === 'lunas' || !d.due_date) continue;
                    const due = new Date(d.due_date);
                    due.setHours(0, 0, 0, 0);
                    const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                    if (diff <= 1 && diff >= -1) {
                        const key = 'notif_debt_' + d.id + '_' + today.toISOString().split('T')[0];
                        if (!sessionStorage.getItem(key)) {
                            const msg = diff < 0 ? '🔴 TERLEWAT!' : (diff === 0 ? '🔴 HARI INI!' : '🟡 Besok!');
                            const type = d.type === 'piutang' ? 'Piutang' : 'Hutang';
                            showSystemNotification(`💰 ${type}: ${d.contact_name}`,
                                `${msg} Jatuh tempo ${formatDate(d.due_date)} - Rp ${formatRupiah(d.amount)}`, key);
                            sessionStorage.setItem(key, 'sent');
                        }
                    }
                }
                for (const r of reminders) {
                    if (r.is_done || !r.due_date) continue;
                    const due = new Date(r.due_date);
                    due.setHours(0, 0, 0, 0);
                    const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                    if (diff <= 1 && diff >= -1) {
                        const key = 'notif_rem_' + r.id + '_' + today.toISOString().split('T')[0];
                        if (!sessionStorage.getItem(key)) {
                            const msg = diff < 0 ? '🔴 TERLEWAT!' : (diff === 0 ? '🔴 HARI INI!' : '🟡 Besok!');
                            showSystemNotification(`⏰ Pengingat: ${r.title}`,
                                `${msg} ${formatDate(r.due_date)}${r.amount ? ' - Rp '+formatRupiah(r.amount) : ''}`,
                                key);
                            sessionStorage.setItem(key, 'sent');
                        }
                    }
                }
            } catch (e) {}
        }

        function isRecurringTransaction(t) {
            if (!t) return false;
            if (t.description && t.description.includes('(Ulang)')) return true;
            return recurringMap[t.id] === true;
        }

        async function loadRecurringMap() {
            const uid = await userManager.getUserId();
            if (!uid) { recurringMap = {}; return; }
            try {
                let userIds = [uid];
                if (currentFamilyId && familyMembers.length > 0) {
                    userIds = familyMembers.map(m => m.user_id);
                }
                const { data, error } = await sb.from('recurring_transactions')
                    .select('original_transaction_id')
                    .in('user_id', userIds);
                if (error) throw error;
                recurringMap = {};
                if (data) {
                    data.forEach(r => { recurringMap[r.original_transaction_id] = true; });
                }
            } catch (e) { recurringMap = {}; }
        }

        // ============================================================
        // REALTIME SUBSCRIPTION
        // ============================================================
        function setupRealtimeSubscriptions() {
            realtimeSubscriptions.forEach(sub => {
                try { sub.unsubscribe(); } catch (e) {}
            });
            realtimeSubscriptions = [];

            if (isGuestMode) return;
            if (!currentFamilyId) return;

            const familyIds = getFamilyMemberIds();
            if (!familyIds.length) return;

            const tables = ['transactions', 'debts', 'tasks', 'reminders', 'sedekah_data', 'sedekah_history'];
            tables.forEach(tableName => {
                try {
                    const channel = sb.channel(`realtime-${tableName}-${currentFamilyId}`);
                    const sub = channel
                        .on(
                            'postgres_changes', {
                                event: '*',
                                schema: 'public',
                                table: tableName,
                                filter: `user_id=in.(${familyIds.join(',')})`
                            },
                            (payload) => {
                                console.log(`🔄 Realtime update on ${tableName}:`, payload);
                                refreshAllData();
                            }
                        )
                        .subscribe((status) => {
                            console.log(`📡 Realtime ${tableName} status:`, status);
                        });
                    realtimeSubscriptions.push(sub);
                } catch (e) {
                    console.warn(`Failed to subscribe to ${tableName}:`, e);
                }
            });
        }

        async function loadFamilyData() {
            if (isGuestMode) {
                currentFamilyId = null;

                familyInfo = null;

            const uid = await userManager.getUserId();

        async function uploadAvatar(file) {
            if (!currentUser) return null;
            if (isGuestMode) {
                showToast('❌ Mode tamu tidak bisa upload foto', 2000, 'error');
                return null;
            }
            try {
                const uid = await userManager.getUserId();
                if (!uid) return null;

                const oldAvatarUrl = await userManager.getAvatarUrl();
                if (oldAvatarUrl) {
                    try {
                        const parts = oldAvatarUrl.split('/');
                        const fileName = parts[parts.length - 1];
                        const avatarsIndex = parts.indexOf('avatars');
                        let oldPath;
                        if (avatarsIndex !== -1) {
                            oldPath = parts.slice(avatarsIndex).join('/');
                        } else {
                            oldPath = `avatars/${fileName}`;
                        }
                        await sb.storage.from('user-avatars').remove([oldPath]);
                    } catch (e) { console.warn('⚠️ Gagal hapus foto lama:', e); }
                }

                const ext = file.name.split('.').pop();
                const path = `avatars/${uid}_${Date.now()}.${ext}`;
                const { data: uploadData, error: uploadError } = await sb.storage
                    .from('user-avatars')
                    .upload(path, file, {
                        cacheControl: '3600',
                        upsert: true
                    });
                if (uploadError) throw uploadError;
                const { data: publicUrl } = sb.storage.from('user-avatars').getPublicUrl(path);
                const url = publicUrl.publicUrl;

                await userManager.updateProfile({ avatar_url: url });
                currentCustomUser = await userManager.getUserData();

                showToast('✅ Foto profil diupdate!', 2000, 'success');
                renderCurrentView();
                return url;
            } catch (e) {
                console.error('Upload error:', e);
                showToast('❌ Gagal upload foto: ' + e.message, 3000, 'error');
                return null;
            }
        }

        function triggerAvatarUpload() {
            if (isGuestMode) {
                showToast('❌ Mode tamu tidak bisa upload foto', 2000, 'error');
                return;
            }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 2 * 1024 * 1024) {
                    showToast('❌ Ukuran max 2MB', 2000, 'error');
                    return;
                }
                await uploadAvatar(file);
            };
            input.click();
        }

        function getOverdueCount() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let count = 0;
            tasks.forEach(t => {
                if (t.is_completed || !t.due_date) return;
                const due = new Date(t.due_date);
                due.setHours(0, 0, 0, 0);
                const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                if (diff <= 7) count++;
            });
            reminders.forEach(r => {
                if (r.is_done || !r.due_date) return;
                const due = new Date(r.due_date);
                due.setHours(0, 0, 0, 0);
                const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                if (diff <= 7) count++;
            });
            debts.forEach(d => {
                if (d.status === 'lunas' || !d.due_date) return;
                const due = new Date(d.due_date);
                due.setHours(0, 0, 0, 0);
                const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                if (diff <= 7) count++;
            });
            return count;
        }

        function getRunningText() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const msgs = [];
            debts.forEach(d => {
                if (d.status === 'lunas' || !d.due_date) return;
                const due = new Date(d.due_date);
                due.setHours(0, 0, 0, 0);
                const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                if (diff < 0) msgs.push({ text: `TERLEWAT! ${d.type==='piutang'?'Piutang':'Hutang'} ${escapeHtml(d.contact_name)} sudah jatuh tempo ${Math.abs(diff)} hari yang lalu!`,
                    type: 'danger' });
                else if (diff === 0) msgs.push({ text: `HARI INI! ${d.type==='piutang'?'Piutang':'Hutang'} ${escapeHtml(d.contact_name)} jatuh tempo HARI INI!`,
                    type: 'danger' });
                else if (diff <= 3) msgs.push({ text: `${d.type==='piutang'?'Piutang':'Hutang'} ${escapeHtml(d.contact_name)} jatuh tempo ${diff} hari lagi!`,
                    type: 'warning' });
            });
            tasks.forEach(t => {
                if (t.is_completed || !t.due_date) return;
                const due = new Date(t.due_date);
                due.setHours(0, 0, 0, 0);
                const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                if (diff < 0) msgs.push({ text: `TERLEWAT! Tugas "${escapeHtml(t.title)}" sudah terlewat ${Math.abs(diff)} hari!`,
                    type: 'danger' });
                else if (diff === 0) msgs.push({ text: `HARI INI! Tugas "${escapeHtml(t.title)}" jatuh tempo HARI INI!`,
                    type: 'danger' });
                else if (diff <= 7) msgs.push({ text: `Tugas "${escapeHtml(t.title)}" jatuh tempo ${diff} hari lagi!`,
                    type: 'warning' });
            });
            reminders.forEach(r => {
                if (r.is_done || !r.due_date) return;
                const due = new Date(r.due_date);
                due.setHours(0, 0, 0, 0);
                const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
                if (diff < 0) msgs.push({ text: `TERLEWAT! Pengingat "${escapeHtml(r.title)}" sudah terlewat ${Math.abs(diff)} hari!`,
                    type: 'danger' });
                else if (diff === 0) msgs.push({ text: `HARI INI! Pengingat "${escapeHtml(r.title)}" jatuh tempo HARI INI!`,
                    type: 'danger' });
                else if (diff <= 7) msgs.push({ text: `Pengingat "${escapeHtml(r.title)}" jatuh tempo ${diff} hari lagi!`,
                    type: 'warning' });
            });
            msgs.sort((a, b) => {
                if (a.type === 'danger' && b.type === 'warning') return -1;
                if (a.type === 'warning' && b.type === 'danger') return 1;
                return 0;
            });
            return msgs;
        }

        function renderRunningText() {
            const msgs = getRunningText();
            if (!msgs.length) return '';
            const danger = msgs.filter(m => m.type === 'danger');
            const warning = msgs.filter(m => m.type === 'warning');
            let cls = danger.length ? 'danger' : (warning.length ? 'warning' : '');
            let html = `<div class="running-text-container ${cls}"><div class="running-text">`;
            msgs.forEach(m => {
                const icon = m.type === 'danger' ? '🔴' : '🟡';
                html += `<span>${icon} ${m.text}</span>`;
            });
            html += `</div></div>`;
            return html;
        }

        function getTaskStatus(t) {
            if (t.is_completed) return { label: '✅ Selesai', cls: 'done', color: '#4ade80' };
            if (!t.due_date) return { label: '⏳ Pending', cls: 'pending', color: '#94a3b8' };
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const due = new Date(t.due_date);
            due.setHours(0, 0, 0, 0);
            const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
            if (diff < 0 || diff === 0) return { label: diff < 0 ? '🔴 Terlewat!' : '🔴 Hari ini!', cls: 'danger',
                color: '#f87171' };
            if (diff <= 7) return { label: `🟡 ${diff} hari lagi`, cls: 'warning', color: '#fbbf24' };
            return { label: `⏳ ${diff} hari lagi`, cls: 'pending', color: '#94a3b8' };
        }

        // ============================================================
        // DEBT FUNCTIONS
        // ============================================================
        async function prosesSaldoDebt(debt, isLunas) {
            if (!debt) return;
            const uid = await userManager.getUserId();
            if (!uid) return;

            let catHutang = categories.find(c => c.name.toLowerCase() === 'hutang' && c.type === 'pengeluaran');
            let catPiutang = categories.find(c => c.name.toLowerCase() === 'piutang' && c.type === 'pemasukan');

            if (!catHutang && !isGuestMode) {
                const { data: newCat } = await sb.from('categories').insert({
                    user_id: uid,
                    name: 'Hutang',
                    icon: '💸',
                    type: 'pengeluaran',
                    color: '#ef4444'
                }).select().single();
                catHutang = newCat;
                await loadCategories();
            }
            if (!catPiutang && !isGuestMode) {
                const { data: newCat } = await sb.from('categories').insert({
                    user_id: uid,
                    name: 'Piutang',
                    icon: '💰',
                    type: 'pemasukan',
                    color: '#10b981'
                }).select().single();
                catPiutang = newCat;
                await loadCategories();
            }

            if (isGuestMode) {
                if (!catHutang) {
                    catHutang = { id: 'cat_hutang', name: 'Hutang', icon: '💸', type: 'pengeluaran', color: '#ef4444' };
                    categories.push(catHutang);
                }
                if (!catPiutang) {
                    catPiutang = { id: 'cat_piutang', name: 'Piutang', icon: '💰', type: 'pemasukan', color: '#10b981' };
                    categories.push(catPiutang);
                }
                saveGuestData();
            }

            const now = new Date().toISOString();
            const desc = `Pelunasan ${debt.type === 'piutang' ? 'piutang' : 'hutang'} dari ${debt.contact_name} (Rp ${formatRupiah(debt.amount)})`;

            if (debt.type === 'piutang') {
                if (isLunas) {
                    const txData = {
                        user_id: uid,
                        description: desc,
                        amount: debt.amount,
                        type: 'pemasukan',
                        category_id: catPiutang.id,
                        created_at: now
                    };
                    if (isGuestMode) {
                        const newTx = { id: 'tx_' + Date.now(), ...txData };
                        transactions.push(newTx);
                        saveGuestData();
                    } else {
                        await sb.from('transactions').insert(txData);
                    }
                    showToast(`💰 Piutang Rp ${formatRupiah(debt.amount)} lunas! Saldo bertambah`, 2500, 'success');
                } else {
                    await hapusTransaksiPelunasan(debt, desc);
                }
            } else {
                if (isLunas) {
                    const txData = {
                        user_id: uid,
                        description: desc,
                        amount: debt.amount,
                        type: 'pengeluaran',
                        category_id: catHutang.id,
                        created_at: now
                    };
                    if (isGuestMode) {
                        const newTx = { id: 'tx_' + Date.now(), ...txData };
                        transactions.push(newTx);
                        saveGuestData();
                    } else {
                        await sb.from('transactions').insert(txData);
                    }
                    showToast(`💸 Hutang Rp ${formatRupiah(debt.amount)} lunas! Saldo berkurang`, 2500, 'warning');
                } else {
                    await hapusTransaksiPelunasan(debt, desc);
                }
            }
            await loadTransactions();
        }

        async function hapusTransaksiPelunasan(debt, desc) {
            if (isGuestMode) {
                const idx = transactions.findIndex(t =>
                    t.description === desc &&
                    t.amount === debt.amount &&
                    ((debt.type === 'piutang' && t.type === 'pemasukan') ||
                        (debt.type === 'hutang' && t.type === 'pengeluaran'))
                );
                if (idx > -1) {
                    transactions.splice(idx, 1);
                    saveGuestData();
                }
            } else {
                const { data: tx } = await sb.from('transactions')
                    .select('id')
                    .eq('description', desc)
                    .eq('amount', debt.amount)
                    .eq('type', debt.type === 'piutang' ? 'pemasukan' : 'pengeluaran')
                    .maybeSingle();
                if (tx) {
                    await sb.from('transactions').delete().eq('id', tx.id);
                }
            }
            showToast(`↩️ Transaksi pelunasan dibatalkan`, 2000, 'warning');
        }

        async function batalkanEfekSaldoDebt(debt) {
            const desc = `Pelunasan ${debt.type === 'piutang' ? 'piutang' : 'hutang'} dari ${debt.contact_name} (Rp ${formatRupiah(debt.amount)})`;
            await hapusTransaksiPelunasan(debt, desc);
        }

        async function createRecurringTransaction(original) {
            if (isGuestMode) return null;
            const uid = await userManager.getUserId();
            if (!uid) return null;
            try {

        async function generateRecurringTransaction(id) {
            if (isGuestMode) return null;
            try {
                const { data: r, error } = await sb.from('recurring_transactions').select('*').eq('id', id)
                    .single();
                if (error) throw error;
                if (!r || !r.is_active) return null;
                if (r.end_date && new Date() > new Date(r.end_date)) {
                    await sb.from('recurring_transactions').update({ is_active: false }).eq('id', id);
                    return null;
                }

                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();
                const currentDay = now.getDate();

                if (currentDay < r.day_of_month) return null;

                if (r.last_generated) {
                    const lastGen = new Date(r.last_generated);
                    if (lastGen.getMonth() === currentMonth && lastGen.getFullYear() === currentYear) {
                        return null;
                    }
                }

                const monthStart = new Date(currentYear, currentMonth, 1);
                const monthEnd = new Date(currentYear, currentMonth + 1, 1);
                const { data: existing } = await sb.from('transactions')
                    .select('id')
                    .eq('user_id', r.user_id)
                    .eq('description', r.description + ' (Ulang)')
                    .gte('created_at', monthStart.toISOString())
                    .lt('created_at', monthEnd.toISOString())
                    .maybeSingle();

                if (existing) {
                    await sb.from('recurring_transactions').update({
                        last_generated: new Date().toISOString().split('T')[0]
                    }).eq('id', id);
                    return null;
                }

                const targetDate = new Date(currentYear, currentMonth, r.day_of_month);
                const { data: tx, error: txErr } = await sb.from('transactions').insert({
                    user_id: r.user_id,
                    description: r.description + ' (Ulang)',
                    amount: r.amount,
                    type: r.type,
                    category_id: r.category_id || null,
                    created_at: targetDate.toISOString()
                }).select().single();

                if (txErr) throw txErr;

                await sb.from('recurring_transactions').update({
                    last_generated: new Date().toISOString().split('T')[0]
                }).eq('id', id);

                showToast(`🔄 Transaksi berulang "${r.description}" otomatis ditambahkan`, 3000, 'success');
                return tx;

            } catch (e) {
                console.error('Generate recurring error:', e);
                return null;
            }
        }

        async function processRecurringTransactions() {
            if (isGuestMode) return;
            const uid = await userManager.getUserId();
            if (!uid) return;
            try {
                const { data: list, error } = await sb.from('recurring_transactions')
                    .select('*')
                    .eq('user_id', uid)
                    .eq('is_active', true);

                if (error) {
                    if (error.code === '42P01') return;
                    throw error;
                }
                if (!list || !list.length) return;

                let generated = 0;
                for (const r of list) {
                    const result = await generateRecurringTransaction(r.id);
                    if (result) generated++;
                }

                if (generated) {
                    await loadTransactions();
                    if (currentNav === 'transaksi') renderTransaksi();
                    else if (currentNav === 'home') renderHome();
                }
            } catch (e) {
                console.error('Process recurring error:', e);
            }
        }

        function startRecurringChecker() {
            if (recurringInterval) clearInterval(recurringInterval);
            recurringInterval = setInterval(async () => {
                if (currentUser && !isGuestMode) {
                    await processRecurringTransactions();
                }
            }, 3600000);
            document.addEventListener('visibilitychange', async () => {
                if (!document.hidden && currentUser && !isGuestMode) {
                    await processRecurringTransactions();
                }
            });
        }

        async function saveSedekahData() {
            const uid = await userManager.getUserId();
            if (!uid) {
                showToast('❌ User ID tidak ditemukan', 2000, 'error');
                return;
            }
            try {
                const today = new Date().toISOString().split('T')[0];

                if (isGuestMode) {
                    const data = {
                        sedekahData: sedekahData,
                        sedekahHistory: sedekahHistory,
                        sedekahReminders: sedekahReminders,
                        savedAt: new Date().toISOString()
                    };
                    localStorage.setItem('guest_sedekah_' + today, JSON.stringify(data));
                    showToast('✅ Data sedekah disimpan (lokal)', 1500, 'success');
                    return;
                }

                let completedItems = [];
                sedekahData.forEach(d => {
                    if (d.completed && d.actions && d.actions.length > 0) {
                        const points = d.actions.length * 2;
                        const nominal = d.actions.reduce((sum, a) => sum + (a.nominal || 0), 0);
                        completedItems.push({
                            id: d.id,
                            actions: d.actions,
                            points: points,
                            nominal: nominal
                        });
                    }
                });

                const payload = {
                    user_id: uid,
                    tanggal: today,
                    actions: sedekahData,
                    updated_at: new Date().toISOString()
                };
                if (currentFamilyId) {
                    payload.family_id = currentFamilyId;
                }

                let q = sb.from('sedekah_data').select('id');
                if (currentFamilyId) {
                    q = q.eq('family_id', currentFamilyId);
                } else {
                    q = q.eq('user_id', uid);
                }
                q = q.eq('tanggal', today);
                const { data: existing, error: existingError } = await q.maybeSingle();

                if (existingError && existingError.code !== 'PGRST116') {
                    throw existingError;
                } else if (existing) {
                    await sb.from('sedekah_data').update(payload).eq('id', existing.id);
                } else {
                    await sb.from('sedekah_data').insert(payload);
                }

                if (completedItems.length > 0) {
                    const now = new Date();
                    for (const item of completedItems) {
                        const { data: existingHistory } = await sb.from('sedekah_history')
                            .select('id, points')
                            .eq('user_id', uid)
                            .eq('tanggal', today)
                            .eq('type_id', item.id)
                            .maybeSingle();

                        if (existingHistory) {
                            await sb.from('sedekah_history')
                                .update({
                                    nominal: item.nominal,
                                    points: item.points,
                                    actions: item.actions.map(a => a.actionId),
                                    updated_at: now.toISOString()
                                })
                                .eq('id', existingHistory.id);
                            continue;
                        }

                        const actionIds = item.actions.map(a => a.actionId);

                        const histPayload = {
                            user_id: uid,
                            tanggal: today,
                            type_id: item.id,
                            nominal: item.nominal,
                            points: item.points,
                            actions: actionIds,
                            created_at: now.toISOString()
                        };
                        if (currentFamilyId) {
                            histPayload.family_id = currentFamilyId;
                        }

                        await sb.from('sedekah_history').insert(histPayload);
                    }

                    await loadSedekahData();
                    const totalPoints = sedekahHistory.reduce((sum, h) => sum + (h.points || 0), 0);
                    showToast(`✅ Poin berhasil disimpan! Total: ${totalPoints} poin`, 2000, 'success');
                }
            } catch (e) {
                showToast('❌ Gagal menyimpan sedekah: ' + e.message, 3000, 'error');
            }
        }

        function renderNotificationBanner() {
            const existing = document.querySelector('.notif-banner');
            if (existing) existing.remove();

            if (isNotificationSupported() && Notification.permission === 'default') {
                const banner = document.createElement('div');
                banner.className = 'notif-banner';
                banner.innerHTML = `
                    <span>🔔 Aktifkan notifikasi untuk pengingat otomatis</span>
                    <button class="notif-btn" onclick="requestNotificationPermission()">Izinkan</button>
                `;
                const container = document.getElementById('appContainer');
                if (container && container.firstChild) {
                    container.insertBefore(banner, container.firstChild);
                } else if (container) {
                    container.prepend(banner);
                }
            } else if (isNotificationSupported() && Notification.permission === 'granted' && !notificationPermission) {
                notificationPermission = true;
            }
        }

        function openCategoryFormModal(editId = null) {
            const isEdit = !!editId;
            const cat = isEdit ? categories.find(c => c.id === editId) : null;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-title">${isEdit ? '✏️ Edit' : '➕ Tambah'} Kategori</div>
                    <div class="modal-subtitle">${isEdit ? 'Perbarui informasi kategori' : 'Buat kategori baru untuk transaksi'}</div>
                    <input type="text" id="catName" class="modal-input" placeholder="Nama Kategori" value="${isEdit ? escapeHtml(cat.name) : ''}">
                    <input type="text" id="catIcon" class="modal-input" placeholder="Icon (contoh: 🍔, 🚗)" value="${isEdit ? cat.icon || '📁' : '📁'}">
                    <select id="catType" class="modal-select">
                        <option value="pengeluaran" ${isEdit && cat.type === 'pengeluaran' ? 'selected' : ''}>💸 Pengeluaran</option>
                        <option value="pemasukan" ${isEdit && cat.type === 'pemasukan' ? 'selected' : ''}>💵 Pemasukan</option>
                    </select>
                    <input type="color" id="catColor" class="modal-input" value="${isEdit ? cat.color || '#3b82f6' : '#3b82f6'}" style="padding:6px;height:44px;cursor:pointer;">
                    <div class="modal-button-grid">
                        <button id="saveCategory" class="modal-btn modal-btn-primary">${isEdit ? 'Update' : 'Simpan'}</button>
                        <button id="closeCategory" class="modal-btn modal-btn-secondary">Batal</button>
                        ${isEdit ? `<button id="deleteCategory" class="modal-btn modal-btn-danger">🗑️ Hapus</button>` : ''}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('saveCategory').onclick = async () => {
                const name = document.getElementById('catName').value.trim();
                const icon = document.getElementById('catIcon').value.trim() || '📁';
                const type = document.getElementById('catType').value;
                const color = document.getElementById('catColor').value;
                if (!name) { showToast('❌ Nama harus diisi', 2000, 'error'); return; }
                const uid = await userManager.getUserId();
                if (isEdit) {
                    if (isGuestMode) {
                        const idx = categories.findIndex(c => c.id === editId);
                        if (idx > -1) { categories[idx] = { ...categories[idx], name, icon, type, color };
                            saveGuestData(); }
                    } else {
                        await sb.from('categories').update({ name, icon, type, color }).eq('id', editId);
                    }
                    showToast('✅ Kategori diupdate', 2000, 'success');
                } else {
                    if (isGuestMode) {
                        const newCat = { id: 'cat_' + Date.now(), user_id: uid, name, icon, type, color };
                        categories.push(newCat);
                        saveGuestData();
                        showToast('✅ Kategori ditambahkan (lokal)', 2000, 'success');
                    } else {
                        await sb.from('categories').insert({ user_id: uid, name, icon, type, color });
                        showToast('✅ Kategori ditambahkan', 2000, 'success');
                    }
                }
                modal.remove();
                await loadCategories();
                renderKategori();
            };
            if (isEdit) {
                document.getElementById('deleteCategory').onclick = async () => {
                    if (confirm('Hapus kategori?')) {
                        if (isGuestMode) {
                            categories = categories.filter(c => c.id !== editId);
                            saveGuestData();
                        } else {
                            await sb.from('categories').delete().eq('id', editId);
                        }
                        showToast('✅ Kategori dihapus', 2000, 'success');
                        modal.remove();
                        await loadCategories();
                        renderKategori();
                    }
                };
            }
            document.getElementById('closeCategory').onclick = () => modal.remove();
        }

        function openTaskModal(editId = null) {
            const isEdit = !!editId;
            const task = isEdit ? tasks.find(t => t.id === editId) : null;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-title">${isEdit ? '✏️ Edit' : '✅ Tambah'} Tugas</div>
                    <div class="modal-subtitle">${isEdit ? 'Perbarui tugas Anda' : 'Buat tugas baru untuk dikerjakan'}</div>
                    <input type="text" id="taskTitle" class="modal-input" placeholder="Judul tugas" value="${isEdit ? escapeHtml(task.title) : ''}">
                    <textarea id="taskDesc" class="modal-textarea" placeholder="Deskripsi (opsional)">${isEdit ? escapeHtml(task.description||'') : ''}</textarea>
                    <input type="date" id="taskDue" class="modal-input" value="${isEdit ? formatDateInput(task.due_date) : ''}">
                    <div class="modal-button-grid">

                </div>
            `;
            document.body.appendChild(modal);

                const title = document.getElementById('taskTitle').value.trim();
                const desc = document.getElementById('taskDesc').value;
                const due = document.getElementById('taskDue').value;
                if (!title) { showToast('❌ Judul harus diisi', 2000, 'error'); return; }
                const uid = await userManager.getUserId();
                if (isEdit) {
                    if (isGuestMode) {
                        const idx = tasks.findIndex(t => t.id === editId);
                        if (idx > -1) { tasks[idx] = { ...tasks[idx], title, description: desc, due_date: due ||
                            null };
                            saveGuestData(); }
                    } else {
                        await sb.from('tasks').update({ title, description: desc, due_date: due || null }).eq(
                        'id', editId);
                    }
                    showToast('✅ Tugas diupdate', 2000, 'success');
                } else {
                    const newTask = { id: 'task_' + Date.now(), user_id: uid, title, description: desc,
                        due_date: due || null, is_completed: false };
                    if (isGuestMode) {
                        tasks.push(newTask);
                        saveGuestData();
                    } else {

                            null });

                    showToast('✅ Tugas ditambahkan', 2000, 'success');

                            await sb.from('tasks').delete().eq('id', editId);
                        }
                        showToast('✅ Tugas dihapus', 2000, 'success');
                        modal.remove();
                        await loadTasks();
                        renderCurrentView();
                    }
                };

            document.getElementById('closeTask').onclick = () => modal.remove();

        async function deleteTask(taskId) {
            if (!confirm('Hapus tugas ini?')) return;
            if (isGuestMode) {
                tasks = tasks.filter(t => t.id !== taskId);
                saveGuestData();
            } else {
                await sb.from('tasks').delete().eq('id', taskId);
            }
            showToast('✅ Tugas dihapus', 2000, 'success');
            await loadTasks();
            renderTasks();
        }

        // ============================================================
        // RENDER HUTANG
        // ============================================================
        async function renderHutang() {
            await loadDebts();
            let piutang = 0, hutang = 0;
            debts.forEach(d => { if (d.status !== 'lunas') { if (d.type === 'piutang') piutang += Number(d.amount) || 0;
                    else hutang += Number(d.amount) || 0; } });
            const grouped = {};
            debts.forEach(d => { if (!grouped[d.contact_name]) grouped[d.contact_name] = [];
                grouped[d.contact_name].push(d); });
            const sorted = Object.entries(grouped).sort((a, b) => {
                const ta = a[1].reduce((s, d) => s + (d.status !== 'lunas' ? Number(d.amount) : 0), 0);
                const tb = b[1].reduce((s, d) => s + (d.status !== 'lunas' ? Number(d.amount) : 0), 0);
                return tb - ta;
            });
            const html = `
                <div class="header"><div class="header-user"><div class="header-avatar">💰</div><div class="header-info"><div class="header-name">Hutang & Piutang</div><div class="header-code">${debts.length} transaksi</div></div></div><div class="header-actions"><button class="header-btn" onclick="goBack()">←</button></div></div>
                <div class="stats-row"><div class="stat-card"><div class="label">💰 Piutang</div><div class="value income">Rp ${formatRupiah(piutang)}</div></div><div class="stat-card"><div class="label">💸 Hutang</div><div class="value expense">Rp ${formatRupiah(hutang)}</div></div></div>
                <button class="modal-btn modal-btn-primary modal-btn-full" style="margin-bottom:12px;" onclick="openDebtModal()">+ Tambah</button>
                <div id="debtPremiumList"></div>
            `;
            renderView('hutang', html);
            const container = document.getElementById('debtPremiumList');
            if (!sorted.length) {
                container.innerHTML =
                    '<div class="empty-state"><div class="icon">💰</div><div class="title">Belum ada data</div></div>';
                return;
            }
            container.innerHTML = sorted.map(([name, items]) => {
                let total = 0;
                let totalBelumLunas = 0;
                items.forEach(d => {
                    if (d.status !== 'lunas') {
                        if (d.type === 'piutang') total += Number(d.amount) || 0;
                        else total -= Number(d.amount) || 0;
                        totalBelumLunas += Number(d.amount) || 0;
                    }
                });
                const abs = Math.abs(total);
                const isPiutang = total >= 0;
                const hasWa = items.some(d => d.wa_number);
                const overdue = items.filter(d => d.status !== 'lunas' && d.due_date && new Date(d.due_date) <
                    new Date()).length;
                const lunasCount = items.filter(d => d.status === 'lunas').length;
                const progress = totalBelumLunas > 0 ? Math.min((lunasCount / items.length) * 100, 100) : 0;
                return `
                    <div class="debt-premium-card" onclick="showDebtGroupDetail('${escapeHtml(name)}')">
                        <div class="top-row">
                            <span class="debt-name">${escapeHtml(name)} ${overdue ? '⚠️' : ''}</span>
                            <span class="debt-amount ${isPiutang ? 'income' : 'expense'}">${isPiutang ? '+' : '-'}Rp ${formatRupiah(abs)}</span>
                        </div>
                        <div class="debt-meta">
                            <span>${items.length} transaksi</span>
                            ${hasWa ? '<span>📱 WA</span>' : ''}
                            ${lunasCount > 0 ? `<span class="lunas">✅ ${lunasCount} lunas</span>` : ''}
                            ${overdue > 0 ? `<span class="overdue">⚠️ ${overdue} overdue</span>` : ''}
                        </div>
                        <div class="progress-bar">
                            <div class="fill" style="width:${progress}%;background:${isPiutang ? '#4ade80' : '#f87171'};"></div>
                        </div>
                        <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">${Math.round(progress)}% terselesaikan</div>
                    </div>
                `;
            }).join('');
        }

                const label = isOver ? '⚠️ Over Budget' : (pct >= 80 ? '⚠️ Mendekati' : '✅ On Track');

                    0;
                    currentBudgetYear++; } else currentBudgetMonth++;
                renderBudgetPage(); };
        }
