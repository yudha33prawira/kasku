        body { background: #f8f9fc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding-bottom: 70px; }
        .app-container { max-width: 450px; margin: 0 auto; padding: 16px; }
        
        /* Login */
        .login-box { max-width: 400px; margin: 50px auto; background: white; border-radius: 32px; padding: 32px 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .login-title { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 32px; color: #1e293b; }
        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 8px; display: block; }
        .password-wrapper { position: relative; }
        .password-wrapper input { width: 100%; padding: 14px 50px 14px 16px; border: 1px solid #e2e8f0; border-radius: 40px; font-size: 16px; background: #f8fafc; }
        .toggle-password { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; }
        input[type="email"] { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 40px; font-size: 16px; background: #f8fafc; }
        .login-btn { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
        .guest-btn { width: 100%; padding: 14px; background: #e2e8f0; color: #475569; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
        .switch-mode { text-align: center; margin-top: 20px; color: #3b82f6; cursor: pointer; font-size: 14px; }
        .error-msg { color: #ef4444; font-size: 13px; text-align: center; margin-top: 12px; padding: 8px; background: #fee2e2; border-radius: 20px; }
        .hidden { display: none; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { background: #e2e8f0; padding: 8px 16px; border-radius: 30px; font-size: 13px; font-weight: 500; }
        .logout-btn { background: #ef4444; color: white; border: none; border-radius: 30px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; }
        
        /* Balance Card */
        .balance-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 28px; padding: 24px; margin-bottom: 20px; color: white; position: relative; }
        .balance-eye { position: absolute; right: 20px; top: 20px; background: rgba(255,255,255,0.2); border: none; border-radius: 30px; padding: 6px 12px; color: white; font-size: 14px; cursor: pointer; }
        .balance-amount { font-size: 32px; font-weight: 700; margin: 8px 0; }
        .balance-stats { display: flex; gap: 16px; margin-top: 16px; }
        .stat-item { flex: 1; }
        .stat-value.income { color: #4ade80; }
        .stat-value.expense { color: #f87171; }
        
        /* Quick Add */
        .quick-add { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn-income { flex: 1; background: #10b981; border: none; border-radius: 60px; padding: 14px; color: white; font-weight: 600; cursor: pointer; }
        .btn-expense { flex: 1; background: #ef4444; border: none; border-radius: 60px; padding: 14px; color: white; font-weight: 600; cursor: pointer; }
        
        /* Cards */
        .card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card-title { font-weight: 600; margin-bottom: 12px; color: #1e293b; display: flex; justify-content: space-between; align-items: center; }
        
        /* Transaction List */
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f2f5; }
        .transaction-desc { font-weight: 500; }
        .transaction-date { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        .transaction-amount.income { color: #10b981; font-weight: 600; }
        .transaction-amount.expense { color: #ef4444; font-weight: 600; }
        .delete-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #cbd5e1; }
        
        /* Filter */

        .filter-btn.active { background: #0f172a; color: white; }

        .month-selector button { background: none; border: none; font-size: 18px; cursor: pointer; padding: 8px 12px; color: #3b82f6; }

        .debt-amount.piutang { color: #10b981; }
        .debt-amount.hutang { color: #ef4444; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 16px 20px; border-top: 1px solid #e2e8f0; max-width: 450px; margin: 0 auto; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; font-size: 11px; color: #94a3b8; cursor: pointer; padding: 8px 12px; border-radius: 30px; }
        .nav-item.active { color: #3b82f6; background: #eff6ff; }
        .nav-icon { font-size: 22px; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }

        .modal-btn-primary { background: #3b82f6; color: white; }
        .modal-btn-secondary { background: #e2e8f0; color: #475569; }
        
        /* Toast */
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; font-size: 13px; z-index: 300; }

function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function updateBalanceUI() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === 'pemasukan') pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    const displaySaldo = isBalanceHidden ? '••••••' : `Rp ${formatRupiah(pemasukan - pengeluaran)}`;
    const displayPemasukan = isBalanceHidden ? '••••' : `Rp ${formatRupiah(pemasukan)}`;

    document.getElementById('totalSaldo').innerText = displaySaldo;

}

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.dataset.filter;
            let filtered = [...transactions];
            if (filter === 'income') filtered = filtered.filter(t => t.type === 'pemasukan');
            if (filter === 'expense') filtered = filtered.filter(t => t.type === 'pengeluaran');
            renderTransactionList(filtered);
        };
    });
}

function renderTransactionList(data) {

    if (data.length === 0) {
        container.innerHTML = '<div class="empty-state">Tidak ada transaksi</div>';
        return;
    }
    
    data.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    let html = '';
    for (const t of data) {

        const prefix = t.type === 'pemasukan' ? '+' : '-';
        html += `
            <div class="transaction-item">
                <div>
                    <div class="transaction-desc">${escapeHtml(t.description)}</div>
                    <div class="transaction-date">${new Date(t.created_at).toLocaleDateString('id-ID')}</div>
                </div>
                <div style="display:flex; align-items:center; gap:8px">
                    <div class="transaction-amount ${kelas}">${prefix} Rp ${formatRupiah(t.amount)}</div>
                    <button class="delete-transaksi" data-id="${t.id}" style="background:none; border:none; font-size:18px; cursor:pointer;">🗑️</button>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
    
    document.querySelectorAll('.delete-transaksi').forEach(btn => {
        btn.onclick = async () => {
            if (confirm('Hapus transaksi?')) {
                await sb.from('transactions').delete().eq('id', btn.dataset.id);
                showToast('Transaksi dihapus');
                await loadTransactions();
                renderCurrentView();
            }
        };
    });
}

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    if (!email || !password) {
        showError('Email dan password harus diisi');
        return;
    }
    clearError();
    
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });

            showError(error.message);

async function handleGuest() {
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) {
        showError(error.message);
        return;
    }
    await onLoginSuccess(data.user);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('formTitle').innerText = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('loginBtn').innerText = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('switchModeBtn').innerText = isLoginMode ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Masuk';
    clearError();
}

async function onLoginSuccess(user) {
    currentUser = user;
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('userInfo').innerHTML = user.email ? `👤 ${user.email}` : `👤 Tamu`;
    
    await loadTransactions();
}

async function logout() {
    await sb.auth.signOut();
    currentUser = null;
    transactions = [];
    document.getElementById('app').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    clearError();
}

async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session?.user) {
        await onLoginSuccess(data.session.user);
    }
}
