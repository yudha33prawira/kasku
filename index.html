<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Keuangan Keluarga</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Login Container */
        .login-card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
            color: #1e293b;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
            display: block;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 16px;
            background: #f8fafc;
            outline: none;
            transition: all 0.2s;
        }
        .input-wrapper input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .input-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
            padding: 0;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .login-btn:active {
            background: #2563eb;
        }
        .guest-btn {
            width: 100%;
            padding: 14px;
            background: #e2e8f0;
            color: #475569;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        .switch-mode {
            text-align: center;
            margin-top: 20px;
            color: #3b82f6;
            cursor: pointer;
            font-size: 14px;
        }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            padding: 8px;
            background: #fee2e2;
            border-radius: 20px;
        }
        
        /* App Container */
        .app-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .user-info {
            background: #e2e8f0;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .balance-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            color: white;
        }
        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            margin: 8px 0;
        }
        .balance-stats {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        .stat-item {
            flex: 1;
        }
        .stat-value.income { color: #4ade80; }
        .stat-value.expense { color: #f87171; }
        .quick-add {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn-income {
            flex: 1;
            background: #10b981;
            border: none;
            border-radius: 60px;
            padding: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-expense {
            flex: 1;
            background: #ef4444;
            border: none;
            border-radius: 60px;
            padding: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: #1e293b;
        }
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .transaction-desc {
            font-weight: 500;
        }
        .transaction-date {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .transaction-amount.income { color: #10b981; font-weight: 600; }
        .transaction-amount.expense { color: #ef4444; font-weight: 600; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px;
            border-top: 1px solid #e2e8f0;
            max-width: 450px;
            margin: 0 auto;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 11px;
            color: #94a3b8;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
        }
        .nav-item.active {
            color: #3b82f6;
            background: #eff6ff;
        }
        .nav-icon {
            font-size: 22px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }
        .modal-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
            background: #f8fafc;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        .modal-btn-primary {
            background: #3b82f6;
            color: white;
        }
        .modal-btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 300;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<!-- Login Card -->
<div id="loginCard" class="login-card">
    <div class="login-title" id="loginTitle">Masuk</div>
    <div class="input-group">
        <div class="input-label">Email</div>
        <div class="input-wrapper">
            <input type="email" id="emailInput" placeholder="contoh@email.com">
        </div>
    </div>
    <div class="input-group">
        <div class="input-label">Password</div>
        <div class="input-wrapper">
            <input type="password" id="passwordInput" placeholder="Minimal 6 karakter">
            <button type="button" id="togglePasswordBtn" class="toggle-password">👁️</button>
        </div>
    </div>
    <button id="loginBtn" class="login-btn">Masuk</button>
    <button id="guestBtn" class="guest-btn">Lanjut sebagai Tamu</button>
    <div id="switchModeText" class="switch-mode">Belum punya akun? Daftar</div>
    <div id="errorMsg" class="error-msg hidden"></div>
</div>

<!-- App Container -->
<div id="appContainer" class="app-container hidden">
    <div class="header">
        <div class="user-info" id="userInfo">Memuat...</div>
        <button id="logoutMainBtn" class="logout-btn">Logout</button>
    </div>
    
    <div class="balance-card">
        <div class="balance-label">Total Saldo</div>
        <div class="balance-amount" id="totalSaldo">Rp 0</div>
        <div class="balance-stats">
            <div class="stat-item">
                <div class="stat-label">Pemasukan</div>
                <div class="stat-value income" id="totalPemasukan">Rp 0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Pengeluaran</div>
                <div class="stat-value expense" id="totalPengeluaran">Rp 0</div>
            </div>
        </div>
    </div>
    
    <div class="quick-add">
        <button id="quickAddIncome" class="btn-income">+ Pemasukan</button>
        <button id="quickAddExpense" class="btn-expense">- Pengeluaran</button>
    </div>
    
    <div class="card">
        <div class="card-title">📋 Transaksi Terbaru</div>
        <div id="recentTransactions"></div>
    </div>
    
    <div class="bottom-nav">
        <button class="nav-item active" data-nav="home"><span class="nav-icon">🏠</span><span>Beranda</span></button>
        <button class="nav-item" data-nav="transaksi"><span class="nav-icon">📋</span><span>Transaksi</span></button>
        <button class="nav-item" data-nav="laporan"><span class="nav-icon">📅</span><span>Laporan</span></button>
        <button class="nav-item" data-nav="hutang"><span class="nav-icon">💰</span><span>Hutang</span></button>
        <button class="nav-item" data-nav="pengaturan"><span class="nav-icon">⚙️</span><span>Atur</span></button>
    </div>
</div>

<script>
// ============================================
// KONFIGURASI SUPABASE
// ============================================
const SUPABASE_URL = "https://dttupsimbwsffyylfpax.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dHVwc2ltYndzZmZ5eWxmcGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTIyMDksImV4cCI6MjA5NjE2ODIwOX0.Fa_552HBaZmNgXdZUiMZc3jVWQqzEnAJNcKE_GgJy3g";

let sb = null;
let currentUser = null;
let transactions = [];
let isLoginMode = true;
let currentNav = "home";

// ============================================
// HELPER FUNCTIONS
// ============================================
function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

// ============================================
// UPDATE UI
// ============================================
function updateBalanceUI() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === 'pemasukan') pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    document.getElementById('totalSaldo').innerText = `Rp ${formatRupiah(pemasukan - pengeluaran)}`;
    document.getElementById('totalPemasukan').innerText = `Rp ${formatRupiah(pemasukan)}`;
    document.getElementById('totalPengeluaran').innerText = `Rp ${formatRupiah(pengeluaran)}`;
}

function renderRecentTransactions() {
    const container = document.getElementById('recentTransactions');
    const recent = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,5);
    
    if (recent.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
        return;
    }
    
    let html = '';
    for (const t of recent) {
        const kelas = t.type === 'pemasukan' ? 'income' : 'expense';
        const prefix = t.type === 'pemasukan' ? '+' : '-';
        html += `
            <div class="transaction-item">
                <div>
                    <div class="transaction-desc">${escapeHtml(t.description)}</div>
                    <div class="transaction-date">${new Date(t.created_at).toLocaleDateString("id-ID")}</div>
                </div>
                <div class="transaction-amount ${kelas}">${prefix} Rp ${formatRupiah(t.amount)}</div>
            </div>
        `;
    }
    container.innerHTML = html;
}

// ============================================
// TRANSACTION FUNCTIONS
// ============================================
async function loadTransactions() {
    if (!currentUser) return;
    const { data, error } = await sb.from('transactions').select('*').eq('user_id', currentUser.id);
    if (error) {
        console.error('Error:', error);
        return;
    }
    transactions = data || [];
    updateBalanceUI();
    renderRecentTransactions();
}

async function addTransaction(description, amount, type) {
    if (!currentUser) return false;
    const { error } = await sb.from('transactions').insert({
        user_id: currentUser.id,
        description: description,
        amount: amount,
        type: type
    });
    if (error) {
        showToast('Gagal: ' + error.message);
        return false;
    }
    showToast('Transaksi berhasil ditambahkan');
    await loadTransactions();
    return true;
}

function openAddTransactionModal(predefinedType) {
    const desc = prompt('Masukkan deskripsi transaksi:');
    if (!desc) return;
    const amount = parseInt(prompt('Masukkan jumlah (Rp):'));
    if (isNaN(amount) || amount <= 0) {
        showToast('Jumlah tidak valid');
        return;
    }
    addTransaction(desc, amount, predefinedType);
}

// ============================================
// AUTHENTICATION FUNCTIONS
// ============================================
async function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorDiv = document.getElementById('errorMsg');
    
    if (!email || !password) {
        errorDiv.textContent = 'Email dan password harus diisi';
        errorDiv.classList.remove('hidden');
        return;
    }
    errorDiv.classList.add('hidden');
    
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
            errorDiv.textContent = error.message;
            errorDiv.classList.remove('hidden');
            return;
        }
        await onLoginSuccess(data.user);
    } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) {
            errorDiv.textContent = error.message;
            errorDiv.classList.remove('hidden');
            return;
        }
        if (data.user) {
            alert('Pendaftaran berhasil! Silakan login.');
            toggleMode();
        }
    }
}

async function handleGuestLogin() {
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        return;
    }
    await onLoginSuccess(data.user);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('loginTitle').innerText = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('loginBtn').innerText = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('switchModeText').innerText = isLoginMode ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Masuk';
    document.getElementById('errorMsg').classList.add('hidden');
}

async function onLoginSuccess(user) {
    currentUser = user;
    document.getElementById('loginCard').classList.add('hidden');
    document.getElementById('appContainer').classList.remove('hidden');
    document.getElementById('userInfo').innerHTML = user.email ? `👤 ${user.email}` : `👤 Tamu`;
    
    await loadTransactions();
}

async function logout() {
    await sb.auth.signOut();
    currentUser = null;
    transactions = [];
    document.getElementById('appContainer').classList.add('hidden');
    document.getElementById('loginCard').classList.remove('hidden');
    document.getElementById('emailInput').value = '';
    document.getElementById('passwordInput').value = '';
    document.getElementById('errorMsg').classList.add('hidden');
}

async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session?.user) {
        await onLoginSuccess(data.session.user);
    } else {
        document.getElementById('loginCard').classList.remove('hidden');
        document.getElementById('appContainer').classList.add('hidden');
    }
}

// ============================================
// NAVIGATION
// ============================================
function setupNavigation() {
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
        item.addEventListener('click', () => {
            navItems.forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');
            currentNav = item.dataset.nav;
            
            if (currentNav === 'home') {
                renderRecentTransactions();
            } else {
                showToast('Fitur ' + currentNav + ' akan segera hadir');
            }
        });
    });
}

// ============================================
// INITIALIZATION
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    // Initialize Supabase
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Toggle password visibility
