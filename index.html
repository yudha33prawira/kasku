                <button class="menu-popup-item" data-nav="settings"><span class="icon">⚙️</span>Settings</button>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', navHtml);
    document.getElementById('centerAddBtn')?.addEventListener('click', () => openTransaksiModal());
    const moreBtn = document.getElementById('moreMenuBtn');
    const popup = document.getElementById('moreMenuPopup');
    let open = false;
    moreBtn?.addEventListener('click', (e) => {
        e.stopPropagation();
        open = !open;
        popup.classList.toggle('open', open);
        moreBtn.classList.toggle('active', open);
        moreBtn.style.color = open ? '#3b82f6' : '';
    });
    document.addEventListener('click', (e) => {
        if (open && !popup.contains(e.target) && e.target !== moreBtn && !moreBtn.contains(e.target)) {
            open = false;
            popup.classList.remove('open');
            moreBtn.classList.remove('active');
            moreBtn.style.color = '';
        }
    });
    document.querySelectorAll('.menu-popup-item').forEach(btn => {
        btn.addEventListener('click', () => {
            open = false;
            popup.classList.remove('open');
            moreBtn.classList.remove('active');
            moreBtn.style.color = '';
            pushHistory(currentNav);
            currentNav = btn.dataset.nav;
            updateNav();
            renderCurrentView();
        });
    });
    document.querySelectorAll('.nav-item[data-nav]').forEach(btn => {
        btn.addEventListener('click', () => {
            if (open) {
                open = false;
                popup.classList.remove('open');
                moreBtn.classList.remove('active');
                moreBtn.style.color = '';
            }
            pushHistory(currentNav);
            currentNav = btn.dataset.nav;
            updateNav();
            renderCurrentView();
        });
    });
}

function updateNav() {
    document.querySelectorAll('.nav-item[data-nav]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.nav === currentNav);
        btn.style.color = btn.dataset.nav === currentNav ? '#3b82f6' : '';
    });
}

function renderCurrentView() {
    if (!appReady) return;
    const views = { 
        home: renderHome, 
        transaksi: renderTransaksi, 
        budget: renderBudgetPage, 
        tasks: renderTasks, 
        settings: renderSettings, 
        hutang: renderHutang, 
        savings: renderSavings, 
        reminders: renderReminders, 
        kategori: renderKategori, 
        laporan: renderLaporan,
        'kunci-sukses': renderKunciSukses
    };
    if (views[currentNav]) views[currentNav]();
}

// ============================================
// AUTH FUNCTIONS
// ============================================
async function onAuthSuccess(user) {
    currentUser = user;
    document.getElementById('loginModal').style.display = 'none';
    let customUser = await userManager.setupCustomUser(user);
    if (!customUser) { customUser = { id: 0, user_code: 'USR-???', email: user.email, username: user.email.split('@')[0] }; userManager.customUser = customUser; userManager.authUser = user; }
    currentCustomUser = customUser;
    await loadAllData();
    try { await processRecurringTransactions(); } catch(e) { console.log('⚠️ Recurring skipped'); }
    await initTheme();
    appReady = true;
    addBottomNav();
    renderCurrentView();
    hideLoading();
}

async function logout() {
    await sb.auth.signOut();
    currentUser = null; currentCustomUser = null; appReady = false;
    document.querySelector('.bottom-nav')?.remove();
    document.getElementById('appContainer').innerHTML = '';
    document.getElementById('loginModal').style.display = 'flex';
    document.getElementById('emailInput').value = ''; document.getElementById('passwordInput').value = '';
    isLoginMode = true;
    document.getElementById('modalTitle').innerHTML = '💰 Keuangan Keluarga';
    document.getElementById('submitLoginBtn').innerHTML = 'Masuk';
    document.getElementById('switchText').innerHTML = 'Belum punya akun? Daftar';
    applyTheme(false);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('modalTitle').innerHTML = isLoginMode ? '💰 Masuk ke Akun' : '💰 Daftar Akun Baru';
    document.getElementById('submitLoginBtn').innerHTML = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('switchText').innerHTML = isLoginMode ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Masuk';
}

async function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorDiv = document.getElementById('loginError');
    if (!email || !password) { errorDiv.textContent = 'Email dan password harus diisi'; return; }
    errorDiv.textContent = '';
    const loading = showLoading();
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { errorDiv.textContent = error.message; clearInterval(loading); hideLoading(); return; }
        if (data.user) { await onAuthSuccess(data.user); }
    } else {
        if (password.length < 6) { errorDiv.textContent = 'Password minimal 6 karakter'; clearInterval(loading); hideLoading(); return; }
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { errorDiv.textContent = error.message; clearInterval(loading); hideLoading(); return; }
        if (data.user) { showToast('✅ Pendaftaran berhasil! Silakan login.', 2500, 'success'); toggleMode(); document.getElementById('emailInput').value = ''; document.getElementById('passwordInput').value = ''; clearInterval(loading); hideLoading(); }
    }
}

async function handleGuest() {
    const errorDiv = document.getElementById('loginError');
    errorDiv.textContent = '';
    const loading = showLoading();
    try {
        const { data, error } = await sb.auth.signInAnonymously();
        if (error) { errorDiv.textContent = error.message; clearInterval(loading); hideLoading(); return; }
        if (data.user) { await onAuthSuccess(data.user); }
    } catch(e) { errorDiv.textContent = 'Gagal masuk sebagai tamu: ' + e.message; clearInterval(loading); hideLoading(); }
}

async function startApp() {
    showLoading();
    await new Promise(r => {
        if (typeof supabase !== 'undefined') { r(); return; }
        let attempts = 0;
        const iv = setInterval(() => { attempts++; if (typeof supabase !== 'undefined') { clearInterval(iv); r(); } else if (attempts > 50) { clearInterval(iv); console.error('Supabase failed to load'); document.getElementById('loadingOverlay').classList.add('hidden'); document.getElementById('loginModal').style.display = 'flex'; document.getElementById('loginError').textContent = 'Gagal memuat Supabase. Refresh halaman.'; r(); } }, 200);
    });
    if (!initSupabase()) { document.getElementById('loadingOverlay').classList.add('hidden'); document.getElementById('loginModal').style.display = 'flex'; document.getElementById('loginError').textContent = 'Gagal memuat Supabase. Refresh halaman.'; return; }
    try {
        const { data } = await sb.auth.getSession();
        if (data.session?.user) await onAuthSuccess(data.session.user);
        else { document.getElementById('loginModal').style.display = 'flex'; hideLoading(); }
    } catch(e) { document.getElementById('loginModal').style.display = 'flex'; hideLoading(); }
}

// ============================================
// EVENT LISTENERS
// ============================================
document.getElementById('submitLoginBtn')?.addEventListener('click', handleLogin);
document.getElementById('guestBtn')?.addEventListener('click', handleGuest);
document.getElementById('switchText')?.addEventListener('click', toggleMode);
document.getElementById('toggleLoginPassword')?.addEventListener('click', () => {
    const inp = document.getElementById('passwordInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    inp.nextElementSibling.textContent = inp.type === 'password' ? '👁️' : '👁️‍🗨️';
});

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startApp);
else startApp();
</script>
