<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Keuangan Keluarga</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f8f9fc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding-bottom: 70px; }
        .app-container { max-width: 450px; margin: 0 auto; padding: 16px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .user-info { background: #e8edf5; padding: 6px 14px; border-radius: 30px; font-size: 13px; font-weight: 500; color: #1e293b; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .settings-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 8px; color: #475569; }
        .logout-btn { background: #ef4444; color: white; border: none; border-radius: 30px; padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer; }
        
        .running-text-container { background: #fef3c7; border-radius: 12px; padding: 10px 16px; margin-bottom: 16px; overflow: hidden; white-space: nowrap; position: relative; }
        .running-text { display: inline-block; animation: scroll 20s linear infinite; font-size: 13px; color: #92400e; }
        .running-text span { margin-right: 30px; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 32px; padding: 20px; margin-bottom: 20px; color: white; position: relative; }
        .balance-eye { position: absolute; right: 20px; top: 20px; background: rgba(255,255,255,0.2); border: none; border-radius: 30px; padding: 6px 12px; color: white; font-size: 14px; cursor: pointer; }
        .balance-label { font-size: 14px; opacity: 0.7; }
        .balance-amount { font-size: 32px; font-weight: 700; margin: 8px 0 4px; }
        .balance-stats { display: flex; gap: 16px; margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.15); }
        .stat-item { flex: 1; }
        .stat-label { font-size: 12px; opacity: 0.7; }
        .stat-value { font-size: 18px; font-weight: 600; margin-top: 4px; }
        .stat-value.income { color: #4ade80; }
        .stat-value.expense { color: #f87171; }
        
        .btn-income, .btn-expense { flex: 1; border: none; border-radius: 60px; padding: 14px; color: white; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-income { background: #10b981; }
        .btn-expense { background: #ef4444; }
        .btn-secondary { background: #64748b; color: white; border: none; border-radius: 40px; padding: 10px 16px; font-weight: 500; cursor: pointer; }
        .btn-recurring { background: #8b5cf6; color: white; border: none; border-radius: 40px; padding: 10px 16px; font-weight: 500; cursor: pointer; }
        .btn-purple { background: #8b5cf6; }
        
        .card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .card-title { font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 8px 16px 20px; border-top: 1px solid #eef2f6; max-width: 450px; margin: 0 auto; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; font-size: 11px; color: #94a3b8; cursor: pointer; padding: 8px 10px; border-radius: 40px; transition: all 0.2s; font-weight: 500; }
        .nav-item .nav-icon { font-size: 22px; }
        .nav-item.active { color: #3b82f6; background: #eff6ff; }
        
        .transaction-list, .task-list, .savings-list, .reminders-list { display: flex; flex-direction: column; gap: 8px; }
        .transaction-item, .task-item, .savings-item, .reminder-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f2f5; }
        .task-check { margin-right: 12px; transform: scale(1.2); cursor: pointer; }
        .task-title { font-weight: 500; flex: 1; }
        .task-completed { text-decoration: line-through; color: #94a3b8; }
        .task-date { font-size: 10px; color: #94a3b8; margin-top: 2px; }
        
        .filter { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; }
        .filter-btn { padding: 8px 16px; border: none; border-radius: 40px; background: #e2e8f0; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #0f172a; color: white; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .modal-content { background: white; border-radius: 32px; padding: 24px; width: 100%; max-width: 340px; max-height: 85vh; overflow-y: auto; }
        .modal-title { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 20px; }
        .modal-input, .modal-select, .modal-textarea { width: 100%; padding: 14px 16px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 40px; font-size: 15px; background: #f8fafc; }
        .modal-btn { width: 100%; padding: 14px; border-radius: 40px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 8px; }
        .modal-btn-primary { background: #3b82f6; color: white; }
        .modal-btn-secondary { background: #e2e8f0; color: #475569; }
        
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; font-size: 13px; z-index: 300; white-space: nowrap; }
        .empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
        .progress-bar { background: #e2e8f0; border-radius: 10px; height: 6px; margin-top: 8px; }
        .progress-fill { background: #10b981; height: 6px; border-radius: 10px; }
        .month-selector { display: flex; justify-content: space-between; background: white; border-radius: 60px; padding: 8px 16px; margin-bottom: 16px; }
        .top-expense-item { display: flex; justify-content: space-between; padding: 8px 0; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 50px; }
        .toggle-password { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; cursor: pointer; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
        .detail-label { font-weight: 500; color: #475569; }
        .detail-value { color: #1e293b; }
        .debt-urgent { background: #fee2e2; border-radius: 12px; padding: 8px; margin-bottom: 8px; }
        .edit-detail-btn { background: #3b82f6; color: white; border: none; border-radius: 30px; padding: 6px 12px; font-size: 12px; margin-top: 12px; cursor: pointer; }
    </style>
</head>
<body>

<script>
// Supabase Config
const SUPABASE_URL = "https://dttupsimbwsffyylfpax.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dHVwc2ltYndzZmZ5eWxmcGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTIyMDksImV4cCI6MjA5NjE2ODIwOX0.Fa_552HBaZmNgXdZUiMZc3jVWQqzEnAJNcKE_GgJy3g";

let sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
let categories = [];
let transactions = [];
let debts = [];
let savings = [];
let reminders = [];
let tasks = [];
let recurringList = [];
let chart = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

let previousNav = "home"; // Untuk navigasi back

let transaksiFilter = "all";
let taskFilter = "all";

// Helper functions
function showToast(msg) { let t = document.querySelector('.toast'); if (t) t.remove(); t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }

function formatRupiah(angka) {
    if (angka === undefined || angka === null) return '0';
    return new Intl.NumberFormat("id-ID").format(angka);
}

function parseRupiah(str) {
    if (!str) return 0;
    return parseInt(str.replace(/\./g, '').replace(/[^0-9]/g, '')) || 0;
}

function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) || ''; }
function getCategoryById(id) { return categories.find(c => c.id === id); }
function hitungTotalSaldo() { let p=0, k=0; transactions.forEach(t => t.type==='pemasukan'? p+=t.amount : k+=t.amount); return { pemasukan:p, pengeluaran:k, saldo:p-k }; }
function hitungTotalTabungan() { return savings.reduce((a,b)=>a+b.current_amount,0); }

function setupRupiahInput(inputId) {
    const input = document.getElementById(inputId);
    if (!input) return;
    input.addEventListener('input', function(e) {
        let value = this.value.replace(/\./g, '').replace(/[^0-9]/g, '');
        if (value) this.value = formatRupiah(parseInt(value));
        else this.value = '';
    });
}

// Load Data
async function loadCategories() { if(currentUser) { const {data}=await sb.from("categories").select("*").eq("user_id",currentUser.id); categories=data||[]; } }
async function loadTransactions() { if(currentUser) { const {data}=await sb.from("transactions").select("*").eq("user_id",currentUser.id); transactions=data||[]; } }
async function loadDebts() { if(currentUser) { const {data}=await sb.from("debts").select("*").eq("user_id",currentUser.id); debts=data||[]; } }
async function loadSavings() { if(currentUser) { const {data}=await sb.from("savings").select("*").eq("user_id",currentUser.id); savings=data||[]; } }
async function loadReminders() { if(currentUser) { const {data}=await sb.from("reminders").select("*").eq("user_id",currentUser.id); reminders=data||[]; } }
async function loadTasks() { if(currentUser) { const {data}=await sb.from("tasks").select("*").eq("user_id",currentUser.id); tasks=data||[]; } }
async function loadRecurring() { if(currentUser) { const {data}=await sb.from("recurring_transactions").select("*").eq("user_id",currentUser.id); recurringList=data||[]; } }

// Process recurring transactions
async function processRecurring() {
    if (!currentUser) return;
    const today = new Date();
    const currentDay = today.getDate();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();
    const todayStr = `${currentYear}-${currentMonth+1}-${currentDay}`;
    
    for (const r of recurringList) {
        if (!r.is_active) continue;
        if (r.day_of_month !== currentDay) continue;
        if (r.last_processed_date) {
            const last = new Date(r.last_processed_date);
            if (last.getMonth() === currentMonth && last.getFullYear() === currentYear) continue;
        }
        const insertData = {
            user_id: currentUser.id,
            description: `${r.description} (otomatis)`,
            amount: r.amount,
            type: r.type,
            is_fixed_expense: r.type === 'pengeluaran'
        };
        if (r.category_id) insertData.category_id = r.category_id;
        await sb.from("transactions").insert(insertData);
        await sb.from("recurring_transactions").update({ last_processed_date: todayStr }).eq("id", r.id);
    }
}

// Running text untuk deadline
function getRunningText() {
    const today = new Date();
    const messages = [];
    
    debts.forEach(d => {
        if (d.status === 'lunas') return;
        if (d.due_date) {
            const due = new Date(d.due_date);
            const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
            if (diff >= 0 && diff <= 7) {
                messages.push(`⚠️ ${d.type === 'piutang' ? 'Piutang' : 'Hutang'} ${escapeHtml(d.contact_name)} jatuh tempo ${diff === 0 ? 'HARI INI!' : `${diff} hari lagi`}`);
            }
        }
    });
    
    tasks.forEach(t => {
        if (t.is_completed) return;
        if (t.due_date) {
            const due = new Date(t.due_date);
            const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
            if (diff >= 0 && diff <= 7) {
                messages.push(`📋 Tugas "${escapeHtml(t.title)}" ${diff === 0 ? 'HARI INI!' : `${diff} hari lagi`}`);
            }
        }
    });
    
    reminders.forEach(r => {
        if (r.is_done) return;
        if (r.due_date) {
            const due = new Date(r.due_date);
            const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
            if (diff >= 0 && diff <= 7) {
                messages.push(`⏰ ${escapeHtml(r.title)} ${diff === 0 ? 'HARI INI!' : `${diff} hari lagi`}`);
            }
        }
    });
    
    return messages;
}

function renderRunningText() {
    const messages = getRunningText();
    if (messages.length === 0) return '';
    return `<div class="running-text-container"><div class="running-text">${messages.map(m => `<span>🔔 ${m}</span>`).join('')}</div></div>`;
}

// ==================== RENDER FUNGSI ====================

// HOME
async function renderHome() {
    const totals = hitungTotalSaldo();
    const totalSavings = hitungTotalTabungan();
    const bulanIni = transactions.filter(t => { const d=new Date(t.created_at); return d.getMonth()===new Date().getMonth() && d.getFullYear()===new Date().getFullYear() && t.type==='pengeluaran' && !t.is_fixed_expense; });
    const topExpenses = [...bulanIni].sort((a,b)=>b.amount-a.amount).slice(0,3);
    let piutang=0, hutang=0;
    debts.forEach(d => { if(d.status!=='lunas') d.type==='piutang'? piutang+=d.amount : hutang+=d.amount; });
    const recent = [...transactions].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
    
    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email?.slice(0,20)||'Tamu'}</div>
            <div class="header-actions">
                <button id="openSettingsBtn" class="settings-btn">⚙️</button>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>
        ${renderRunningText()}
        <div class="balance-card">
            <button id="toggleBalanceBtn" class="balance-eye">${isBalanceHidden?'👁️‍🗨️':'👁️'}</button>
            <div class="balance-label">Total Saldo</div>
            <div class="balance-amount">${isBalanceHidden?'••••••':`Rp ${formatRupiah(totals.saldo)}`}</div>
            <div class="balance-stats">
                <div class="stat-item"><div class="stat-label">Pemasukan</div><div class="stat-value income">${isBalanceHidden?'••••':`+Rp ${formatRupiah(totals.pemasukan)}`}</div></div>
                <div class="stat-item"><div class="stat-label">Pengeluaran</div><div class="stat-value expense">${isBalanceHidden?'••••':`-Rp ${formatRupiah(totals.pengeluaran)}`}</div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title"><span>💰 Tabungan</span><span style="color:#10b981">Rp ${formatRupiah(totalSavings)}</span></div>
            <div id="savingsPreview"></div>
            <button id="viewAllSavings" class="btn-secondary" style="margin-top:8px; width:100%">Lihat semua tabungan →</button>
        </div>
        <div style="display:flex; gap:12px; margin-bottom:20px">
            <button id="quickIncome" class="btn-income">+ Pemasukan</button>
            <button id="quickExpense" class="btn-expense">- Pengeluaran</button>
        </div>
        <div style="display:flex; gap:12px; margin-bottom:20px">
            <div style="flex:1; background:#d1fae5; border-radius:20px; padding:12px; text-align:center"><div>💰 Piutang</div><div style="font-weight:700; color:#10b981">Rp ${formatRupiah(piutang)}</div></div>
            <div style="flex:1; background:#fee2e2; border-radius:20px; padding:12px; text-align:center"><div>💸 Hutang</div><div style="font-weight:700; color:#ef4444">Rp ${formatRupiah(hutang)}</div></div>
        </div>
        <div class="card"><div class="card-title">📊 Pengeluaran Teratas</div>${topExpenses.map((t,i)=>`<div class="top-expense-item"><span>${i+1}. ${escapeHtml(t.description)}</span><span style="color:#ef4444">-Rp ${formatRupiah(t.amount)}</span></div>`).join('')||'<div class="empty-state">Belum ada</div>'}</div>
        <div class="card"><div class="card-title">📋 Transaksi Terbaru</div>${recent.map(t=>`<div style="display:flex; justify-content:space-between; padding:8px 0"><div>${escapeHtml(t.description)}<br><small>${new Date(t.created_at).toLocaleDateString()}</small></div><div style="font-weight:600;color:${t.type==='pemasukan'?'#10b981':'#ef4444'}">${t.type==='pemasukan'?'+':'-'}Rp ${formatRupiah(t.amount)}</div></div>`).join('')||'<div class="empty-state">Belum ada transaksi</div>'}</div>
    `;
    document.getElementById("appContainer").innerHTML = html;
    
    const previewDiv = document.getElementById("savingsPreview");
    if(previewDiv) {
        if(savings.length===0) previewDiv.innerHTML='<div class="empty-state" style="padding:12px">Belum ada tabungan</div>';
        else previewDiv.innerHTML = savings.slice(0,2).map(s=>`<div><div>${escapeHtml(s.name)}</div><div>Rp ${formatRupiah(s.current_amount)} / Rp ${formatRupiah(s.target_amount)}</div><div class="progress-bar"><div class="progress-fill" style="width:${s.target_amount? (s.current_amount/s.target_amount*100).toFixed(0):0}%"></div></div></div>`).join('');
    }
    
    document.getElementById("quickIncome")?.addEventListener("click",()=>openTransaksiModal("pemasukan"));
    document.getElementById("quickExpense")?.addEventListener("click",()=>openTransaksiModal("pengeluaran"));
    document.getElementById("logoutBtn")?.addEventListener("click",logout);
    document.getElementById("openSettingsBtn")?.addEventListener("click",()=>{

        currentNav = "settings"; 
        updateNav(); 
        renderSettings(); 
    });
    document.getElementById("toggleBalanceBtn")?.addEventListener("click",()=>{ isBalanceHidden=!isBalanceHidden; renderHome(); });
    document.getElementById("viewAllSavings")?.addEventListener("click",()=>{ 
        previousNav = currentNav;
        currentNav = "savings"; 
        updateNav(); 
        renderSavings(); 
    });
}

// TRANSAKSI
async function renderTransaksi() {
    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email?.slice(0,20)||'Tamu'}</div>
            <div class="header-actions">
                <button id="openSettingsBtn" class="settings-btn">⚙️</button>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>
        ${renderRunningText()}
        <div style="display:flex; gap:12px; margin-bottom:12px">
            <button id="addTransaksiBtn" class="btn-income" style="flex:1">+ Transaksi</button>
            <button id="addRecurringBtn" class="btn-recurring" style="flex:1">🔄 Berulang</button>
        </div>
        <button id="manageCategoryBtn" class="btn-secondary" style="margin-bottom:16px; width:100%; background:#8b5cf6">🏷️ Kelola Kategori</button>
        <div class="filter">
            <button class="filter-btn ${transaksiFilter==='all'?'active':''}" data-filter="all">Semua</button>
            <button class="filter-btn ${transaksiFilter==='income'?'active':''}" data-filter="income">Pemasukan</button>
            <button class="filter-btn ${transaksiFilter==='expense'?'active':''}" data-filter="expense">Pengeluaran</button>
        </div>
        <div class="card"><div id="transaksiList"></div></div>
    `;
    document.getElementById("appContainer").innerHTML = html;
    document.getElementById("addTransaksiBtn")?.addEventListener("click",()=>openTransaksiModal());
    document.getElementById("addRecurringBtn")?.addEventListener("click",()=>openRecurringModal());
    document.getElementById("manageCategoryBtn")?.addEventListener("click",()=>openCategoryManageModal());
    document.getElementById("logoutBtn")?.addEventListener("click",logout);
    document.getElementById("openSettingsBtn")?.addEventListener("click",()=>{ 
        previousNav = currentNav;
        currentNav = "settings"; 
        updateNav(); 
        renderSettings(); 
    });
    
    let data = [...transactions];
    if(transaksiFilter==='income') data=data.filter(t=>t.type==='pemasukan');
    if(transaksiFilter==='expense') data=data.filter(t=>t.type==='pengeluaran');
    data.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const container = document.getElementById("transaksiList");

    document.getElementById("saveRecurring").onclick = async () => {
        const desc = document.getElementById("recurringDesc").value.trim();
        const amount = parseRupiah(document.getElementById("recurringAmount").value);

        const amount=parseRupiah(document.getElementById("reminderAmount").value);
        const id=document.getElementById("reminderId").value;
        if(!title||!due) return alert("Judul dan tanggal harus diisi");
        if(id) await sb.from("reminders").update({title,description:desc,due_date:due,amount}).eq("id",id);
        else await sb.from("reminders").insert({user_id:currentUser.id,title,description:desc,due_date:due,amount});
        showToast(isEdit?"Pengingat diupdate":"Pengingat ditambahkan");
        modal.remove(); await loadReminders(); renderReminders();
    };
    document.getElementById("closeReminder").onclick=()=>modal.remove();
}

// TUGAS
async function renderTasks() {
    let html=`
        <div class="header">
            <div class="user-info">${currentUser?.email?.slice(0,20)||'Tamu'}</div>
            <div class="header-actions">
                <button id="openSettingsBtn" class="settings-btn">⚙️</button>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>
        ${renderRunningText()}
        <button id="addTaskBtn" class="btn-income" style="margin-bottom:16px">+ Tambah Tugas</button>
        <div class="filter">
            <button class="filter-btn ${taskFilter==='all'?'active':''}" data-filter="all">Semua</button>
            <button class="filter-btn ${taskFilter==='active'?'active':''}" data-filter="active">Belum Selesai</button>
            <button class="filter-btn ${taskFilter==='completed'?'active':''}" data-filter="completed">Selesai</button>
        </div>
        <div class="card"><div id="tasksList"></div></div>
    `;
    document.getElementById("appContainer").innerHTML=html;
    document.getElementById("addTaskBtn")?.addEventListener("click",()=>openTaskModal());
    document.getElementById("logoutBtn")?.addEventListener("click",logout);
    document.getElementById("openSettingsBtn")?.addEventListener("click",()=>{ 
        previousNav = currentNav;
        currentNav = "settings"; 
        updateNav(); 
        renderSettings(); 
    });
    
    let filtered=tasks;
    if(taskFilter==='active') filtered=tasks.filter(t=>!t.is_completed);
    if(taskFilter==='completed') filtered=tasks.filter(t=>t.is_completed);
    const container=document.getElementById("tasksList");
    if(!filtered.length) container.innerHTML='<div class="empty-state">Belum ada tugas</div>';
    else container.innerHTML=filtered.map(t=>{
        const isOverdue = t.due_date && !t.is_completed && new Date(t.due_date) < new Date();
        return `<div class="task-item" style="${isOverdue?'background:#fee2e2; border-radius:12px; padding:8px; margin-bottom:8px':''}"><div style="display:flex; align-items:center; gap:8px; flex:1"><input type="checkbox" class="task-check" data-id="${t.id}" ${t.is_completed?'checked':''}><div><div class="${t.is_completed?'task-completed':''}" style="font-weight:500">${escapeHtml(t.title)}</div>${t.description?`<div class="task-date">📝 ${escapeHtml(t.description)}</div>`:''}<div class="task-date">📅 ${t.due_date?new Date(t.due_date).toLocaleDateString():'Tanpa deadline'} ${isOverdue?'⚠️ Terlewat':''}</div></div></div><div><button class="edit-task" data-id="${t.id}" style="background:none; border:none; font-size:18px;">✏️</button><button class="delete-task" data-id="${t.id}" style="background:none; border:none; font-size:18px;">🗑️</button></div></div>`;
    }).join('');
    
    document.querySelectorAll(".task-check").forEach(cb=>cb.onclick=async()=>{await sb.from("tasks").update({is_completed:cb.checked}).eq("id",cb.dataset.id); await loadTasks(); renderTasks();});
    document.querySelectorAll(".edit-task").forEach(btn=>btn.onclick=()=>openTaskModal(btn.dataset.id));
    document.querySelectorAll(".delete-task").forEach(btn=>btn.onclick=async()=>{if(confirm("Hapus tugas?")){await sb.from("tasks").delete().eq("id",btn.dataset.id); await loadTasks(); renderTasks();}});
    document.querySelectorAll(".filter-btn").forEach(btn=>btn.onclick=()=>{taskFilter=btn.dataset.filter; renderTasks();});
}

function openTaskModal(editId=null){
    const isEdit=!!editId;
    const t=isEdit?tasks.find(t=>t.id===editId):null;
    const modal=document.createElement('div');modal.className='modal-overlay';
    modal.innerHTML=`<div class="modal-content"><div class="modal-title">${isEdit?'Edit Tugas':'Tambah Tugas'}</div><input id="taskTitle" class="modal-input" placeholder="Judul tugas" value="${isEdit?escapeHtml(t.title):''}"><textarea id="taskDesc" class="modal-textarea" placeholder="Deskripsi (opsional)">${isEdit?escapeHtml(t.description||''):''}</textarea><input type="date" id="taskDue" class="modal-input" value="${isEdit?t.due_date?.slice(0,10):''}"><input id="taskId" type="hidden" value="${editId||''}"><button id="saveTask" class="modal-btn modal-btn-primary">Simpan</button><button id="closeTask" class="modal-btn modal-btn-secondary">Batal</button></div>`;
    document.body.appendChild(modal);
    document.getElementById("saveTask").onclick=async()=>{
        const title=document.getElementById("taskTitle").value.trim();
        const desc=document.getElementById("taskDesc").value;
        const due=document.getElementById("taskDue").value;
        const id=document.getElementById("taskId").value;
        if(!title) return alert("Judul harus diisi");
        if(id) await sb.from("tasks").update({title,description:desc,due_date:due||null}).eq("id",id);
        else await sb.from("tasks").insert({user_id:currentUser.id,title,description:desc,due_date:due||null});
        showToast(isEdit?"Tugas diupdate":"Tugas ditambahkan");
        modal.remove(); await loadTasks(); renderTasks();
    };
    document.getElementById("closeTask").onclick=()=>modal.remove();
}

// LAPORAN
async function renderLaporan() {
    const monthNames=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const filtered=transactions.filter(t=>{const d=new Date(t.created_at); return d.getMonth()===currentMonth && d.getFullYear()===currentYear;});
    let pemasukan=0,pengeluaran=0,catTotals={};
    filtered.forEach(t=>{if(t.type==='pemasukan') pemasukan+=t.amount; else pengeluaran+=t.amount; const cid=t.category_id||'uncategorized'; catTotals[cid]=(catTotals[cid]||0)+t.amount;});
    const labels=[],data=[],colors=[];
    Object.entries(catTotals).forEach(([id,val])=>{if(id==='uncategorized'){labels.push('📁 Tanpa Kategori');colors.push('#94a3b8');}else{const cat=categories.find(c=>c.id===id);if(cat){labels.push(`${cat.icon} ${cat.name}`);colors.push(cat.color);}}data.push(val);});
    let html=`
        <div class="header"><div class="user-info">${currentUser?.email?.slice(0,20)||'Tamu'}</div><div class="header-actions"><button id="openSettingsBtn" class="settings-btn">⚙️</button><button id="logoutBtn" class="logout-btn">Logout</button></div></div>
        ${renderRunningText()}
        <div class="month-selector"><button id="prevMonth">◀</button><span>${monthNames[currentMonth]} ${currentYear}</span><button id="nextMonth">▶</button></div>
        <div class="balance-card"><div style="display:flex; justify-content:space-between"><div>💚 +Rp ${formatRupiah(pemasukan)}</div><div>❤️ -Rp ${formatRupiah(pengeluaran)}</div><div>💰 Rp ${formatRupiah(pemasukan-pengeluaran)}</div></div></div>
        <div class="card"><div class="card-title">📊 Statistik Kategori <button id="exportPdfBtn" style="background:#6366f1; border:none; border-radius:30px; padding:8px 16px; color:white; font-size:12px;">📑 Export PDF</button></div><canvas id="laporanChart" style="max-height:180px"></canvas></div>
        <div class="card"><div class="card-title">📋 Detail Transaksi</div><div id="detailTransaksi"></div></div>
    `;
    document.getElementById("appContainer").innerHTML=html;
    const ctx=document.getElementById('laporanChart')?.getContext('2d');
    if(ctx && data.length){ if(window.laporanChart) window.laporanChart.destroy(); window.laporanChart=new Chart(ctx,{type:'pie',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});}
    const grouped={};
    filtered.forEach(t=>{const d=new Date(t.created_at).toLocaleDateString(); if(!grouped[d]) grouped[d]=[]; grouped[d].push(t);});
    let detail='';
    Object.entries(grouped).forEach(([date,items])=>{let total=items.reduce((s,i)=>s+(i.type==='pemasukan'?i.amount:-i.amount),0); detail+=`<div style="margin-top:12px"><strong>📌 ${date}</strong> <span style="color:${total>=0?'#10b981':'#ef4444'}">${total>=0?'+':'-'}Rp ${formatRupiah(Math.abs(total))}</span></div>`; items.forEach(i=>{const cat=getCategoryById(i.category_id); detail+=`<div style="padding-left:16px; margin:4px 0">${i.type==='pemasukan'?'💚':'❤️'} ${escapeHtml(i.description)} ${cat?`• ${cat.icon} ${cat.name}`:''} <span style="float:right">${i.type==='pemasukan'?'+':'-'}Rp ${formatRupiah(i.amount)}</span></div>`;});});
    document.getElementById("detailTransaksi").innerHTML=detail||'<div class="empty-state">Tidak ada transaksi</div>';
    document.getElementById("logoutBtn")?.addEventListener("click",logout);
    document.getElementById("openSettingsBtn")?.addEventListener("click",()=>{ 
        previousNav = currentNav;
        currentNav = "settings"; 
        updateNav(); 
        renderSettings(); 
    });
    document.getElementById("prevMonth")?.addEventListener("click",()=>{if(currentMonth===0){currentMonth=11;currentYear--;}else currentMonth--; renderLaporan();});
    document.getElementById("nextMonth")?.addEventListener("click",()=>{if(currentMonth===11){currentMonth=0;currentYear++;}else currentMonth++; renderLaporan();});
    document.getElementById("exportPdfBtn")?.addEventListener("click",async()=>{const element = document.createElement('div'); element.innerHTML = document.querySelector('.balance-card')?.outerHTML + document.querySelector('.card')?.outerHTML; const opt={margin:[10,10,10,10],filename:`laporan_${currentYear}_${currentMonth+1}.pdf`,html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}; html2pdf().set(opt).from(element).save(); showToast("Membuat PDF...");});
}

// PENGATURAN - dengan navigasi back
async function renderSettings() {
    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email?.slice(0,20)||'Tamu'}</div>
            <div class="header-actions">
                <button id="backFromSettingsBtn" class="settings-btn" style="font-size:20px;">←</button>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>
        ${renderRunningText()}
        <div class="card">
            <div class="card-title">🔐 Ubah Password</div>
            <div class="password-wrapper"><input type="password" id="oldPass" placeholder="Password Lama" class="modal-input"><button class="toggle-password" data-target="oldPass">👁️</button></div>
            <div class="password-wrapper"><input type="password" id="newPass" placeholder="Password Baru (min 6)" class="modal-input"><button class="toggle-password" data-target="newPass">👁️</button></div>
            <div class="password-wrapper"><input type="password" id="confirmPass" placeholder="Konfirmasi Password" class="modal-input"><button class="toggle-password" data-target="confirmPass">👁️</button></div>
            <button id="changePassBtn" class="modal-btn modal-btn-primary">Update Password</button>
        </div>
        <div class="card">
            <div class="card-title">👥 Akses Bersama</div>
            <div style="display:flex; gap:8px; margin-bottom:16px">
                <input type="email" id="sharedEmail" placeholder="Email pengguna lain" class="modal-input" style="flex:1">
                <select id="accessLevel" class="modal-select" style="width:100px">
                    <option value="view">Lihat</option>
                    <option value="edit">Edit</option>
                </select>
                <button id="addSharedBtn" style="background:#3b82f6; border:none; border-radius:40px; padding:0 16px; color:white;">Tambah</button>
            </div>
            <div id="sharedList"></div>
        </div>
    `;
    document.getElementById("appContainer").innerHTML = html;
    document.getElementById("logoutBtn")?.addEventListener("click",logout);
    
    // Tombol back ke menu sebelumnya
    document.getElementById("backFromSettingsBtn")?.addEventListener("click",() => {
        if (previousNav && previousNav !== "settings") {
            currentNav = previousNav;
            updateNav();
            renderCurrentView();
        } else {
            currentNav = "home";
            updateNav();
            renderHome();
        }
    });
    
    document.getElementById("changePassBtn")?.addEventListener("click",async()=>{
        const old=document.getElementById("oldPass").value, newp=document.getElementById("newPass").value, conf=document.getElementById("confirmPass").value;
        if(!old||!newp) return alert("Isi semua field");
        if(newp.length<6) return alert("Password baru minimal 6 karakter");
        if(newp!==conf) return alert("Konfirmasi password tidak cocok");
        const {error}=await sb.auth.updateUser({password:newp});
        if(error) alert(error.message);
        else showToast("Password berhasil diubah");
    });
    document.getElementById("addSharedBtn")?.addEventListener("click",async()=>{
        const email=document.getElementById("sharedEmail").value.trim();
        const level=document.getElementById("accessLevel").value;
        if(!email) return alert("Email harus diisi");
        const {error}=await sb.from("shared_access").insert({owner_id:currentUser.id,shared_email:email,access_level:level});
        if(error) alert(error.message);
        else { showToast(`Akses diberikan ke ${email}`); renderSettings(); }
    });
    const {data:shared}=await sb.from("shared_access").select("*").eq("owner_id",currentUser.id);
    const sharedDiv=document.getElementById("sharedList");
    if(!shared?.length) sharedDiv.innerHTML='<div class="empty-state">Belum ada akses bersama</div>';
    else sharedDiv.innerHTML=shared.map(s=>`<div class="transaction-item"><div>📧 ${escapeHtml(s.shared_email)}</div><div><span style="font-size:11px; background:#e2e8f0; padding:2px 8px; border-radius:20px">${s.access_level==='edit'?'✏️ Edit':'👁️ Lihat'}</span><button class="remove-shared" data-id="${s.id}" style="margin-left:12px; background:none; border:none;">🗑️</button></div></div>`).join('');
    document.querySelectorAll(".remove-shared").forEach(btn=>btn.onclick=async()=>{await sb.from("shared_access").delete().eq("id",btn.dataset.id); showToast("Dihapus"); renderSettings();});
    document.querySelectorAll(".toggle-password").forEach(btn=>btn.onclick=()=>{const inp=document.getElementById(btn.dataset.target); if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}else{inp.type='password';btn.textContent='👁️';}});
}

// Navigation
function renderCurrentView() {
    if(currentNav==='home') renderHome();
    else if(currentNav==='transaksi') renderTransaksi();
    else if(currentNav==='laporan') renderLaporan();
    else if(currentNav==='hutang') renderHutang();
    else if(currentNav==='savings') renderSavings();
    else if(currentNav==='reminders') renderReminders();
    else if(currentNav==='tasks') renderTasks();
    else if(currentNav==='settings') renderSettings();
}
function updateNav() { document.querySelectorAll('.nav-item').forEach(btn=>{ if(btn.dataset.nav===currentNav) btn.classList.add('active'); else btn.classList.remove('active'); }); }
function addBottomNav() {
    const navHtml=`<div class="bottom-nav">
        <button class="nav-item ${currentNav==='home'?'active':''}" data-nav="home"><span class="nav-icon">🏠</span><span>Beranda</span></button>
        <button class="nav-item ${currentNav==='transaksi'?'active':''}" data-nav="transaksi"><span class="nav-icon">📋</span><span>Transaksi</span></button>
        <button class="nav-item ${currentNav==='laporan'?'active':''}" data-nav="laporan"><span class="nav-icon">📅</span><span>Laporan</span></button>
        <button class="nav-item ${currentNav==='hutang'?'active':''}" data-nav="hutang"><span class="nav-icon">💰</span><span>Hutang</span></button>
        <button class="nav-item ${currentNav==='tasks'?'active':''}" data-nav="tasks"><span class="nav-icon">✅</span><span>Tugas</span></button>
    </div>`;
    document.body.insertAdjacentHTML('beforeend',navHtml);
    document.querySelectorAll('.nav-item').forEach(btn=>btn.onclick=()=>{
        previousNav = currentNav;
        currentNav = btn.dataset.nav;
        updateNav();
        renderCurrentView();
    });
}

// Auth
async function handleLogin() {
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    const errorDiv = document.getElementById("loginError");
    if (!email || !password) { errorDiv.innerText = "Email dan password harus diisi"; return; }
    errorDiv.innerText = "";
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { errorDiv.innerText = error.message; return; }
        await onAuthSuccess(data.user);
    } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { errorDiv.innerText = error.message; return; }
        if (data.user) { alert("Pendaftaran berhasil! Silakan login."); toggleMode(); }
    }
}
async function handleGuest() {
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) { document.getElementById("loginError").innerText = error.message; return; }
    await onAuthSuccess(data.user);
}
function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById("modalTitle").innerText = isLoginMode ? "Masuk / Daftar" : "Daftar Akun Baru";
    document.getElementById("submitLoginBtn").innerText = isLoginMode ? "Masuk" : "Daftar";
    document.getElementById("switchText").innerText = isLoginMode ? "Belum punya akun? Daftar" : "Sudah punya akun? Masuk";
}
async function onAuthSuccess(user) {
    currentUser = user;
    document.getElementById("loginModal").style.display = "none";
    await loadCategories(); await loadTransactions(); await loadDebts(); await loadSavings(); await loadReminders(); await loadTasks(); await loadRecurring();
    await processRecurring();
    await loadTransactions();
    addBottomNav();
    renderCurrentView();
}
async function logout() {
    await sb.auth.signOut();
    currentUser = null;
    document.querySelector(".bottom-nav")?.remove();
    document.getElementById("appContainer").innerHTML = "";
    document.getElementById("loginModal").style.display = "flex";
}
async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session?.user) { await onAuthSuccess(data.session.user); }
    else { document.getElementById("loginModal").style.display = "flex"; }
}

document.getElementById("submitLoginBtn").onclick = handleLogin;
document.getElementById("switchText").onclick = toggleMode;
document.getElementById("guestBtn").onclick = handleGuest;
document.getElementById("toggleLoginPassword")?.addEventListener("click",()=>{const inp=document.getElementById("passwordInput"); if(inp.type==='password'){inp.type='text'; document.getElementById("toggleLoginPassword").textContent='🙈';}else{inp.type='password'; document.getElementById("toggleLoginPassword").textContent='👁️';}});
checkSession();
</script>
