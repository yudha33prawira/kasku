<script>

let sb = null;
let currentUser = null;
let categories = [];
let transactions = [];
let debts = [];
let savings = [];
let reminders = [];
let chart = null;

let currentYear = new Date().getFullYear();
let currentNav = "home";

// ============================================
// HELPER FUNCTIONS
// ============================================
function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function getCategoryById(id) {
    if (!id) return null;
    return categories.find(c => c.id === id);
}

function hitungTotalSaldo() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === "pemasukan") pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    return { pemasukan, pengeluaran, saldo: pemasukan - pengeluaran };
}

// ============================================
// RENDER FUNCTIONS
// ============================================
function renderHome() {
    const totals = hitungTotalSaldo();
    const bulanIni = transactions.filter(t => {
        const d = new Date(t.created_at);
        return d.getMonth() === new Date().getMonth() && t.type === "pengeluaran";
    });
    const topExpenses = [...bulanIni].sort((a,b) => b.amount - a.amount).slice(0,3);
    
    let totalPiutang = 0, totalHutang = 0;
    for (const d of debts) {
        if (d.status === 'lunas') continue;
        if (d.type === 'piutang') totalPiutang += d.amount;
        else totalHutang += d.amount;
    }
    
    const recent = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,5);
    
    let html = `
        <div class="debt-summary" style="display:flex; gap:12px; margin-bottom:20px;">
            <div style="flex:1; background:#d1fae5; border-radius:20px; padding:12px; text-align:center;">
                <div style="font-size:12px">💰 Piutang</div>
                <div style="font-size:18px; font-weight:700; color:#10b981">Rp ${formatRupiah(totalPiutang)}</div>
            </div>
            <div style="flex:1; background:#fee2e2; border-radius:20px; padding:12px; text-align:center;">
                <div style="font-size:12px">💸 Hutang</div>
                <div style="font-size:18px; font-weight:700; color:#ef4444">Rp ${formatRupiah(totalHutang)}</div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">📊 Pengeluaran Tertinggi Bulan Ini</div>
            ${topExpenses.length === 0 ? '<div class="empty-state">Belum ada pengeluaran</div>' : ''}
            ${topExpenses.map((t, i) => `<div style="display:flex; justify-content:space-between; padding:8px 0"><span>${i+1}. ${escapeHtml(t.description)}</span><span style="color:#ef4444">-Rp ${formatRupiah(t.amount)}</span></div>`).join('')}
        </div>
        <div class="card">
            <div class="card-title">📋 Transaksi Terbaru</div>
            <div class="transaction-list" id="recentTransactionsList"></div>
        </div>
    `;
    
    document.getElementById("mainContent").innerHTML = html;
    
    const container = document.getElementById("recentTransactionsList");
    if (recent.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
    } else {
        let rHtml = "";
        for (const t of recent) {
            const cat = getCategoryById(t.category_id);
            rHtml += `
                <div class="transaction-item">
                    <div>
                        <div class="transaction-desc">${escapeHtml(t.description)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-date">${new Date(t.created_at).toLocaleDateString("id-ID")}</span>
                            ${cat ? `<span class="transaction-cat">${cat.icon} ${cat.name}</span>` : ''}
                        </div>
                    </div>
                    <div class="transaction-amount ${t.type === 'pemasukan' ? 'income' : 'expense'}">
                        ${t.type === 'pemasukan' ? '+' : '-'} Rp ${formatRupiah(t.amount)}
                    </div>
                </div>
            `;
        }
        container.innerHTML = rHtml;
    }
}

function renderTransaksi() {
    let html = `
        <div class="card">
            <div class="card-title">📋 Semua Transaksi</div>
            <div class="filter">
                <button class="filter-btn active" data-filter="all">Semua</button>

            <div class="transaction-list" id="allTransactionsList"></div>

    `;

    let data = [...transactions];

    const container = document.getElementById("allTransactionsList");

        container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
    } else {
        let listHtml = "";
        for (const t of data) {
            const cat = getCategoryById(t.category_id);
            listHtml += `
                <div class="transaction-item">
                    <div>
                        <div class="transaction-desc">${escapeHtml(t.description)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-date">${new Date(t.created_at).toLocaleDateString("id-ID")}</span>

                    </div>
                    <div style="display:flex; align-items:center; gap:8px">
                        <div class="transaction-amount ${t.type === 'pemasukan' ? 'income' : 'expense'}">
                            ${t.type === 'pemasukan' ? '+' : '-'} Rp ${formatRupiah(t.amount)}
                        </div>
                        <button class="delete-transaksi" data-id="${t.id}" style="background:none; border:none; font-size:18px; cursor:pointer;">🗑️</button>

                </div>
            `;
        }
        container.innerHTML = listHtml;
    }
    
    document.querySelectorAll(".delete-transaksi").forEach(btn => {
        btn.onclick = async () => {
            if (confirm("Hapus transaksi?")) {
                await sb.from("transactions").delete().eq("id", btn.dataset.id);
                showToast("Transaksi dihapus");
                await loadTransactions();
                renderCurrentView();
            }
        };
    });
    
    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));

            const filter = btn.dataset.filter;

            if (filter === "expense") filtered = filtered.filter(t => t.type === "pengeluaran");

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">Tidak ada transaksi</div>';
            } else {
                let fHtml = "";
                for (const t of filtered) {
                    const cat = getCategoryById(t.category_id);
                    fHtml += `
                        <div class="transaction-item">
                            <div>
                                <div class="transaction-desc">${escapeHtml(t.description)}</div>
