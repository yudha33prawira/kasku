<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Keuangan Keluarga</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        
        /* Login */
        .login-card {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 32px;
            padding: 32px 24px;

        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
            color: #1e293b;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 16px;
            background: #f8fafc;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 50px;
        }
        .toggle-pwd {
            position: absolute;

            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
        }
        button {
            width: 100%;

            font-size: 16px;

            background: #3b82f6;
            color: white;
        }
        .btn-secondary {
            background: #e2e8f0;

        }
        .switch-text {
            text-align: center;
            margin-top: 20px;
            color: #3b82f6;
            cursor: pointer;
            font-size: 14px;
            background: none;
            padding: 0;
        }
        .error-text {
            color: #ef4444;
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
        }
        .hidden { display: none; }
        
        /* App */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .user-badge {
            background: #e2e8f0;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            width: auto;
            padding: 8px 16px;
            margin: 0;
        }
        .balance-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            color: white;
        }
        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            margin: 8px 0;
        }
        .balance-row {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        .balance-item {

        }
        .income-text { color: #4ade80; }
        .expense-text { color: #f87171; }
        .quick-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;

        .btn-income {

            color: white;
            margin: 0;
        }
        .btn-expense {
            background: #ef4444;
            color: white;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card-title {
            font-weight: 600;
            margin-bottom: 12px;
        }
        .txn-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eef2f6;
        }
        .txn-desc {
            font-weight: 500;
        }
        .txn-date {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .txn-income { color: #10b981; font-weight: 600; }
        .txn-expense { color: #ef4444; font-weight: 600; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .delete-icon {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 0 8px;
            color: #cbd5e1;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px;
            border-top: 1px solid #e2e8f0;
            max-width: 500px;
            margin: 0 auto;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 11px;
            color: #94a3b8;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            width: auto;
            margin: 0;
        }
        .nav-item.active {
            color: #3b82f6;
            background: #eff6ff;
        }
        .nav-icon {
            font-size: 22px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-box {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }
        .modal-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 300;
        }

<body>

<!-- Login Form -->
<div id="loginScreen" class="login-card">
    <div class="login-title" id="loginTitle">Masuk</div>
    <input type="email" id="loginEmail" placeholder="Email">
    <div class="password-wrapper">
        <input type="password" id="loginPassword" placeholder="Password">
        <button type="button" id="togglePwdBtn" class="toggle-pwd">👁️</button>
    </div>
    <button id="doLoginBtn" class="btn-primary">Masuk</button>
    <button id="doGuestBtn" class="btn-secondary">Lanjut sebagai Tamu</button>
    <div id="switchModeBtn" class="switch-text">Belum punya akun? Daftar</div>
    <div id="loginError" class="error-text hidden"></div>
</div>

<!-- Main App -->
<div id="mainApp" class="app-container hidden">
    <div class="header">
        <div class="user-badge" id="userName">Loading...</div>
        <button id="logoutAppBtn" class="logout-btn">Logout</button>
    </div>
    
    <div class="balance-card">
        <div style="opacity:0.7">Total Saldo</div>
        <div class="balance-amount" id="totalSaldo">Rp 0</div>
        <div class="balance-row">
            <div class="balance-item">
                <div style="font-size:12px; opacity:0.7">Pemasukan</div>
                <div class="income-text" id="totalPemasukan">Rp 0</div>
            </div>
            <div class="balance-item">
                <div style="font-size:12px; opacity:0.7">Pengeluaran</div>
                <div class="expense-text" id="totalPengeluaran">Rp 0</div>
            </div>
        </div>
    </div>
    
    <div class="quick-row">
        <button id="addIncomeBtn" class="btn-income">+ Pemasukan</button>
        <button id="addExpenseBtn" class="btn-expense">- Pengeluaran</button>
    </div>
    
    <div class="card">
        <div class="card-title">📋 Transaksi Terbaru</div>
        <div id="txnList"></div>
    </div>
    
    <div class="bottom-nav">
        <button class="nav-item active" data-nav="home"><span class="nav-icon">🏠</span><span>Beranda</span></button>
        <button class="nav-item" data-nav="transaksi"><span class="nav-icon">📋</span><span>Transaksi</span></button>
        <button class="nav-item" data-nav="laporan"><span class="nav-icon">📅</span><span>Laporan</span></button>
        <button class="nav-item" data-nav="hutang"><span class="nav-icon">💰</span><span>Hutang</span></button>
        <button class="nav-item" data-nav="pengaturan"><span class="nav-icon">⚙️</span><span>Atur</span></button>
    </div>
</div>

<script>
// ============================================
// KONFIGURASI SUPABASE
// ============================================
const SUPABASE_URL = "https://dttupsimbwsffyylfpax.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dHVwc2ltYndzZmZ5eWxmcGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTIyMDksImV4cCI6MjA5NjE2ODIwOX0.Fa_552HBaZmNgXdZUiMZc3jVWQqzEnAJNcKE_GgJy3g";

let sb = null;
let currentUser = null;
let transactions = [];
let currentNav = "home";
let isLoginMode = true;

// Helper
function formatRp(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

// Update balance
function updateBalance() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === 'pemasukan') pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    document.getElementById('totalSaldo').innerText = `Rp ${formatRp(pemasukan - pengeluaran)}`;
    document.getElementById('totalPemasukan').innerText = `Rp ${formatRp(pemasukan)}`;
    document.getElementById('totalPengeluaran').innerText = `Rp ${formatRp(pengeluaran)}`;
}

// Render home/transactions
function renderHome() {
    const container = document.getElementById('txnList');
    const recent = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,10);
    
    if (recent.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
        return;
    }
    
    let html = '';
    for (const t of recent) {
        const kelas = t.type === 'pemasukan' ? 'txn-income' : 'txn-expense';
        const prefix = t.type === 'pemasukan' ? '+' : '-';
        html += `
            <div class="txn-item">
                <div>
                    <div class="txn-desc">${escapeHtml(t.description)}</div>
                    <div class="txn-date">${new Date(t.created_at).toLocaleDateString('id-ID')}</div>
                </div>
                <div style="display:flex; align-items:center">
                    <div class="${kelas}">${prefix} Rp ${formatRp(t.amount)}</div>
                    <button class="delete-icon" data-id="${t.id}">🗑️</button>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
    
    // Delete event
    document.querySelectorAll('.delete-icon').forEach(btn => {
        btn.onclick = async () => {
            if (confirm('Hapus transaksi ini?')) {
                await sb.from('transactions').delete().eq('id', btn.dataset.id);
                await loadTransactions();
                renderHome();
            }
        };
    });
}

// Render transaksi page
function renderTransaksi() {
    const container = document.getElementById('txnList');
    const all = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    
    if (all.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
        return;
    }
    
    let html = '';
    for (const t of all) {
        const kelas = t.type === 'pemasukan' ? 'txn-income' : 'txn-expense';
        const prefix = t.type === 'pemasukan' ? '+' : '-';
        html += `
            <div class="txn-item">
                <div>
                    <div class="txn-desc">${escapeHtml(t.description)}</div>
                    <div class="txn-date">${new Date(t.created_at).toLocaleDateString('id-ID')}</div>
                </div>
                <div style="display:flex; align-items:center">
                    <div class="${kelas}">${prefix} Rp ${formatRp(t.amount)}</div>
                    <button class="delete-icon" data-id="${t.id}">🗑️</button>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
    
    document.querySelectorAll('.delete-icon').forEach(btn => {
        btn.onclick = async () => {
            if (confirm('Hapus transaksi?')) {
                await sb.from('transactions').delete().eq('id', btn.dataset.id);
                await loadTransactions();
                renderCurrentView();
            }
        };
    });
}

function renderLaporan() {
    document.getElementById('txnList').innerHTML = '<div class="empty-state">Fitur laporan akan segera hadir</div>';
}

function renderHutang() {
    document.getElementById('txnList').innerHTML = '<div class="empty-state">Fitur hutang piutang akan segera hadir</div>';
}

function renderPengaturan() {
    document.getElementById('txnList').innerHTML = '<div class="empty-state">Fitur pengaturan akan segera hadir</div>';
}

function renderCurrentView() {
    if (currentNav === 'home') renderHome();
    else if (currentNav === 'transaksi') renderTransaksi();
    else if (currentNav === 'laporan') renderLaporan();
    else if (currentNav === 'hutang') renderHutang();
    else if (currentNav === 'pengaturan') renderPengaturan();
}

// Data functions
async function loadTransactions() {
    if (!currentUser) return;
    const { data, error } = await sb.from('transactions').select('*').eq('user_id', currentUser.id);
    if (error) {
        console.error(error);
        return;
    }
    transactions = data || [];
    updateBalance();
    if (currentNav === 'home' || currentNav === 'transaksi') renderCurrentView();
}

async function addTransaction(desc, amount, type) {
    if (!desc) return alert('Deskripsi harus diisi');
    if (isNaN(amount) || amount <= 0) return alert('Jumlah harus lebih dari 0');
    
    const { error } = await sb.from('transactions').insert({
        user_id: currentUser.id,
        description: desc,
        amount: amount,
        type: type
    });
    
    if (error) {
        alert('Gagal: ' + error.message);
        return false;
    }
    
    showToast('Transaksi berhasil ditambahkan');
    await loadTransactions();
    return true;
}

function openAddModal(type) {
    const desc = prompt('Masukkan deskripsi:');
    if (desc === null) return;
    const amount = parseInt(prompt('Masukkan jumlah (Rp):'));
    if (isNaN(amount)) return;
    addTransaction(desc, amount, type);
}

// Auth functions
async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    
    if (!email || !password) {
        errorDiv.textContent = 'Email dan password harus diisi';
        errorDiv.classList.remove('hidden');
        return;
    }
    errorDiv.classList.add('hidden');
    
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
            errorDiv.textContent = error.message;
            errorDiv.classList.remove('hidden');
            return;
        }
        await onLoginSuccess(data.user);
    } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) {
            errorDiv.textContent = error.message;
            errorDiv.classList.remove('hidden');
            return;
        }
        if (data.user) {
            alert('Pendaftaran berhasil! Silakan login.');
            toggleMode();
        }
    }
}

async function handleGuest() {
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) {
        document.getElementById('loginError').textContent = error.message;
        document.getElementById('loginError').classList.remove('hidden');
        return;
    }
    await onLoginSuccess(data.user);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('loginTitle').innerText = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('doLoginBtn').innerText = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('switchModeBtn').innerText = isLoginMode ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Masuk';
    document.getElementById('loginError').classList.add('hidden');
}

async function onLoginSuccess(user) {
    currentUser = user;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('userName').innerHTML = user.email ? `👤 ${user.email}` : '👤 Tamu';
    
    await loadTransactions();
    renderHome();
}

async function logout() {
    await sb.auth.signOut();
    currentUser = null;
    transactions = [];
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginError').classList.add('hidden');
}

async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session?.user) {
        await onLoginSuccess(data.session.user);
    }
}

// Setup navigation
function setupNav() {
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
        item.onclick = () => {
            navItems.forEach(n => n.classList.remove('active'));
            item.classList.add('active');
            currentNav = item.dataset.nav;
            renderCurrentView();
        };
    });
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Toggle password
    document.getElementById('togglePwdBtn').onclick = function() {
        const pwd = document.getElementById('loginPassword');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            this.textContent = '🙈';
        } else {
