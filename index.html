<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Keuangan Keluarga</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f8f9fc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding-bottom: 70px; }
        .app-container { max-width: 450px; margin: 0 auto; padding: 16px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 4px 0; }
        .user-info { background: #e8edf5; padding: 6px 14px; border-radius: 30px; font-size: 13px; font-weight: 500; color: #1e293b; }
        .logout-text { background: none; border: none; font-size: 14px; color: #ef4444; cursor: pointer; padding: 8px 12px; font-weight: 500; }
        
        /* Kartu Saldo */
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 32px; padding: 24px 20px; margin-bottom: 20px; color: white; }
        .balance-label { font-size: 14px; opacity: 0.7; }
        .balance-amount { font-size: 36px; font-weight: 700; margin: 8px 0 4px; }
        .balance-stats { display: flex; gap: 16px; margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.15); }
        .stat-item { flex: 1; }
        .stat-label { font-size: 12px; opacity: 0.7; }
        .stat-value { font-size: 18px; font-weight: 600; margin-top: 4px; }
        .stat-value.income { color: #4ade80; }
        .stat-value.expense { color: #f87171; }
        
        /* Kartu Tabungan */
        .savings-card { background: linear-gradient(135deg, #065f46 0%, #047857 100%); border-radius: 32px; padding: 20px; margin-bottom: 20px; color: white; }
        .savings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .savings-title { font-size: 14px; opacity: 0.8; }
        .savings-amount { font-size: 28px; font-weight: 700; }
        .savings-actions { display: flex; gap: 12px; margin-top: 16px; }
        .btn-savings { flex: 1; background: rgba(255,255,255,0.2); border: none; border-radius: 40px; padding: 10px; color: white; font-weight: 500; cursor: pointer; }
        
        /* Quick Add */
        .quick-add { display: flex; gap: 12px; margin-bottom: 24px; }
        .btn-income { flex: 1; background: #10b981; border: none; border-radius: 60px; padding: 14px; color: white; font-weight: 600; font-size: 15px; cursor: pointer; text-align: center; }
        .btn-expense { flex: 1; background: #ef4444; border: none; border-radius: 60px; padding: 14px; color: white; font-weight: 600; font-size: 15px; cursor: pointer; text-align: center; }
        
        /* Card */
        .card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .card-title { font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        /* Hutang */
        .debt-summary { display: flex; gap: 12px; margin-bottom: 20px; }
        .debt-box { flex: 1; background: #f1f5f9; border-radius: 20px; padding: 14px; text-align: center; }
        .debt-box.piutang { background: #d1fae5; }
        .debt-box.hutang { background: #fee2e2; }
        .debt-box .label { font-size: 12px; margin-bottom: 6px; }
        .debt-box .amount { font-size: 18px; font-weight: 700; }
        .debt-box.piutang .amount { color: #10b981; }
        .debt-box.hutang .amount { color: #ef4444; }
        
        /* List */
        .transaction-list { display: flex; flex-direction: column; gap: 8px; }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f2f5; }
        .transaction-info { flex: 1; }
        .transaction-desc { font-weight: 500; font-size: 15px; color: #1e293b; }
        .transaction-meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
        .transaction-date { font-size: 11px; color: #94a3b8; }
        .transaction-cat { font-size: 10px; background: #f1f5f9; padding: 2px 8px; border-radius: 30px; color: #475569; }
        .transaction-amount { font-weight: 600; font-size: 16px; }
        .transaction-amount.income { color: #10b981; }
        .transaction-amount.expense { color: #ef4444; }
        .delete-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 8px; color: #cbd5e1; }
        
        /* Month Selector */
        .month-selector { display: flex; justify-content: space-between; align-items: center; background: white; border-radius: 60px; padding: 8px 16px; margin-bottom: 16px; }
        .month-selector button { background: none; border: none; font-size: 20px; cursor: pointer; padding: 8px 12px; color: #3b82f6; }
        .month-selector span { font-weight: 600; font-size: 16px; color: #1e293b; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
        
        /* Filter */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }
        .filter-btn { flex: 1; padding: 10px; border: none; border-radius: 40px; background: #e2e8f0; color: #475569; cursor: pointer; font-weight: 500; }
        .filter-btn.active { background: #3b82f6; color: white; }
        .filter-btn.income-active { background: #10b981; color: white; }
        .filter-btn.expense-active { background: #ef4444; color: white; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 32px; padding: 24px; width: 90%; max-width: 340px; max-height: 85vh; overflow-y: auto; }
        .modal-title { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 20px; }
        .modal-input, .modal-select, .modal-textarea { width: 100%; padding: 14px 16px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 40px; font-size: 15px; background: #f8fafc; }
        .password-wrapper { position: relative; width: 100%; margin-bottom: 12px; }
        .password-wrapper input { width: 100%; padding: 14px 45px 14px 16px; border: 1px solid #e2e8f0; border-radius: 40px; font-size: 15px; background: #f8fafc; }
        .toggle-password { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; }
        .modal-btn { width: 100%; padding: 14px; border-radius: 40px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 8px; }
        .modal-btn-primary { background: #3b82f6; color: white; }
        .modal-btn-secondary { background: #e2e8f0; color: #475569; }
        
        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 8px 16px 20px; border-top: 1px solid #eef2f6; max-width: 450px; margin: 0 auto; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; font-size: 12px; color: #94a3b8; cursor: pointer; padding: 8px 12px; border-radius: 40px; font-weight: 500; }
        .nav-item .nav-icon { font-size: 22px; }
        .nav-item.active { color: #3b82f6; background: #eff6ff; }
        
        /* Setting Item */
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f0f2f5; cursor: pointer; }
        .setting-left { display: flex; align-items: center; gap: 12px; }
        .setting-icon { font-size: 22px; }
        .setting-text { font-size: 15px; font-weight: 500; color: #1e293b; }
        
        /* Toast */
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; font-size: 13px; z-index: 1000; white-space: nowrap; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer"></div>

<div id="loginModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">Masuk / Daftar</div>
        <input type="email" id="emailInput" class="modal-input" placeholder="Email">
        <div class="password-wrapper">
            <input type="password" id="passwordInput" placeholder="Password (min. 6)">
            <button type="button" class="toggle-password" data-target="passwordInput">👁️</button>
        </div>
        <button id="submitLoginBtn" class="modal-btn modal-btn-primary">Masuk</button>
        <div id="switchText" style="text-align:center; margin:12px 0; color:#3b82f6; cursor:pointer;">Belum punya akun? Daftar</div>
        <button id="guestBtn" class="modal-btn modal-btn-secondary">Lanjut sebagai Tamu</button>
        <div id="loginError" style="color:#ef4444; font-size:12px; text-align:center; margin-top:12px;"></div>
    </div>
</div>

<script>
// Supabase Config
const SUPABASE_URL = "https://dttupsimbwsffyylfpax.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dHVwc2ltYndzZmZ5eWxmcGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTIyMDksImV4cCI6MjA5NjE2ODIwOX0.Fa_552HBaZmNgXdZUiMZc3jVWQqzEnAJNcKE_GgJy3g";

let sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
let categories = [];
let transactions = [];
let debts = [];
let savings = { id: null, balance: 0, name: 'Tabungan Utama' };
let chart = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let currentNav = "home";
let currentFilter = "semua";
let isLoginMode = true;

// Helper Functions
function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function getCategoryById(id) {
    if (!id) return null;
    return categories.find(c => c.id === id);
}

function hitungTotalSaldo() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === "pemasukan") pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    return { pemasukan, pengeluaran, saldo: pemasukan - pengeluaran };
}

// Load Data
async function loadCategories() {
    if (!currentUser) return;
    const { data } = await sb.from("categories").select("*").eq("user_id", currentUser.id);
    categories = data || [];
}

async function loadTransactions() {
    if (!currentUser) return;
    const { data } = await sb.from("transactions").select("*").eq("user_id", currentUser.id);
    transactions = data || [];
}

async function loadDebts() {
    if (!currentUser) return;
    const { data } = await sb.from("debts").select("*").eq("user_id", currentUser.id);
    debts = data || [];
}

async function loadSavings() {
    if (!currentUser) return;
    const { data } = await sb.from("savings").select("*").eq("user_id", currentUser.id);
    if (data && data.length > 0) {
        savings = data[0];
    } else {
        const { data: newData } = await sb.from("savings").insert({ user_id: currentUser.id, name: 'Tabungan Utama', balance: 0 }).select();
        if (newData && newData.length > 0) savings = newData[0];
    }
}

async function addToSavings(amount, description = '') {
    if (!currentUser) return;
    const newBalance = savings.balance + amount;
    await sb.from("savings").update({ balance: newBalance }).eq("id", savings.id);
    await sb.from("saving_transactions").insert({ user_id: currentUser.id, saving_id: savings.id, amount: amount, type: 'deposit', description: description });
    savings.balance = newBalance;
}

async function withdrawFromSavings(amount, description = '') {
    if (!currentUser) return false;
    if (amount > savings.balance) { showToast("Saldo tabungan tidak cukup!"); return false; }
    const newBalance = savings.balance - amount;
    await sb.from("savings").update({ balance: newBalance }).eq("id", savings.id);
    await sb.from("saving_transactions").insert({ user_id: currentUser.id, saving_id: savings.id, amount: amount, type: 'withdraw', description: description });
    savings.balance = newBalance;
    return true;
}

// Render Functions
async function renderHome() {
    const totals = hitungTotalSaldo();
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
    const now = new Date();
    
    const bulanIni = transactions.filter(t => {
        const d = new Date(t.created_at);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    let pemasukanBulan = 0, pengeluaranBulan = 0;
    for (const t of bulanIni) {
        if (t.type === "pemasukan") pemasukanBulan += t.amount;
        else pengeluaranBulan += t.amount;
    }
    
    let totalPiutang = 0, totalHutang = 0;
    for (const d of debts) {
        if (d.status === 'lunas') continue;
        if (d.type === 'piutang') totalPiutang += d.amount;
        else totalHutang += d.amount;
    }
    
    const recent = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,5);
    
    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email ? currentUser.email.slice(0,20) : 'Tamu'}</div>
            <button id="logoutBtn" class="logout-text">Logout</button>
        </div>
        <div class="balance-card">
            <div class="balance-label">Total Saldo</div>
            <div class="balance-amount">Rp ${formatRupiah(totals.saldo)}</div>
            <div class="balance-stats">
                <div class="stat-item"><div class="stat-label">Pemasukan</div><div class="stat-value income">+Rp ${formatRupiah(totals.pemasukan)}</div></div>
                <div class="stat-item"><div class="stat-label">Pengeluaran</div><div class="stat-value expense">-Rp ${formatRupiah(totals.pengeluaran)}</div></div>
            </div>
        </div>
        <div class="savings-card">
            <div class="savings-header"><span class="savings-title">🏦 ${escapeHtml(savings.name)}</span><span style="font-size:12px; opacity:0.7">Terpisah dari dompet</span></div>
            <div class="savings-amount">Rp ${formatRupiah(savings.balance)}</div>
            <div class="savings-actions"><button id="savingsDeposit" class="btn-savings">+ Tambah</button><button id="savingsWithdraw" class="btn-savings">- Tarik</button></div>
        </div>
        <div class="quick-add"><button id="quickIncome" class="btn-income">+ Pemasukan</button><button id="quickExpense" class="btn-expense">- Pengeluaran</button></div>
        <div class="debt-summary"><div class="debt-box piutang"><div class="label">💰 Piutang</div><div class="amount">Rp ${formatRupiah(totalPiutang)}</div></div>
        <div class="debt-box hutang"><div class="label">💸 Hutang</div><div class="amount">Rp ${formatRupiah(totalHutang)}</div></div></div>
        <div class="card"><div class="card-title">📋 Transaksi Terbaru</div><div class="transaction-list">
    `;
    
    if (recent.length === 0) {
        html += `<div class="empty-state">Belum ada transaksi</div>`;
    } else {
        for (const t of recent) {
            const cat = getCategoryById(t.category_id);
            html += `<div class="transaction-item"><div class="transaction-info"><div class="transaction-desc">${escapeHtml(t.description)}</div>
            <div class="transaction-meta"><span class="transaction-date">${new Date(t.created_at).toLocaleDateString("id-ID")}</span>${cat ? `<span class="transaction-cat">${cat.icon} ${escapeHtml(cat.name)}</span>` : ''}</div></div>
            <div class="transaction-amount ${t.type === 'pemasukan' ? 'income' : 'expense'}">${t.type === 'pemasukan' ? '+' : '-'} Rp ${formatRupiah(t.amount)}</div></div>`;
        }
    }
    html += `</div></div>`;
    document.getElementById("appContainer").innerHTML = html;
    
    document.getElementById("quickIncome")?.addEventListener("click", () => openTransaksiModal("pemasukan"));
    document.getElementById("quickExpense")?.addEventListener("click", () => openTransaksiModal("pengeluaran"));
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
    document.getElementById("savingsDeposit")?.addEventListener("click", () => openSavingsModal('deposit'));
    document.getElementById("savingsWithdraw")?.addEventListener("click", () => openSavingsModal('withdraw'));
}

    document.getElementById("appContainer").innerHTML = html;

    const container = document.getElementById("transaksiListContainer");
    if (data.length === 0) {
        container.innerHTML = `<div class="empty-state">Tidak ada transaksi</div>`;
    } else {
        let listHtml = "";
        for (const t of data) {
            const cat = getCategoryById(t.category_id);
            listHtml += `<div class="transaction-item"><div class="transaction-info"><div class="transaction-desc">${escapeHtml(t.description)}</div>
            <div class="transaction-meta"><span class="transaction-date">${new Date(t.created_at).toLocaleDateString("id-ID")}</span>${cat ? `<span class="transaction-cat">${cat.icon} ${escapeHtml(cat.name)}</span>` : ''}</div></div>
            <div style="display:flex; gap:8px; align-items:center"><div class="transaction-amount ${t.type === 'pemasukan' ? 'income' : 'expense'}">${t.type === 'pemasukan' ? '+' : '-'} Rp ${formatRupiah(t.amount)}</div>
