        // ============================================================
        // SHOW TRANSACTION DETAIL
        // ============================================================
        async function showTransactionDetail(tx) {
            const cat = getCategoryById(tx.category_id);
            const isRecur = isRecurringTransaction(tx);
            const uid = await userManager.getUserId();
            let recurringData = null;
            let isOriginalRecurring = false;
            if (uid && !isGuestMode) {
                try {
                    const { data: recurring } = await sb.from('recurring_transactions').select('*').eq(
                        'original_transaction_id', tx.id).maybeSingle();
                    if (recurring) { recurringData = recurring;
                        isOriginalRecurring = true; }
                } catch (e) {}
            }

            let recurringInfo = '';
            let recurringActionsHtml = '';

            if (isRecur) {
                const statusText = isOriginalRecurring ?
                    (recurringData.is_active ? '✅ Aktif (Berulang)' : '❌ Nonaktif (Berulang)') :
                    '🔄 Otomatis (Ulang)';
                const badgeClass = isOriginalRecurring ?
                    (recurringData.is_active ? 'success' : 'danger') :
                    'info';
                recurringInfo = `
                    <div class="modal-detail-row"><span class="modal-detail-label">🔄 Status</span><span class="modal-detail-value"><span class="modal-badge ${badgeClass}">${statusText}</span></span></div>
                `;
                if (isOriginalRecurring && recurringData) {
                    recurringInfo += `
                        <div class="modal-detail-row"><span class="modal-detail-label">🗓️ Hari</span><span class="modal-detail-value">Setiap tanggal ${recurringData.day_of_month}</span></div>
                    `;
                    if (tx.user_id === currentCustomUser?.id) {
                        recurringActionsHtml = `
                            <div class="recurring-action-section">
                                <button id="toggleRecurringBtn" class="modal-btn ${recurringData.is_active ? 'modal-btn-warning' : 'modal-btn-success'} btn-full">
                                    ${recurringData.is_active ? '⏸️ Nonaktifkan Berulang' : '▶️ Aktifkan Berulang'}
                                </button>
                            </div>
                        `;
                    } else {
                        recurringActionsHtml = `
                            <div class="recurring-action-section" style="border-color: rgba(16,185,129,0.2); background: rgba(16,185,129,0.05);">
                                <div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:4px 0;">🔒 Pengaturan berulang oleh pemilik transaksi</div>
                            </div>
                        `;
                    }
                } else if (tx.description && tx.description.includes('(Ulang)')) {
                    recurringActionsHtml = `
                        <div class="recurring-action-section" style="border-color: rgba(16,185,129,0.2); background: rgba(16,185,129,0.05);">
                            <div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:4px 0;">🔄 Transaksi ini dihasilkan otomatis</div>
                        </div>
                    `;
                }
            } else {
                recurringInfo = `
                    <div class="modal-detail-row"><span class="modal-detail-label">🔄 Recurring</span><span class="modal-detail-value"><span class="modal-badge warning">Belum Diaktifkan</span></span></div>
                `;
                if (tx.user_id === currentCustomUser?.id) {
                    recurringActionsHtml = `
                        <div class="recurring-action-section" style="border-color: rgba(139,92,246,0.2); background: rgba(139,92,246,0.05);">
                            <button id="activateRecurringBtn" class="modal-btn modal-btn-success btn-full">🔁 Aktifkan Berulang</button>
                            <div style="font-size:10px;color:var(--text-secondary);text-align:center;margin-top:6px;">Transaksi ini akan muncul otomatis setiap bulan</div>
                        </div>
                    `;
                } else {
                    recurringActionsHtml = `
                        <div class="recurring-action-section" style="border-color: rgba(148,163,184,0.2); background: rgba(148,163,184,0.05);">
                            <div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:4px 0;">🔒 Hanya pemilik yang dapat mengaktifkan berulang</div>
                        </div>
                    `;
                }
            }

            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-title">📋 Detail Transaksi</div>
                    <div style="display:grid;gap:4px;padding:4px 0;">
                        <div class="modal-detail-row"><span class="modal-detail-label">Deskripsi</span><span class="modal-detail-value">${escapeHtml(tx.description)}</span></div>
                        <div class="modal-detail-row"><span class="modal-detail-label">Jumlah</span><span class="modal-detail-value" style="color:${tx.type==='pemasukan'?'#4ade80':'#f87171'}">${tx.type==='pemasukan'?'+':'-'}Rp ${formatRupiah(tx.amount)}</span></div>
                        <div class="modal-detail-row"><span class="modal-detail-label">Tanggal & Waktu</span><span class="modal-detail-value">${formatDateTime(tx.created_at)}</span></div>
                        ${cat ? `<div class="modal-detail-row"><span class="modal-detail-label">Kategori</span><span class="modal-detail-value">${cat.icon} ${cat.name}</span></div>` : ''}
                        ${recurringInfo}
                    </div>
                    ${tx.proof_url ? `<hr class="modal-divider"><div style="margin:8px 0;"><div style="font-weight:600;margin-bottom:8px;font-size:13px;">📸 Bukti</div><img src="${tx.proof_url}" class="modal-proof-img" onclick="window.open('${tx.proof_url}','_blank')"></div>` : ''}
                    <hr class="modal-divider">
                    ${recurringActionsHtml}
                    <div class="modal-button-grid">
                        <button id="editTxBtn" class="modal-btn modal-btn-primary">✏️ Edit</button>
                        <button id="deleteTxBtn" class="modal-btn modal-btn-danger">🗑️ Hapus</button>
                        <button id="closeDetailBtn" class="modal-btn modal-btn-secondary">Tutup</button>
                    </div>
                </div>

            document.getElementById('editTxBtn').onclick = () => {
                if (tx.user_id !== currentCustomUser?.id) {
                    showToast('❌ Anda tidak dapat mengedit transaksi milik orang lain', 2000, 'error');
                    return;
                }
                modal.remove();
                openTransaksiModal(null, tx.id);
            };

            if (isOriginalRecurring && recurringData && tx.user_id === currentCustomUser?.id) {
                const toggleBtn = document.getElementById('toggleRecurringBtn');
                if (toggleBtn) {
                    toggleBtn.onclick = async () => {
                        const newStatus = !recurringData.is_active;
                        await sb.from('recurring_transactions').update({ is_active: newStatus,
                            updated_at: new Date().toISOString() }).eq('id', recurringData.id);
                        showToast(newStatus ? '✅ Transaksi berulang diaktifkan' :
                            '⏸️ Transaksi berulang dinonaktifkan', 2000, 'success');
                        modal.remove();
                        await loadTransactions();
                        renderCurrentView();
                    };
                }
            }

            if (!isRecur && tx.user_id === currentCustomUser?.id) {
                const activateBtn = document.getElementById('activateRecurringBtn');
                if (activateBtn) {
                    activateBtn.onclick = async () => {
                        if (!confirm('Aktifkan transaksi berulang untuk transaksi ini? Akan muncul otomatis setiap bulan.'))
                            return;
                        await createRecurringTransaction(tx);
                        showToast('✅ Transaksi berulang diaktifkan!', 2000, 'success');
                        modal.remove();
                        await loadTransactions();
                        renderCurrentView();
                    };
                }
            }

            document.getElementById('deleteTxBtn').onclick = async () => {
                if (tx.user_id !== currentCustomUser?.id) {
                    showToast('❌ Anda tidak dapat menghapus transaksi milik orang lain', 2000, 'error');
                    return;
                }
                if (confirm('Hapus transaksi ini?')) {
                    if (isOriginalRecurring && recurringData) { await sb.from('recurring_transactions').delete()
                            .eq('id', recurringData.id); }
                    if (tx.proof_url) {
                        const parts = tx.proof_url.split('/');
                        const path = parts.slice(parts.indexOf('transaction-proofs') + 1).join('/');
                        await sb.storage.from('transaction-proofs').remove([path]);
                    }
                    if (isGuestMode) {
                        transactions = transactions.filter(t => t.id !== tx.id);
                        saveGuestData();
                    } else {
                        await sb.from('transactions').delete().eq('id', tx.id);
                    }
                    showToast('✅ Transaksi dihapus', 2000, 'success');
                    modal.remove();
                    await loadTransactions();
                    renderCurrentView();
                }
            };
            document.getElementById('closeDetailBtn').onclick = () => modal.remove();
        }

        function openTransaksiModal(predefinedType = null, editId = null) {
            const isEdit = !!editId;
            const tx = isEdit ? transactions.find(t => t.id === editId) : null;
            const today = new Date().toISOString().slice(0, 10);
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-title">${isEdit ? '✏️ Edit' : '✨ Tambah'} Transaksi</div>
                    <div class="modal-subtitle">${isEdit ? 'Perbarui transaksi Anda' : 'Catat transaksi baru'}</div>
                    <input type="text" id="modalDesk" class="modal-input" placeholder="Deskripsi" value="${isEdit ? escapeHtml(tx.description) : ''}">
                    <input type="text" id="modalJum" class="modal-input" placeholder="Jumlah" value="${isEdit ? formatRupiah(tx.amount) : ''}">
                    <select id="modalTipe" class="modal-select">
                        <option value="pemasukan" ${(isEdit && tx.type === 'pemasukan') || predefinedType === 'pemasukan' ? 'selected' : ''}>💵 Pemasukan</option>
                        <option value="pengeluaran" ${(isEdit && tx.type === 'pengeluaran') || predefinedType === 'pengeluaran' ? 'selected' : ''}>💸 Pengeluaran</option>
                    </select>
                    <input type="datetime-local" id="modalTanggalWaktu" class="modal-input" value="${isEdit ? new Date(tx.created_at).toISOString().slice(0,16) : new Date().toISOString().slice(0,16)}">
                    <select id="modalKat" class="modal-select">
                        <option value="">Pilih Kategori</option>
                        ${categories.map(c => `<option value="${c.id}" ${isEdit && tx.category_id === c.id ? 'selected' : ''}>${c.icon} ${c.name}</option>`).join('')}
                    </select>
                    <div style="background:rgba(59,130,246,0.05);padding:12px;border-radius:12px;margin:12px 0;">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span style="font-size:18px;">📸</span><span style="font-weight:600;">Bukti</span></div>
                        ${isEdit && tx?.proof_url ? `<div id="proofPreview"><img src="${tx.proof_url}" style="max-width:100%;max-height:120px;border-radius:8px;border:1px solid var(--border-color);"><div style="display:flex;gap:8px;margin-top:8px;"><button id="removeProofBtn" style="background:#ef4444;border:none;border-radius:20px;padding:4px 12px;color:white;font-size:11px;cursor:pointer;">🗑️ Hapus</button><button id="changeProofBtn" style="background:#3b82f6;border:none;border-radius:20px;padding:4px 12px;color:white;font-size:11px;cursor:pointer;">📸 Ganti</button></div></div>` : `
                            <div id="proofUploadArea" class="modal-upload-area"><span class="icon">📁</span><span class="text">Klik untuk upload bukti</span><span class="hint">JPG, PNG, WEBP (max 5MB)</span><input type="file" id="proofInput" accept="image/*" style="display:none;"></div>
                            <div id="proofPreview" style="display:none;margin-top:8px;"><img id="proofPreviewImg" style="max-width:100%;max-height:120px;border-radius:8px;border:1px solid var(--border-color);"><div style="display:flex;gap:8px;margin-top:8px;"><button id="removeProofBtn" style="background:#ef4444;border:none;border-radius:20px;padding:4px 12px;color:white;font-size:11px;cursor:pointer;">🗑️ Hapus</button><button id="changeProofBtn" style="background:#3b82f6;border:none;border-radius:20px;padding:4px 12px;color:white;font-size:11px;cursor:pointer;">📸 Ganti</button></div></div>
                        `}
                    </div>
                    ${!isEdit ? `<div style="background:rgba(139,92,246,0.05);padding:12px;border-radius:12px;margin:12px 0;"><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="modalRecurring"> <span>🔄 Ulangi setiap bulan</span></label><div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">Transaksi akan muncul otomatis bulan depan dengan tanda 🔄</div></div>` : ''}
                    <div class="modal-button-grid">
                        <button id="saveTransaksi" class="modal-btn modal-btn-primary">${isEdit ? 'Update' : 'Simpan'}</button>
                        <button id="closeModal" class="modal-btn modal-btn-secondary">Batal</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setupRupiahInput('modalJum');
            let selectedFile = null;
            const proofInput = document.getElementById('proofInput');
            const proofUploadArea = document.getElementById('proofUploadArea');
            const proofPreview = document.getElementById('proofPreview');
            const proofPreviewImg = document.getElementById('proofPreviewImg');
            if (proofUploadArea) proofUploadArea.onclick = () => proofInput.click();
            proofInput?.addEventListener('change', function(e) {
                const file = this.files[0];
                if (file) {
                    selectedFile = file;
                    const reader = new FileReader();
                    reader.onload = (ev) => { if (proofPreviewImg) proofPreviewImg.src = ev.target.result; if (
                            proofPreview) proofPreview.style.display = 'block'; if (proofUploadArea)
                            proofUploadArea.style.display = 'none'; };
                    reader.readAsDataURL(file);
                }
            });
            document.querySelectorAll('#removeProofBtn').forEach(btn => {
                btn.onclick = function(e) {
                    e.stopPropagation();
                    selectedFile = null;
                    if (proofPreview) proofPreview.style.display = 'none';
                    if (proofUploadArea) { proofUploadArea.style.display = 'block'; }
                    if (proofInput) proofInput.value = '';
                    if (isEdit && tx?.proof_url) window._removeOldProof = true;
                };
            });
            document.querySelectorAll('#changeProofBtn').forEach(btn => {
                btn.onclick = function(e) { e.stopPropagation(); if (proofInput) proofInput.click(); };
            });
            document.getElementById('saveTransaksi').onclick = async () => {
                const desc = document.getElementById('modalDesk').value.trim();
                const amount = parseRupiah(document.getElementById('modalJum').value);
                const type = document.getElementById('modalTipe').value;
                const datetime = document.getElementById('modalTanggalWaktu').value;
                const catId = document.getElementById('modalKat').value;
                const isRecurring = document.getElementById('modalRecurring')?.checked || false;
                if (!desc || !amount) { showToast('❌ Isi dengan benar', 2000, 'error'); return; }
                if (!datetime) { showToast('❌ Pilih tanggal dan waktu', 2000, 'error'); return; }
                const uid = await userManager.getUserId();
                if (!uid) { showToast('❌ User ID tidak ditemukan', 2000, 'error'); return; }
                const data = { description: desc, amount, type, created_at: new Date(datetime).toISOString() };
                if (catId) data.category_id = catId;
                try {
                    if (isEdit) {
                        if (isGuestMode) {
                            const idx = transactions.findIndex(t => t.id === editId);
                            if (idx > -1) { transactions[idx] = { ...transactions[idx], ...data };
                                saveGuestData(); }
                        } else {
                            await sb.from('transactions').update(data).eq('id', editId);
                            if (selectedFile) {
                                if (window._removeOldProof && tx?.proof_url) await deleteProof(editId);
                                await uploadProof(selectedFile, editId);
                            }
                        }
                        showToast('✅ Transaksi diupdate', 2000, 'success');
                        modal.remove();
                        await loadTransactions();
                        renderCurrentView();
                    } else {
                        data.user_id = uid;
                        if (isGuestMode) {
                            const newTx = { id: 'tx_' + Date.now(), ...data };
                            transactions.push(newTx);
                            saveGuestData();
                            showToast('✅ Transaksi ditambahkan (lokal)', 2000, 'success');
                        } else {
                            const { data: newTx, error } = await sb.from('transactions').insert(data)
                                .select();
                            if (error) throw error;
                            if (newTx?.length) {
                                const txId = newTx[0].id;
                                if (selectedFile) await uploadProof(selectedFile, txId);
                                if (isRecurring) {
                                    showToast('🔄 Menyimpan transaksi berulang...', 2000);
                                    await createRecurringTransaction(newTx[0]);
                                    await loadRecurringMap();
                                    await loadTransactions();
                                    showToast('✅ Transaksi berulang siap! (Mulai bulan depan dengan tanda 🔄)',
                                        2500, 'success');
                                }
                            }
                            showToast('✅ Transaksi ditambahkan', 2000, 'success');
                        }
                        modal.remove();
                        await loadTransactions();
                        renderCurrentView();
                    }
                } catch (e) { showToast('❌ Error: ' + e.message, 3000, 'error'); }
            };
            document.getElementById('closeModal').onclick = () => modal.remove();
        }

        async function uploadProof(file, txId) {
            if (isGuestMode) return null;
            if (!file) return null;
            try {
                const ext = file.name.split('.').pop();
                const path = `${currentUser.id}/${txId}_${Date.now()}.${ext}`;
                await sb.storage.from('transaction-proofs').upload(path, file, { cacheControl: '3600',
                    upsert: true });
                const { data } = sb.storage.from('transaction-proofs').getPublicUrl(path);
                await sb.from('transactions').update({ proof_url: data.publicUrl }).eq('id', txId);
                showToast('📸 Bukti berhasil diupload!', 2000, 'success');
                return data.publicUrl;
            } catch (e) { showToast('❌ Gagal upload: ' + e.message, 3000, 'error'); return null; }
        }

        async function deleteProof(txId) {
            if (isGuestMode) return;
            try {
                const { data: tx } = await sb.from('transactions').select('proof_url').eq('id', txId)
                .single();
                if (!tx?.proof_url) return;
                const parts = tx.proof_url.split('/');
                const path = parts.slice(parts.indexOf('transaction-proofs') + 1).join('/');
                await sb.storage.from('transaction-proofs').remove([path]);
                await sb.from('transactions').update({ proof_url: null }).eq('id', txId);
            } catch (e) { console.error(e); }
        }

        // ============================================================
        // RENDER LAPORAN
        // ============================================================
        async function renderLaporan() {

            const catTotals = {};
            all.forEach(t => {

                else totalPengeluaran += Number(t.amount) || 0;

                </div>
            `;
            renderView('laporan', html);
            
            const ctx = document.getElementById('laporanChart')?.getContext('2d');
            const chartLabels = [],
                chartData = [],
                chartColors = [];
            Object.entries(catTotals).forEach(([id, val]) => {
                if (id === 'uncategorized') { chartLabels.push('📁 Tanpa Kategori');
                    chartColors.push('#64748b'); } else { const cat = categories.find(c => c.id === id); if (cat) { chartLabels
                            .push(`${cat.icon} ${cat.name}`);
                        chartColors.push(cat.color); } else { chartLabels.push('📁 Unknown');
                        chartColors.push('#64748b'); } }
                chartData.push(val);
            });
            
            if (ctx && chartData.length) {
                if (window.laporanChart && typeof window.laporanChart.destroy === 'function') window.laporanChart
                    .destroy();
                window.laporanChart = new Chart(ctx, {
                    type: 'pie',
                    data: { labels: chartLabels, datasets: [{ data: chartData, backgroundColor: chartColors, borderWidth: 2,
                            borderColor: '#fff' }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom',
                                labels: { font: { size: 10 }, padding: 8, usePointStyle: true } } } }
                });
            }
            
            const grouped = {};
            monthFiltered.forEach(t => {
                const d = formatDate(t.created_at);
                if (!grouped[d]) grouped[d] = [];
                grouped[d].push(t);
            });
            const sortedDates = Object.keys(grouped).sort((a, b) => {
                const da = a.split('/');
                const db = b.split('/');
                return new Date(db[2], db[1] - 1, db[0]) - new Date(da[2], da[1] - 1, da[0]);
            });
            let detail = '';
            if (!sortedDates.length) {
                detail = '<div class="empty-state" style="padding:20px 0;"><div class="desc">Tidak ada transaksi bulan ini</div></div>';
            } else {
                sortedDates.forEach(date => {
                    const items = grouped[date];
                    const total = items.reduce((s, i) => s + (i.type === 'pemasukan' ? Number(i.amount) : -Number(
                        i.amount)), 0);
                    detail += `<div style="margin-top:12px;padding:8px 0;border-bottom:1px solid var(--border-color);color:var(--text-primary);">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <strong style="font-size:15px;">📌 ${date}</strong>
                            <span style="font-size:15px;font-weight:700;color:${total >= 0 ? '#4ade80' : '#f87171'};">${total >= 0 ? '+' : '-'}Rp ${formatRupiah(Math.abs(total))}</span>
                        </div>
                    </div>`;
                    items.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                    items.forEach(i => {
                        const cat = getCategoryById(i.category_id);
                        const isRecur = isRecurringTransaction(i);
                        const isPemasukan = i.type === 'pemasukan';
                        const recurringTag = isRecur ?
                            ' <span style="font-size:10px;color:#8b5cf6;font-weight:600;">🔄</span>' : '';
                        detail += `
                            <div class="tx-premium-item" style="padding:8px 0 8px 16px;cursor:pointer;border-left:3px solid ${isPemasukan ? '#4ade80' : (cat?.color || '#64748b')};margin-left:8px;color:var(--text-primary);" data-id="${i.id}">
                                <div class="tx-left">
                                    <div class="tx-icon-wrapper" style="border-color:${cat?.color || '#64748b'};">
                                        ${cat?.icon || '📁'}
                                    </div>
                                    <div class="tx-info">
                                        <div class="tx-desc" style="font-size:13px;font-weight:500;color:var(--text-primary);">
                                            ${isPemasukan ? '💚' : '❤️'} ${escapeHtml(i.description)}${recurringTag}
                                        </div>
                                        <div class="tx-meta" style="font-size:11px;color:var(--text-secondary);">
                                            ${cat ? cat.icon + ' ' + cat.name : 'Tanpa Kategori'} · ${formatDateTimeShort(i.created_at)}
                                        </div>
                                    </div>
                                </div>
                                <div class="tx-amount ${isPemasukan ? 'income' : 'expense'}" style="font-size:14px;">
                                    ${isPemasukan ? '+' : '-'}Rp ${formatRupiah(i.amount)}
                                </div>
                            </div>
                        `;
                    });
                });
            }
            document.getElementById('detailTransaksi').innerHTML = detail;
            document.querySelectorAll('#detailTransaksi .tx-premium-item').forEach(el => {
                el.onclick = () => {
                    const id = el.dataset.id;
                    const tx = transactions.find(t => t.id === id);
                    if (tx) showTransactionDetail(tx);
                };
            });
            document.getElementById('prevMonth').onclick = () => { if (currentMonth === 0) { currentMonth = 11;
                    currentYear--; } else currentMonth--;
                renderLaporan(); };
            document.getElementById('nextMonth').onclick = () => { if (currentMonth === 11) { currentMonth = 0;
                    currentYear++; } else currentMonth++;
                renderLaporan(); };
        }

        async function renderKunciSukses() {
            await loadSedekahData();

            let totalPemasukan = 0,
                totalPengeluaran = 0;

            const allTx = transactions.filter(t => {
                if (currentFamilyId && familyMemberIds.length > 0) {
                    return familyMemberIds.includes(t.user_id);
                }
                return true;
            });
            allTx.forEach(t => {
                if (t.type === 'pemasukan') totalPemasukan += Number(t.amount) || 0;
                else totalPengeluaran += Number(t.amount) || 0;
            });
            const totalSaldo = totalPemasukan - totalPengeluaran;
            const targetSedekah = Math.max(0, Math.round(totalSaldo * 0.25));

            let totalSedekahHariIni = 0;
            let totalPointsToday = 0;
            const today = new Date().toISOString().split('T')[0];
            const todayHistory = sedekahHistory.filter(h => h.tanggal === today);
            todayHistory.forEach(h => {
                totalSedekahHariIni += h.nominal || 0;
                totalPointsToday += h.points || 0;

            let pointsFromData = 0;
            let completedCount = 0;

                    pointsFromData += actions.length * 2;
                    completedCount++;
                }

            const pointsToday = totalPointsToday > 0 ? totalPointsToday : pointsFromData;

            const progressTarget = targetSedekah > 0 ? Math.min((totalSedekahHariIni / targetSedekah) * 100, 100) : 0;
            const targetTercapai = totalSedekahHariIni >= targetSedekah && targetSedekah > 0;

        async function createFamily(name) {
            if (isGuestMode) {
                showToast('❌ Fitur keluarga tidak tersedia di mode tamu', 2000, 'error');
                return;
            }
            const uid = await userManager.getUserId();
            if (!uid) { showToast('❌ User ID tidak ditemukan', 2000, 'error'); return; }
            try {
                const { data: family } = await sb.from('families').insert({ name, created_by: uid }).select()
                    .single();
                await sb.from('family_members').insert({ family_id: family.id, user_id: uid, role: 'owner' });
                await sb.from('user_settings').upsert({ user_id: uid, family_id: family.id });
                currentFamilyId = family.id;
                familyInfo = family;
                showToast('✅ Keluarga dibuat!', 2000, 'success');
                await loadAllData();
                renderSettings();
            } catch (e) { showToast('❌ Gagal: ' + e.message, 3000, 'error'); }
        }

        async function joinFamily(familyId) {
            if (isGuestMode) {
                showToast('❌ Fitur keluarga tidak tersedia di mode tamu', 2000, 'error');
                return;
            }
            const uid = await userManager.getUserId();
            if (!uid) { showToast('❌ User ID tidak ditemukan', 2000, 'error'); return; }
            try {
                const { data: family } = await sb.from('families').select('*').eq('id', familyId).single();
                if (!family) { showToast('❌ Keluarga tidak ditemukan', 2000, 'error'); return; }
                await sb.from('family_members').insert({ family_id: familyId, user_id: uid, role: 'member' });
                await sb.from('user_settings').upsert({ user_id: uid, family_id: familyId });
                currentFamilyId = familyId;
                familyInfo = family;
                showToast('✅ Bergabung ke ' + family.name, 2000, 'success');
                await loadAllData();
                renderSettings();
            } catch (e) { showToast('❌ Gagal: ' + e.message, 3000, 'error'); }
        }

        function copyFamilyId() {
            if (!currentFamilyId) { showToast('❌ Tidak ada keluarga', 2000, 'error'); return; }
            navigator.clipboard.writeText(currentFamilyId).then(() => showToast('✅ ID disalin!', 2000,
                'success')).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = currentFamilyId;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✅ ID disalin!', 2000, 'success');
            });
        }

                renderSettings();

            document.getElementById('closeProfileModal').onclick = () => modal.remove();

        // ============================================================
        // RENDER CURRENT VIEW
        // ============================================================
        function renderCurrentView() {
            if (!appReady) return;
            const views = {
                home: renderHome,
                transaksi: renderTransaksi,
                budget: renderBudgetPage,
                tasks: renderTasks,
                settings: renderSettings,
                hutang: renderHutang,
                savings: renderSavings,
                reminders: renderReminders,
                kategori: renderKategori,
                laporan: renderLaporan,
                'kunci-sukses': renderKunciSukses,
                guide: renderGuide
            };
            if (views[currentNav]) views[currentNav]();

        // ============================================================
        // AUTH FUNCTIONS
        // ============================================================
        async function onAuthSuccess(user) {
            currentUser = user;
            document.getElementById('loginModal').style.display = 'none';
            let customUser = await userManager.setupCustomUser(user);
            if (!customUser) {
                customUser = { id: 0, user_code: 'USR-???', email: user.email, username: user.email.split('@')[0] };
                userManager.customUser = customUser;
                userManager.authUser = user;
            }
            currentCustomUser = customUser;
            isGuestMode = false;
            await loadAllData();
            try { await processRecurringTransactions(); } catch (e) {}
            await initTheme();
            appReady = true;
            addBottomNav();
            startRecurringChecker();
            startNotificationChecker();
            setupAndroidBackButton();
            if (isNotificationSupported() && Notification.permission === 'granted') {
                notificationPermission = true;
                initAudioContext();
            }
            renderCurrentView();
            hideLoading();
        }

        async function handleGuest() {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = '';
            errorDiv.style.color = '#fbbf24';
            errorDiv.textContent = '⏳ Memproses login tamu...';

            const loading = showLoading();
            try {
                const guestId = 'guest_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
                const guestUser = {
                    id: guestId,
                    email: 'guest@tamu.com',
                    user_metadata: { username: 'Tamu' }
                };

                currentUser = guestUser;
                currentCustomUser = {
                    id: 0,
                    auth_id: guestId,
                    email: 'guest@tamu.com',
                    username: 'Tamu',
                    user_code: 'TAMU-' + String(Math.floor(Math.random() * 10000)).padStart(4, '0'),
                    display_name: 'Pengunjung',
                    avatar_url: null
                };

                userManager.customUser = currentCustomUser;
                userManager.authUser = currentUser;
                userManager.isGuest = true;
                isGuestMode = true;

                document.getElementById('loginModal').style.display = 'none';
                await loadAllDataForGuest();
                await initTheme();

                appReady = true;
                addBottomNav();
                startRecurringChecker();
                startNotificationChecker();
                setupAndroidBackButton();
                if (isNotificationSupported() && Notification.permission === 'granted') {
                    notificationPermission = true;
                    initAudioContext();
                }
                renderCurrentView();
                hideLoading();

                showToast('👤 Masuk sebagai Tamu (data lokal)', 2000, 'success');
            } catch (e) {
                console.error('Guest login error:', e);
                errorDiv.textContent = '❌ Gagal masuk sebagai tamu: ' + e.message;
                errorDiv.style.color = '#ef4444';
                clearInterval(loading);
                hideLoading();
            }
        }

        async function logout() {
            if (recurringInterval) clearInterval(recurringInterval);
            if (notifCheckerInterval) clearInterval(notifCheckerInterval);
            realtimeSubscriptions.forEach(sub => {
                try { sub.unsubscribe(); } catch (e) {}
            });
            realtimeSubscriptions = [];
            if (isGuestMode) {
                isGuestMode = false;
                userManager.isGuest = false;
            }
            if (sb) {
                await sb.auth.signOut();
            }
            currentUser = null;
            currentCustomUser = null;
            appReady = false;
            isGuestMode = false;
            document.querySelector('.bottom-nav')?.remove();
            document.getElementById('appContainer').innerHTML = '';
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('emailInput').value = '';
            document.getElementById('passwordInput').value = '';
            isLoginMode = true;
            document.getElementById('modalTitle').innerHTML = '💰 Keuangan Keluarga';
            document.getElementById('submitLoginBtn').innerHTML = 'Masuk';
            document.getElementById('switchText').innerHTML = 'Belum punya akun? Daftar';
            document.getElementById('loginError').textContent = '';
            applyTheme(false);
        }

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('modalTitle').innerHTML = isLoginMode ? '💰 Masuk ke Akun' :
                '💰 Daftar Akun Baru';
            document.getElementById('submitLoginBtn').innerHTML = isLoginMode ? 'Masuk' : 'Daftar';
            document.getElementById('switchText').innerHTML = isLoginMode ? 'Belum punya akun? Daftar' :
                'Sudah punya akun? Masuk';
        }

        async function handleLogin() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('loginError');
            if (!email || !password) { errorDiv.textContent = 'Email dan password harus diisi'; return; }
            errorDiv.textContent = '';
            const loading = showLoading();
            if (isLoginMode) {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) { errorDiv.textContent = error.message;
                    clearInterval(loading);
                    hideLoading(); return; }
                if (data.user) { await onAuthSuccess(data.user); }
            } else {
                if (password.length < 6) { errorDiv.textContent = 'Password minimal 6 karakter';
                    clearInterval(loading);
                    hideLoading(); return; }
                const { data, error } = await sb.auth.signUp({ email, password });
                if (error) { errorDiv.textContent = error.message;
                    clearInterval(loading);
                    hideLoading(); return; }
                if (data.user) {
                    showToast('✅ Pendaftaran berhasil! Silakan login.', 2500, 'success');
                    toggleMode();
                    document.getElementById('emailInput').value = '';
                    document.getElementById('passwordInput').value = '';
                    clearInterval(loading);
                    hideLoading();
                }
            }
        }

        // ============================================================
        // START APP
        // ============================================================
        async function startApp() {
            showLoading();
            await new Promise(r => {
                if (typeof supabase !== 'undefined') { r(); return; }
                let attempts = 0;
                const iv = setInterval(() => {
                    attempts++;
                    if (typeof supabase !== 'undefined') { clearInterval(iv);
                        r(); } else if (attempts > 50) {
                        clearInterval(iv);
                        console.error('Supabase failed to load');
                        document.getElementById('loadingOverlay').classList.add('hidden');
                        document.getElementById('loginModal').style.display = 'flex';
                        document.getElementById('loginError').textContent =
                            'Gagal memuat Supabase. Refresh halaman.';
                        r();
                    }
                }, 200);
            });
            if (!initSupabase()) {
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('loginModal').style.display = 'flex';
                document.getElementById('loginError').textContent = 'Gagal memuat Supabase. Refresh halaman.';
                return;
            }
            try {
                const { data } = await sb.auth.getSession();
                if (data.session?.user) await onAuthSuccess(data.session.user);
                else { document.getElementById('loginModal').style.display = 'flex';
                    hideLoading(); }
            } catch (e) { document.getElementById('loginModal').style.display = 'flex';
                hideLoading(); }
            if (isNotificationSupported() && Notification.permission === 'granted') {
                notificationPermission = true;
                initAudioContext();
            }
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        document.getElementById('submitLoginBtn')?.addEventListener('click', handleLogin);
        document.getElementById('guestBtn')?.addEventListener('click', handleGuest);
        document.getElementById('switchText')?.addEventListener('click', toggleMode);
        document.getElementById('toggleLoginPassword')?.addEventListener('click', () => {
            const inp = document.getElementById('passwordInput');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            inp.nextElementSibling.textContent = inp.type === 'password' ? '👁️' : '👁️‍🗨️';
        });
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startApp);
        else startApp();
    </script>
</body>
</html>
