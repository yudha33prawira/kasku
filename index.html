// Helper functions
function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function getCategoryById(id) {
    if (!id) return null;
    return categories.find(c => c.id === id);
}

function hitungTotalSaldo() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === "pemasukan") pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    return { pemasukan, pengeluaran, saldo: pemasukan - pengeluaran };
}

function hitungTotalTabungan() {
    let total = 0;
    for (const s of savings) total += s.current_amount;
    return total;
}

// Data loading functions
async function loadCategories() {
    if (!currentUser) return;
    const { data } = await sb.from("categories").select("*").eq("user_id", currentUser.id);
    categories = data || [];
}

async function loadTransactions() {
    if (!currentUser) return;
    const { data } = await sb.from("transactions").select("*").eq("user_id", currentUser.id);
    transactions = data || [];
}

async function loadDebts() {
    if (!currentUser) return;
    const { data } = await sb.from("debts").select("*").eq("user_id", currentUser.id);
    debts = data || [];
}

async function loadSavings() {

async function loadReminders() {

    reminders = data || [];
}

// Authentication functions
async function handleLogin() {
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    const errorDiv = document.getElementById("loginError");
    if (!email || !password) { errorDiv.innerText = "Email dan password harus diisi"; return; }
    errorDiv.innerText = "";
    
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { errorDiv.innerText = error.message; return; }
        await onAuthSuccess(data.user);
    } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { errorDiv.innerText = error.message; return; }
        if (data.user) {
            alert("Pendaftaran berhasil! Silakan login.");
            toggleMode();
        }
    }
}

async function handleGuest() {
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) { document.getElementById("loginError").innerText = error.message; return; }
    await onAuthSuccess(data.user);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById("modalTitle").innerText = isLoginMode ? "Masuk / Daftar" : "Daftar Akun Baru";
    document.getElementById("submitLoginBtn").innerText = isLoginMode ? "Masuk" : "Daftar";
    document.getElementById("switchText").innerText = isLoginMode ? "Belum punya akun? Daftar" : "Sudah punya akun? Masuk";
}

async function onAuthSuccess(user) {
    currentUser = user;
    document.getElementById("loginModal").style.display = "none";
    
    await loadCategories();
    await loadTransactions();
    await loadDebts();
    await loadSavings();
    await loadReminders();
    await loadTransactions();
    
    addBottomNav();
    renderCurrentView();
}

async function logout() {
    await sb.auth.signOut();
    currentUser = null;
    document.querySelector(".bottom-nav")?.remove();
    document.getElementById("appContainer").innerHTML = "";
    document.getElementById("loginModal").style.display = "flex";
}

async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session?.user) {
        await onAuthSuccess(data.session.user);
    } else {
        document.getElementById("loginModal").style.display = "flex";
    }
}

// Navigation
function addBottomNav() {
    const navHtml = `
        <div class="bottom-nav">
            <button class="nav-item" data-nav="home"><span class="nav-icon">🏠</span><span>Beranda</span></button>
            <button class="nav-item" data-nav="transaksi"><span class="nav-icon">📋</span><span>Transaksi</span></button>
            <button class="nav-item" data-nav="laporan"><span class="nav-icon">📅</span><span>Laporan</span></button>
            <button class="nav-item" data-nav="hutang"><span class="nav-icon">💰</span><span>Hutang</span></button>
            <button class="nav-item" data-nav="settings"><span class="nav-icon">⚙️</span><span>Atur</span></button>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', navHtml);
    
    for (const btn of document.querySelectorAll('.nav-item')) {
        btn.onclick = () => {
            currentNav = btn.dataset.nav;
            for (const b of document.querySelectorAll('.nav-item')) b.classList.remove('active');
            btn.classList.add('active');
            renderCurrentView();
        };
    }
}
