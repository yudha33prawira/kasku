<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Keuangan Keluarga</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f8f9fc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 70px;
        }

        .app-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 4px 0;
        }
        .user-info {
            background: #e8edf5;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #1e293b;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }

        .balance-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            position: relative;
        }
        .balance-eye {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .balance-label {
            font-size: 14px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }
        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            margin: 8px 0 4px;
            letter-spacing: -0.5px;
        }
        .balance-stats {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .stat-item {
            flex: 1;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 600;
            margin-top: 4px;
        }
        .stat-value.income { color: #4ade80; }
        .stat-value.expense { color: #f87171; }

        .quick-add {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn-income {
            flex: 1;
            background: #10b981;
            border: none;
            border-radius: 60px;
            padding: 14px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-expense {
            flex: 1;
            background: #ef4444;
            border: none;
            border-radius: 60px;
            padding: 14px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 20px;
            border-top: 1px solid #eef2f6;
            max-width: 450px;
            margin: 0 auto;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 11px;
            color: #94a3b8;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 40px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .nav-item .nav-icon {
            font-size: 22px;
        }
        .nav-item.active {
            color: #3b82f6;
            background: #eff6ff;
        }

        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            width: 100%;
            padding: 14px 50px 14px 16px;
        }
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
        }

        .transaction-list, .savings-list, .reminders-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .transaction-item, .savings-item, .reminder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .transaction-info, .savings-info, .reminder-info {
            flex: 1;
        }
        .transaction-desc, .savings-name, .reminder-title {
            font-weight: 500;
            font-size: 15px;
            color: #1e293b;
        }
        .transaction-meta, .savings-meta, .reminder-meta {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .transaction-date, .reminder-date {
            font-size: 11px;
            color: #94a3b8;
        }
        .transaction-cat {
            font-size: 10px;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 30px;
            color: #475569;
        }
        .transaction-amount, .savings-amount {
            font-weight: 600;
            font-size: 15px;
        }
        .transaction-amount.income { color: #10b981; }
        .transaction-amount.expense { color: #ef4444; }
        .delete-btn, .edit-btn, .action-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            color: #94a3b8;
        }

        .top-expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .top-expense-rank {
            width: 28px;
            height: 28px;
            background: #f1f5f9;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            color: #475569;
        }

        .month-selector, .period-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 8px 12px;
            margin-bottom: 16px;
        }
        .month-selector button, .period-selector button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px 12px;
            color: #3b82f6;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }
        .modal-input, .modal-select, .modal-textarea {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
            background: #f8fafc;
        }
        .modal-textarea {
            border-radius: 20px;
            resize: none;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        .modal-btn-primary {
            background: #3b82f6;
            color: white;
        }
        .modal-btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }
        .modal-btn-danger {
            background: #ef4444;
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 300;
            white-space: nowrap;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: white;
            border-radius: 60px;
            padding: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #3b82f6;
            color: white;
        }

        .filter {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
        }
        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 40px;
            background: #e2e8f0;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: #0f172a;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        .hidden {
            display: none;
        }

        .reminder-urgent {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
        }
        .reminder-warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer"></div>

<div id="loginModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">Masuk / Daftar</div>
        <input type="email" id="emailInput" class="modal-input" placeholder="Email">
        <div class="password-wrapper">
            <input type="password" id="passwordInput" class="modal-input" placeholder="Password (min. 6)">
            <button type="button" class="toggle-password" id="toggleLoginPassword">👁️</button>
        </div>
        <button id="submitLoginBtn" class="modal-btn modal-btn-primary">Masuk</button>
        <div id="switchText" style="text-align:center; margin:12px 0; color:#3b82f6; cursor:pointer;">Belum punya akun? Daftar</div>
        <button id="guestBtn" class="modal-btn modal-btn-secondary">Lanjut sebagai Tamu</button>
        <div id="loginError" style="color:#ef4444; font-size:12px; text-align:center; margin-top:12px;"></div>
    </div>
</div>

<script>
// Supabase Config
const SUPABASE_URL = "https://dttupsimbwsffyylfpax.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dHVwc2ltYndzZmZ5eWxmcGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTIyMDksImV4cCI6MjA5NjE2ODIwOX0.Fa_552HBaZmNgXdZUiMZc3jVWQqzEnAJNcKE_GgJy3g";

let sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
let categories = [];
let transactions = [];
let debts = [];
let savings = [];
let reminders = [];
let sharedUsers = [];
let chart = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let currentNav = "home";
let isLoginMode = true;
let isBalanceHidden = false;
let currentPeriod = "weekly";
let transaksiFilter = "all";
let reminderFilter = "all";

// Helper functions
function togglePasswordVisibility(inputId) {
    const input = document.getElementById(inputId);
    if (input) {
        if (input.type === 'password') {
            input.type = 'text';
        } else {
            input.type = 'password';
        }
    }
}

function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function getCategoryById(id) {
    if (!id) return null;
    return categories.find(c => c.id === id);
}

function hitungTotalSaldo() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === "pemasukan") pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    return { pemasukan, pengeluaran, saldo: pemasukan - pengeluaran };
}

function hitungTotalTabungan() {
    let total = 0;
    for (const s of savings) {
        total += s.current_amount;
    }
    return total;
}

async function transferToSavings(savingsId, amount) {
    if (amount <= 0) return;
    const savingsItem = savings.find(s => s.id === savingsId);
    if (!savingsItem) return;
    
    const { error: transError } = await sb.from("transactions").insert({
        user_id: currentUser.id,
        description: `Transfer ke tabungan: ${savingsItem.name}`,
        amount: amount,
        type: "pengeluaran",
        is_fixed_expense: false
    });
    if (transError) return;
    
    const newAmount = savingsItem.current_amount + amount;
    await sb.from("savings").update({ current_amount: newAmount }).eq("id", savingsId);
    showToast(`Rp ${formatRupiah(amount)} ditransfer ke ${savingsItem.name}`);
    await loadSavings();
    await loadTransactions();
}

async function transferFromSavings(savingsId, amount) {
    if (amount <= 0) return;
    const savingsItem = savings.find(s => s.id === savingsId);
    if (!savingsItem || savingsItem.current_amount < amount) return;
    
    const { error: transError } = await sb.from("transactions").insert({
        user_id: currentUser.id,
        description: `Ambil dari tabungan: ${savingsItem.name}`,
        amount: amount,
        type: "pemasukan",
        is_fixed_expense: false
    });
    if (transError) return;
    
    const newAmount = savingsItem.current_amount - amount;
    await sb.from("savings").update({ current_amount: newAmount }).eq("id", savingsId);
    showToast(`Rp ${formatRupiah(amount)} diambil dari ${savingsItem.name}`);
    await loadSavings();
    await loadTransactions();
}

// Render functions (simplified - same as before but with fixes)
async function renderHome() {
    const totals = hitungTotalSaldo();
    const totalSavings = hitungTotalTabungan();
    
    const bulanIni = transactions.filter(t => {
        const d = new Date(t.created_at);
        return d.getMonth() === new Date().getMonth() && d.getFullYear() === new Date().getFullYear() && t.type === "pengeluaran" && !t.is_fixed_expense;
    });
    const topExpenses = [...bulanIni].sort((a,b) => b.amount - a.amount).slice(0,3);
    
    const now = new Date();
    const startOfWeek = new Date(now);
    startOfWeek.setDate(now.getDate() - now.getDay());
    startOfWeek.setHours(0,0,0,0);
    const mingguIni = transactions.filter(t => {
        const d = new Date(t.created_at);
        return d >= startOfWeek && t.type === "pengeluaran" && !t.is_fixed_expense;
    });
    const topWeekly = [...mingguIni].sort((a,b) => b.amount - a.amount).slice(0,3);
    
    let totalPiutang = 0, totalHutang = 0;
    for (const d of debts) {
        if (d.status === 'lunas') continue;
        if (d.type === 'piutang') totalPiutang += d.amount;
        else totalHutang += d.amount;
    }
    
    const upcomingReminders = reminders.filter(r => !r.is_done && new Date(r.due_date) >= new Date()).sort((a,b) => new Date(a.due_date) - new Date(b.due_date)).slice(0,3);
    const recent = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,5);
    
    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email ? currentUser.email.slice(0,20) : 'Tamu'}</div>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
        
        <div class="balance-card">
            <button id="toggleBalanceBtn" class="balance-eye">${isBalanceHidden ? '👁️‍🗨️' : '👁️'}</button>
            <div class="balance-label">Total Saldo</div>
            <div class="balance-amount">${isBalanceHidden ? '••••••' : `Rp ${formatRupiah(totals.saldo)}`}</div>
            <div class="balance-stats">
                <div class="stat-item">
                    <div class="stat-label">Pemasukan</div>
                    <div class="stat-value income">${isBalanceHidden ? '••••' : `+Rp ${formatRupiah(totals.pemasukan)}`}</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Pengeluaran</div>
                    <div class="stat-value expense">${isBalanceHidden ? '••••' : `-Rp ${formatRupiah(totals.pengeluaran)}`}</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">
                <span>💰 Tabungan</span>
                <span style="font-size:14px; color:#10b981">Rp ${formatRupiah(totalSavings)}</span>
            </div>
            <div class="savings-list" id="savingsPreviewList"></div>
            <button id="viewAllSavings" style="margin-top:12px; background:none; border:none; color:#3b82f6; font-size:13px; cursor:pointer;">Lihat semua tabungan →</button>
        </div>
        
        <div class="quick-add">
            <button id="quickIncome" class="btn-income">+ Pemasukan</button>
            <button id="quickExpense" class="btn-expense">- Pengeluaran</button>
        </div>
        
        <div class="debt-summary" style="display:flex; gap:12px; margin-bottom:20px;">
            <div style="flex:1; background:#d1fae5; border-radius:20px; padding:12px; text-align:center;">
                <div style="font-size:12px">💰 Piutang</div>
                <div style="font-size:18px; font-weight:700; color:#10b981">Rp ${formatRupiah(totalPiutang)}</div>
            </div>
            <div style="flex:1; background:#fee2e2; border-radius:20px; padding:12px; text-align:center;">
                <div style="font-size:12px">💸 Hutang</div>
                <div style="font-size:18px; font-weight:700; color:#ef4444">Rp ${formatRupiah(totalHutang)}</div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">
                <span>📊 Pengeluaran Teratas</span>
                <div class="period-selector" style="margin:0; padding:0; background:none;">
                    <button id="periodWeekly" style="background:${currentPeriod === 'weekly' ? '#3b82f6' : '#e2e8f0'}; color:${currentPeriod === 'weekly' ? 'white' : '#475569'}; border-radius:30px; padding:6px 12px; font-size:12px;">Minggu Ini</button>
                    <button id="periodMonthly" style="background:${currentPeriod === 'monthly' ? '#3b82f6' : '#e2e8f0'}; color:${currentPeriod === 'monthly' ? 'white' : '#475569'}; border-radius:30px; padding:6px 12px; font-size:12px;">Bulan Ini</button>
                </div>
            </div>
            <div id="topExpensesList"></div>
        </div>
        
        ${upcomingReminders.length > 0 ? `
        <div class="card">
            <div class="card-title">⏰ Pengingat Mendatang</div>
            <div class="reminders-list" id="reminderPreviewList"></div>
            <button id="viewAllReminders" style="margin-top:12px; background:none; border:none; color:#3b82f6; font-size:13px; cursor:pointer;">Lihat semua pengingat →</button>
        </div>
        ` : ''}
        
        <div class="card">
            <div class="card-title">📋 Transaksi Terbaru</div>
            <div class="transaction-list" id="recentTransactionsList"></div>
        </div>
    `;
    
    document.getElementById("appContainer").innerHTML = html;
    
    // Preview savings
    const savingsPreview = document.getElementById("savingsPreviewList");
    if (savingsPreview) {
        if (savings.length === 0) {
            savingsPreview.innerHTML = '<div class="empty-state" style="padding:12px">Belum ada tabungan</div>';
        } else {
            let sHtml = "";
            for (const s of savings.slice(0,2)) {
                const percent = s.target_amount > 0 ? (s.current_amount / s.target_amount * 100).toFixed(0) : 0;
                sHtml += `
                    <div style="margin-bottom:12px">
                        <div style="display:flex; justify-content:space-between; font-size:13px">
                            <span>${escapeHtml(s.name)}</span>
                            <span>Rp ${formatRupiah(s.current_amount)} / Rp ${formatRupiah(s.target_amount)}</span>
                        </div>
                        <div style="background:#e2e8f0; border-radius:10px; height:6px; margin-top:4px">
                            <div style="background:#10b981; width:${percent}%; height:6px; border-radius:10px"></div>
                        </div>
                    </div>
                `;
            }
            savingsPreview.innerHTML = sHtml;
        }
    }
    
    // Top expenses
    const topContainer = document.getElementById("topExpensesList");
    const topData = currentPeriod === "weekly" ? topWeekly : topExpenses;
    if (topData.length === 0) {
        topContainer.innerHTML = '<div class="empty-state" style="padding:12px">Belum ada pengeluaran</div>';
    } else {
        let tHtml = "";
        for (let i = 0; i < topData.length; i++) {
            const t = topData[i];
            const cat = getCategoryById(t.category_id);

async function renderReminders() {

    let html = `

        <div class="card">
            <div class="card-title">⏰ Daftar Pengingat</div>
            <div class="reminders-list" id="remindersList"></div>

    document.getElementById("logoutBtn")?.addEventListener("click", logout);
    
    let filtered = [...reminders];
    if (reminderFilter === "active") filtered = reminders.filter(r => !r.is_done);
    if (reminderFilter === "done") filtered = reminders.filter(r => r.is_done);
    
    const container = document.getElementById("remindersList");
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada pengingat</div>';
    } else {
        let rHtml = "";
        for (const r of filtered) {
            const daysLeft = Math.ceil((new Date(r.due_date) - new Date()) / (1000 * 60 * 60 * 24));
            const isUrgent = daysLeft <= 7 && daysLeft >= 0 && !r.is_done;
            const isOverdue = daysLeft < 0 && !r.is_done;
            let statusClass = "";
            let statusText = "";
            if (isOverdue) { statusClass = "reminder-urgent"; statusText = "⚠️ TERLEWAT"; }
            else if (isUrgent) { statusClass = "reminder-warning"; statusText = `⏰ ${daysLeft} hari lagi`; }
            else if (r.is_done) { statusText = "✅ Selesai"; }
            else { statusText = `📅 ${Math.abs(daysLeft)} hari lagi`; }
            
            rHtml += `
                <div class="reminder-item ${statusClass}" style="border-bottom:1px solid #f0f2f5; padding:12px 0; border-radius:12px; margin-bottom:8px; padding:12px">
                    <div class="reminder-info">
                        <div class="reminder-title" style="font-weight:600">${escapeHtml(r.title)}</div>
                        <div class="reminder-meta" style="margin-top:4px">
                            <span class="reminder-date">📅 ${new Date(r.due_date).toLocaleDateString("id-ID")}</span>
                            <span style="font-size:11px; color:${isOverdue ? '#ef4444' : (isUrgent ? '#f59e0b' : '#64748b')}">${statusText}</span>
                        </div>
                        ${r.description ? `<div style="font-size:12px; color:#64748b; margin-top:4px">${escapeHtml(r.description)}</div>` : ''}
                        ${r.amount ? `<div style="font-size:12px; color:#10b981; margin-top:4px">Estimasi: Rp ${formatRupiah(r.amount)}</div>` : ''}
                    </div>
                    <div style="display:flex; gap:8px; margin-top:8px">
                        ${!r.is_done ? `<button class="done-reminder" data-id="${r.id}" style="background:#10b981; border:none; border-radius:30px; padding:6px 12px; color:white; font-size:11px; cursor:pointer;">✓ Tandai Selesai</button>` : ''}
                        <button class="edit-reminder" data-id="${r.id}" style="background:#3b82f6; border:none; border-radius:30px; padding:6px 12px; color:white; font-size:11px; cursor:pointer;">✏️ Edit</button>
                        <button class="delete-reminder" data-id="${r.id}" style="background:#ef4444; border:none; border-radius:30px; padding:6px 12px; color:white; font-size:11px; cursor:pointer;">🗑️ Hapus</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = rHtml;
    }
    
    for (const btn of document.querySelectorAll(".done-reminder")) {
        btn.onclick = async () => {
            await sb.from("reminders").update({ is_done: true }).eq("id", btn.dataset.id);
            showToast("Pengingat ditandai selesai");
            await loadReminders();
            renderReminders();
        };
    }
    for (const btn of document.querySelectorAll(".edit-reminder")) {
        btn.onclick = () => editReminder(btn.dataset.id);
    }
    for (const btn of document.querySelectorAll(".delete-reminder")) {
        btn.onclick = async () => {
            if (confirm("Hapus pengingat?")) {
                await sb.from("reminders").delete().eq("id", btn.dataset.id);
                showToast("Pengingat dihapus");
                await loadReminders();
                renderReminders();
            }
        };
    }
    for (const btn of document.querySelectorAll(".filter-btn")) {
        btn.onclick = () => {
            reminderFilter = btn.dataset.filter;
            renderReminders();
        };
    }
}

async function renderLaporan() {
    const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    
    const filtered = transactions.filter(t => {
        const d = new Date(t.created_at);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
    });
    
    let pemasukan = 0, pengeluaran = 0;
    const catTotals = {};
    for (const t of filtered) {
        if (t.type === "pemasukan") pemasukan += t.amount;
        else pengeluaran += t.amount;
        const catId = t.category_id || "uncategorized";
        catTotals[catId] = (catTotals[catId] || 0) + t.amount;
    }
    
    const labels = [], chartData = [], colors = [];
    for (const [id, val] of Object.entries(catTotals)) {
        if (id === "uncategorized") {
            labels.push("📁 Tanpa Kategori");
            colors.push("#94a3b8");
        } else {
            const cat = categories.find(c => c.id === id);
            if (cat) {
                labels.push(`${cat.icon} ${cat.name}`);
                colors.push(cat.color);
            }
        }
        chartData.push(val);
    }
    
    let html = `
        <div class="header">
            <div class="user-info">${currentUser?.email ? currentUser.email.slice(0,20) : 'Tamu'}</div>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
        <div class="month-selector">
            <button id="prevMonth">◀</button>
            <span>${monthNames[currentMonth]} ${currentYear}</span>
            <button id="nextMonth">▶</button>
        </div>
        <div class="balance-card" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
            <div style="display:flex; justify-content:space-between; text-align:center;">
                <div style="flex:1"><div style="font-size:12px; opacity:0.7">Pemasukan</div><div style="font-size:20px; font-weight:600; color:#4ade80">+Rp ${formatRupiah(pemasukan)}</div></div>
                <div style="flex:1"><div style="font-size:12px; opacity:0.7">Pengeluaran</div><div style="font-size:20px; font-weight:600; color:#f87171">-Rp ${formatRupiah(pengeluaran)}</div></div>
                <div style="flex:1"><div style="font-size:12px; opacity:0.7">Saldo</div><div style="font-size:20px; font-weight:600">Rp ${formatRupiah(pemasukan - pengeluaran)}</div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">📊 Statistik Kategori</div>
            <canvas id="laporanChart" style="max-height:200px; width:100%"></canvas>
        </div>
        <div class="card">
            <div class="card-title">📋 Detail Transaksi</div>
            <div class="transaction-list" id="detailTransaksiList"></div>
        </div>
    `;
    document.getElementById("appContainer").innerHTML = html;
    
    const ctx = document.getElementById('laporanChart')?.getContext('2d');
    if (ctx && chartData.length > 0) {
        if (window.laporanChart) window.laporanChart.destroy();
        window.laporanChart = new Chart(ctx, {
            type: 'pie',
            data: { labels, datasets: [{ data: chartData, backgroundColor: colors, borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
        });
    }
    
    const grouped = {};
    for (const t of filtered) {
        const date = new Date(t.created_at).toLocaleDateString("id-ID");
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(t);
    }
    
    let detailHtml = "";
    for (const [date, items] of Object.entries(grouped)) {
        let totalHari = 0;
        for (const item of items) totalHari += item.type === "pemasukan" ? item.amount : -item.amount;
        detailHtml += `<div style="margin-top:12px; padding:8px 0; border-bottom:1px solid #eef2f6;"><strong>📌 ${date}</strong> <span style="color:${totalHari >= 0 ? '#10b981' : '#ef4444'}">${totalHari >= 0 ? '+' : '-'} Rp ${formatRupiah(Math.abs(totalHari))}</span></div>`;
        for (const item of items) {
            const cat = getCategoryById(item.category_id);
            detailHtml += `

async function renderHutang() {

    let html = `

                <div style="font-size:12px">💰 Piutang</div>

    `;
    document.getElementById("appContainer").innerHTML = html;
    
    document.getElementById("addDebtBtn")?.addEventListener("click", () => openDebtModal());

    if (debts.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada data hutang/piutang</div>';
    } else {
        let listHtml = "";
        for (const d of debts) {
            const isPiutang = d.type === "piutang";
            const statusText = d.status === "lunas" ? "✅ Lunas" : "⏳ Belum Lunas";
            const dueText = d.due_date ? ` • Jatuh tempo: ${new Date(d.due_date).toLocaleDateString("id-ID")}` : '';
            listHtml += `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-desc">${isPiutang ? '💰' : '💸'} ${escapeHtml(d.contact_name)}</div>
                        <div class="transaction-meta">
                            <span class="transaction-date">${statusText}${dueText}</span>
                            ${d.description ? `<span class="transaction-cat">${escapeHtml(d.description)}</span>` : ''}
                        </div>
                    </div>
                    <div style="display:flex; gap:8px; align-items:center">
                        <div class="transaction-amount ${isPiutang ? 'income' : 'expense'}">
                            ${isPiutang ? '+' : '-'} Rp ${formatRupiah(d.amount)}
                        </div>
                        ${d.status !== 'lunas' ? `<button class="lunas-debt" data-id="${d.id}" style="background:#10b981; border:none; border-radius:30px; padding:6px 12px; color:white; font-size:11px; cursor:pointer;">✓ Lunas</button>` : ''}
                        <button class="delete-debt" data-id="${d.id}" style="background:none; border:none; font-size:18px; cursor:pointer;">🗑️</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = listHtml;
    }
    
    for (const btn of document.querySelectorAll(".lunas-debt")) {
        btn.onclick = async () => {
            if (confirm("Tandai sebagai lunas?")) {
                await sb.from("debts").update({ status: 'lunas' }).eq("id", btn.dataset.id);
                showToast("Ditandai lunas");
                await loadDebts();
                renderHutang();
            }
        };
    }
    for (const btn of document.querySelectorAll(".delete-debt")) {
        btn.onclick = async () => {
            if (confirm("Hapus data ini?")) {
                await sb.from("debts").delete().eq("id", btn.dataset.id);
                showToast("Data dihapus");
                await loadDebts();
                renderHutang();
            }
        };
    }
}

        <div style="font-family: Arial, sans-serif; padding: 20px;">

                <div><strong>Total Pemasukan:</strong> Rp ${formatRupiah(pemasukan)}</div>
                <div><strong>Total Pengeluaran:</strong> Rp ${formatRupiah(pengeluaran)}</div>
                <div><strong>Saldo:</strong> Rp ${formatRupiah(pemasukan - pengeluaran)}</div>
            </div>
            <h4>Detail Transaksi:</h4>
            <table style="width: 100%; border-collapse: collapse;">
                <tr style="background: #f1f5f9;">
                    <th style="padding: 8px; text-align: left;">Tanggal</th>
                    <th style="padding: 8px; text-align: left;">Deskripsi</th>
                    <th style="padding: 8px; text-align: left;">Kategori</th>
                    <th style="padding: 8px; text-align: right;">Jumlah</th>
                </tr>
                ${filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).map(t => {
                    const cat = getCategoryById(t.category_id);
                    return `
                        <tr>
                            <td style="padding: 8px;">${new Date(t.created_at).toLocaleDateString("id-ID")}</td>
                            <td style="padding: 8px;">${escapeHtml(t.description)}</td>
                            <td style="padding: 8px;">${cat ? `${cat.icon} ${cat.name}` : '-'}</td>
                            <td style="padding: 8px; text-align: right; color: ${t.type === 'pemasukan' ? '#10b981' : '#ef4444'}">
                                ${t.type === 'pemasukan' ? '+' : '-'} Rp ${formatRupiah(t.amount)}
                            </td>
                        </tr>
                    `;
                }).join('')}
            </table>
            <hr>
            <p style="text-align: center; font-size: 12px;">Dibuat pada: ${new Date().toLocaleString()}</p>
        </div>

    const opt = {
        margin: [10, 10, 10, 10],

        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(reportHtml).save();
    showToast("Laporan PDF sedang diproses");
}

async function processRecurring() {
    if (!currentUser) return;
    const today = new Date();
    const currentDay = today.getDate();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();
    
    const { data: recurringList } = await sb.from("recurring_transactions").select("*").eq("user_id", currentUser.id).eq("is_active", true);
    if (!recurringList) return;
    
    for (const r of recurringList) {
        if (r.day_of_month !== currentDay) continue;
        if (r.last_processed_date) {
            const last = new Date(r.last_processed_date);
            if (last.getMonth() === currentMonth && last.getFullYear() === currentYear) continue;
        }
        const insertData = { user_id: currentUser.id, description: `${r.description} (otomatis)`, amount: r.amount, type: r.type };
        if (r.category_id) insertData.category_id = r.category_id;
        await sb.from("transactions").insert(insertData);
        await sb.from("recurring_transactions").update({ last_processed_date: `${currentYear}-${currentMonth+1}-${currentDay}` }).eq("id", r.id);
    }
}

    const errorDiv = document.getElementById("loginError");
    if (!email || !password) { errorDiv.innerText = "Email dan password harus diisi"; return; }
    errorDiv.innerText = "";
    
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { errorDiv.innerText = error.message; return; }
        await onAuthSuccess(data.user);
    } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { errorDiv.innerText = error.message; return; }
        if (data.user) {
            alert("Pendaftaran berhasil! Silakan login.");
            toggleMode();
        }
    }
}

async function handleGuest() {
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) { document.getElementById("loginError").innerText = error.message; return; }
    await onAuthSuccess(data.user);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById("modalTitle").innerText = isLoginMode ? "Masuk / Daftar" : "Daftar Akun Baru";
    document.getElementById("submitLoginBtn").innerText = isLoginMode ? "Masuk" : "Daftar";
    document.getElementById("switchText").innerText = isLoginMode ? "Belum punya akun? Daftar" : "Sudah punya akun? Masuk";
}

async function onAuthSuccess(user) {
    currentUser = user;
    document.getElementById("loginModal").style.display = "none";
    
    await loadCategories();
    await loadTransactions();
    await loadDebts();
    await loadSavings();
    await loadReminders();
    await processRecurring();
    await loadTransactions();
    
    addBottomNav();
    renderCurrentView();
}

async function logout() {
    await sb.auth.signOut();
    currentUser = null;
    document.querySelector(".bottom-nav")?.remove();
    document.getElementById("appContainer").innerHTML = "";
    document.getElementById("loginModal").style.display = "flex";
}

async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session?.user) {
        await onAuthSuccess(data.session.user);
    } else {
        document.getElementById("loginModal").style.display = "flex";
    }
}

// Setup toggle password for login
document.getElementById("toggleLoginPassword")?.addEventListener("click", () => {
    const input = document.getElementById("passwordInput");
    if (input) {
        if (input.type === 'password') {
            input.type = 'text';
            document.getElementById("toggleLoginPassword").textContent = '🙈';
        } else {
            input.type = 'password';
            document.getElementById("toggleLoginPassword").textContent = '👁️';
        }
    }
});

// Event Listeners Login
document.getElementById("submitLoginBtn").onclick = handleLogin;
document.getElementById("switchText").onclick = toggleMode;
document.getElementById("guestBtn").onclick = handleGuest;

checkSession();
</script>
</body>
</html>
