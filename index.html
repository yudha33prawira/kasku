<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Keuangan Keluarga</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        
        /* Login Form */
        .login-box {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #1e293b;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .guest-btn {
            background: #e2e8f0;
            color: #475569;
        }
        .switch-btn {
            background: none;
            color: #3b82f6;
            font-size: 14px;
        }
        .error {
            color: #ef4444;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }
        .hidden {
            display: none;
        }
        
        /* App */
        .app-box {
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .user-info {
            background: #e2e8f0;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
        }
        .logout-btn {
            background: #ef4444;
            width: auto;
            padding: 8px 16px;
            margin: 0;
        }
        .balance-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            color: white;
        }
        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            margin: 8px 0;
        }
        .balance-stats {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        .stat-item {
            flex: 1;
        }
        .income { color: #4ade80; }
        .expense { color: #f87171; }
        .quick-add {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn-income {
            background: #10b981;
            margin: 0;
        }
        .btn-expense {
            background: #ef4444;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card-title {
            font-weight: 600;
            margin-bottom: 12px;
        }
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eef2f6;
        }
        .transaction-desc {
            font-weight: 500;
        }
        .transaction-date {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .transaction-amount.income { color: #10b981; font-weight: 600; }
        .transaction-amount.expense { color: #ef4444; font-weight: 600; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

<!-- Login Form -->
<div id="loginForm" class="login-box">
    <h2 id="formTitle">Masuk</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Masuk</button>
    <button id="guestBtn" class="guest-btn">Lanjut sebagai Tamu</button>
    <button id="switchModeBtn" class="switch-btn">Belum punya akun? Daftar</button>
    <div id="errorMsg" class="error"></div>
</div>

<!-- App Main -->
<div id="app" class="app-box hidden">
    <div class="header">
        <div class="user-info" id="userInfo">Loading...</div>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
    
    <div class="balance-card">
        <div style="opacity:0.7">Total Saldo</div>
        <div class="balance-amount" id="totalSaldo">Rp 0</div>
        <div class="balance-stats">
            <div class="stat-item">
                <div style="opacity:0.7; font-size:12px">Pemasukan</div>
                <div class="income" id="totalPemasukan">Rp 0</div>
            </div>
            <div class="stat-item">
                <div style="opacity:0.7; font-size:12px">Pengeluaran</div>
                <div class="expense" id="totalPengeluaran">Rp 0</div>
            </div>
        </div>
    </div>
    
    <div class="quick-add">
        <button id="addIncomeBtn" class="btn-income">+ Tambah Pemasukan</button>
        <button id="addExpenseBtn" class="btn-expense">- Tambah Pengeluaran</button>
    </div>
    
    <div class="card">
        <div class="card-title">📋 Transaksi Terbaru</div>
        <div id="transactionList"></div>
    </div>
</div>

<script>
// Supabase Config
const SUPABASE_URL = "https://dttupsimbwsffyylfpax.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dHVwc2ltYndzZmZ5eWxmcGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTIyMDksImV4cCI6MjA5NjE2ODIwOX0.Fa_552HBaZmNgXdZUiMZc3jVWQqzEnAJNcKE_GgJy3g";

let sb = null;
let currentUser = null;
let transactions = [];
let isLoginMode = true;

// Helper
function formatRupiah(angka) {
    return new Intl.NumberFormat("id-ID").format(angka || 0);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function showError(msg) {
    document.getElementById('errorMsg').innerText = msg;
}

function clearError() {
    document.getElementById('errorMsg').innerText = '';
}

// Update UI
function updateBalance() {
    let pemasukan = 0, pengeluaran = 0;
    for (const t of transactions) {
        if (t.type === 'pemasukan') pemasukan += t.amount;
        else pengeluaran += t.amount;
    }
    document.getElementById('totalSaldo').innerText = `Rp ${formatRupiah(pemasukan - pengeluaran)}`;
    document.getElementById('totalPemasukan').innerText = `Rp ${formatRupiah(pemasukan)}`;
    document.getElementById('totalPengeluaran').innerText = `Rp ${formatRupiah(pengeluaran)}`;
}

function renderTransactions() {
    const container = document.getElementById('transactionList');
    const recent = [...transactions].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,10);
    
    if (recent.length === 0) {
        container.innerHTML = '<div class="empty-state">Belum ada transaksi</div>';
        return;
    }
    
    let html = '';
    for (const t of recent) {
        const kelas = t.type === 'pemasukan' ? 'income' : 'expense';
        const prefix = t.type === 'pemasukan' ? '+' : '-';
        html += `
            <div class="transaction-item">
                <div>
                    <div class="transaction-desc">${escapeHtml(t.description)}</div>
                    <div class="transaction-date">${new Date(t.created_at).toLocaleDateString('id-ID')}</div>
                </div>
                <div style="display:flex; align-items:center; gap:8px">
                    <div class="transaction-amount ${kelas}">${prefix} Rp ${formatRupiah(t.amount)}</div>
                    <button class="delete-btn" data-id="${t.id}">🗑️</button>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
    
    // Add delete event
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.onclick = async () => {
            if (confirm('Hapus transaksi ini?')) {
                await sb.from('transactions').delete().eq('id', btn.dataset.id);
                await loadTransactions();
            }
        };
    });
}

// Data functions
async function loadTransactions() {
    if (!currentUser) return;
    const { data, error } = await sb.from('transactions').select('*').eq('user_id', currentUser.id);
    if (error) {
        console.error('Error loading:', error);
        return;
    }
    transactions = data || [];
    updateBalance();
    renderTransactions();
}

async function addTransaction(description, amount, type) {
    if (!description) {
        alert('Deskripsi harus diisi');
        return false;
    }
    if (isNaN(amount) || amount <= 0) {
        alert('Jumlah harus lebih dari 0');
        return false;
    }
    
    const { error } = await sb.from('transactions').insert({
        user_id: currentUser.id,
        description: description,
        amount: amount,
        type: type
    });
    
    if (error) {
        alert('Gagal: ' + error.message);
        return false;
    }
    
    await loadTransactions();
    return true;
}

// Auth functions
async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    if (!email || !password) {
        showError('Email dan password harus diisi');
        return;
    }
    clearError();
    
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
            showError(error.message);
            return;
        }
        await onLoginSuccess(data.user);
    } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) {
            showError(error.message);
            return;
        }
        if (data.user) {
            alert('Pendaftaran berhasil! Silakan login.');
            toggleMode();
        }
    }
}

async function handleGuest() {
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) {
        showError(error.message);
        return;
    }
    await onLoginSuccess(data.user);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('formTitle').innerText = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('loginBtn').innerText = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('switchModeBtn').innerText = isLoginMode ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Masuk';
    clearError();
}

async function onLoginSuccess(user) {
    currentUser = user;
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('userInfo').innerHTML = user.email ? `👤 ${user.email}` : `👤 Tamu`;
    
    await loadTransactions();
}

async function logout() {
    await sb.auth.signOut();
    currentUser = null;
    transactions = [];
    document.getElementById('app').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    clearError();
}

async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (data.session?.user) {
        await onLoginSuccess(data.session.user);
    }
}

// Add transaction modal using prompt (simple)
function promptAddTransaction(type) {
    const desc = prompt('Masukkan deskripsi:');
    if (desc === null) return;
    const amountStr = prompt('Masukkan jumlah (Rp):');
    if (amountStr === null) return;
    const amount = parseInt(amountStr);
    addTransaction(desc, amount, type);
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    document.getElementById('loginBtn').onclick = handleLogin;
    document.getElementById('guestBtn').onclick = handleGuest;
    document.getElementById('switchModeBtn').onclick = toggleMode;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('addIncomeBtn').onclick = () => promptAddTransaction('pemasukan');
    document.getElementById('addExpenseBtn').onclick = () => promptAddTransaction('pengeluaran');
    
    checkSession();
});
</script>
</body>
</html>
