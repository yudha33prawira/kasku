<!DOCTYPE html>
<html lang="id">
<head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(255,255,255,0.06);
            --bg-card-hover: rgba(255,255,255,0.10);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255,255,255,0.06);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --gradient-success: linear-gradient(135deg, #10b981, #059669);
            --gradient-danger: linear-gradient(135deg, #ef4444, #dc2626);
            --gradient-warning: linear-gradient(135deg, #f59e0b, #d97706);
            --nav-height: 70px;
        }
        
        body { background: var(--bg-primary); font-family: 'Inter', -apple-system, sans-serif; color: var(--text-primary); min-height: 100vh; padding-bottom: calc(var(--nav-height) + 20px); transition: background 0.3s ease; }
        body.light { --bg-primary: #f1f5f9; --bg-secondary: #ffffff; --bg-card: rgba(0,0,0,0.04); --bg-card-hover: rgba(0,0,0,0.08); --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8; --border-color: rgba(0,0,0,0.06); --shadow: 0 8px 32px rgba(0,0,0,0.08); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }
        
        .loading-overlay { position: fixed; inset: 0; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease; }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-logo { font-size: 64px; margin-bottom: 20px; animation: pulse 1.5s ease-in-out infinite; }
        .loading-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loading-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; }
        .loading-bar { width: 200px; height: 4px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
        .loading-bar-fill { height: 100%; background: var(--gradient-primary); border-radius: 4px; animation: shimmer 1.5s ease-in-out infinite; background-size: 200% 100%; }
        .loading-percent { color: var(--text-muted); font-size: 12px; margin-top: 12px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        
        .app-container { max-width: 420px; margin: 0 auto; padding: 16px 16px 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--bg-card); backdrop-filter: blur(20px); border-radius: var(--radius); border: 1px solid var(--border-color); margin-bottom: 16px; }
        .header-user { display: flex; align-items: center; gap: 10px; }
        .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: white; flex-shrink: 0; }

        .header-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--bg-card); color: var(--text-secondary); font-size: 16px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; position: relative; }
        .header-btn:active { transform: scale(0.92); }
        .header-btn .badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 9px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .running-text-container { background: rgba(251, 191, 36, 0.10); border: 1px solid rgba(251, 191, 36, 0.15); border-radius: var(--radius-sm); padding: 10px 16px; margin-bottom: 16px; overflow: hidden; white-space: nowrap; }
        .running-text { display: inline-block; animation: scrollText 25s linear infinite; font-size: 12px; color: #fbbf24; font-weight: 500; }
        .running-text span { margin-right: 30px; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .balance-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .balance-card::before { content: ''; position: absolute; top: -50%; right: -30%; width: 60%; height: 200%; background: radial-gradient(circle, rgba(59,130,246,0.10), transparent 70%); pointer-events: none; }
        .balance-label { font-size: 12px; color: var(--text-secondary); letter-spacing: 0.5px; }
        .balance-amount { font-size: 32px; font-weight: 800; margin: 6px 0; letter-spacing: -0.5px; }
        .balance-stats { display: flex; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); position: relative; z-index: 1; }

        .card { background: var(--bg-card); backdrop-filter: blur(10px); border-radius: var(--radius); padding: 18px 16px; margin-bottom: 12px; border: 1px solid var(--border-color); transition: var(--transition); cursor: pointer; }

        .family-badge.owner { background: rgba(139,92,246,0.2); color: #a78bfa; }
        .family-badge.member { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .family-badge.shared { background: rgba(251,191,36,0.15); color: #fbbf24; }
        
        .bottom-nav { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); max-width: 420px; width: calc(100% - 32px); background: var(--bg-secondary); backdrop-filter: blur(20px); border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); display: flex; justify-content: space-around; align-items: center; padding: 6px 8px; z-index: 100; height: var(--nav-height); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px 10px; border-radius: var(--radius-sm); transition: var(--transition); flex: 1; position: relative; min-width: 0; }
        .nav-item .nav-icon { font-size: 20px; transition: var(--transition); }
        .nav-item .nav-label { font-size: 9px; font-weight: 500; transition: var(--transition); }
        .nav-item:active { transform: scale(0.92); }
        .nav-item.active { color: #3b82f6; }
        .nav-item.active .nav-icon { transform: translateY(-2px); }
        .nav-item .nav-badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 8px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
        
        .nav-center { flex: 0 0 auto; margin-top: -20px; }
        .nav-center-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--gradient-primary); border: none; color: white; font-size: 28px; font-weight: 300; cursor: pointer; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3); transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        .nav-center-btn:active { transform: scale(0.92); }
        
        #moreMenuPopup { position: fixed; bottom: calc(var(--nav-height) + 20px); left: 50%; transform: translateX(-50%) scale(0.9); max-width: 420px; width: calc(100% - 32px); background: var(--bg-secondary); backdrop-filter: blur(20px); border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); padding: 12px; z-index: 99; opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        #moreMenuPopup.open { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
        .menu-popup-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 8px; border: none; border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; transition: var(--transition); font-size: 12px; font-weight: 500; }

        .menu-popup-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }

        .modal-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 16px; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-input, .modal-select, .modal-textarea { width: 100%; padding: 12px 16px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-primary); font-size: 14px; transition: var(--transition); }
        .modal-input:focus, .modal-select:focus, .modal-textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .modal-textarea { min-height: 80px; resize: vertical; }
        .modal-button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .modal-btn { padding: 12px; border: none; border-radius: var(--radius-sm); font-weight: 600; font-size: 13px; cursor: pointer; transition: var(--transition); text-align: center; }
        .modal-btn:active { transform: scale(0.96); }
        .modal-btn-full { grid-column: span 2; }
        .modal-btn-primary { background: var(--gradient-primary); color: white; }
        .modal-btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .modal-btn-danger { background: var(--gradient-danger); color: white; }
        .modal-btn-success { background: var(--gradient-success); color: white; }
        
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 50px; }
        .toggle-password { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.6; color: var(--text-secondary); }
        
        .toast { position: fixed; bottom: calc(var(--nav-height) + 30px); left: 50%; transform: translateX(-50%); background: var(--bg-secondary); color: var(--text-primary); padding: 12px 24px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; z-index: 300; box-shadow: var(--shadow); border: 1px solid var(--border-color); animation: toastIn 0.3s ease-out; max-width: 90%; text-align: center; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.95); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
        
        .empty-state { text-align: center; padding: 30px 20px; color: var(--text-secondary); }
        .empty-state .icon { font-size: 48px; margin-bottom: 8px; }
        .empty-state .title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .empty-state .desc { font-size: 13px; margin-top: 4px; }
        
        .budget-item { padding: 14px 12px; background: var(--bg-card); border-radius: var(--radius-sm); border: 1px solid var(--border-color); margin-bottom: 8px; cursor: pointer; transition: var(--transition); }
        .budget-item:active { transform: scale(0.98); }
        .budget-item .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding: 0; background: none; border: none; }
        .budget-item .header .name { font-weight: 600; font-size: 14px; }
        .budget-item .header .status { font-size: 11px; font-weight: 500; padding: 2px 10px; border-radius: 20px; }
        .budget-item .progress { height: 4px; background: var(--bg-card); border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .budget-item .progress .fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .budget-item .amounts { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        
        .filter { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
        .filter-btn { padding: 8px 16px; border: none; border-radius: 20px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; transition: var(--transition); }
        .filter-btn.active { background: var(--gradient-primary); color: white; }
        .filter-btn:active { transform: scale(0.95); }
        
        @media (max-width: 420px) { .app-container { padding: 12px 12px 20px; } .balance-amount { font-size: 26px; } .header-name { font-size: 13px; } .nav-item .nav-label { font-size: 8px; } .nav-center-btn { width: 44px; height: 44px; font-size: 24px; } .bottom-nav { padding: 4px 6px; height: 64px; } }
    </style>
</head>

<script>
// ============================================
// SUPABASE CONFIG
// ============================================
const SUPABASE_URL = "https://dttupsimbwsffyylfpax.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0dHVwc2ltYndzZmZ5eWxmcGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTIyMDksImV4cCI6MjA5NjE2ODIwOX0.Fa_552HBaZmNgXdZUiMZc3jVWQqzEnAJNcKE_GgJy3g";

let sb = null;
let currentUser = null;
let currentCustomUser = null;
let categories = [];
let transactions = [];
let debts = [];
let savings = [];
let reminders = [];
let tasks = [];
let budgets = [];
let chart = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let currentNav = "home";
let previousNav = "home";
let isLoginMode = true;
let isBalanceHidden = false;
let transaksiFilter = "all";
let taskFilter = "all";
let navigationHistory = [];
let appReady = false;
let currentBudgetMonth = new Date().getMonth();
let currentBudgetYear = new Date().getFullYear();

let currentFamilyId = null;
let familyMembers = [];
let familyInfo = null;

// ============================================
// CUSTOM USER MANAGER
// ============================================
class CustomUserManager {
    constructor(sb) { this.sb = sb; this.authUser = null; this.customUser = null; }
    
    async setupCustomUser(authUser) {
        if (!authUser) return null;
        try {
            const { data: existing } = await this.sb.from('users').select('*').eq('auth_id', authUser.id).maybeSingle();
            if (existing) { this.customUser = existing; this.authUser = authUser; return this.customUser; }
            const username = authUser.email.split('@')[0] + '_' + Math.floor(Math.random()*10000);
            const { data: inserted } = await this.sb.from('users').insert({ auth_id: authUser.id, email: authUser.email, username }).select().maybeSingle();
            if (inserted) { this.customUser = inserted; this.authUser = authUser; return this.customUser; }
            throw new Error('Failed to create user');
        } catch(e) { console.error(e); return null; }
    }
    async getUserId() { return this.customUser?.id || 0; }
    async getUserCode() { return this.customUser?.user_code || 'USR-???'; }
    async getUsername() { return this.customUser?.username || 'User'; }
    async getUserData() { return this.customUser; }
    async updateProfile(data) {
        if (!this.customUser) throw new Error('No user');
        await this.sb.from('users').update({ ...data, updated_at: new Date().toISOString() }).eq('id', this.customUser.id);
        const { data: updated } = await this.sb.from('users').select('*').eq('id', this.customUser.id).single();
        this.customUser = updated;
        return updated;
    }
    async getUserById(id) {
        const { data } = await this.sb.from('users').select('*').eq('id', id).maybeSingle();
        return data;
    }
}
const userManager = new CustomUserManager(null);

// ============================================
// UTILITY FUNCTIONS
// ============================================
function initSupabase() {
    if (typeof supabase !== 'undefined') {
        sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        userManager.sb = sb;
        return true;
    }
    return false;
}

function showToast(msg, duration = 3000) {
    let t = document.querySelector('.toast');
    if (t) t.remove();
    t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(-10px)'; setTimeout(() => t.remove(), 300); }, duration);
}

function formatRupiah(n) { return n ? new Intl.NumberFormat('id-ID').format(n) : '0'; }
function parseRupiah(s) { return parseInt((s || '0').replace(/\./g, '').replace(/[^0-9]/g, '')) || 0; }
function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function getCategoryById(id) { return categories.find(c => c.id === id); }
function formatDate(d) { if (!d) return '-'; const dt = new Date(d); return `${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}`; }
function formatDateInput(d) { if (!d) return ''; const dt = new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function capitalizeName(s) { if (!s) return ''; return s.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); }

function showLoading() {
    const ov = document.getElementById('loadingOverlay');
    if (ov) ov.classList.remove('hidden');
    let p = 0;
    const iv = setInterval(() => {
        p += Math.random() * 10;
        if (p > 100) p = 100;
        const bar = document.getElementById('loadingBarFill');
        const percent = document.getElementById('loadingPercent');
        if (bar) bar.style.width = p + '%';
        if (percent) percent.textContent = Math.round(p) + '%';
        if (p >= 100) clearInterval(iv);
    }, 200);
    return iv;
}
function hideLoading() { document.getElementById('loadingOverlay')?.classList.add('hidden'); }
function pushHistory(n) { navigationHistory.push(n); }

function getFamilyMemberIds() { return familyMembers.map(m => m.user_id); }
function getFamilyBadge(userId) {
    if (userId === currentCustomUser?.id) return '';
    const m = familyMembers.find(f => f.user_id === userId);
    if (!m) return `<span class="family-badge shared">📤</span>`;
    return m.role === 'owner' ? `<span class="family-badge owner">👑 Owner</span>` : `<span class="family-badge member">👤 Anggota</span>`;
}
function getUserEmail(userId) {
    const m = familyMembers.find(f => f.user_id === userId);
    return m?.users?.email || m?.users?.username || `User ${userId}`;
}
function getOverdueCount() {
    const today = new Date(); today.setHours(0,0,0,0);
    let count = 0;
    tasks.forEach(t => { if (!t.is_completed && t.due_date && new Date(t.due_date) < today) count++; });
    reminders.forEach(r => { if (!r.is_done && r.due_date && new Date(r.due_date) < today) count++; });
    debts.forEach(d => { if (d.status !== 'lunas' && d.due_date && new Date(d.due_date) < today) count++; });
    return count;
}

function applyTheme(isDark) {
    document.body.classList.toggle('dark', isDark);
    document.body.classList.toggle('light', !isDark);
    localStorage.setItem('theme_mode', isDark ? 'dark' : 'light');
}
async function initTheme() {
    if (currentUser) {
        const uid = await userManager.getUserId();
        if (uid) {
            const { data } = await sb.from('user_settings').select('dark_mode').eq('user_id', uid);
            if (data?.[0]?.dark_mode !== undefined) { applyTheme(data[0].dark_mode); return; }
        }
    }
    const local = localStorage.getItem('theme_mode');
    applyTheme(local === 'dark');
}
async function toggleTheme() {
    const isDark = !document.body.classList.contains('dark');
    applyTheme(isDark);
    const uid = await userManager.getUserId();
    if (uid) {
        const { data: existing } = await sb.from('user_settings').select('id').eq('user_id', uid).maybeSingle();
        if (existing) await sb.from('user_settings').update({ dark_mode: isDark, updated_at: new Date().toISOString() }).eq('user_id', uid);
        else await sb.from('user_settings').insert({ user_id: uid, dark_mode: isDark });
    }
    showToast(isDark ? '🌙 Mode Gelap' : '☀️ Mode Terang');
}

// ============================================
// GET RUNNING TEXT
// ============================================
function getRunningText() {
    const today = new Date(); today.setHours(0,0,0,0);
    const msgs = [];
    debts.forEach(d => {
        if (d.status === 'lunas' || !d.due_date) return;
        const diff = Math.ceil((new Date(d.due_date) - today) / (1000*60*60*24));
        if (diff < 0) msgs.push(`⚠️ ${d.type === 'piutang' ? 'Piutang' : 'Hutang'} ${escapeHtml(d.contact_name)} terlewat ${Math.abs(diff)} hari!`);
        else if (diff <= 3) msgs.push(`⚠️ ${d.type === 'piutang' ? 'Piutang' : 'Hutang'} ${escapeHtml(d.contact_name)} jatuh tempo ${diff === 0 ? 'HARI INI!' : diff + ' hari lagi'}`);
    });
    tasks.forEach(t => {
        if (t.is_completed || !t.due_date) return;
        const diff = Math.ceil((new Date(t.due_date) - today) / (1000*60*60*24));
        if (diff < 0) msgs.push(`⚠️ Tugas "${escapeHtml(t.title)}" terlewat ${Math.abs(diff)} hari!`);
        else if (diff <= 3) msgs.push(`📋 Tugas "${escapeHtml(t.title)}" ${diff === 0 ? 'HARI INI!' : diff + ' hari lagi'}`);
    });
    return msgs;
}

function showRemindersPopup() {
    const msgs = getRunningText();
    if (!msgs.length) { showToast('✅ Tidak ada peringatan'); return; }
    const modal = document.createElement('div'); modal.className = 'modal-overlay';
    modal.innerHTML = `<div class="modal-content"><div class="modal-title">⚠️ Peringatan</div>${msgs.map(m => `<div style="padding:8px 0; border-bottom:1px solid var(--border-color); font-size:14px;">${m}</div>`).join('')}<div class="modal-button-grid"><button class="modal-btn modal-btn-primary modal-btn-full" onclick="this.closest('.modal-overlay').remove()">Tutup</button></div></div>`;
    document.body.appendChild(modal);
}

async function renderHutang() {

async function renderBudgetPage() {
    await loadTransactions();
    await loadBudgets();
    const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const totalBudget = budgets.reduce((s, b) => s + Number(b.amount), 0);
    const html = `
        <div class="header"><div class="header-user"><div class="header-avatar">📊</div><div class="header-info"><div class="header-name">Anggaran</div></div></div><div class="header-actions"><button class="header-btn" onclick="pushHistory(currentNav);currentNav='home';updateNav();renderHome();">←</button></div></div>
        <div class="month-selector" style="display:flex;justify-content:space-between;align-items:center;background:var(--bg-card);border-radius:12px;padding:8px 12px;margin-bottom:12px;">
            <button id="prevBudgetMonth" style="background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;">◀</button>
            <span style="font-weight:600;">${monthNames[currentBudgetMonth]} ${currentBudgetYear}</span>
            <button id="nextBudgetMonth" style="background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;">▶</button>
        </div>
        <div class="balance-card" style="padding:16px;"><div style="display:flex;justify-content:space-between;"><div><div style="font-size:12px;opacity:0.7;">Total Anggaran</div><div style="font-size:22px;font-weight:700;">Rp ${formatRupiah(totalBudget)}</div></div><div><div style="font-size:12px;opacity:0.7;">Kategori</div><div style="font-size:22px;font-weight:700;">${budgets.length}</div></div><button class="modal-btn modal-btn-primary" style="padding:8px 16px;font-size:12px;" onclick="openBudgetModal()">+ Tambah</button></div></div>
        <div class="card"><div id="budgetList"></div></div>
    `;
    document.getElementById('appContainer').innerHTML = html;
    const container = document.getElementById('budgetList');
    if (!budgets.length) { container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><div class="title">Belum ada anggaran</div></div>'; return; }
    container.innerHTML = budgets.map(b => {
        const spent = getSpentByCategory(b.category_id);
        const pct = b.amount > 0 ? Math.min((spent / b.amount) * 100, 100) : 0;
        const isOver = spent > b.amount;
        const color = isOver ? '#ef4444' : (pct >= 80 ? '#f59e0b' : '#4ade80');
        const label = isOver ? '⚠️ Over Budget' : (pct >= 80 ? '⚠️ Mendekati' : '✅ On Track');
        return `<div class="budget-item" onclick="openBudgetModal('${b.id}')">
            <div class="header"><span class="name">${b.categories?.icon || '📁'} ${b.categories?.name || 'Kategori'}</span><span class="status" style="color:${color};background:${color}15;padding:2px 10px;border-radius:20px;font-size:11px;">${label}</span></div>
            <div class="amounts"><span>Rp ${formatRupiah(spent)}</span><span style="color:var(--text-secondary);">/ Rp ${formatRupiah(b.amount)}</span><span style="color:${b.amount - spent >= 0 ? '#4ade80' : '#f87144'};">${b.amount - spent >= 0 ? 'Sisa' : 'Kurang'} Rp ${formatRupiah(Math.abs(b.amount - spent))}</span></div>
            <div class="progress"><div class="fill" style="width:${pct}%;background:${color};"></div></div>
        </div>`;
    }).join('');
    document.getElementById('prevBudgetMonth').onclick = () => { if (currentBudgetMonth === 0) { currentBudgetMonth = 11; currentBudgetYear--; } else currentBudgetMonth--; renderBudgetPage(); };
    document.getElementById('nextBudgetMonth').onclick = () => { if (currentBudgetMonth === 11) { currentBudgetMonth = 0; currentBudgetYear++; } else currentBudgetMonth++; renderBudgetPage(); };
}

async function deleteTransaction(id) {
    const tx = transactions.find(t => t.id === id);
    if (tx?.proof_url) { const urlParts = tx.proof_url.split('/'); const path = urlParts.slice(urlParts.indexOf('transaction-proofs') + 1).join('/'); await sb.storage.from('transaction-proofs').remove([path]); }
    await sb.from('transactions').delete().eq('id', id);
    await loadTransactions();
    renderCurrentView();
    showToast('✅ Transaksi dihapus');
}

function setupRupiahInput(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', function() { const val = this.value.replace(/\./g, '').replace(/[^0-9]/g, ''); this.value = val ? formatRupiah(parseInt(val)) : ''; });
}

        const uid = await userManager.getUserId();
        if (!uid) { showToast('❌ User ID tidak ditemukan'); return; }
        const data = { description: desc, amount, type, created_at: new Date(tanggal).toISOString() };
        if (catId) data.category_id = catId;
        try {
            if (isEdit) {
                await sb.from('transactions').update(data).eq('id', editId);
                if (selectedFile) { if (window._removeOldProof && tx?.proof_url) await deleteProof(editId); await uploadProof(selectedFile, editId); }
                showToast('✅ Transaksi diupdate');
                modal.remove();
                await loadTransactions();
                renderCurrentView();
            } else {
                data.user_id = uid;
                const { data: newTx, error } = await sb.from('transactions').insert(data).select();
                if (error) throw error;
                if (newTx?.length) {
                    const txId = newTx[0].id;
                    if (selectedFile) await uploadProof(selectedFile, txId);
                    if (isRecurring) { showToast('🔄 Membuat transaksi berulang...'); await createRecurringTransaction(newTx[0], 12); await loadTransactions(); showToast('✅ Selesai!'); }
                }
                showToast('✅ Transaksi ditambahkan');
                modal.remove();
                await loadTransactions();
                renderCurrentView();
            }
        } catch(e) { showToast('❌ Error: ' + e.message); }
    };
    document.getElementById('closeModal').onclick = () => modal.remove();
}

async function uploadProof(file, txId) {
    if (!file) return null;
    try {
        const ext = file.name.split('.').pop();
        const path = `${currentUser.id}/${txId}_${Date.now()}.${ext}`;
        await sb.storage.from('transaction-proofs').upload(path, file, { cacheControl: '3600', upsert: true });
        const { data } = sb.storage.from('transaction-proofs').getPublicUrl(path);
        await sb.from('transactions').update({ proof_url: data.publicUrl }).eq('id', txId);
        showToast('📸 Bukti berhasil diupload!');
        return data.publicUrl;
    } catch(e) { showToast('❌ Gagal upload: ' + e.message); return null; }
}

async function deleteProof(txId) {
    try {
        const { data: tx } = await sb.from('transactions').select('proof_url').eq('id', txId).single();
        if (!tx?.proof_url) return;
        const parts = tx.proof_url.split('/');
        const path = parts.slice(parts.indexOf('transaction-proofs') + 1).join('/');
        await sb.storage.from('transaction-proofs').remove([path]);
        await sb.from('transactions').update({ proof_url: null }).eq('id', txId);
    } catch(e) { console.error(e); }
}

async function createRecurringTransaction(original, months = 12) {
    const uid = await userManager.getUserId();
    if (!uid) return 0;
    let count = 0;
    const origDate = new Date(original.created_at);
    const existingKeys = new Set();
    transactions.forEach(t => { const d = new Date(t.created_at); d.setHours(0,0,0,0); existingKeys.add(`${t.description}_${d.getFullYear()}_${d.getMonth()}`); });
    for (let i = 1; i <= months; i++) {
        const next = new Date(origDate);
        next.setMonth(origDate.getMonth() + i);
        if (next.getDate() !== origDate.getDate()) continue;
        const key = `${original.description}_${next.getFullYear()}_${next.getMonth()}`;
        if (!existingKeys.has(key)) {
            const d = { user_id: uid, description: original.description + ' (Ulang)', amount: original.amount, type: original.type, created_at: next.toISOString() };
            if (original.category_id) d.category_id = original.category_id;
            const { error } = await sb.from('transactions').insert(d);
            if (!error) { count++; existingKeys.add(key); }
        }
    }
    return count;
}

async function renderLaporan() {
    await loadTransactions();
    const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const filtered = transactions.filter(t => { const d = new Date(t.created_at); return d.getMonth() === currentMonth && d.getFullYear() === currentYear; });
    let pemasukan=0, pengeluaran=0, catTotals={};
    filtered.forEach(t => {
        if (t.type === 'pemasukan') pemasukan += Number(t.amount)||0;
        else pengeluaran += Number(t.amount)||0;
        const cid = t.category_id || 'uncategorized';
        catTotals[cid] = (catTotals[cid]||0) + Number(t.amount);
    });
    const labels = [], data = [], colors = [];
    Object.entries(catTotals).forEach(([id, val]) => {
        if (id === 'uncategorized') { labels.push('📁 Tanpa Kategori'); colors.push('#64748b'); }
        else { const cat = categories.find(c => c.id === id); if (cat) { labels.push(`${cat.icon} ${cat.name}`); colors.push(cat.color); } else { labels.push('📁 Unknown'); colors.push('#64748b'); } }
        data.push(val);
    });
    const html = `
        <div class="header"><div class="header-user"><div class="header-avatar">📊</div><div class="header-info"><div class="header-name">Laporan</div></div></div><div class="header-actions"><button class="header-btn" onclick="pushHistory(currentNav);currentNav='transaksi';updateNav();renderTransaksi();">←</button></div></div>
        <div class="month-selector" style="display:flex;justify-content:space-between;align-items:center;background:var(--bg-card);border-radius:12px;padding:8px 12px;margin-bottom:12px;">
            <button id="prevMonth" style="background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;">◀</button>
            <span style="font-weight:600;">${monthNames[currentMonth]} ${currentYear}</span>
            <button id="nextMonth" style="background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;">▶</button>
        </div>
        <div class="balance-card" style="padding:16px;"><div style="display:flex;justify-content:space-between;"><div>💚 +Rp ${formatRupiah(pemasukan)}</div><div>❤️ -Rp ${formatRupiah(pengeluaran)}</div><div>💰 ${pemasukan-pengeluaran >= 0 ? '+' : '-'}Rp ${formatRupiah(Math.abs(pemasukan-pengeluaran))}</div></div></div>
        <div class="card"><div class="card-title">📊 Statistik Kategori <button id="exportPdfBtn" style="background:var(--gradient-primary);border:none;border-radius:20px;padding:6px 14px;color:white;font-size:11px;font-weight:600;cursor:pointer;">📑 Export PDF</button></div><canvas id="laporanChart" style="max-height:180px;width:100%;"></canvas></div>
        <div class="card"><div class="card-title">📋 Detail</div><div id="detailTransaksi"></div></div>
    `;
    document.getElementById('appContainer').innerHTML = html;
    const ctx = document.getElementById('laporanChart')?.getContext('2d');
    if (ctx && data.length) {
        if (window.laporanChart && typeof window.laporanChart.destroy === 'function') window.laporanChart.destroy();
        window.laporanChart = new Chart(ctx, { type: 'pie', data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, padding: 8, usePointStyle: true } } } } });
    }
    const grouped = {};
    filtered.forEach(t => { const d = formatDate(t.created_at); if (!grouped[d]) grouped[d] = []; grouped[d].push(t); });
    let detail = '';
    Object.entries(grouped).forEach(([date, items]) => {
        const total = items.reduce((s, i) => s + (i.type === 'pemasukan' ? Number(i.amount) : -Number(i.amount)), 0);
        detail += `<div style="margin-top:12px;"><strong>📌 ${date}</strong> <span style="color:${total>=0?'#4ade80':'#f87171'}">${total>=0?'+':'-'}Rp ${formatRupiah(Math.abs(total))}</span></div>`;
        items.forEach(i => {
            const cat = getCategoryById(i.category_id);
            detail += `<div class="tx-item" style="padding:6px 0;cursor:pointer;" data-id="${i.id}"><div class="left"><span class="dot" style="background:${cat?.color||'#64748b'}"></span><div><div class="desc" style="font-size:12px;">${escapeHtml(i.description)}</div></div></div><div class="amount ${i.type==='pemasukan'?'income':'expense'}" style="font-size:12px;">${i.type==='pemasukan'?'+':'-'}Rp ${formatRupiah(i.amount)}</div></div>`;
        });
    });
    document.getElementById('detailTransaksi').innerHTML = detail || '<div class="empty-state">Tidak ada transaksi</div>';
    document.querySelectorAll('#detailTransaksi .tx-item').forEach(el => { el.onclick = () => { const id = el.dataset.id; const tx = transactions.find(t => t.id === id); if (tx) showTransactionDetail(tx); }; });
    document.getElementById('prevMonth').onclick = () => { if (currentMonth === 0) { currentMonth = 11; currentYear--; } else currentMonth--; renderLaporan(); };
    document.getElementById('nextMonth').onclick = () => { if (currentMonth === 11) { currentMonth = 0; currentYear++; } else currentMonth++; renderLaporan(); };
    document.getElementById('exportPdfBtn').onclick = async function() {
        try {
            showToast('📑 Menyiapkan PDF...');
            this.textContent = '⏳...';
            this.disabled = true;
            const el = document.createElement('div');
            el.innerHTML = document.querySelector('.balance-card')?.outerHTML + document.querySelector('.card:first-of-type')?.outerHTML;
            await html2pdf().set({ margin: 10, filename: `laporan_${currentYear}_${currentMonth+1}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } }).from(el).save();
            showToast('✅ PDF berhasil!');
            this.textContent = '📑 Export PDF';
            this.disabled = false;
        } catch(e) { showToast('❌ Gagal: ' + e.message); this.textContent = '📑 Export PDF'; this.disabled = false; }
    };
}

                <label class="theme-switch" style="position:relative;display:inline-block;width:48px;height:26px;"><input type="checkbox" id="darkModeSwitch" ${document.body.classList.contains('dark') ? 'checked' : ''} style="opacity:0;width:0;height:0;"><span class="slider" style="position:absolute;cursor:pointer;inset:0;background:#ccc;transition:0.3s;border-radius:34px;"><span style="position:absolute;content:'';height:20px;width:20px;left:3px;bottom:3px;background:white;transition:0.3s;border-radius:50%;${document.body.classList.contains('dark') ? 'transform:translateX(22px);' : ''}"></span></span></label>
            </div>
        </div>
        <div class="card"><div class="card-title">🔐 Password</div>
            <div class="password-wrapper"><input type="password" id="oldPass" class="modal-input" placeholder="Password Lama"><button class="toggle-password" data-target="oldPass" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;cursor:pointer;opacity:0.6;">👁️</button></div>
            <div class="password-wrapper"><input type="password" id="newPass" class="modal-input" placeholder="Password Baru (min 6)"><button class="toggle-password" data-target="newPass" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;cursor:pointer;opacity:0.6;">👁️</button></div>
            <div class="password-wrapper"><input type="password" id="confirmPass" class="modal-input" placeholder="Konfirmasi Password"><button class="toggle-password" data-target="confirmPass" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;cursor:pointer;opacity:0.6;">👁️</button></div>
            <button id="changePassBtn" class="modal-btn modal-btn-primary modal-btn-full">Update Password</button>
        </div>
    `;
    document.getElementById('appContainer').innerHTML = html;
    
    document.getElementById('darkModeSwitch')?.addEventListener('change', toggleTheme);
    document.getElementById('changePassBtn')?.addEventListener('click', async () => {
        const old = document.getElementById('oldPass').value;
        const newp = document.getElementById('newPass').value;
        const conf = document.getElementById('confirmPass').value;
        if (!old || !newp) { showToast('❌ Isi semua field'); return; }
        if (newp.length < 6) { showToast('❌ Password min 6 karakter'); return; }
        if (newp !== conf) { showToast('❌ Konfirmasi tidak cocok'); return; }
        const { error } = await sb.auth.updateUser({ password: newp });
        if (error) showToast('❌ ' + error.message);
        else { showToast('✅ Password diubah'); document.getElementById('oldPass').value = ''; document.getElementById('newPass').value = ''; document.getElementById('confirmPass').value = ''; }
    });
    document.querySelectorAll('.toggle-password').forEach(btn => { btn.onclick = () => { const inp = document.getElementById(btn.dataset.target); if (inp) { inp.type = inp.type === 'password' ? 'text' : 'password'; btn.textContent = inp.type === 'password' ? '👁️' : '🙈'; } }; });
    document.getElementById('createFamilyBtn')?.addEventListener('click', async () => { const name = document.getElementById('familyNameInput').value.trim(); if (!name) { showToast('❌ Masukkan nama'); return; } await createFamily(name); });
    document.getElementById('joinFamilyBtn')?.addEventListener('click', async () => { const id = document.getElementById('joinFamilyInput').value.trim(); if (!id) { showToast('❌ Masukkan ID'); return; } await joinFamily(id); });
    document.getElementById('inviteMemberBtn')?.addEventListener('click', async () => {
        const email = document.getElementById('inviteEmail').value.trim();
        if (!email) { showToast('❌ Masukkan email'); return; }
        const { data: user } = await sb.from('users').select('id').eq('email', email).maybeSingle();
        if (!user) { showToast('❌ User tidak ditemukan'); return; }
        const { data: existing } = await sb.from('family_members').select('id').eq('family_id', currentFamilyId).eq('user_id', user.id).maybeSingle();
        if (existing) { showToast('⚠️ Sudah menjadi anggota'); return; }
        await sb.from('family_members').insert({ family_id: currentFamilyId, user_id: user.id, role: 'member' });
        showToast('✅ Anggota ditambahkan');
        await loadFamilyData();
        renderSettings();
    });
    document.getElementById('leaveFamilyBtn')?.addEventListener('click', async () => {
        if (!confirm('Yakin keluar?')) return;
        const uid = await userManager.getUserId();
        await sb.from('family_members').delete().eq('family_id', currentFamilyId).eq('user_id', uid);
        await sb.from('user_settings').update({ family_id: null }).eq('user_id', uid);
        currentFamilyId = null; familyMembers = []; familyInfo = null;
        showToast('✅ Keluar dari keluarga');
        await loadAllData();
        renderSettings();
    });
}

// ============================================
// FAMILY FUNCTIONS
// ============================================
async function createFamily(name) {
    const uid = await userManager.getUserId();
    if (!uid) { showToast('❌ User ID tidak ditemukan'); return; }
    try {
        const { data: family } = await sb.from('families').insert({ name, created_by: uid }).select().single();
        await sb.from('family_members').insert({ family_id: family.id, user_id: uid, role: 'owner' });
        await sb.from('user_settings').upsert({ user_id: uid, family_id: family.id });
        currentFamilyId = family.id; familyInfo = family;
        showToast('✅ Keluarga dibuat!');
        await loadAllData();
        renderSettings();
    } catch(e) { showToast('❌ Gagal: ' + e.message); }
}

async function joinFamily(familyId) {
    const uid = await userManager.getUserId();
    if (!uid) { showToast('❌ User ID tidak ditemukan'); return; }
    try {
        const { data: family } = await sb.from('families').select('*').eq('id', familyId).single();
        if (!family) { showToast('❌ Keluarga tidak ditemukan'); return; }
        await sb.from('family_members').insert({ family_id: familyId, user_id: uid, role: 'member' });
        await sb.from('user_settings').upsert({ user_id: uid, family_id: familyId });
        currentFamilyId = familyId; familyInfo = family;
        showToast('✅ Bergabung ke ' + family.name);
        await loadAllData();
        renderSettings();
    } catch(e) { showToast('❌ Gagal: ' + e.message); }
}

function copyFamilyId() {
    if (!currentFamilyId) { showToast('❌ Tidak ada keluarga'); return; }
    navigator.clipboard.writeText(currentFamilyId).then(() => showToast('✅ ID disalin!')).catch(() => { const ta = document.createElement('textarea'); ta.value = currentFamilyId; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('✅ ID disalin!'); });
}

// ============================================
// EDIT PROFILE MODAL
// ============================================
async function openEditProfileModal() {
    const user = await userManager.getUserData();
    if (!user) { showToast('❌ Data user tidak ditemukan'); return; }
    const modal = document.createElement('div'); modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-title">✏️ Edit Profil</div>
            <div style="text-align:center;padding:12px;background:rgba(59,130,246,0.1);border-radius:12px;margin-bottom:12px;"><span style="color:var(--text-secondary);font-size:12px;">🆔 Kode User</span><div style="font-size:24px;font-weight:700;color:#3b82f6;">${user.user_code}</div></div>
            <input type="text" id="editUsername" class="modal-input" placeholder="Username" value="${escapeHtml(user.username || '')}">
            <input type="text" id="editDisplayName" class="modal-input" placeholder="Nama Tampilan" value="${escapeHtml(user.display_name || '')}">
            <div class="modal-button-grid">
                <button id="saveProfileBtn" class="modal-btn modal-btn-primary">💾 Simpan</button>
                <button id="closeProfileModal" class="modal-btn modal-btn-secondary">Batal</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('saveProfileBtn').onclick = async () => {
        const username = document.getElementById('editUsername').value.trim();
        const displayName = document.getElementById('editDisplayName').value.trim();
        if (!username) { showToast('❌ Username harus diisi'); return; }
        await userManager.updateProfile({ username, display_name: displayName || username });
        currentCustomUser = await userManager.getUserData();
        showToast('✅ Profil diupdate');
        modal.remove();
        renderSettings();
    };
    document.getElementById('closeProfileModal').onclick = () => modal.remove();
}

// ============================================
// BOTTOM NAVIGATION
// ============================================
function addBottomNav() {
    const navHtml = `
        <div class="bottom-nav">
            <button class="nav-item ${currentNav === 'home' ? 'active' : ''}" data-nav="home"><span class="nav-icon">🏠</span><span class="nav-label">Beranda</span></button>
            <button class="nav-item ${currentNav === 'transaksi' ? 'active' : ''}" data-nav="transaksi"><span class="nav-icon">📋</span><span class="nav-label">Transaksi</span></button>
            <div class="nav-center"><button class="nav-center-btn" id="centerAddBtn">+</button></div>
            <button class="nav-item ${currentNav === 'budget' ? 'active' : ''}" data-nav="budget"><span class="nav-icon">📊</span><span class="nav-label">Anggaran</span></button>
            <button class="nav-item" id="moreMenuBtn"><span class="nav-icon">📂</span><span class="nav-label">Lainnya</span></button>
        </div>
        <div id="moreMenuPopup">
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
                <button class="menu-popup-item" data-nav="tasks"><span class="icon">✅</span>Tugas</button>
                <button class="menu-popup-item" data-nav="hutang"><span class="icon">💰</span>Hutang</button>
                <button class="menu-popup-item" data-nav="savings"><span class="icon">🏦</span>Tabungan</button>
                <button class="menu-popup-item" data-nav="reminders"><span class="icon">⏰</span>Pengingat</button>
                <button class="menu-popup-item" data-nav="laporan"><span class="icon">📊</span>Laporan</button>
                <button class="menu-popup-item" data-nav="settings"><span class="icon">⚙️</span>Settings</button>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', navHtml);
    
    document.getElementById('centerAddBtn')?.addEventListener('click', () => openTransaksiModal());
    
    const moreBtn = document.getElementById('moreMenuBtn');
    const popup = document.getElementById('moreMenuPopup');
    let isPopupOpen = false;
    
    moreBtn?.addEventListener('click', (e) => {
        e.stopPropagation();
        isPopupOpen = !isPopupOpen;
        popup.classList.toggle('open', isPopupOpen);
        moreBtn.classList.toggle('active', isPopupOpen);
        moreBtn.style.color = isPopupOpen ? '#3b82f6' : '';
    });
    
    document.addEventListener('click', (e) => {
        if (isPopupOpen && !popup.contains(e.target) && e.target !== moreBtn && !moreBtn.contains(e.target)) {
            isPopupOpen = false;
            popup.classList.remove('open');
            moreBtn.classList.remove('active');
            moreBtn.style.color = '';
        }
    });
    
    document.querySelectorAll('.menu-popup-item').forEach(btn => {
        btn.addEventListener('click', () => {
            isPopupOpen = false;
            popup.classList.remove('open');
            moreBtn.classList.remove('active');
            moreBtn.style.color = '';
            pushHistory(currentNav);
            currentNav = btn.dataset.nav;
            updateNav();
            renderCurrentView();
        });
    });
    
    document.querySelectorAll('.nav-item[data-nav]').forEach(btn => {
        btn.addEventListener('click', () => {
            if (isPopupOpen) {
                isPopupOpen = false;
                popup.classList.remove('open');
                moreBtn.classList.remove('active');
                moreBtn.style.color = '';
            }
            pushHistory(currentNav);
            currentNav = btn.dataset.nav;
            updateNav();
            renderCurrentView();
        });
    });
}

function updateNav() {
    document.querySelectorAll('.nav-item[data-nav]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.nav === currentNav);
        btn.style.color = btn.dataset.nav === currentNav ? '#3b82f6' : '';
    });
}

function renderCurrentView() {
    if (!appReady) return;
    const views = {
        home: renderHome,
        transaksi: renderTransaksi,
        budget: renderBudgetPage,
        tasks: renderTasks,
        settings: renderSettings,
        hutang: renderHutang,
        savings: renderSavings,
        reminders: renderReminders,
        laporan: renderLaporan
    };
    if (views[currentNav]) views[currentNav]();
}

// ============================================
// AUTH FUNCTIONS
// ============================================
async function onAuthSuccess(user) {
    currentUser = user;
    document.getElementById('loginModal').style.display = 'none';
    let customUser = await userManager.setupCustomUser(user);
    if (!customUser) { customUser = { id: 0, user_code: 'USR-???', email: user.email, username: user.email.split('@')[0] }; userManager.customUser = customUser; userManager.authUser = user; }
    currentCustomUser = customUser;
    await loadAllData();
    await initTheme();
    appReady = true;
    addBottomNav();
    renderCurrentView();
    hideLoading();
}

async function logout() {
    await sb.auth.signOut();
    currentUser = null; currentCustomUser = null; appReady = false;
    document.querySelector('.bottom-nav')?.remove();
    document.getElementById('appContainer').innerHTML = '';
    document.getElementById('loginModal').style.display = 'flex';
    document.getElementById('emailInput').value = ''; document.getElementById('passwordInput').value = '';
    isLoginMode = true;
    document.getElementById('modalTitle').innerHTML = '💰 Keuangan Keluarga';
    document.getElementById('submitLoginBtn').innerHTML = 'Masuk';
    document.getElementById('switchText').innerHTML = 'Belum punya akun? Daftar';
    applyTheme(false);
}

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('modalTitle').innerHTML = isLoginMode ? '💰 Masuk ke Akun' : '💰 Daftar Akun Baru';
    document.getElementById('submitLoginBtn').innerHTML = isLoginMode ? 'Masuk' : 'Daftar';
    document.getElementById('switchText').innerHTML = isLoginMode ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Masuk';
}

async function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorDiv = document.getElementById('loginError');
    if (!email || !password) { errorDiv.textContent = 'Email dan password harus diisi'; return; }
    errorDiv.textContent = '';
    const loading = showLoading();
    if (isLoginMode) {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { errorDiv.textContent = error.message; clearInterval(loading); hideLoading(); return; }
        if (data.user) { await onAuthSuccess(data.user); }
    } else {
        if (password.length < 6) { errorDiv.textContent = 'Password minimal 6 karakter'; clearInterval(loading); hideLoading(); return; }
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { errorDiv.textContent = error.message; clearInterval(loading); hideLoading(); return; }
        if (data.user) { showToast('✅ Pendaftaran berhasil! Silakan login.'); toggleMode(); document.getElementById('emailInput').value = ''; document.getElementById('passwordInput').value = ''; clearInterval(loading); hideLoading(); }
    }
}

async function handleGuest() {
    const errorDiv = document.getElementById('loginError');
    errorDiv.textContent = '';
    const loading = showLoading();
    try {
        const { data, error } = await sb.auth.signInAnonymously();
        if (error) { errorDiv.textContent = error.message; clearInterval(loading); hideLoading(); return; }
        if (data.user) { await onAuthSuccess(data.user); }
    } catch(e) { errorDiv.textContent = 'Gagal masuk sebagai tamu: ' + e.message; clearInterval(loading); hideLoading(); }
}

async function startApp() {
    showLoading();
    await new Promise(r => {
        if (typeof supabase !== 'undefined') { r(); return; }
        let attempts = 0;
        const iv = setInterval(() => { attempts++; if (typeof supabase !== 'undefined') { clearInterval(iv); r(); } else if (attempts > 50) { clearInterval(iv); console.error('Supabase failed to load'); document.getElementById('loadingOverlay').classList.add('hidden'); document.getElementById('loginModal').style.display = 'flex'; document.getElementById('loginError').textContent = 'Gagal memuat Supabase. Refresh halaman.'; r(); } }, 200);
    });
    if (!initSupabase()) { document.getElementById('loadingOverlay').classList.add('hidden'); document.getElementById('loginModal').style.display = 'flex'; document.getElementById('loginError').textContent = 'Gagal memuat Supabase. Refresh halaman.'; return; }
    try {
        const { data } = await sb.auth.getSession();
        if (data.session?.user) await onAuthSuccess(data.session.user);
        else { document.getElementById('loginModal').style.display = 'flex'; hideLoading(); }
    } catch(e) { document.getElementById('loginModal').style.display = 'flex'; hideLoading(); }
}

// ============================================
// EVENT LISTENERS
// ============================================
document.getElementById('submitLoginBtn')?.addEventListener('click', handleLogin);
document.getElementById('guestBtn')?.addEventListener('click', handleGuest);
document.getElementById('switchText')?.addEventListener('click', toggleMode);
document.getElementById('toggleLoginPassword')?.addEventListener('click', () => {
    const inp = document.getElementById('passwordInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    inp.nextElementSibling.textContent = inp.type === 'password' ? '👁️' : '👁️‍🗨️';
});

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startApp);
else startApp();
</script>
